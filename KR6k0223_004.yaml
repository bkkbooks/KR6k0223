body:
  text: 金陵寶華山弘律沙門讀體集第六私房過量戒若比丘自求作屋無主自為己當應量作是中量者長佛十二磔手內廣七磔手當將比丘指授處所彼比丘當指示處所無難處無妨處若比丘有難處妨處自求作屋無主自為己不將比丘指授處所若過量作者僧伽婆尸沙緣起佛在王舍城靈鷲山中聽諸比丘作私房舍時有曠野國比丘聞佛聽許即私作大房功力繁多常行求索居士厭避復有一比丘欲起房舍自斫樹樹神作念欲打比丘恐違道理乃往白佛佛讚慰之示別所棲時大迦葉至曠野城居士遙見各自避去迦葉問知其故具陳白佛佛集僧而為結戒由依住處事諍恨住處鄙業煩惱制斯學處乃初篇盜根本種類釋義文分二節自求作屋下明其正制若比丘有難處妨處下結顯違犯律云自求者彼處處乞索無主者彼無有若一若兩若衆多施主自為已者自求索自為作也當應量作者是中量長佛十二磔手廣七磔手磔手者張指一跨也長者縱量乃房之深處廣者橫量乃房之寬處佛身長丈六一磔手準今小尺一尺六寸則深有一丈九尺二寸寬有一丈一尺二寸若太大則煩勞太小則逼狹令離二過故制此量也難處者有虎狼師子惡獸下至蟻子若不為此諸蟲獸所惱應修治平地若有石樹荊棘當使人掘出若有陷溝坑陂池處當使人填滿若畏水淹漬當豫設隄防若地為人所認當共斷無使他有語是名難處妨處者不通草車回轉是防處僧祇律云非妨處者四邊各容十二桄梯桄間各一拳肘令作事者周匝來往塗治覆苦以二尺為一拳肘彼作屋比丘看無難無妨已到僧中具儀三乞爾時衆僧當觀察此比丘為可信不可信若可信即當聽使作若不可信一切僧應到彼處看若衆僧不去遣僧中可信者往看若彼處有難有妨若無難有妨若有難無妨皆不應與處分若無難處無妨處應與處分白二羯磨此羯磨法於作持中明故云彼比丘當指授處所無難處無妨處既與羯磨已彼作房時應知初安若石若土墼泥團乃至治訖斯為如法結罪是中犯者若僧不處分一僧殘過量作一僧殘有難處一突吉羅有妨處一突吉羅若無難處是有妨處一突吉羅若有難處是無妨處一突吉羅若僧不處分一僧殘不過量作無犯有難有妨無難有妨有難無妨皆如上若僧已處分無犯過量作一僧殘有難有妨無難有妨有難無妨皆如上若僧已處分不過量作皆無犯若有難有妨無難有妨有難無妨得罪如上若作而不成僧不處分及過量作各得一偷蘭遮有難有妨無難有妨有難無妨得罪如上若使他作屋成僧不處分及過量作若僧已處分過量作若僧不處分不過量作得僧殘皆如上有難有妨無難有妨有難無妨得罪如上若為他作屋成僧不處分過量作僧已處分過量作僧不處分不過量作皆得偷蘭遮有難有妨無難有妨有難無妨得突吉羅如上若作而不成僧不處分及過量作有難有妨處一一皆犯突吉羅若作屋以繩拼地應量作者過量作者犯若教人案繩墨作彼受教者言如法作而過量彼受教者犯彼教人案繩墨作即如法作不還報作者犯若教人案繩墨作即如法作教者不問如法作否教者犯若僧不處分作不處分想僧殘不處分疑不處分作處分想處分作不處分想處分疑皆偷蘭遮若過量想疑亦如是若難有難想難疑有難無難想無難有難想並疑皆突吉羅若妨處想疑亦爾此戒具六緣方成本罪一無主自作私房二不求衆僧處分三作不處分想四違制過量五過量想六房已作成若緣有闕罪結方便兼制比丘尼偷蘭遮同制別學比丘尼因難事起故不聽住阿蘭若式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者如量作減量作僧處分作無難無妨處作如法拼作若為僧作為佛圖講堂草庵葉庵小容身屋及未制戒等是為不犯會採僧祗律云作房時若授磚泥團及壘磚等盡越毗尼罪若戶牖已成時偷蘭遮乃至作成時僧殘若房主比丘不捨戒不死不與僧若比丘於此房中若熏鉢若讀誦若思惟謂修定坐禪也一切受用得越毗尼罪十誦律云若比丘語餘比丘為我作舍語已便去後作未成行還自成是舍不如法作犯當仍請指授與量相應無諸難妨斯則何咎由依前人違制規模故爾成犯若得先成舍無犯根本律云若於不淨處有諍競處無進趣處自作使人作小房時於此三中隨有過皆得窣吐羅一不淨處者若有蛇蠍蟲蟻窟穴是二諍競處者若近王宮及以天祠或長者宅外道家苾芻尼寺或有好樹須伐是三無進趣處者若有河井或臨崖坎是摩得勒伽云乞房已不作偷蘭遮物不現前而作房偷蘭遮善見律云若長中減一磔手廣中益一磔手若減廣益長亦不得何況長廣俱過量若二三人共作屋若一比丘一沙彌悉不犯何以故人無一屋分故若段段分人得一屋分得僧殘罪此戒大乘同制梵網經所謂惡求多求菩薩戒本經所謂多欲不知足也引證佛因比丘自求作屋故種種訶責已告諸比丘往昔此恆水側有一螺髻梵志常居此水邊顏貌憔悴形體羸瘦時我詣彼與共相見而問其故彼報我言此水中有一龍王名曰摩尼犍大自出其宮來至我所以身繞我頭覆我上時我作念龍性暴急恐害其命以此憂患致使形容如是耳時我語梵志言汝欲使此龍常在水中不出至汝所不彼答我云實欲使此龍不來至我所我即問梵志彼龍有瓔珞不答言龍頸之下有好瓔珞佛語梵志言若此龍出水來至汝所時當起迎語言龍王且止持汝頸下瓔珞與我來并為説偈云我今須如此頸下好瓔珞汝以信樂心施我嚴好珠時彼梵志受我語已後時龍王從水中出梵志遙見往迎而為説偈爾時龍王復以偈報梵志云我所致財寶緣由此珠故汝是乞求人不復來相見端正好淨潔索珠以驚我不復來相見何為與汝珠於是龍王即時還宮更不復出爾時世尊即説偈言多求人不愛過求致怨憎梵志求龍珠便不復相見又一比丘所住林間於半夜後衆鳥悲鳴相呼而亂定意我教彼比丘語衆鳥云我今急須汝兩翅與我來時羣鳥出林更不復還汝等比丘當知乃至龍畜飛鳥尚不喜人乞索而況人乎多求無厭豈不怨憎第七大房不處分戒若比丘欲作大房有主為已作當將餘比丘往指授處所彼比丘應指授處所無難處無妨處若比丘有難處妨處作大房有主為已作不將餘比丘往看指授處所僧伽婆尸沙緣起佛在拘睒彌國瞿師羅園中時優填王與尊者闡陀為親友知識語言隨意任作房舍時近城有尼拘律神樹人馬往來多止息其下闡陀伐之而作大屋居士譏嫌諸比丘白佛故結此戒因起違諍為防譏過制斯學處乃初篇盜根本種類唯除過量無罪其餘所犯同上立緣用四準知不繁此戒大乘同制梵網經云頭陀行道乃至夏坐安居是諸難處皆不得入也第八無根謗戒若比丘瞋恚所覆故非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行若於異時若問若不問知此事無根説我瞋恚故作是語若比丘作是語者僧伽婆尸沙緣起佛在靈鷲山中時尊者沓婆摩羅子得阿羅漢果已自念我宜以力供養衆僧遂往白佛佛令諸比丘白二羯磨差沓婆摩羅分僧臥具及差次受請飯食時有慈地比丘是衆中下座隨次得惡房臥具便生瞋恚言沓婆摩羅有愛喜者與好不喜者與惡衆僧云何差如是人次日差僧受請慈地比丘被差次至檀越家檀越聞慈地比丘次來受食便於門外敷弊坐具施設惡食慈地倍瞋遂使其妹慈地比丘尼於佛僧會時誣謗尊者言沓婆摩羅來犯我世尊知而故問尊者尊者答言生來夢中尚無況覺時有佛告諸比丘有二種人一向入地獄何者為二若非梵行自稱梵行若真梵行以無根非梵行謗之是名為二如來種種訶責慈地比丘已與諸比丘結戒此是性罪由誣梵行事及不忍煩惱制斯學處乃初篇妄根本種類釋義文分三節瞋恚所覆下明誣謗之由若於異時下明覺悔發露若比丘作是語下結成所犯之罪律云瞋恚者有十惡法因緣故瞋十事中以一一生瞋法數云謂恚恨讒誑嬌忿怒慳癡妬於此十事而生瞋僧祇律云九惱及非處起瞋第十恨者凡夫及學人有不喜者乃至阿羅漢有瞋恚者由忿心而起忿恨忿他為瞋自忿為恚南山鈔云比丘以六和表用以慈心為體今云瞋恚所覆正覆此體違背六和致興毀謗大經云一念瞋心起八萬障門開根者有三種根一見根二聞根三疑根見根者實見犯梵行見偷五錢過五錢見斷人命若他見者從彼聞是謂見根聞根者若聞犯梵行聞偷五錢過五錢聞斷人命聞自歎譽得上人法若彼説從彼聞是謂聞根疑根者有二種生疑從見生疑者若見與婦女入林出林無衣裸形不淨污身手捉刀血污與惡知識伴是謂從見生疑從聞生疑者若在暗地若聞牀聲若聞草褥轉側聲若聞身動聲若聞共語聲若聞交會聲若聞我犯梵行聲聞言偷五錢過五錢若聞言我殺人若聞言我得上人法是謂從聞生疑除此三根已更以餘法謗者是謂無根欲壞彼清淨行者欲壞彼人清淨之名不得與僧共同法事故若於異時等者若問者被他如法比丘而來詰問僧祇律云若撿校者問言汝見何事淫耶盜五錢耶殺人耶稱過人法耶云何見因何見何處見是名檢校不如是問是名不檢校若不問者是瞋恚人過後覺語希求清淨自己發露無根毀謗之事縱雖過後覺悔其罪於一生謗説時已成豈容露而獲免結罪是中犯者若不見聞疑言見聞疑不論前人清淨不清淨以波羅夷法謗説而了了僧殘説而不了了偷蘭遮此中互明恐昧正制故下一一列次俾知所犯也不見聞疑生見聞疑想後忘想言見聞疑以波羅夷法謗亦如上不見聞疑彼有疑後言無疑我見聞疑以波羅夷法謗亦如上不見聞疑生疑後忘疑言見聞疑以波羅夷法謗亦如上不見聞疑是中無疑言有疑見聞疑以波羅夷法謗亦如上不見聞疑是中無疑後忘無疑言我見聞疑以波羅夷法謗亦如上不見有見想後忘想言聞疑以波羅夷法謗亦如上不見有疑言無疑有聞疑以波羅夷法謗亦如上不見有疑後忘疑言聞疑以波羅夷法謗亦如上不見無疑言聞疑以波羅夷法謗亦如上不見無疑後忘無疑言聞疑以波羅夷法謗亦如上聞疑亦如是除四波羅夷不論前人清淨不清淨更以餘非比丘法謗言犯邊罪犯比丘尼賊心受戒破內外道犯五逆非人畜生黃門二根説而了了僧殘説不了了偷蘭遮若指印書遣使作知相以無根四棄及十三種非比丘法謗知而了了者僧殘不了了者偷蘭遮若以八波羅夷法一淫二盜三殺四妄五染心觸摩六染心八事七覆他重罪八順從作舉是為尼八棄也及犯邊罪乃至二根非比丘尼法謗比丘尼亦如上除比丘及尼以無根罪謗餘人者突吉羅餘人即小三衆及優婆塞優婆夷也此戒以五緣成犯一有瞋心二無三根三是四棄非比丘法四謗受具人五説明了若緣一闕罪結方便兼制比丘尼僧殘同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者見聞疑有根實説戲説疾疾説獨説夢中説若欲説此錯説彼又最初未制戒等是為不犯會採僧祗律云若於波羅夷中一一語謗僧殘十三事中一一法謗犯波逸提以三十事及九十中一一法謗得越毗尼罪於四可呵及衆學法中一一謗者犯越毗尼心悔比丘尼八波羅夷十九僧殘若一一謗波逸提若以三十事及百四十一波逸提一一謗犯越毗尼罪以八可呵及衆學法一一謗犯越毗尼心悔式叉摩那十八事若一一謗言更當與學戒犯偷蘭遮十八事者一不分別衣二離衣宿三觸火四足食五害生種六青草上棄不淨七輒上高八觸寶九殘宿食十壞地十一不受食十二損生苗及本所受學六法一染心相觸二盜減五錢三斷畜生命四小妄語五非時食六飲酒是名十八事沙彌沙彌尼十戒若一一謗言當更與出家犯越毗尼罪下至俗人五戒一一謗犯越毗尼心悔律攝云若塢波索迦即優婆塞謗苾芻者應與作覆鉢羯磨此法於作持中明此戒大乘同制若向外人説犯重若向同法説犯輕引證十誦律云夫人處世間斧在口中生以是自斬身斯由作惡言第九取片謗戒若比丘以瞋恚故於異分事中取片非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼於異時若問若不問知是異分事中取片是比丘自言我瞋恚故作是語作是語者僧伽婆尸沙緣起佛在羅閲城耆闍崛山中時慈地比丘從耆闍崛山下見大羝羊共母羊行淫便以羝羊比尊者沓婆母羊比慈地尼往語諸比丘言前以無根法謗今親自眼見時諸比丘詰問乃自謂沓婆無此事是清淨人我向者從靈山下見羝母羊行淫以相似事比類而説諸比丘聞知白佛結戒此是性罪由誣梵行事及不忍煩惱制斯學處乃初篇妄根本種類釋義文分三節如上瞋恚如上十誦律云異分者四波羅夷是是中若犯一一事非沙門非釋子失比丘法故名異分片者諸威儀事善見律云餘分者沓婆慈地尼是人羊是非人以羊當人故名餘分餘分即異分也餘義同前釋結罪是中犯者若不清淨人與不清淨人相似名同姓同相同以此人事謗彼若不清淨人與清淨人相似名姓相同以此人事謗彼若清淨人與不清淨人相似名姓相同以此人事謗彼若清淨人與清淨人相似名姓相同以此人事謗彼若見本在家時犯淫盜五錢若過五錢若殺人便語人言我見比丘犯淫盜殺此謂見居家受持優婆塞戒時所作非出家受具後事若聞本在家時犯淫盜殺及聞自稱説上人法便言我聞比丘犯淫盜殺妄語若比丘如是以異分無根四事法謗比丘説而了了者皆僧殘説而不了了者皆偷蘭遮其餘所犯輕重及不犯等並大乘同制一一如前第十不捨壞僧法戒若比丘欲壞和合僧方便受壞和合僧法堅持不捨彼比丘應諫是比丘大德莫壞和合僧莫方便壞和合僧莫受壞僧法堅持不捨大德應與僧和合與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣起佛在靈鷲山時提婆達多為利養故學得神通化太子阿闍世令生信樂大得供養唯不如佛心生嫉妬即失神通欲畜徒衆伺候佛大衆會時往至佛所求佛付囑云世尊年已老邁壽過於人學道亦久宜居間靜默然自守世尊是諸法之王宜可以僧付囑我我當將護世尊訶責言我尚不以僧付舍利弗目犍連況汝癡人涕唾之身豈可付囑時提婆達多即生不忍心便教阿闍世害父遣人害佛不遂自往靈鷲山頂執石遙擲世尊由是惡名流布利養斷絶乃通己五人家家乞食通己五人者有四伴故一名三聞達多此人智慧高才故居其首二名騫荼達婆是調達親友三名拘婆離是調達弟子四名迦留羅鞮舍是人有姊妹七人皆為比丘尼有大勢力佛制不聽別衆食彼即作是念未曾有瞿曇乃斷人口食我寧可破彼僧倫我身滅後可得名稱言瞿曇有大神力智慧無礙而調達能破即共四比丘為伴以五法教諸比丘言如來常稱説頭陀少欲知足樂出離者我今有五法亦是頭陀勝法少欲知足樂出離者一盡形壽乞食二盡形壽著糞掃衣三盡形壽露地坐四盡形壽不食酥鹽五盡形壽不食魚肉可共行之令其新學無智比丘信樂諸比丘聞已白佛佛告諸比丘提婆達多今日欲斷四聖種即衣食臥具醫藥四依法也世尊以無數方便訶責提婆達多汝莫斷四聖種汝莫以五法教諸比丘汝今莫方便受破和合僧法堅持不捨汝當與僧和合當知破和合僧甚惡得大重罪在地獄中一劫受罪不可救療世尊以種種方便令提婆達多破僧心暫息令僧與提婆達多作訶諫白四羯磨若餘比丘方便欲破和合僧者亦當以此白四羯磨訶諫乃為諸比丘結戒此由僧伽事及邪智煩惱制斯學處乃初篇妄根本種類釋義文分四節若比丘欲壞和合僧下明舉破僧之人法彼比丘應諫是比丘下明如法諫捨之詞是比丘如是諫時下明訶諫白四羯磨若不捨者下結成違諫之罪律云和合者同一羯磨同一説戒僧者四比丘若五若十乃至無數破者即壞也破有十八事法非法律非律犯非犯若輕若重有殘無殘粗惡非粗惡常所行非常所行事十誦律云常所行事者若白一白二白四布薩自恣立十四人羯磨制非制説非説住破僧法者即住此十八事住即堅持不捨律攝云既思衆破攝化門徒自守邪宗多求惡黨是以堅執不捨下數句皆準律攝義釋之彼比丘應諫是比丘者諫謂以直言悟人也此諫乃別諫非僧中羯磨雖無羯磨但以言遮令除惡見大德莫壞和合僧等者此三句為之訶誡意謂和合衆不可破若破定墮地獄受苦一劫不能救療大德應與僧和合等者此是勸論之詞以顯不破和合僧豈但無地獄苦抑且有大利益故歡喜者謂善增益各各情悅故無諍者謂彼此見同共相受樂無諍訟故同一師學者謂於一如來大師教中修學不生異見以如來教法雖分十二體無別故如水乳合者謂以水乳和合即同一相一味無別色昧喻四姓異數出家入如來法中同名釋子同修解脫行與理順一相無別故於佛法中有增益安樂住者謂既同一學行理無違於三毒煩惱善能調伏令善法聚增益安樂如來聖教得以流通久住世間故是比丘如是諫時堅持不捨彼比丘應三諫等者僧祗律云三諫者屏處三諫多人中三諫衆中三諫非謂但三諫而已第三分云有二事破僧妄語相似語相似語者謂倣佛聖語相似律制實非法非律律攝云調達以愚癡故心生異見壞破僧伽於形相等改佛正則自制五事謗三淨教勸諸愚小習行五法言五事者一不食乳酪犢子飢困故二不食魚肉由斯殺生故三不噉於鹽多有塵土故四不截衣繢廢損織功故五不住蘭若受房生福故衣服飲食臥具醫藥婆沙論云醫藥攝三中第四出樂斷樂修聖種故云四聖種復有二事破僧作羯磨取籌若一比丘乃至二人三人雖求方便亦不能破僧亦非比丘尼等能破僧若此衆四人若過彼衆四人若過行破僧籌作羯磨是為破和合僧泥犂中受罪一劫不療能和合者得梵天福一劫受樂結罪是中犯者若比丘方便欲破和合僧受破僧法堅持不捨彼比丘當諫此比丘言大德莫方便欲破和合僧莫受破僧法堅持不捨大德當與僧和合歡喜不諍同一水乳於佛法中有增益安樂住大德可捨此事莫令僧作訶諫而犯重罪若用語者善用語者是納諫言以捨其事而云善者謂免本罪但犯方便輕罪也此即僧祗云屏處三諫也若不用語者若復令比丘比丘尼優婆塞優婆夷若王若大臣種種異道沙門婆羅門求異道沙門即諸出家外道也而云求者謂求聽也若比丘如律如法諫人者先當語彼人云大德我今欲諫汝汝當納聽我言彼人應答云我與汝諫若餘方比丘聞知其人信用言者應求若用言者善而言他方比丘者乃彼破僧者親友所以彼此相信其説此即僧祗云多人中三諫也若不用言者應作白作白已應更求大德我已白竟餘有羯磨在汝今可捨此事莫令僧為汝作羯磨更犯重罪若用語者善若不用語者應作初羯磨作初羯磨已應更求大德我已白作初羯磨竟餘有二羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若用語者善若不用語者應作第二羯磨作第二羯磨已應更求大德我已作白二羯磨竟餘有一羯磨在汝可捨此事莫令僧更為汝作羯磨而犯重罪若能捨者善若不捨者與説第三羯磨此即僧祗云衆中三諫也第三羯磨竟不捨僧殘作白二羯磨竟捨者三偷蘭遮作白一羯磨竟捨者二偷蘭遮若白竟捨者一偷蘭遮若初白未竟捨者突吉羅若一切未白方便欲破和合僧受破和合僧法堅持不捨一切突吉羅一切未白謂衆僧未曾與作一白三羯磨前若屏處三諫若多人中三諫不捨之時一一皆突吉羅今但明諫詞及訶諫語其羯磨法俱載作持中若不如律制諫者縱諫不成下三戒亦爾若僧為破僧人作訶諫羯磨時有比丘教言莫捨此比丘偷蘭遮若不訶諫教言莫捨突吉羅若比丘尼教言莫捨尼偷蘭遮若不訶諫尼教莫捨突吉羅除比丘比丘尼更有餘人教莫捨盡突吉羅餘人謂小三衆此戒以五緣方成本罪一要有破僧心二同黨滿衆三屢諫不捨四羯磨如法五三番白竟若緣有闕犯則開輕兼制比丘尼僧殘同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者初諫便捨若非法別衆作訶諫非法和合衆作訶諫法別衆法相似別衆法相似和合衆非法非律非佛所教若一切未作訶諫若破惡友破惡知識若破方便欲破僧者遮令不破若破方便助破僧者二人三人羯磨若欲作非法非毗尼羯磨若為僧為塔為和尚阿闍黎同和尚阿闍黎為知識作損減作無住處者及最初未制戒等如是皆無有犯會採僧祗律云若知是欲破僧人者諸比丘應語長老莫破僧破僧罪重墮惡道入泥犁我當與汝衣鉢授經讀經問事教誡若故不止者應語有力勢優婆塞言長壽此人欲破僧當往諫嘵語令止優婆塞應語尊者莫破僧破僧罪重墮惡道入泥犁我當與尊者衣鉢病瘦湯藥若不樂修梵行者可還俗我當與汝婦供給所須若故不止者應拔籌驅出出已應唱言諸大德有破僧人來宜當自知若如是備猶故破僧者是名破僧五分律云我不見餘法壞人道意如名聞利養者調達所以破僧為利養故調達成就八非法故破僧利不利稱無稱敬不敬樂惡隨惡知識有四事名破僧説五法自行籌捉籌於界內別行僧事復次若王若大臣若餘六衆七衆除比丘也令僧不和合而非破若一比丘乃至七比丘不和合亦非破若不問上座而行僧事是即不和亦非僧破若不共同食於食時異坐鬬諍罵詈亦不名破要於界內八比丘以上分作二部別行僧事乃名為破是中作主者一劫墮大地獄不可救彼比丘欲破僧餘僧見聞知差一與親厚比丘往諫若捨者應一突吉羅悔過若不捨應遣衆多比丘往諫若捨者應二突吉羅悔過若復不捨應僧往諫若捨者應三突吉羅悔過若不捨復應白四羯磨諫之白已捨者應三突吉羅一偷蘭遮若白初羯磨已捨者三突吉羅二偷蘭遮若白二羯磨已捨者三突吉羅三偷蘭遮若白三羯磨未竟捨者三突吉羅三偷蘭遮三羯磨竟捨不捨皆僧殘罪十誦律云破僧有二種破羯磨破法輪破羯磨者一界內別作布薩羯磨破法輪者輪名八聖道分令人捨八聖道入邪道中若如法如律如佛教三約敕竟不捨者僧殘是比丘應即時入僧中自唱言諸長老我某甲比丘得僧殘罪若即説者善若不即説者從是時來名覆藏日數又云不先軟語約敕便白四羯磨約敕作羯磨人得突吉羅未白四羯磨便擯出去作羯磨人得突吉羅未作三語約敕於界內別請人作羯磨得偷蘭遮破僧因緣故若衆僧知衆僧得罪善見律云餘戒最初不犯此戒提婆達多最初犯以其僧三諫不捨故薩婆多論云破僧輪犯逆罪偷蘭遮不可悔破羯磨僧犯非逆罪可懺偷蘭遮破僧輪下至九人一人自稱佛破羯磨僧下至八人不自稱作佛破僧輪界內界外盡破破羯磨僧要在界內別作羯磨破僧輪必比丘破羯磨僧比丘尼亦能破僧輪破俗諦僧破羯磨僧亦破第一義僧破僧輪但南洲諸佛皆出現南閻浮提故破羯磨僧通三天下唯除北洲僧衆少居故但言三天下此戒大乘同制若僧輪未破即是惡心瞋心僻教戒攝僧輪若破則成逆不通懺悔附考僧祗律云破僧者若於中布施故名良福田於中受具足故名受具足若覺已應去若不去者是名破僧伴是破僧伴黨盡壽不應共語共住共食不共三寶事不共布薩安居自恣不共羯磨得與餘外道出家人有牀座欲坐便坐不得與彼令坐準律所言破僧之人猶名福田猶名善受具者以破僧罪是偷蘭遮不同犯四棄失本戒體故云猶是福田如金杖雖斷兩處皆金既不失戒仍是僧伽而令篤信平等行施初出家時未當覺知但以好心從之受具受具心真豈不得戒如後覺知理無共住安有甘心作破僧伴黨是以應去也第十一不捨惡黨破僧戒若比丘伴黨若一若二若三乃至無數是比丘語彼比丘言大德莫諫此比丘此比丘是法語比丘律語比丘此比丘所説我等喜樂此比丘所説我等忍可彼比丘言大德莫作是説言此比丘是法語比丘律語比丘此比丘所説我等喜樂此比丘所説我等忍可然此比丘非法語比丘非律語比丘大德莫欲破壞和合僧汝等當樂欲和合僧大德與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣起佛在王舍城靈鷲山中時調達伴黨方便助破和合僧語諸比丘言汝莫訶調達所説調達是法語比丘律語比丘調達所説我等忍可諸比丘以此白佛佛種種訶責調達伴黨已令僧作訶諫白四羯磨若有如是伴黨相助壞和合僧者亦當作如是訶諫白四羯磨乃與諸比丘結戒此戒所由之事及起煩惱並根本種類皆同於上釋義文分四節若比丘伴黨下是助破僧者返遮如法進諫彼比丘言大德莫作是説下明諫彼非法伴黨是比丘如是諫下明訶諫白四羯磨若不捨者下結成違諫之罪律云順從者有二順從順從謂同邪違正依隨而住即助破伴黨也一法順從以法教授增戒增心增慧諷誦承受二衣食順從給與衣被飲食牀座臥具病瘦醫藥法語律語者律攝云語詞圓足曰法語合理無差曰律語又能引實義名法語出柔軟言名律語我等喜樂者彼所作事咸稱我心我等忍可者彼有所説咸願受持大德莫作是説等者勸其依隨正部捨背邪黨餘如上釋結罪是中犯者若比丘作非法羣黨語諸比丘言大德汝莫諫此比丘此比丘是法語比丘律語比丘此比丘所説我等忍可應諫此羣黨比丘云大德莫作是語此比丘是法語比丘律語比丘此比丘所説我等忍可而此比丘非法語比丘非律語比丘汝等莫壞和合僧當助和合僧大德與僧和合歡喜不諍同一水乳於佛法中有增益安樂住可捨此事勿為僧所訶更犯重罪若隨語者善若不隨語者僧當作白乃至三羯磨訶諫捨不捨所犯輕重悉皆同前犯緣同前兼制比丘尼僧殘同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開此中不犯者同前準本律所明自此下三戒無有令四衆若王大臣等及餘方比丘信語者復求諫捨之法唯比丘屏處別諫屏諫不捨僧即應作白三羯磨訶諫之所以有異上者上乃自立邪宗為主破僧是故聖慈愈切展轉多方會採十誦律云若一比丘被擯四比丘隨之名為破僧若多知多識多聞大德明解三藏義人不應與作不見擯得偷蘭遮破近僧故所言擯者擯有能擯所擯之人法有是法非法之別若能擯者如法如律則罪屬所擯及隨擯人若能擯者非法非律則罪屬能擯者及僧然如法比丘雖枉受擯決不在界內別行僧事而破僧也若多知多識等不應與作不見擯者非謂彼等有過怖愛容恕不治由恐擯彼一人多人隨之必致破僧分部但須善權勸誘令其見罪是以不得輒作羯磨若輒作者反獲其罪不善稱量而無方便密護僧倫也律攝云若他諫時心同惡黨設令不語亦犯衆教即僧殘有言不同而心樂破犯窣吐羅尼衆若破不應教授應告彼曰姊妹應先和合方求教授若苾芻尼衆不咨稟苾芻輒自擅意別為軌則聚徒衆者得窣吐羅罪諸有被責求寂等若餘苾芻輒供衣食而攝養者破他門徒得窣吐羅罪若作好心欲令調伏權時攝誘者無犯此戒大乘同制如上第十二被擯不服戒若比丘依聚落若城邑住污他家行惡行污他家亦見亦聞行惡行亦見亦聞諸比丘當語是比丘言大德污他家行惡行污他家亦見亦聞行惡行亦見亦聞大德汝污他家行惡行今可遠此聚落去不須住此是比丘語彼比丘作是語大德諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘報言大德莫作是語有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者而諸比丘不愛不恚不怖不癡大德污他家行惡行污他家亦見亦聞行惡行亦見亦聞是比丘如是諫時堅持不捨者彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣起佛在舍衛國時羈連邑有二比丘一名馬師二名滿宿作非法行自種華樹自溉灌自摘華自作鬘自持鬘與人亦教他如是作若彼村落中有婦女共同一牀坐起同一器飲食語言戲笑或自歌舞倡伎或教他作己唱和或俳説鼓簧吹貝受雇戲笑等時有衆多比丘至羈連乞食法服齊整行步庠序低目直前不左右顧視諸居士見反以為非不施飲食諸比丘詢知其故具以白佛佛敕舍利弗目犍連往作驅擯白四羯磨二尊者受敕往彼集僧已為彼二人作舉作憶念與罪羯磨時彼二人言衆僧有愛恚怖癡更有餘同罪比丘有驅者有不驅者而獨驅我二尊者還舍衛以此白佛佛令僧與作訶諫白四羯磨為諸比丘結戒此由受用鄙事故而行污家由家慳惱制斯學處乃初篇殺根本種類若謗僧愛恚怖癡乃妄根本種類釋義文分六節若比丘依聚落下明舉所為之非諸比丘當語是比丘等下明驅擯之法是比丘語彼比丘作是語下是非法人反謗如法僧諸比丘報言下明諫捨謗擯是比丘如法諫時下乃訶諫白四羯磨不捨者下結成違諫之罪律云村者有四種如上村即聚落也城邑者屬王城者以城盛民也邑者都邑也周禮以四縣為都四井為邑家者有男有女是俗居之宅污他家有四種事一依家污家若比丘從一家得物與一家所得物處聞之不喜所與物處思當報恩即作是言若有與我者我當報之若不與我者我何故與是為依家污家二依利養污家若比丘如法得利乃至鉢中之餘或與一居士不與一居士彼得者即生是念當報其恩其有與我者我當報之若不與我我何故與是為依利養污家三依親友污家若比丘依王若大臣或為一居士或不為一居士所為者即思當報恩其為我者我當供養不為我者我不供養是為依親友污家四依僧伽藍污家若比丘取僧華果與一居士不與一居士得者作念其有與我者我當供養不與我者我不供養是為依僧伽藍污家行惡行者自種華樹教人種華樹乃至受雇戲笑如上所説亦見亦聞者此顯見聞疑性性者實也今可遠此聚落去不須住此者此乃驅擯之語是比丘語彼比丘作是語大德諸比丘有愛等者因如法驅擯反生謗語有愛謂愛念之者當驅而不驅有恚謂瞋恚之者不當驅而即驅有怖謂於逃去者不敢治罰有癡謂無有智慧有污家輩不善分別可擯不可擯者結罪是中犯者若比丘依聚落住污他家行惡行污他家亦見亦聞行惡行亦見亦聞如法比丘應諫此污家惡行比丘言大德污他家亦見亦聞行惡行亦見亦聞大德污他家行惡行可捨此事莫為僧所訶更犯重罪若隨語者善若不隨語者僧應作白乃至三羯磨捨不捨所犯輕重皆同於上唯異未白前反謗僧言有愛恚怖癡一切突吉羅此戒以四緣成罪一親近白衣住二作污家行三心有貪瞋四謗諫不捨若緣不具唯治方便兼制比丘尼僧殘同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若初語時捨若非法別衆乃至一切未作訶諫前不捨不犯本罪若與父母病人小兒妊身婦女牢獄繫人寺中客作不犯污他家若為三寶種華樹摘取貫華作鬘自持供養教人為供三寶種華等若走避恐難跳躑坑渠若同伴行在後還顧不見嘯喚不犯行惡行及最初未制戒等是為不犯會採十誦律云若言諸比丘隨愛瞋怖癡行得四偷蘭遮若言有驅者有不驅者呵罵僧故得波逸提若未作驅出羯磨時言諸比丘隨愛瞋怖癡行突吉羅是不應約敕言不應約敕者非謂棄而不諫應當集僧作白三羯磨呵諫也薩婆多毗婆沙云凡出家人無為無欲清淨自守以修道為心若與俗人信使往來廢亂正業非出家所宜又復若以信物贈遺白衣則破前人平等好心於得物者歡喜愛敬不得物者縱使賢聖無愛敬心失他前人深厚福利又復倒亂佛法凡在家人應以飲食衣服供養出家人而出家反供養白衣仰失聖心又亂正法凡在家人常於三寶求清淨福田割損身肉以種善根以出家人信物贈遺因緣故反於出家人生希望心破他前人於三寶中清淨信敬又失一切出家人種種利養若以少物贈遺白衣縱使起七寶塔種種莊嚴不如靜坐清淨持戒即是供養如來真實法身若以少物贈遺白衣正使得立精舍猶祗桓不如靜坐清淨持戒即是清淨供養三寶若以少物贈遺白衣縱令四事供滿閻浮提一切賢聖不如靜坐清淨持戒即是清淨供養一切賢聖若有強力欲破塔壞像若以贈遺得全濟者當賣塔地華果若塔有錢若餘緣得物隨宜消息若有強力欲於僧祗作破亂折減若僧祗中隨有何物賣以作錢隨緣消息若僧常臘若面門臘若有強力欲作折減隨此地中所可出物以消息之僧常臘即常住僧物面門臘即現前僧物毗婆沙中并自恣物佛塔物通稱為臘未詳何義或取以時受用意父母是福田則聽供養若僧祗人以為僧祗役故此則應與一切孤窮乞丐憐愍心故應與第三分云比丘不應為白衣剃髮除欲出家者僧畜剃髮刀名曰戒刀若非出家求度豈可泛用今時不禁由不知律故也第四分云比丘不應禮白衣及白衣塔廟不應故左繞行白衣塔廟即在家人之墳墓祠堂也故左繞者謂有心故慢而左逆繞之西域凡作禮時皆從右繞為順以表恭敬也不應與人卜占亦不應從人卜占不應事餘種種外道法不應誦外道安置宅舍吉凶符書呪術不應自作伎樂若吹貝供養塔聽令白衣作不應畜鸚鵡等鳥不應畜狗律攝云為防守故隨意養狗不應乘象馬車乘輦輿捉持刀劒老病者聽乘步挽車即輩輿也若男乘男畜也避難聽乘象馬於聖法律中歌戲猶如哭儛如狂者戲笑似小兒不應向暮至白衣家除為三寶事病比丘事或檀越相喚常喜往返白衣家有五過一數見女人二漸相附近三轉親厚四生欲意五或犯死罪犯四棄不可救故名死罪若次死罪若犯僧殘前四並初二兩篇從生偷蘭還可救故云次死五分律云不應以僧果餉白衣若乞應與十誦律云比丘有五不應行處童女寡婦婦淫女比丘尼又有五不應行處賊家旃陀羅家酤酒家淫女家屠兒家根本雜事云五非處不應住立唱令家即優俳戲樂之家淫聲美色能惑人道意也淫女家酤酒家王家旃陀羅家善見律云檀越請比丘送喪不得去若比丘自念我往看葬作無常觀因此故我或得道果如是去無罪根本尼陀那云苾芻不應賣藥若善醫方者起慈愍心應病與樂不得受他價直諸雜類人既出家已不應輒顯昔時伎業亦不得畜工巧器具若先是醫人聽畜針筒及盛刀子袋若先書生聽畜墨瓶此戒大乘同制污他家即因利求利經理白衣等戒行惡行即邪業覺觀邪命自活等戒言僧有愛恚怖癡即謗僧戒所攝引證緇門警訓云但以邪心有涉貪染為利賣法禮佛讀經斷食諸業所獲贓賄皆曰邪命物正乖佛化斷食者或一七乃至七七日禁咽絶䬸或唯飲水或用粳麩縱然忘身為衆自無所求尚非正行何況存貪顯異而云苦修此則正乖佛制也戒疏發隱云有四正命一深山草果二常行乞食三檀越送供四隨大衆食以此四法清淨活命無所染污佛藏經云或有比丘因以我法出家受戒於此法中勤修精進雖諸天神諸人不念但能一心勤行道者終不念衣食所須所以者何如來福藏難盡如來滅後白毫相中百千億分其中一分供養舍利及諸弟子設使一切世間人皆共出家隨順法行於白毫相百千億分不盡其一第十三不捨惡性戒若比丘惡性不受人語於戒法中諸比丘如法諫己自身不受諫語言諸大德莫向我説若好若惡我亦不向諸大德説若好若惡諸大德且止莫諫我彼比丘諫是比丘言大德莫自身不受諫語大德自身當受諫語大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子衆得增益展轉相諫展轉相教展轉懺悔是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣起佛在拘睒彌國美音長者園中時尊者闡陀惡性不受人語語諸比丘言汝莫語我好惡且止莫有所説何用教我為我應教諸大德何以故我聖主得正覺故而云我聖主者自謂佛是我家之佛也譬如大水初來漂諸草木積在一處亦如大風吹諸草木集於一處諸大德亦如是種種姓種種名種種家出家集在一處是故諸大德不應教我我應教諸大德我聖主得正覺故諸比丘具陳白佛佛令僧與彼作訶諫白四羯磨為諸比丘結戒此由惡性故遂生惱根自損損他制斯學處乃初篇妄根本種類釋義文分四節若比丘下明惡性違教彼比丘諫是比丘下明諫捨惡性是比丘如是諫時下明作白羯磨訶諫不捨者下結成犯罪律云惡性不受語者不忍不受人教誨以戒法中如法諫者有七犯聚波羅夷僧殘波逸提波羅提提舍尼偷蘭遮突吉羅惡説諸部不言七聚唯本律明之於突吉羅中開出惡説自身不受諫語者得如法諫誨之時仍守惡性自用戾情不納他言乃作不共語也諸大德莫向我説若好若惡者謂利益事不須勸喻非利事勿相遮止此以慠慢不忍善言我亦不向諸大德説若好若惡者此欲彰己無事及人而人亦勿以事及我皆是遮他諫語且止莫諫我者是預為遮止他人未出之言勿令説也愈顯自心不忍不納莫自身不受諫語者是教誡之詞自身當受諫語者是教授之言大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子衆得增益等者此是勸喻獲益之語由互相諫故佛弟子衆得善法增長熾盛由熾盛故正法得以久住世間由正法久住故能使聖種不斷諫謂遮無利益教謂令獲善利懺悔謂改往修來結罪是中犯者若比丘惡性不受人語餘言如上比丘應諫此比丘言大德莫自作不可共語當作可共語大德如法諫諸比丘諸比丘亦當如法諫大德如是佛弟子衆得增益展轉相教展轉相諫展轉懺悔大德可捨此事莫為僧作訶諫更犯重罪若隨語者善不隨語者僧應作白乃至三羯磨訶諫捨不捨犯罪輕重皆同於上此戒以四緣具足成犯一稟性粗獷二無慚慠慢三不忍違諫四羯磨已成若緣有闕但結方便兼制比丘尼僧殘同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者初語時捨非法別衆乃至若一切未作訶諫前若無智人訶諫時語彼如是言汝和尚阿闍黎所行亦如是汝可更學問誦經若戲語疾疾語獨語夢中語欲説此錯説彼及最初未制戒等是為不犯會採十誦律云若諸比丘不舉不憶念自身作不共語突吉羅是不應約敕舉者比丘應語長老汝作某罪當發露莫覆藏當如法除滅憶念者比丘應語長老汝憶念某時某處作如是罪不此戒大乘同制若惡性戾情則遠捨利生自障本慧引證第四分云佛告諸比丘我為汝等説八種惡馬及八種惡人或有惡馬授勒與鞭欲令其去而更觸躓不去一或反倚傍兩轅而不前進二或顛蹙倒地既傷其膝又折轅轢三或更却行不進四或更趣非道破輪折軸五或不畏御者亦不畏鞭方便咋銜奔突不可禁制六或雙腳人立吐沫七或反蹲臥八是為八種惡馬或有比丘舉彼見聞疑罪便言我不憶我不憶一或不言犯不言不犯默然而住二或言長老亦自犯罪云何能除他罪三或言長老自癡猶須人教而欲教我四或説餘事答反生瞋恚五或不畏衆僧亦不畏犯不受舉罪者語便捉坐具置肩而出不可訶制六或左抄衣在衆中舉手大語乃令汝等教授我耶七或言長老亦不與我衣鉢臥具醫藥何故教我彼即捨戒取於下道至比丘所作如是言我已休道於意快耶八是為八種惡人如彼惡馬無異佛所慈愍附考薩婆多論云經中説但自觀身行諦視善不善而律云展轉相教者佛因時制教言乖趣合不相違背佛以前人心有愛憎發言有損若鈍無智若少聞少見出言無補若為利養名聞有所言説者是故但自觀身行若為慈心有利益若聰智利根發言有補若廣聞博見有所弘益若為利益衆生闡揚佛法者則應展轉相教又為新出家愛戀父母兄弟妻子是故言但自觀身行若久染佛法力能兼人者則應展轉相教然此十三僧殘罪雖有救制悔不易例前似輕準後極重其間有覆無覆與夫更與本日治或三增四五或二復加三乃至重重稱量展轉治法皆於作持中詳明二十三僧殘法竟音義曠野國根本律云時摩竭陀憍薩羅二國中間大曠野處有五百羣賊殺害商旅由斯兩界人行路絶時影勝王聞知已命大將往彼屏除羣賊其將至彼方便降伏羣賊求哀請活大將愍之慈心向彼即於二界中間築一新城總集諸人共住於此從斯已後名曠野城螺髻梵志西天外道或以螺為髮或以髮塠髻如螺也梵志是一切出家外道通稱若有承用其法者亦名梵志摩尼犍大龍王摩尼正言末尼即如意珠也此云離垢謂龍王腦中有此珠若人得之毒不能害火不能燒犍大正言犍達此云香梵語那伽此云龍王也佛圖即浮圖是佛塔廟也拼音崩拘彌國西域記云憍賞彌國舊曰拘睒彌國訛也中印度境周六千餘里國大都城周三十里土稱沃壤地利豐植氣序暑熱風俗剛強好學典藝崇樹福善瞿師羅國此是長者名也此翻美音由過去世作狗子時以聲吠請辟支佛至家供食故生生中報得好音是長者身長三尺佛亦化身為三尺以化彼令歸正法西域記云具史羅舊云瞿師羅訛也城東南不遠有故伽藍其史羅長者舊園中有窣堵波無優王之所建立高二百餘丈如來於此數年説法其側則有過去四佛座及經行遺迹復有如來髮瓜塔長者因緣根本律廣明優填王或云憂陀延又云優陀延那唐言出愛佛初降誕時大地震動普放光明時憍閃毗國百軍大王初誕一子見此光明便作念云我子福力有大光明如日初現普照世間宜與名曰光明若詳其王功德於賓頭盧經廣明闡陀按薩婆多論云又名闡那是佛異母弟優填王妹兒生大豪族出家為道多住拘睒彌國性悷自用作種種過惡多在此國又云此國是闡那所生處白淨王安一宮室闡那母常在此中有一妹亦適此國以是因緣多住此國又以此中利益衆生尼拘律樹又云尼拘盧陀此云無節又云縱廣阿含云其身圓正其葉青滑長廣子似枇杷子子承蒂如柿然其種類耐老諸樹中最能高大者佛磔手磔音窄磔者張也律攝云佛張手者中人三張手謂佛一張手當一肘半也五分律云修伽陀磔手者方二尺修伽陀此云善逝是佛十號之一號也尺者度也周制寸尺唐即於周一寸上增二分一尺上增二寸蓋周尺一尺唐是八寸五分言二尺即唐尺一尺六寸方與中人三張手相當也沓婆摩羅子沓婆或作達婆或作陀婆又曰陀驃陀驃翻云主摩羅此云力士或云壯士根本律云波波國中有一壯士大臣名勝軍大富多財受用豐足所有資産如毗沙門王雖非王種時諸壯士作灌頂法扶以為王後生一兒色相端美天然淨潔彼國之法若天然淨潔者名實此兒亦爾淨潔過人復是壯士大王之子應與立字名實力子善見律云沓婆是比丘名摩羅是王名此王子出家故名沓婆摩羅子此大德年七歲出家鬚髮落地即成羅漢得三達智具六神通以本願故為僧差使慈地比丘是六羣比丘中第一惡者於生生中與摩羅子常為怨惡檀越或云檀那寄歸傳云梵云陀那鉢底譯為施主陀那是施鉢底是主略去那字取上陀音轉名為檀更加越字意道由行檀捨自可越度貧窮羝音低牡羊三歲曰羝性善抵觸提婆達多略言調達或云提波達兜提婆翻名天達多此云授亦云與亦云施三義皆一謂父母從天乞子天授與之故名天授或翻天熱以其生時人天等衆心皆驚熱是佛堂弟阿難親兄也或云是佛從兄身有三十相出家誦通六萬法聚學滿十二韋陀典十二遊經云調達四月七日食時生身長一丈五尺四寸阿闍世此翻未生怨母懷之日已有惡心於瓶沙王未生已惡故因為名舊翻無指生時相者云凶王令升樓撲之不死但損一指故為名也內人將護呼為善見涅槃經云提婆達多語善見太子言國人罵汝為未生怨善見言何故名我為未生怨誰作此名達多言汝未生時一切相師占言是兒生已必殺其父是故外人悉號汝為未生怨一切內人護汝心故謂善見普超經云阿闍世從文殊懺悔得柔順忍命終入賓吒羅地獄即入即出生上方佛土得無生忍彌勒出時復來此界名不動菩薩後當作佛號淨界如來涕吐之身提婆達往至阿闍世太子所以神通力飛在空中或現身或隱身或現半身等説法或身出煙出火或變身作嬰孩身著瓔珞在太子抱上轉側欶太子指時太子阿闍世見此變恐懼提婆達知太子恐懼即語言勿懷恐懼太子問曰汝是何人答言是提婆達太子言汝實是提婆達者還復汝身尋復其身見已即增信樂太子日日將從五百乘車朝暮問訊并增供五百釜飲食諸比丘以此因緣白佛佛告諸比丘汝等各自攝心莫生貪著提婆達利養也何以故正使太子日日如是問訊供養唯增益提婆達惡心譬如男子打惡狗鼻而令彼狗更增凶惡此亦如是故佛訶責云涕吐之身也四聖種一衣服知足聖種二飲食知足聖種三臥具知足聖種四醫藥知足聖種婆沙論以醫藥攝前三中第四出樂斷樂修聖種即住阿蘭若也聖者佛獨覺聲聞彼從此生相續不斷故名聖種也又正法名聖此能住持令久相續故名聖種立十四種人羯磨即是立人作寺主作知庫分衣乃至分粥等白二羯磨差使也不截衣繢繢音織衛餘曰繢即機頭粗者馬師滿宿馬師梵語阿濕婆滿宿云富羅婆娑善見律云馬師滿宿於六羣比丘中最是上座本是田夫同作田辛苦共相論言我等作田辛苦可共出家於佛法中衣食自然一是舍利弗弟子一是目犍連弟子出家受具足已誦戒竟五臘滿二人共議意共同好種華等事即往豐熟處住婆沙論云馬宿井宿恆造惡行佛常教化都不信受佛記二人命終生龍趣中彼亦自見於十指端有十道水將欲流出便作是念我等決定當生龍中佛復記彼二人已種獨覺菩提於當來世定成獨覺俳説上音牌戲也又俳優雜戲也又俳者樂人所為戲笑以自怡悅也漢書云詼笑類俳倡詼音奎謿調也倡妓倡者俳也妓者女樂也鼓簧吹貝簧者乃笙竽管中金葉也然笙竿皆以竹管植於匏中而竅其管底之側以薄金葉障之吹則鼓之而出聲所謂簧也故笙竽皆謂之簧小笙十三簧大笙十九簧竽二十六簧長四尺二寸貝乃海中螺貝也受雇傭賃也嘯喚上音笑蹙口而吹聲也贓賄金玉曰貨布帛曰賄凡非理所得財賄皆曰贓餐餐平聲熟食也一曰吞食闡陀此云車匿薩婆多論又云闡那是佛異母弟優填王妹兒生大豪族出家為道多住拘睒國性悷自用因惡性不捨衆僧作梵罰雜阿含經云佛般泥洹未久闡陀詣鹿野苑中諸比丘所而請教授諸比丘為説五蘊無常彼未解後於阿難所請教聞法阿難為説法要得聞悟證果躓音至頓足不前進也音厥跳走也轅音袁車前曲木上鉤衡者轢音隔車軸也咋銜上音責嚙也下音醎馬口中勒也
