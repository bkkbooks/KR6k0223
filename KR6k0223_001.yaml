body:
  text: 金陵寶華山弘律沙門讀體集將明斯律依賢首宗略開七門一教起因緣二藏乘所攝三教義通局四辨定宗趣五教所被機六總釋題目七別解戒相所言門者收攝無壅名之為門俾依門入解通達無滯凡所釋義則有所宗歸也初教起因緣者有通有別所言通者謂如來惟為一大事因緣出現於世則一代時教總其大意惟欲衆生開示悟入佛之知見今此律者欲令衆生以波羅提木叉戒入佛知見故故謂之通別則專就此律復有十義為教起所因一攝取於僧二令僧歡喜三令僧安樂四未信者令信五已信者令增長六難調者令調順七慚愧者得安樂八斷現在有漏九斷未來有漏十正法得久住一攝取於僧者謂於世人衆姓之內若有篤信男女等入正法中深生敬信樂為苾芻以成僧衆令取僧寶果故二令僧歡喜者律攝云為僧伽極善謂既入善說法律之中而知僧尊堅固道志暢悅持戒蕩滌凡情能令善法極增勝故三令僧安樂者謂依禁戒清淨活命三慧自淑五邪不干以七法財還信施債德業漸增不為施所墮故四未信者令信者謂持禁戒性遮清淨四儀整肅譏誚不興令未信者知歸佛道使邪見輩正信發生故五已信者令增長者謂嚴淨律儀梵行可軌如教化利慈威可欽能令久淹佛法者景仰歸從愈增淨信故六難調者令調順者律攝云為折伏惡人謂有一類名字比丘及一類雖具信心煩惱業習強者今以輕重律儀諫治調伏令知自責隨順衆僧故七慚愧者得安樂者謂清淨律儀調難調者令知足慚愧樂持戒僧一界六和身心無擾得適悅進道故八斷現在有漏者謂諸惡發業皆由潤生今以淨戒防止功用能違現行乾枯業種不起煩惱斷除苦因故九斷未來有漏者謂依淨戒定慧發生心無染污永斷漏種不受後有得證僧寶果故十令正法久住者謂令清淨僧寶種性相續不息如法宣說廣利人天展轉相教正法得以久住故以上別中十義皆准律攝釋者是為此教結制之因薩婆多云如來以此十義結戒者順此十利功德得此十利功德若持一戒將來得一戒果報兼得十利果報如是一切戒當分別爾非一切通得此十利功德也初明教起因緣竟二藏乘所攝者已知此戒有如是因未審藏乘之中各何屬攝先明藏攝次明乘攝先明藏攝者有二一三藏二二藏且初三藏者一修多羅或云修妬路亦名素呾纜此翻契經契者契理契機經者以貫攝為義貫謂貫穿所應知義攝謂攝持所化之機故此教於三學中所詮定學二毗奈耶此翻調伏謂調練三業治伏過非亦名鼻奈耶鼻翻去奈耶翻真去若干非而就真故曰真也降伏此心息此心忍不起故曰真也降伏戒也息定也忍智也亦名毗尼翻滅又云調御使心行調善也此教於三學中所詮戒學三阿毗達磨舊云阿毗曇訛也阿毗是對義達磨法義合言對法謂能對者是妙慧通漏無漏所對者是法通世出世法此慧對向涅槃法復能對觀了四諦法法之所對故名對法此教於三學中所詮慧學梵語比吒此云藏即包含攝持之義非藏無以積錢財非藏無以蘊文義故上三典皆名曰藏今此戒者正屬毗奈耶藏非如他經分攝故二藏者一菩薩藏二聲聞藏不列緣覺者攝歸聲聞故今此戒者正屬聲聞藏亦分攝菩薩藏蓋聲聞人未發大心容可不學菩薩戒而菩薩人未有不學聲聞戒故次明乘攝者乘有五乘一人二天三聲聞四緣覺五菩薩乘者運載為義通教理行果謂依教解理依理起行依行證果行果正運教理助運五皆名乘由力有大小載有遠近故分為五一人乘者涅槃經云多思慮故名人雜心論云意寂靜故名人謂受三皈五戒修下品十善運載衆生越於三途生於人道其猶小艇才過溪㵎二天乘者俱舍論云光潔自在神用名天謂受持三皈五戒修中品十善非定相應運載衆生越於四洲生欲界天與四禪定相應生色界天與四空定相應生無色界天猶如小船越於江河三聲聞乘者聲謂佛音聲聞謂耳根發識聽聞佛聲四諦之法故名聲聞四緣覺乘者以慧覺了十二因緣之法亦名獨覺謂出無佛世雖不稟至教自悟無生故名獨覺修四諦十二因緣法門皆能運載衆生越於三界到有餘涅槃成阿羅漢及辟支佛皆如大船越大江河五菩薩乘者梵語具云菩提薩埵菩提覺義薩埵有情義合言覺有情以悲智為本修六度法門運載衆生越於三界三乘之境至無上菩提大般涅槃之彼岸如乘大舶越於大海今此戒者正攝聲聞乘非餘乘所攝二明藏乘所攝竟三教義通局者已知藏乘所攝如是未審教義當復云何其中分二初約教局論次推義通論初約教局論者世尊一大時教有稱性隨機權實開會方便演說義各淺深今依賢首所判不出五教一小教此教以隨機故但說人空不說法空縱說法空亦不明了但依六識三毒建立染淨根本唯論聲聞乘故名為小教二始教由第二時但明於空未盡大乘法理故名之為始第三時定說三乘不言定性聲聞無性闡提成佛故亦名分教於中廣說法相少說法性所說法性亦是相數是大乘之初門故曰始教三終教言定性聲聞無性闡提悉當成佛方盡大乘至極之說名之為終以稱實理亦名為實於中少說法相多說法性雖說法相亦會歸性是大乘終極名為終教四頓教此教明一念不生即名為佛不依地位漸次而說名之為頓於中不說法相唯明真性一切所有唯是妄想一切法界唯是絶言名為頓教五圓教此教所說唯是無盡法界性海圓融剎塵無礙即華嚴所談名為圓教今此戒相正為衆生癡所覆故遂起貪瞋邪見十使縈纏汩沒四流升沉九地是以六識三毒為染根本故如來愍此為制毗尼令治伏三毒防護七支修生空觀斷分別俱生二種我執超越三界證阿羅漢果是為六識反染而為淨根本義屬小教正阿含攝非餘四教故曰局也次推義通論者謂此戒相雖曰小教若以義推則通乎圓故法華玄義云開粗者毗尼學即大乘學式叉式叉即大乘第一義光非青黃赤白三歸五戒十善二百五十皆是摩訶衍豈有粗戒隔於妙戒戒既即妙人亦復然汝實我子即此義也文蓋圓人受法無法不圓一色一香無非中道低頭合掌悉是道場孰曰戒相而非圓頓且如來化緣事畢仍遺教云汝諸比丘於我滅後當尊重珍敬波羅提木叉如暗遇明貧人得寶當知此戒則是汝等大師若我住世無異此也斯乃開顯之後顧命之言必局小教豈其然乎三明教義通局竟四辨定宗趣者已知教義通局如斯未審宗趣當何所取宗者言之所尚曰宗趣者宗之所歸曰趣亦有總別總則此毗尼教以反染成淨止作為宗以盡諸有漏解脫為趣按薩婆多論云比丘二百五十戒一切衆生上各得七戒以義分別有二十一戒如一衆生上起身口七惡凡起此惡以三因緣一以貪故起二以瞋故起三以癡故起此三惡三七二十一惡反惡心得戒一衆生上得二十一戒色一切衆生亦復如是有五種子中破一粒麥損一粒栗斷一根果摘一枝葉隨所斷所破各得一罪隨得罪處反罪得戒得爾所戒本受戒時不殺一切草木一切草木上盡得戒色如不掘地一微塵上得一戒色三千大千世界下至金剛地際一一微塵上得一戒色如是二百五十戒中若衆生非衆生類上得戒多少以義而推可以類解文若非遵制防止則不能增定慧淨諸有漏若非如律作辦則不能反惡業而成淨戒故漏盡解脫即獲果證是故反染止作漏盡解脫正是今教中所崇所尊所主之宗趣也別則互舉若舉法為宗令得人為趣謂律藏所詮雖意皆明了須待比丘信敬躬行以辨深義是其所趣若舉人為宗令知法為趣謂具信登壇雖名為僧寶須當精窮五篇微究二持知其所歸四辨定宗趣竟五教所被機者宗趣既辨已知所歸未審此教所被何機是故再明教所被機教乃聖人被下之言機是依教修行之士教分有五准前所明機別有三謂上中下而於教中復分為二一是化教二是制教化教者謂開化指示權實性相善惡因果化導之機通在家出家今此毗尼非彼化教唯是制教制約行業制善令行制惡令斷示持犯相明諸學處所被之機不通在家獨制僧徒正被中下之機亦可兼於上者故今分三一正被二隨被三漸被一正被者毗尼總收二部一制比丘僧二制比丘尼僧比丘僧始自須提那子以降具足二百五十禁章比丘尼僧緣從憍曇彌八敬以來三百四十八戒漸備其僧部中攝尼而尼部中攝僧間有同制別學同制同學蓋由僧尼性習各殊故佛於正被中復異也二隨被者式叉摩那沙彌沙彌尼此三雖曰小衆居必依隨二僧食隨僧分法隨僧學是故二僧戒內於後俱隨有制但令知惡莫作是制當遵若犯輕重條章通云一突吉羅仍有擯懺故誤不同名之小三衆隨律威儀所謂兼制今故為隨被也三漸被者漸謂漸次若有上根稟戒機非中下本為志求佛果不似耽樂寂滅由遵聖制楷定律規不躐僧寶以故先秉息慈次入僧數然後方圓菩薩三聚淨戒是知聲聞身戒即菩薩心戒之基菩薩心戒即聲聞身戒之本未有身戒不淨而欲心戒清淨者也所以圓通會上波離尊者云我以執身身得自在次第執心心得通達然後身心一切通達得證圓通故今以上根次第稟戒而攝漸被中也五明教所被機竟六總釋題目者前五義門已知今當釋題就中分四初出律藏源流二明五部所弘三釋四分戒本四釋止持會集初出律藏源流者審夫娑羅唱滅之後豐德結集之初五百漏盡比丘僧同於畢鉢羅窟內大迦葉白僧問法優波羅依制讀宣誦如來言詞滿八十因而號曰八十誦律原無衆部之殊其分張衆部者蓋自惡王滅法之後復有善王重興佛教羣黨互爭故分二部從二部中復分十八久後流傳惟餘五部此則八十誦律是為鼻祖二部為支分十八五部是其派衍也按舍利弗問經云云何世尊為諸比丘所說戒律或開或遮後世比丘比丘尼等云何奉持佛言如我言者是名隨時在此時中應行此語在彼時中應行彼語我尋泥洹大迦葉等當為分別為比丘比丘尼等大作依止如我無異此懸記迦葉五百結集也又云後有孔輸柯王孫名弗沙蜜多羅滅我法教害我僧徒彌勒菩薩以神通力接我經律上兜率天得蟲行神捧山壓王及四兵衆王種四兵一時滅盡後有王出性甚良善彌勒菩薩化作三百童子下於人間以求佛道從五百羅漢咨受法教羅漢上天接取經律還於人間國土男女復共出家比丘比丘尼還復滋繁時諸比丘好於名聞極力諍論抄治我律開張增廣互相是非求王判決王集二部行黑白籌此乃息諍之法若要舊者可取黑籌若要新者可取白籌時取黑者多白者少王以皆是佛說好樂不同不得共處學舊者多從以為名為摩訶僧祗也學新者少而是上座從上座為名為他俾羅也此懸記律分二部也又文殊問經云世尊入涅槃後未來弟子云何諸部分別云何根本部佛言未來我弟子有二十部能令諸法住二十部者並得四果三藏平等無下中上譬如海水味無有異如人有二十子真實如來所說文殊師利根本二部從大乘出從般若波羅蜜出初二部者一摩訶僧祗此言大衆老少同會共集律部也二體毗履此言老宿唯老宿人同會共出律部也我入涅槃後一百歲此二部當起從摩訶僧祗出七部於此百歲內出一部名執一語言所執與僧祗同故云一也於百歲內從執一語言部復出一部名出世間語言稱讚辭也於百歲內從出世間語言出一部名高拘梨柯是出律主也於百歲內從高拘梨柯出一部名多聞出律主有多聞智也於百歲內從多聞出一部名只底舸此山名出律主居之於百歲內從只底舸出一部名東山亦律主居也於百歲內從東山出一部名北山亦律主居也此謂從摩訶僧祗部出於七部及本僧祗是為八部於百歲內從體毗履部出十一部於百歲內出一部名一切語言律主執三世有故一切可厝語言也此即五部中之薩婆多部於百歲內從一切語言出一部名雪山亦律主居也於百歲內從雪山出一部名犢子律主姓也此即五部中之婆蹉富羅部於百歲內從犢子出一部名法勝律主名也於百歲內從法勝出一部名賢律主名也於百歲內從賢部出一部名一切所貴律主為通人所重也於百歲內從一切所貴出一部名芿山律主居也於百歲內從芿山出一部名大不可棄律主初生母棄之於井父追尋之雖墜不死故云不可棄又名能射此即五部中之彌沙塞部於百歲內從大不可棄出一部名法護律主名也此即五部中之曇無德部於百歲內從法護出一部名迦葉比律主姓也此即五部中之迦葉維部於百歲內從迦葉比出一部名修妬路句律主執修妬路義也此謂體毗履部出十一部及體毗履成十二部佛說此祗夜摩訶僧祗部分別出有七體毗履十一是謂二十部十八及本二悉從大乘出無是亦無非我說未來起此上經文乃懸記從二部中復分十八部也偈中言無是亦無非者准華嚴會玄記云謂以隨情執故無是四諦等更無異說故無非或但各自言是豈名實是故云無是各互非他豈名實非故云無非又既皆從大乘出何有是非或可依之修行無不獲益故云無是亦無非也又南海寄歸傳云諸部流派生起不同西國相承大綱唯四一聖大衆部分出七部二聖上座部分出三部三聖根本說一切有部分出四部四聖正量部分出四部亦是從本分出十八部也其間離分出沒部別名字事非一致此不繁述又俱舍論云過去迦葉佛時佛父訖栗枳王夢見一衣堅而且廣有十八人各執少分四向爭挽衣猶不破因問彼佛佛言此表當來釋迦如來弟子分佛正法成十八部雖有異執而真法尚在依之修行皆得解脫文是知部雖多分義皆可取若欲細核各所宗執當閲十八部論部執異論異部宗輪論此三論出北藏席字函二明五部所弘者諸部流分雖有十八其可久行不過五部按翻譯名義集云世尊成道三十八年赴王舍城國王食訖令羅云洗鉢失手㩧鉢以為五片諸比丘白佛佛言鉢破五片表我滅後毗尼分為五部也又舍利弗問經佛言部分如是衆多久後流傳唯餘五部各舉所長名其服色摩訶僧祗部勤學衆經宣講真義以處本居中應著黃衣今律四十卷是其支分也曇無屈多迦即曇無德通達理味開導利益表法殊勝應著赤色衣薩婆多部此云一切有博通敏達以導法化應著皂衣有十誦律六十卷其根本說一切有部皆此部攝迦葉維部此云重空觀精勤勇猛攝護衆生應著木蘭衣律止解脫戒本一卷或云全部未至或云未曾翻譯彌沙塞部此云不著有無觀禪思入微究暢幽密應著青衣有五分律三十卷據此經文即此五部若准他經凡列五部皆無摩訶僧祗部却有婆蹉富羅部此云犢子上古有仙染犢生子自後種姓皆名犢子其彼部律未至如賢首疏云總別六部僧祗是總五部是別此摩訶僧祗部行解虗通不生偏執遍順五見以通故故知摩訶僧祗是總五部是別通則六部也今此方唯存四部缺迦葉維及犢子部其餘善見毗尼母薩婆多論摩得勒伽優波離問經等俱是諸部支屬皆可覽也然斯五部既佛預記無勞致疑有所是非譬如一燈出百千燈雖燈隨物異而光照無殊至於破暗除冥功用則一是故五天諸國隨宗一律各競進業皆獲道果東夏傳來四部俱行精持戒軌咸躋聖域自非聖化通玄何以使之然乎故別舉五部明其所弘也三釋四分戒本者已知部彚固多行唯五部未審今者所弘何部故次明之中復分四一出宗主二釋四分三釋律義四出譯時一出宗主者此四分宗主名曇無德此翻法藏又云法密由師含容正法如藏之密故又云法護護者防護即密藏義也師乃采菽氏之裔體毗履之支二釋四分者此律全部有六十卷分為四大分自首卷至二十一卷止名第一分其中所明比丘二百五十戒法自二十二卷至三十六卷止名第二分前之九卷乃明比丘尼三百四十八戒法後六卷明受戒犍度說戒犍度梵語犍度此翻法聚以相類之法聚而歸一也自三十七卷至四十九卷止名第三分其中所明安居自恣皮革衣藥迦絺那衣拘睒彌瞻波呵責人覆藏遮破僧滅諍比丘尼法法共十六犍度自五十卷至六十卷終名第四分其中所明房舍雜法五百結集七百結集調部毗尼毗尼增一共六犍度今於四分之中單明第一分比丘戒法也三釋律義者一大制教通名毗尼五部所出通名曰律梵語毗尼此翻滅然滅有三義一滅業非謂不殺盜等故律中有犯毗尼有諍毗尼二滅煩惱煩惱是發業之本故律云調伏貪等令盡是故如來制增上戒學三得滅果故經云戒淨有智慧便得第一道南山云毗尼翻調伏及滅者是從功用為名非正譯也正翻云律律者法也從教為名斷割重輕開遮持犯非法不定俗有九流法流居一故世律法皆約刑科道與俗違刑名乃異至於處斷必依常法故翻毗尼為律也四出譯時者此四分律乃姚秦時北天竺罽賓國佛陀耶舍尊者共竺佛念所譯緣佛陀耶舍先於本國誦四分律不賫梵本而來秦司𨽻校尉姚爽欲請尊者譯出姚主以其無梵本難可證信衆僧多有不同故未許之羅什法師勸曰耶舍甚有記功數聞誦習未曾脫誤於是姚主即以藥方一卷民籍一卷並可四十紙許令其誦之一日便集僧執文覆之乃至銖兩人數年紀不謬一字是時衆咸信伏由是耶舍口誦梵音佛念筆受成文即以弘始十二年譯出為四十五卷又云四十四卷今分為六十卷若支法領所譯者止有三十卷然今已失矣據唐圓照律師傳則弘始五年壬寅歲耶舍譯出成四十五卷至十一年歲次戊申支法領又從西國將梵本來於長安中寺重讐校殆十四年辛亥譯畢成六十二卷四釋止持會集者宣祖云持戒之心要唯二轍止持則戒本最為標首作持則羯磨結其大科後進前修妙宗斯法故今統閲諸部撮略正文會集止持用益將來共扶頽幢以樹正法也六總釋題目竟音義序匏繫上音庖瓠屬蓋匏味苦瓠味甘也言匏繫者孔子曰吾豈匏瓜也哉繫之而不食大約今人用匏繫皆取無用之義也荒隈下音威崖內曰隩崖外曰隈荒隈者謂居於荒山也玄猷下音由道也五邪一詐現異相謂諸比丘違佛正教於世俗人前詐現奇特之相令其心生敬仰而求利養二自說功德謂諸比丘以辨口利詞抑人揚己自逞功能令所見者心生敬信而求利養三占相吉凶謂諸比丘攻學異術卜命相形講談吉凶而求利養四高聲現威謂諸比丘大語高聲詐現威儀令人畏敬而求利養五說所得利以動人心謂諸比丘於彼得利於此稱說於此得利於彼稱說令人動心而求利養如是五種令人邪命八穢一置買田宅謂比丘當依衆居止勤修出世清淨無為之道若私置田宅以圖自足是為不淨二種植根栽比丘當勤修道業於世間資生之事不生貪著若不為衆私自種植田園內妨行業是為不淨三貯聚穀粟謂比丘當乞食資身清淨活命若不為衆私自藏貯穀粟米麥是為不淨四畜養奴婢謂比丘當閒居靜處修攝其心行安樂行若不為衆畜養奴婢驅使作務是為不淨五畜養羣畜謂比丘當持禁戒慈心不殺若畜牛馬等孳生之類以污梵行是為不淨六藏積金銀錢寶謂比丘當以清雅為高安貧樂道身無長物若貪積世間所重金銀資財等物資生求利計算出納有乖道行是為不淨七藏積象牙刻鏤等物謂比丘當奉佛戒志尚儉素於諸玩好心不貪戀布衣草座常懷知足若貪世間稀有雕飾之物是為不淨八藏積銅鐵釜鑊以自煮爨謂比丘於衆居止當與衆同餐或乞食自活勵精梵行成就道業若藏積釜鑊以自煮爨背衆而食是為不淨殉音旬隨也福田淨德一發心離俗謂出家之人發勇猛心脫離凡俗習佛菩提而能懷佩妙道為世福田是為初淨德也二毀其形好謂出家之人剃除鬚髮毀壞相好去世俗之塵衣著如來之法服具佛威儀為世福田是為第二淨德也三永割親愛謂投佛出家割絶父母親愛之情一心精勤修道以報父母生成之德兼能為世福田是為第三淨德也四委棄軀命謂出家之人能委棄身命無所顧惜惟務一心求證佛道兼能為世福田是為第四淨德也五志求大乘謂出家之人常懷濟物之心專志勤求大乘之法度脫一切有情為世福田是為第五淨德也模楷模木生於周公冢上其葉春青夏赤秋白冬黑以色得其正也楷木生孔子冢上其餘枝疏而不屈以質得其直也此二字取義若正與直可為法則苾芻此香草也出於雪山具有五德以喻比丘一體性柔軟以喻比丘能折伏身語意業之粗也二引蔓旁布以喻比丘傳法度人延綿不絶也三馨香遠聞以喻比丘戒德芬馥為衆所聞也四能療疼痛以喻比丘能斷煩惱毒害之痛也五不背日光以喻比丘正見思惟常向佛日而不背也凡例經通餘說大智論云一佛說謂如來金口所宣二弟子說謂諸聲聞緣覺菩薩承佛神力加被所說三仙說謂佛會中諸大仙人從佛入道誓弘佛化宣揚正法四諸天說謂帝釋每於善法堂上為忉利天人演說般若五化人說謂三乘聖人隨機現化如羅睺羅化作金輪王而度城東老母先讚福果因緣後說大乘妙法等覺已下等覺者一生補處菩薩之名如今彌勒菩薩是也下地望之雖與佛等然有極細一品無明未盡故猶稱菩薩言下者指下位九地三賢措粗去聲安著也綱要十二法人即頭陀十二行也又名杜多此翻抖擻亦翻修治亦翻淘汰十二法者一住阿蘭若處二常乞食三次第乞食四受一食法五節量食六中後不飲果漿蜜漿七著糞掃衣八但三衣九冢間住十樹下止十一露地坐十二但坐不臥緘縢上音兼下音騰繩也謂束篋之緘縢也人可使由之不可使知此出論語今借用之謂初受戒人但可使其依律行持未可使閲律藏知其所從結戒之由蓋六羣比丘等皆是大權示現曲為末世而示犯緣誠恐愚者不達認為實事反生放縱義學演教之師深入義海故稱義學險途險者險阻途者途路此喻三途惡道也鹿苑鹿苑去波羅奈國十餘里是如來昔與提婆達多俱為鹿王住處各統羣鹿五百餘時國王畋遊原澤菩薩鹿王前詣王曰大王校獵中原縱燎飛矢凡我徒屬命在茲晨不日應臭無所克膳欲次差日輸一鹿王有割鮮之膳我延旦夕之命王善其言而回駕兩羣之鹿更次輸命提婆羣中有懷孕鹿次當就死白其主曰身雖應死子未次也鹿王怒曰誰不保命雌鹿歎曰吾主不仁死無日矣乃告急菩薩鹿王王曰悲哉慈母之心思及未形吾今代汝遂至王門國王問由鹿具答情王聞歎曰我人身鹿也汝鹿身人也於是悉放諸鹿不復輸命即以其林為諸鹿藪因而號曰鹿苑鶴樹亦云鶴林如來出世說法利生化緣事訖於娑羅雙樹間二月十五日入涅槃雙樹皆悉變白猶如鶴色故名鶴樹波羅提木叉此翻別解脫律攝云別解脫者由依別解脫經如說修行於下下等九品諸惑漸次斷除永不退故於諸煩惱而得解脫名別解脫又見修煩惱其類各多於別別品而能捨離名別解脫由惑漂沒三界有情為此先因勤求別解脫經又云隨順解脫此據果立名隨順有為無為二種果故又云保解脫謂戒淨有智慧如來保任必證涅槃故一則中觀二乃瑜伽中觀即龍樹宗世稱法性宗瑜伽即護法宗世稱法相宗以瑜伽師地論為宗故名瑜伽此翻相應也冗結冗者雜也結者不解也浮囊不泄浮囊渡海器也昔有商人持囊渡海海中羅剎從乞浮囊其人不與乃乞一半亦不聽許至乞一絲亦不從願何故命在囊故浮囊若破則於海岸終不能到以喻持戒之人欲渡生死苦海設遇愛染羅剎假求一願亦終不從何故命在戒故戒若有破則溺生死苦海永無出期是故護戒若此勿輕小愆還成最後之唱如來涅槃令諸比丘以戒為師依戒而住故云最後之唱若輕細過放蕩無拘是違遺教非佛弟子故云勿輕也聊陳一隅謂物有四隅舉一隅則以三隅反也摩夷具云摩得勒伽此翻智母以其能生智故卷一僧寶果即漏盡阿羅漢也三慧自淑淑者善也和也清湛也三慧者一聞慧由從善知識處得聞經律論以因聞故能生無漏聖慧二思慧由能思惟經律論及從善知識所聞法義皆能生於無漏聖慧三修慧謂既已聞法思惟義趣即當隨順修習因此修習能生無漏聖慧七法財財者謂信等七種出世法財也若一切衆生行此七法資成道果故謂之財一信財謂信能決定受持正法以為佛道之糧二進財謂未能見真諦理而一心精進求出世道以為成佛之資三戒財謂戒為解脫之本能止防身口意之惡非以為成佛之資四慚愧財慚者慚天愧者愧人謂既能慚愧則不造諸惡業以為成佛之資五聞財聞為三慧之首聞必能思思必能修若能聞佛聲教則開發妙解如說而行以為成佛之資六捨財捨即捨施謂若能運平等心無憎愛想身命資財隨求給施無所吝惜以為成佛之資七定慧財定慧即止觀也定則攝心不散止諸妄念慧則照了諸法破諸邪見以為成佛之資不為施所墮毗尼母云若不坐禪誦經營三寶事及不持戒受人信施則為施所墮有漏毗婆沙論云有者若業能令後生續生是名有義漏者是留住義謂令有情留住欲界色界無色界故涅槃經云有漏法有二種一因二果有漏果者是則名苦有漏因者是名為集艇庭上聲小船也二百斛以上曰艇其船小而長舶音白海中大船也十使一貪使二瞋使三癡使四慢使五疑使六身見使七邊見使八邪見使九見取使十戒取使此十皆名使者謂能驅役行者心神流轉三界生死也四流一見流即三界見惑謂意根對於法塵起分別見也二欲流即欲界思惑謂五根貪愛五塵故名為思惑即貪瞋慢也三有流因果不亡為有即色無色界思惑貪慢是也四無明流無所明了故曰無明即三界思惑中之癡惑也此四皆名流者謂衆生由三惑之所流轉漂泊三界而不能返於涅槃彼岸也九地一五趣雜居地二離生喜樂地三定生喜樂地四離喜妙樂地五捨念清淨地六空無邊處地七識無邊處地八無所有處地九非非想處地生空亦曰人空即我空也謂凡夫妄計五蘊是我強立主宰引生煩惱造種種業佛為破此計故說五蘊無我二乘悟之入無我理是名生空二我執一俱生我執謂於五陰等法中強立主宰妄執為我與身俱生是名俱生我執二分別我執謂於計我法中分別我能行善行惡等事而起執著是名分別我執式叉此翻云學躐廉入聲踰跨也儒云學不躐等鼻祖人之懷胎鼻先受形然後諸根漸具故稱始祖為鼻祖而波離結集八十誦律為諸部之始祖故曰鼻祖也芿音成舊草不芟新草又生曰芿五通一足不履地謂身能飛行履空如地二知人心命謂能知他人之心行善行惡生善處惡處三回眼千里謂天下衆生之類若好若醜城郭屋舍山巖樹木回眼之時無有遠近皆悉能見四呼名即至謂於天下男女及象馬巨細等聲無不能聞若有呼其名者或遠或近隨即而至五石壁無礙謂於天下周旋往來山河石壁無所障礙裔音曳後嗣也九流一儒流祖述堯舜憲章文武宗師仲尼者也本出司徒二道流絶禮樂去仁義獨任清虗者也本出史官三陰陽流敬順昊天曆象日月本出羲和之官四法流信任賞罰以輔禮制者也本出理官五名流名仕不同禮亦異數出於禮官六墨流推兼愛之意出清廟之官七縱橫流言其當制宜受命而不受詞者也出於行人之官八雜流兼儒墨合名法出於議官九農流播百穀勸耕桑者也出於農稷之官關會要也附譯人傳略佛陀耶舍師罽賓國人婆羅門種也年十三出家嘗與其師遠行曠野逢虎其師欲走避師曰此虎已飽必不侵人俄而虎去前行果有噉嚼餘蹟其師密異之年十五日誦經二三萬言有羅漢重其聰明恆乞食供之嗣從舅氏習五明諸論世間法術靡不綜間後受沙勒國太子供養待遇隆厚乃辭去東適龜茲尋羅什蓋什曾在沙勒國受學於師而師甚重之也時師被符堅執羈虜姑臧遣信要師師為國人留欲行不克因命弟子取淨水呪藥洗足乘夜而發走數百里始旦問弟子何所覺耶曰惟聞疾風耳國人追不及方至姑臧而羅什又入長安長安乃秦主姚興也興聞師名即盛禮聘之師不受笑曰明旨既降便應載馳然檀越待士既厚脫如羅什見處則不敢聞命蓋興嘗媵妾逼什故也使還覆興歎其幾慎重信敦喻師方允至長安日興自出候延於逍遙園中遂與羅什出十住經并四分律長阿含等經也師儀容端雅而髭赤色尤善毗婆沙時人號赤髭毗婆沙既為什之師亦稱大毗婆沙後還外國不知所終媵音胤送女從嫁也凡送皆曰媵竺佛念師涼州人弱年出家志業清堅外和內朗有過敏之鑒少好游方備貫風俗華梵音義莫不兼通故義學之譽雖闕洽聞之聲甚著符氏建元年入長安與僧伽跋陀曇摩難提等翻譯諸經質斷疑字音義自世高支謙以後莫踰也故在姚符二代為譯人之宗關中名德咸嘉推焉後復自出菩薩瓔珞十住斷結及曜胎中陰等經始就治定意多未盡遂爾遘疾卒于長安
