body:
  text: 金陵寶華山弘律沙門讀體集第五十八藏他物戒若比丘藏他比丘衣鉢坐具針筒若自藏教人藏下至戲笑者波逸提緣起佛在舍衛國給孤獨園有居士請僧明日食夜辦供已明日清旦往白時至爾時十七羣持衣鉢坐具針筒著一面經行倣徉望食時到六羣伺彼背向時取而藏之時到尋覓不得見六羣在前調弄餘比丘察知嫌責白佛結戒由調戲事不寂靜煩惱制斯學處乃初篇盜根本種類釋義藏者密舉也衣者三衣及餘衣也鉢者鐵瓦二種應量之器坐具者敷以坐臥針筒者貯針之器此等皆是比丘要用隨身之六物也下至戲笑者若故令他生惱而藏或戲弄取笑而藏結罪是中犯者若自藏若教人藏下至戲笑者波逸提此戒具三緣方成本罪一調弄心藏二須是比丘六物三彼人尋覓不獲兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若實知彼人物相體悉而取舉若在露地為風雨所飄漬取舉若物主為人性慢狼藉六物為欲戒敕彼故而舉之若借衣著而彼不收攝恐失便舉之或以此衣鉢諸物故有命難梵行難及最初未制戒等是為不犯會採五分律云藏餘四衆乃至畜生物突吉羅尼藏二衆物波逸提藏餘三衆物皆突吉羅十誦律云彼若覓得突吉羅覓不得波逸提若藏空針筒覓不得突吉羅律攝云但是沙門合畜之物藏得墮罪不合畜者得惡作若犯捨墮物及不淨三衣減量衣授學人物外道婆羅門等物輒藏舉者咸得惡作根本律云若苾芻寄與餘苾芻彼但藏自衣不藏他衣被賊盜去不犯此戒大乘同學第五十九輒著淨施衣戒若比丘與比丘比丘尼式叉摩那沙彌沙彌尼衣後不語主還取著波逸提緣起佛在舍衛國給孤獨園六羣真實施親厚比丘衣已後不語主還取著諸比丘聞有少欲慚愧者嫌責白佛結戒由衣事及廢闕煩惱制斯學處乃初篇盜根本種類釋義文分二節與比丘下明施衣有主後不語下結成所犯律云衣有十種如上與衣者淨施衣有二種一者真實淨施言此是我長衣未作淨今為淨故與長老作真實淨二者展轉淨施展轉淨施法於作持中明此中約真實淨施制也結罪是中犯者若真實施衣不語主而取著者波逸提此戒具三緣方成本罪一是真實淨二不語主知三私取輒用兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若真實淨施語主取著展轉淨施語以不語隨意取著及最初未制戒等是為不犯此戒大乘同學第六十衣不壞色戒若比丘得新衣應三種壞色一一色中隨意壞若青若黑若木蘭若不壞色著餘新衣波逸提緣起佛在舍衛國給孤獨園六羣比丘著白色衣時諸居士見共皆譏嫌謂如似王大臣有慚愧比丘聞知白佛結戒由衣服事譏嫌煩惱制斯學處釋義文分二節得新衣下明其正制若不壞下結成所犯律云衣有十種如上新者若是新衣若初從人得者盡名新衣若青者非大深青及純青也亦要壞其正青之色若黑者謂是泥染然亦不聽用純烏泥皂以類外道故宜兼赤土樹皮染之可也若木蘭者木蘭樹名也亦名林蘭其染衣色赤又云紫淡色非正赤色也結罪是中犯者若得新衣不染作三種色著者波逸提若得重衣若得輕衣不作淨而畜者盡突吉羅若非衣鉢囊革屣囊針線囊禪帶腰帶帽襪巾等不作淨畜者一切突吉羅此謂非説淨是百一中數應點作淨也若以未染衣寄白衣家突吉羅此戒具三緣方成本罪一是純白及正上色衣二不以三種色染壞亦不點淨而畜三作三衣中數於現處著用兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不違上制若衣色脫更染及最初未制戒等是為不犯會採十誦律云若得青衣應泥茜淨泥即黑色也茜音倩染絳之草也得泥衣應青茜淨得茜衣應青泥淨得黃衣赤衣白衣應青泥茜三種淨五分律云應三種色作志若不作志著著波逸提若不著宿宿波逸提律攝云下至拭鉢巾拂足巾鉢囊腰絛等咸須壞色點淨而畜薩婆多論云除三衣餘一切衣但作三點淨著無過若非純青淺青及碧作點淨得作衣裏舍勒外不現相得著舍勒此云內衣似短裙也若作現處衣盡不得著赤黃白色色不純大者亦如是除富羅革屣餘一切衣臥具等盡應三點淨著不點淨著用皆墮罪若如法色衣以五大色作點淨者惡作除五大色有純黃藍金青黛及一切青亦不得著若黃赤白雖三點淨著亦惡作僧祗律云作淨時極大齊四指極小如豌豆或一或三或五或七或九不得如華形若得多雜碎新物合補一處者一處作淨各各補者一一作淨若作新衣趣一角作淨若一條半條補者亦作淨此戒大乘同制第六十一殺生命戒若比丘故殺畜生命者波逸提緣起此戒有二制佛在舍衛國祗園精舍迦留陀夷不喜見烏作竹弓射之時諸居士來入園中禮拜佛僧見已譏嫌云沙門釋子不知慚愧無有慈心諸比丘聞之啓白世尊此初結戒也佛結戒已時諸比丘坐起行來多殺細小蟲其中或有作波逸提懺者或有畏慎者佛言不知不犯更加故殺之語復為僧第二結戒也此是性罪由生命事無悲煩惱制斯學處乃初篇殺根本種類釋義律云畜生者不能變化者殺者謂斷其命若自斷若教人斷乃至毒藥安殺具等殺言故者謂有心害物非無意錯誤也廣如初篇殺波羅夷中所釋結罪是中犯者若故有殺心殺者波逸提方便殺而不死突吉羅此戒具四緣方成本罪一有殺心二是畜生三畜生想四必令命斷兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不故殺或以瓦石刀杖擲餘處而誤斷命若比丘經營作房舍手失瓦石而誤殺若土墼杖木若屋枉椽如是手不禁墮而殺者若扶病起臥出入房時一切無有害心而死及最初未制戒等是為不犯會採五分律云畜生者除龍餘畜生是龍雖是畜而能變化具神力守護國土保綏正法其功用與諸天相類故所殺龍者犯偷蘭遮本律亦云不能變化者義皆同此故爾除之根本律云若苾芻作殺害心乃至以一指損害旁生因此命終者得墮罪或當時不死後時因此死者亦得墮罪若後時不死者得惡作罪律攝云若使癲狂者行殺害時彼雖無犯教者本罪旁生旁生想墮罪旁生疑旁生非旁生想非旁生旁生想非旁生疑皆得惡作罪薩婆多摩得勒伽云欲斫藤誤斫蛇不犯欲斫蛇誤斫藤惡作欲殺此蟲而誤殺彼蟲欲斫蟲而斫地欲搦蟲而搦土皆得惡作罪此戒大乘同制菩薩以護衆生凡有命者一切不得殺殺者犯重附考律攝云若守房廊鳥棲宿為喧閙者應使人檢察巢無兒卵應即除棄有者待去方除若有蜂窠無兒應除有者以線縷纏之便不增長大論云好殺之人有命之屬皆不喜見若不好殺一切衆生皆樂依附故持戒之人命欲終時其心安樂無疑無悔若生天上若在人中常得長壽是為得道因緣乃至得佛住壽無量殺生之人今世後世受種種身心苦痛不殺之人無此衆苦是則殺他還是自殺其有智者肯自殺乎第六十二飲用蟲水戒若比丘知水有蟲飲用波逸提緣起此戒有二制佛在舍衛國給孤獨園六羣比丘取雜蟲水而飲用諸居士見已譏嫌有少欲比丘聞知白佛此初結戒也爾時諸比丘不知有蟲無蟲後乃知或作波逸提懺者或有畏慎者佛言不知不犯故更加知水有蟲復為僧第二結戒也此是性罪由受用水時害衆生命制斯學處乃初篇殺根本種類釋義知者或自知或他告水有蟲者蟲有二種一謂才觀即見二謂羅漉方見水謂一切河池泉井溝瀆等水用水有二一內受用謂是內身所有受用洗浴飲噉嚼齒木或洗手足此乃內用二外受用如前第十九戒中所明此準根本律釋之結罪是中犯者知是雜蟲水飲用者及飲用雜蟲漿醋等波逸提有蟲水有蟲水想波逸提有蟲水疑無蟲水有蟲想無蟲水疑皆突吉羅此戒具四緣方成本罪一是雜蟲水二有蟲想三不觀漉四飲用入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先不知有蟲無蟲想若粗蟲觸水使去若漉水飲者及最初未制戒等是為不犯此戒大乘同制引證僧祗律云波羅脂國有二比丘共伴來詣舍衛國問訊世尊中路渴乏無水前到一井一比丘汲水便飲一比丘看水見蟲不飲飲水比丘問言汝何不飲答言世尊制戒不得飲蟲水故彼復勸言長老但飲勿令渴死不得見佛答言我寧喪身不毀佛戒遂便渴死飲水比丘漸到佛所佛問汝從何來又問汝有伴不彼即具以事答佛言癡人汝不見我謂得見我彼死比丘已先見我十誦律云彼持戒者不飲便死即生三十三天得天身具足先到佛所禮佛聞法得法眼淨受三皈依故曰已先見我也根本律中其事亦同若比丘放逸懈怠不攝諸根雖共我一處彼離我遠彼雖見我我不見彼若有比丘在海彼岸能不放逸精進不怠斂攝諸根雖去我遠我常見彼彼常近我此約界論也若約世論則放逸之人雖生聖世不異末法不放逸者雖生末世不異正法佛身真常本無出世及與滅度願深信智者莫起像法法滅盡想而自委棄誓當精進不懈善攝諸根嚴淨毗尼勿輕小過常如面奉慈顏親承明誨修持不已當見靈山一會儼然未散也附考僧祗律云蟲者非魚鱉等謂小小倒孑諸蟲乃至極微細形眼所見者不應以天眼看亦不得使暗眼人看下至能見掌中細文者得使看水不得太速太久當如大象一回頃若水中蟲極細不得就用洗手面及大小行孑音結餘也説文云人無右臂今取義謂此蟲乃無足而倒行也律攝云有五種眼不應觀水一患瘡眼二睛翳眼三狂亂眼四老病眼五天眼齊幾許時應觀水謂六牛車回轉頃若順河流一度觀水無蟲齊一拘羅舍隨意飲用然須中間無別河入一拘羅舍謂五里也或云二里若下流水及逆流河一度觀時齊一尋內得用八尺為一尋也有五種淨水一僧伽淨二別人淨三漉羅淨四涌泉淨五井水淨若知彼人是持戒者存護生命縱不觀察得彼水時飲用無犯凡一切觀水始從日出迄至明相未出咸隨受用應知漉物有其五種一謂方羅二謂法瓶三謂君持四謂酌羅五謂衣角第四分云不應無漉水囊行乃至半由旬若無應以僧伽梨角漉木五分律云亦聽畜漉水筒用銅鐵竹木瓦石作之以細衣縵口不聽用糞掃衣根本雜事云以絹繫君持口細繩繫項沉放水中擡頭半出口若全沉水則難入待滿引出仍須察蟲但是綽口瓶瓨無問大小以絹縵口隨時取水極是省事綽昌入聲寬也瓨與缸同緇門警訓漉囊教意云出家之人修慈為本慈名與樂無殺為先物類雖微保命無異此乃行慈之具濟物之緣大行由是而生至道因茲而尅所以匿王大將梨師達多及富羅那受居家五禁凡奉王命征討時弓稍恆挂漉水囊況僧慈護豈容乏之第六十三故惱他戒若比丘故惱他比丘令須臾間不樂波逸提緣起此戒有二制佛在舍衛國給孤獨園時十七羣比丘往問六羣長老云何入初禪第二第三第四禪云何入空無相無願云何得須陀洹果斯陀含果阿那含果阿羅漢果耶六羣報言如汝等所説者即已犯波羅夷法非比丘十七羣便往上座比丘所問言若有諸比丘作如是問云何入初禪乃至得阿羅漢果為犯何罪上座報言無犯即察知此六羣與十七羣作疑惱往白世尊此初結戒也如是結戒已時諸比丘集在一處共論法律有一比丘退去而心有疑作是言彼諸比丘與我作疑諸比丘白佛佛言不故作者無犯此第二結戒也由戲弄事掉舉煩惱制斯學處按根本律烏陀夷苾芻見十七群受近圓已作惱亂心而告之曰汝等雖蒙作法實不得戒何用勞心更求學業故制釋義律云疑惱者若為生若為年歲若受戒若為羯磨若為犯故為法也為生時疑者問言汝生來幾時耶報言我生來爾所時語言汝不爾所時生汝如餘人生非爾所時生是謂問生時疑問年歲時疑者問言汝幾歲報言我爾所歲語言汝非爾所歲如餘受戒者汝未爾所歲是謂問年歲時生疑問受戒生疑者問言汝受戒既年不滿二十又界內別衆是謂問受戒時生疑問羯磨時生疑者問言汝受戒時白不成羯磨不成非法別衆是謂問羯磨生疑於犯生疑者語言汝犯波羅夷僧伽婆尸沙波逸提波羅提提舍尼偷蘭遮突吉羅惡説是謂於犯生疑於法生疑者汝等所問法者則犯波羅夷非比丘是謂於法生疑令須臾間不樂者三十須臾為一晝夜謂令他少時間情不安隱也結罪是中犯者若比丘故為比丘作疑若以生時若為年歲乃至法時疑説而了了者波逸提説而不了了者突吉羅此戒具三緣方成本罪一前人是比丘二故有疑惱心三説聽了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者其事實爾不故作惱或戲笑語或疾疾語或獨語或夢中語或欲説此錯説彼及最初未制戒等是為不犯會採僧祗律云若有人來欲受具足戒若滿二十與受具足若不滿者語言且住待滿若彼便於彼處受具足來不得語疑悔語者越毗尼罪若諸根不具及病亦爾此上二句謂總攝百遮等人是也五分律云令餘四衆疑悔突吉羅尼令二衆疑悔波逸提令餘三衆疑悔突吉羅薩婆多論云若更以餘事欲令疑悔故語者突吉羅所謂語比丘言汝多眠多食多語等是人非比丘非沙門非釋子令疑悔者突吉羅此戒大乘同學第六十四覆他粗罪戒若比丘知他比丘犯粗罪覆藏者波逸提緣起此戒有二制佛在舍衛國給孤獨園跋難陀數犯罪向一親厚比丘説之囑令勿語人後二人共鬬彼比丘即向餘比丘説其所犯餘比丘聞知白佛此初結戒也時有比丘聞佛結戒已不知犯粗不犯粗後乃知粗罪或作波逸提懺者或有疑者佛言不知無犯復更與結戒也此是性罪由舊伴屬事覆藏煩惱制斯學處釋義律云粗罪者四波羅夷十三僧殘覆藏者謂掩蔽其過而不説也薩婆多論云覆藏罪令佛法不清淨長養惡法故結罪是中犯者小食知食後説食後知至初夜説初夜知至中夜説盡突吉羅中夜知至後夜欲説而未説明相出時波逸提除粗罪覆餘罪者突吉羅自覆藏粗罪突吉羅此是經夜展轉名從生小罪也除比丘比丘尼覆餘人粗罪突吉羅餘人謂出家下三衆及居家受戒者二衆粗罪粗罪想波逸提粗罪疑非粗罪粗罪想非粗罪疑盡突吉羅此戒具四緣方成本罪一是受具戒人二所犯是粗罪三粗罪想為他人覆四覆經明相已出兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯問準尼律比丘尼覆藏他尼棄罪犯波羅夷此定波逸提二義何從答少有差別若尼覆他尼行淫一事得重餘戒從輕故爾結墮隨開不犯者先不知粗罪不粗罪想若向人説或無人可向説發心言我當説未説之間明相已出若或説有命難梵行難不説及最初未制戒等是為不犯會採薩婆多論云覆他粗罪有三種一覆他四棄僧殘得墮罪二覆出佛身血壞僧倫得對首偷蘭遮三覆下三篇得突吉羅十誦律云見他犯罪向一人説便止若聞若疑不須説僧祗律云不得趣向人説當向善比丘説若彼罪比丘凶暴或依王力大臣力起奪命因緣傷梵行者應作是念彼罪行業必自有報彼自應知喻如失火但自救身焉知餘事斯則無罪根本律云恐與為障礙之事或緣此令僧破壞者覆皆無犯此戒大乘同制與不教悔罪戒一也附考第三分云內有五法應舉他以時不以非時真實不以不實有益不以損減柔軟不以粗獷慈心不以瞋恚第四分云佛告優波離身威儀不清淨言不清淨命不清淨寡聞不知修多羅寡聞不誦毗尼言辨不了喻若白羊是不應舉他若諸法具足應以時以法舉他罪又復此比丘有愛恭敬於我則應舉罪或無愛有恭敬或無恭敬有愛應舉或雖無恭敬能令捨惡就善應舉或彼有所重比丘尊敬信樂者能令捨惡行善應舉若都無者僧應都捨置驅棄語言長老隨汝所去處彼當為汝作舉作憶念作自言遮出罪遮説戒遮自恣譬如調馬師惡馬難調即合韁杙驅棄如此比丘不應先從其求聽即此是聽薩婆多論云天眼舉他罪突吉羅天耳舉亦如是第六十五授戒不如法戒年滿二十應受大戒若比丘知年不滿二十與受大戒此人不得戒彼比丘可訶癡故波逸提緣起此戒有二制佛在羅閲城迦蘭陀竹園時城中有十七羣童子先為親友最大者年十七最小者年十二共求出家諸比丘即度令出家與受大戒時諸童子小來習樂不堪一食至於夜半患飢高聲大喚啼哭言與我食來與我食來諸比丘語言少待須天明若衆僧有食當與共食若無食者當共乞此間都無作食處佛聞知而故問阿難具以事白佛言不應授年未滿二十者大戒此初結戒也時彼比丘聞結戒已不知年滿二十不滿二十後乃知不滿二十或作波逸提懺者或有疑者佛言不知無犯此第二結戒也由近圓事攝衆煩惱制斯學處釋義文分二節年滿二十應受大戒明其正制若比丘知年不滿下結成所犯律云年不滿二十者不堪忍寒熱飢渴暴風蚊虻毒蟲及不忍惡言若身有種種病苦痛不能堪忍又復不堪持戒不堪一食與受大戒者與是能授之者謂壇上三師及七位證盟僧也受謂求具足戒之人此人不得戒者謂所受人年既不滿三師七證雖如法秉宣白四羯磨而彼不成比丘性戒體不圓名非具足蓋佛為諸法之王深知衆生業性差別而諸佛子從佛口生從法化生是故依制則比丘性具違教則戒法匪成也彼比丘可訶癡故者謂不但所受者不得戒而能授者亦招愆以癡無智慧不知戒法故律攝云滿足十夏方住師位復須成就五法一知有犯二知無犯三知輕四知重五於別解脫經廣能開解於諸學處創結隨開若遇難緣善知通塞常誦戒本能決他疑戒見多聞自他俱利威儀行法無有虧犯具如是德名親教師由其親能教出離法故若苾芻雖近圓已於諸學處不識重輕設六十夏仍須仗託明德依止而住若師小者唯除禮拜自餘咸作此即名為老小苾芻不得與他出家及受近圓也結罪是中犯者和尚若知年未滿二十衆中問言汝年滿二十未受戒人報言或滿二十或未滿二十或疑或不知年數或默然或衆僧不問授大戒三羯磨竟波逸提白已二羯磨竟三突吉羅白已一羯磨竟二突吉羅白竟一突吉羅和尚疑年未滿得罪亦爾若未白為作方便若剃髮淨壇敷座是為作方便剃髮者非出家時凡登壇受具必須相同比丘不得長髮俗衣故當先剃髮也若欲集衆若衆僧已集和尚一切突吉羅衆僧若知若疑年未滿二十不問一切突吉羅此戒具三緣方成本罪一是授具和尚二知年未滿三羯磨已竟兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯下三衆犯突吉羅者彼非大僧無登壇作師之位若受居家八戒等法不遵律制豈無違越毗尼之咎隨開不犯者先不知信受戒人語若旁人證若信父母若受戒已疑聽數胎中年月及閏月若數一切十四日説戒以為年數半月半月説戒每年共有二十四次白月及黑月大皆十五日説戒若黑月小則十四日説戒一年僅有六次十四日説戒當有十八次是十五日説戒今以方便皆約十四日説戒以算日數則每年省出一十八日十年便有百八十日儻其人是十九歲共省三百四十二日又可算作一年即可名為滿二十歲矣會採律攝云若有人近圓時年實未滿而作滿想後有親屬報云不滿應數胎月閏月若滿者善斯名善受若不滿者退為求寂應更與受近圓若不爾者同前賊住若有人年滿十九作二十心而受近圓後經一年親屬來見報云不滿或自憶知不滿或年十八而受近圓後經二歲同前憶知斯等皆名善受正教難逢是開聽故本部未滿更開數一切十四日説戒律攝未滿但聽數胎月閏月以足之若不足者退為求寂須知上根受具應準本部機若下劣律攝當依然斯乃受具已後有疑佛慈聽開若未登壇先算此而為滿歲者則法犯相似人墮全非斷不可例此宜應欽遵於此此戒大乘比丘同學第六十六發起諍事戒若比丘知諍事如法懺悔已後更發起者波逸提緣起此戒有二制佛在舍衛國給孤獨園時六羣比丘鬬諍僧如法滅已後更發起作如是言汝不善觀不成觀不善解不成解不善滅不成滅令僧未有諍事而有諍事起已有諍事而不除滅諸比丘察知其故具白世尊此初結戒也與結戒已時諸比丘不知諍事如法滅不如法滅後乃知如法滅或作波逸提懺者或有疑者佛言不知無犯此第二結戒也由起諍事不忍煩惱制斯學處釋義律云諍者有四種言諍覓諍犯諍事諍詳如後七滅諍法中釋如法者如法如毗尼如佛所教懺悔已者謂善滅諍法後更發起者謂其諍已滅復以不善心而舉發令衆諍論不息也結罪是中犯者知如法滅已後更發起作如是言不善觀不成觀不善解不成解不善滅不成滅説而了了波逸提言觀解者謂稱量得宜應與何法當與何法也不成觀解者謂法不應諍與毗尼相乖也觀作觀想者波逸提觀疑不成觀有觀想不成觀疑盡突吉羅此戒具四緣方成本罪一見比丘諍事二如法滅已三觀作觀想而更發起四説而了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先不知若觀作不觀想若事實爾言不善觀乃至不成滅若戲笑語若疾疾語若夢中語欲説此錯説彼及最初未制戒等是為不犯會採律攝云若衆為衆作羯磨得窣吐羅罪以是破僧方便故薩婆多論云若是僧制不入佛法發起得突吉羅罪此戒大乘同制為菩薩不能善和鬬諍而反亂衆鬬諍罪結輕垢第六十七同賊伴行戒若比丘知賊伴結要共同道行乃至一村間波逸提緣起此戒有二制佛在舍衛國給孤獨園有衆多比丘從舍衛至毗舍離有私度關賈客欲為伴與之同行俱為守關者所捉將至波斯匿王王問其故諸尊實知此人不輸王稅是賊賈不答言知王言若實知者法應死復作念云豈宜殺沙門釋子耶但以訶責放去臣衆不服有少欲比丘聞知白佛此初結戒也時諸比丘不知是賊非賊伴行後乃知是賊伴或作波逸提懺者或生疑者佛言不知無犯故有第二結戒也此是遮罪由行路事譏嫌煩惱制斯學處乃初篇盜根本種類釋義律云賊伴者若作賊還若方欲去結要者共要至城若至村道者村間處處道結罪是中犯者知是賊伴共要同道行至村間處處道行一一波逸提無村曠野無界處共道行波逸提若共村間半道若無村曠野行減十里皆突吉羅若村間一道行若方便欲去而不去共要去而不去一切突吉羅此戒具三緣方成本罪一實知是賊二結要同行三行處不減兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先不知不共結伴逐行安隱謂無恐怖也若力勢所持若被繫縛將去若命難梵行難及最初未制戒等是為不犯會採僧祗律云若比丘欲行時當求車伴賊相貌有三事可知香色莊嚴香者在空處食生熟肉氣色者常恐怖色莊嚴者終日結束面黑髮黃凶惡似閻羅人若賊詐稱作好人著好衣服到空回處展轉相語今日當入聚落破墻壁劫奪財物不問沙門婆羅門一切盡取當知是賊不得即便捨離宜隨順去若近聚落方便捨去若賊覺者應語言長壽我正到此若與偷金賊共行波逸提金乃七寶之首攝餘可知與叛負債人共行越毗尼罪十誦律云若險難處賊迭度者不犯根本律云若迷失道彼來指示雖同行不犯五分律云共惡比丘期行突吉羅若諸難緣不犯此戒大乘同制第六十八惡見不捨戒若比丘作如是説我知佛所説法行淫欲非障道法彼比丘諫此比丘言大德莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便説犯淫欲是障道法彼比丘諫此比丘時堅持不捨彼比丘乃至三諫捨此事故若再三諫捨者善不捨者波逸提緣起佛在舍衛國給孤獨園有阿梨吒比丘生是惡見諸比丘聞欲除去彼惡見故諫而不捨往白世尊世尊以無數方便訶責阿梨吒已告諸比丘聽衆僧為彼作訶諫白四羯磨捨此事若有餘比丘作如是言亦應訶諫白四羯磨故結此戒由邪思事僻執煩惱制斯學處此並下二戒於三破中皆名破見也釋義文分三節若比丘作如是説等明所生之惡見彼比丘諫此比丘言乃至犯淫欲是障道法等明所諫之詞彼比丘諫此比丘時堅持不捨等結成所犯作是説者謂謬引佛語以證己見由見居家善信士女受持三皈五戒唯斷邪淫雖有妻室而亦能證須陀洹乃至亦得阿那含果故生如是惡見我知者謂自能解知非他告知也佛所説法者所説是彰義法有二種一是佛親説二是弟子説雖弟子説由承佛教故亦名法也行淫欲者是鄙惡事也非障道法者謂習行其事而不能障礙諸賢聖道法也彼比丘諫此比丘言者謂作下別諫之詞大德者是如律尊稱之詞莫作是語者謂不可作是惡見之言也莫謗世尊者謂佛所説法離欲清淨寂滅無為若言欲非障道即違反佛説是誹謗世尊謗者謂出非理之言也不善者謂當來定招惡果報也世尊不作是語者謂佛不説淫非障道法也世尊無數方便説犯淫欲是障道者謂世尊以種種言詞説法教斷欲想除愛欲所燒度於愛結欲如火坑如火炬欲如枯骨如段肉如夢所見欲是不淨法是有漏法是障諸賢聖道果法彼比丘諫時堅持不捨者謂一比丘於屏處別諫之時固執邪見不受諫語也彼比丘乃至三諫等者謂別諫不從當鳴椎集僧白四羯磨其羯磨全法於作持中明向下唯明諫詞結罪結罪是中犯者彼比丘諫此比丘言乃至無數方便説行淫欲是障道法汝今可捨此事莫為僧所訶更犯重罪若受語者善此是一比丘別諫也不隨語者應白此是集僧訶諫凡作羯磨皆先有白白已當語言我已白竟餘有羯磨在汝可捨此事莫為衆僧所訶責更犯罪若隨語者善言善者僅免本罪其方便罪仍當懺除不隨語者作初羯磨作初羯磨已當語言我已白初羯磨竟餘有二羯磨在汝當捨此事莫為僧所訶責犯罪若隨語者善若不隨語者當作第二羯磨第二羯磨已當語言已作白二羯磨竟餘有一羯磨在汝可捨是事莫為衆僧所訶犯罪若隨語者善若不隨語者唱三羯磨竟波逸提作白已二羯磨竟捨者三突吉羅作白已一羯磨竟捨者二突吉羅作白已捨者一突吉羅若白未竟捨者突吉羅若未作白作是語我知佛所説法行淫欲非障道法一切突吉羅此謂別諫時及未曾別諫之前也彼比丘諫此比丘時餘比丘遮若比丘尼遮者若有餘人遮汝莫捨此事衆僧諫與不諫遮者一切突吉羅此戒具四緣方成本罪一堅持惡見二頻諫不捨三羯磨如法四三番白竟兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若初語時捨謂最初別諫時一聞諫語即捨若非法別衆諫若非法和合諫法別衆法相似別衆法相似和合非法非毗尼非佛所教諫若無諫者及最初未制戒等是為不犯會採律攝云若苾芻心生惡見謂為正見云我所解最為殊勝實不從佛聞如是語但出自意説其文義不生慚愧邪説誑他餘苾芻見時應為屏諫若不捨者得惡作罪次羯磨諫作初白竟乃至第二羯磨竟若不捨者一一皆得惡作之罪第三竟時便得墮罪應於衆中説悔其罪然懺單墮皆對首作法即得除滅今準律攝云衆中説悔者其義有二一以衆為證更不再生如是邪見故二治此一人以誡衆人令正思惟故此戒大乘犯重攝謗法戒故引證大般若經云若染色欲於生梵天尚能為障況得無上正等菩提是故菩薩斷欲出家能得無上菩提非不斷者又云菩薩摩訶薩於五欲中深生厭患不為五欲過失所染以無量門訶毀諸欲欲為熾火燒身心故欲為穢惡染自他故欲為魁膾於去來今常為害故欲為怨敵長夜伺求作衰損故欲如草炬欲如苦果欲如利劒欲如火聚欲如毒器欲如幻惑欲如暗井欲如詐親旃陀羅等舍利子諸菩薩摩訶薩以如是等無量過門訶毀諸欲第六十九黨惡見不捨戒若比丘知如是語人未作法如是邪見而不捨供給所須共同羯磨止宿言語者波逸提緣起此戒有二制佛在舍衛國給孤獨園阿梨吒生惡見衆僧訶諫而故執不捨諸比丘嫌責白佛佛令僧與作惡見不捨舉白四羯磨此初結戒也即前戒是時六羣比丘供給所須共同羯磨止宿言語有知足頭陀比丘訶責白佛此第二結戒也亦由邪思事僻執煩惱制斯學處釋義律云如是語者作如是語我聞世尊説法行淫欲非障道法未作法者若被舉未與解羯磨如是邪見不捨者衆僧訶責而未捨惡見供給所須者有二種若法若財法者教修習增上戒增上意增上智學問誦經財者供給衣服飲食牀座臥具病瘦醫藥同羯磨者同説戒止宿者屋有四壁一切覆或一切覆不一切障或一切障不一切覆言語者謂教授及與評論善惡等事也結罪是中犯者若比丘先入屋後有如是語人來若如是語人先入比丘後來若二人俱入宿隨脅著地一切波逸提此戒具三緣方成本罪一知是惡邪見人二知僧作舉不捨三供給所須止宿兼制比丘尼波逸提準尼律若隨順被舉比丘三諫不捨者波羅夷是尼發起之本制也此乃比丘發起之兼制也式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不知有如是語人在中宿若屋不盡覆障若露地若病倒地若為勢力所持若被繫閉或命難梵行難及最初未制戒等是為不犯會採五分律云共語語語波逸提共坐坐坐波逸提共宿宿宿波逸提共事事事波逸提雖捨惡見僧未解羯磨亦波逸提若作惡見僧未羯磨突吉羅若不知及不如法羯磨不犯十誦律云若教他法若從受法若與他財若取他財若共宿一切波逸提根本律云若彼身病看侍無犯或同居令捨惡見此亦無犯此戒大乘同制第七十畜被擯沙彌戒若比丘知沙彌作如是言我從佛聞法行淫欲非障道法彼比丘諫此沙彌如是言汝莫誹謗世尊謗世尊者不善世尊不作是語沙彌世尊無數方便説淫欲是障道法彼比丘諫此沙彌時堅持不捨彼比丘應乃再三訶諫令捨此事故乃至三諫而捨者善不捨者彼比丘應語彼沙彌言汝自今已去不得言佛是我世尊不得隨逐餘比丘如諸沙彌得與餘比丘二三宿汝今無是事汝出去滅去不應住此若比丘知如是衆中被擯沙彌而誘將畜養共止宿者波逸提緣起此戒有二制佛在舍衛國給孤獨園跋難陀有二沙彌共行不淨自相謂言我等從佛聞法其行淫欲非障道法聞中有少欲比丘白佛佛敕諸比丘置此二沙彌於衆僧前眼見不聞處立作訶諫白四羯磨捨此事故而彼故不捨乃令僧如前置立作不捨滅擯白四羯磨此乃不現前羯磨法也若諫訶則呼之近前而令聽若羯磨則遣之遠立而不聞時六羣比丘知僧為此二沙彌作惡見不捨滅擯羯磨而便誘將畜養同共止宿諸比丘嫌責六羣啓白世尊此初結戒也如是結戒已彼二沙彌城中擯出便往外村城外擯出還入城中時諸比丘亦不知此是滅擯不滅擯後乃方知是滅擯或作波逸提懺者或有疑者佛言不知者無犯此第二結戒也亦由邪思事僻執煩惱制斯學處釋義文分四節若比丘知沙彌作如是言等明沙彌所起邪見彼比丘諫此沙彌如是言等明訶諫白四羯磨彼比丘應語沙彌言自今已去等明不捨滅擯白四羯磨若比丘知如是衆中被擯沙彌等結成所犯律云滅擯者僧與作滅擯羯磨滅謂滅除擯謂擯棄誘者若自誘若教人誘謂以財法勸動引誘將去也畜養者若自畜若與人畜畜謂攝受與作依止養謂教授學問經法並給飲食也共止宿者謂同餘比丘一處居止共房二三宿也羯磨法於作持中明結罪是中犯者若比丘先入宿滅擯者後至若滅擯者先入比丘後至或二人俱至隨脅著地轉側一切波逸提此戒具三緣方成本罪一是惡邪被擯二明知誘引三同宿畜養兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者先不知若比丘先至滅擯者後至比丘不知若房四無障上有覆若顛發倒地若病動轉或為勢力所持被繫閉若命難梵行難及最初未制戒等是為不犯會採十誦律云通夜坐不臥亦波逸提律攝云若與依止及教讀誦皆得墮罪凡不見罪等被捨置人共為受用皆得惡作罪此謂凡是三舉二擯等人若共同受用皆不應故根本律云若是親族或時帶病或復令彼冀捨惡見雖權攝教並皆無犯此戒大乘同制附考僧祗律云若有人為和尚阿闍黎所嫌餘比丘不得誘引言我與汝四事汝當在我邊住受經誦經若觀彼人必當捨戒就俗者得誘取已當教言汝當知二師恩甚重難報汝應還彼目下住音義倣徉上音旁下音羊倣徉猶徘徊也又倣徉以逍遙也關與鑰同關令不能開漉音六淋也水下也畜生梵語底栗車此云畜生立世論云由因諂曲業故於中受生復説此道衆生多覆身行故名底栗車婆沙論云生謂衆生畜謂畜養謂彼橫生稟性愚癡不能自立為他畜養故名畜生問若以畜養名畜生者如諸龍水陸空行豈可為人所養名為畜生耶答養者義寬且滿人世及以六天不養者處狹唯在人中山野澤內又古昔諸龍亦為人養具在文史今從畜養偏多故名畜生綏音雖安也搦音諾按也溝瀆水注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆又田間之水曰溝又水瀆廣四尺深四尺曰瀆一尋四尺謂之仞倍仞謂之尋又云舒兩臂為一尋天眼此眼諸天因修禪定而得也能見遠近前後內外晝夜上下皆悉見之以無色質障礙故名天眼通非礙也得法眼淨證須陀洹果斷三界分別惑見真諦理名法眼淨阿梨吒比丘阿梨吒亦名阿利吒此云無相是人所以生此邪見者言須陀洹斯陀含皆有妻室亦不障道牽此自比故生邪見言淫欲非障道法也薩婆多論云此人先是外道弟子外道邪見師遣入佛法中倒亂佛法其人聰明利根不經少時通達三藏即便倒説云行障道法不能障道盡其智辨不能令成
