body:
  text: 金陵寶華山弘律沙門讀體集第三殺戒殺者喪己本慈斷他命根最惡不良之事此是性罪縱未受佛戒世間法爾有罪國制殺人會須償命若犯佛戒必墮三塗苦嬰長劫非山非海中脫之不受報若比丘故自手斷人命持刀與人歎譽死快勸死咄男子用此惡活為寧死不生作如是心思惟種種方便歎譽死快勸死是比丘波羅夷不共住緣起佛遊毗舍離獼猴江邊講堂中說不淨觀歎不淨觀歎思惟不淨觀不淨觀亦名九想觀此九種不淨觀法想念純熟心不分散若得三昧成就自然貪欲殄除惑業消滅得證道果此之九想雖是假想作觀然用之能成大事譬如大海中死屍溺人附之即得渡也一肨脹想謂修行之人心想死屍見其肨脹如韋盛風異於本相是為肨脹想二青瘀想既觀肨脹已復觀死屍風吹日曝皮肉黃赤瘀黑青黤是為青瘀想三壞想既觀青瘀已復觀死屍風日所變皮肉裂壞六分破碎五臟腐敗臭穢流溢是為壞想四血塗漫想既觀壞已復觀死屍從頭至足遍身膿血流溢污穢塗漫是為血塗漫想五膿爛想既觀塗漫已復觀死屍身上九孔蟲膿流出皮肉壞爛狼藉在地臭氣轉增是為膿爛想六蟲噉想既觀膿爛已復觀死屍蟲蛆唼食鳥獸咀嚼殘缺剝落是為蟲噉想七散想既觀蟲噉已復觀死屍為禽獸所食分裂破散筋斷骨離頭足交橫是為散想八骨想既觀散已復觀死屍形骸暴露皮肉已盡但見白骨狼藉如貝如珂是為骨想九燒想既觀骨已復觀死屍為火所燒𪹼裂烟臭白骨俱然薪盡火滅同於灰土是為燒想比丘聞已習不淨觀厭患身命求刀欲自殺時有比丘字勿力伽難提是沙門種出家言沙門種是姓手執利刀入婆裘園有一比丘語言大德斷我命來我以衣鉢與汝即受僱斷其命詣江洗刀尋生悔恨時有天魔立水勸讚善哉善男子汝今獲大功德度不度者時勿力伽難提悔心即滅復入園中殺諸比丘至六十人圍中死屍狼藉居士驚怪譏嫌時佛觀眾減少知而故問阿難具白上事佛乃集眾告諸比丘有阿那般那三昧寂然快樂諸不善法即能滅之永使不生阿那般那此翻遣來遣去即十六特勝法門也法界次第初門云一知息入二知息出三知息長短四知息徧身五除諸身行並屬身念處觀六受喜七受樂八受諸心行此三屬受念處觀九心作喜十心作攝十一心作解脫此三屬心念處觀十二觀無常十三觀出散十四觀離欲十五觀滅十六觀棄捨此五并屬法念處觀又知入知出正依隨息為門得麤細住及欲界定則知長短入未到地則知徧身得初禪則除身行受喜受樂受諸心行得二禪則心作喜作攝得三禪則心作解脫得四禪則觀無常得空處則觀出散得識處則觀離欲得無所有時則能觀滅得非有想非無想時則觀棄捨此與根本四禪四定一住雖同觀行有別行人若於地地修觀照了則地地之中顛倒不起心不染著隨其因緣會處即於是地發真無漏證三乘果說是三昧已與諸比丘集十句義結戒凡為殺者並由癡故於事不忍內懷瞋恨斷他命根制斯學處僧祗律云佛成道六年冬分第三半月九日食前為勿力伽難提制此戒准此方正當九月二十四日也善見律云如來以天眼觀往昔有五百獵師共入阿蘭若處殺諸羣鹿以此為業墮三惡道受諸苦惱經久得出昔有微福得生人間出家為道宿殃未盡於半月中更相殺害諸佛所不能救於此五百人中有四果聖眾生死有際有餘凡人輪轉無際是故為說不淨觀欲得生天上本不教死但不可以神力救護是故為說不淨觀已半月入於靜室唯聽一人送食勿使諸人作如是言佛是一切智而不能斷諸弟子相殺以世尊入定無人得往說如此事耳薩婆多毗婆沙云佛一切智何故教諸比丘令得如是衰惱若不知者不名一切智答曰佛一切等教爾時不但六十人受不淨觀佛教法無有偏但受得利有多有少佛深知眾生根業始終必以此法因緣後得大利六十比丘迦葉佛所受不淨觀法不能專修多犯惡行命終入地獄中今佛出世罪畢得生人間墮下賤家出家入道以本緣故應受此法既命終已得生天上於天下來從佛聽法得獲道迹以是因緣佛無偏也釋義文分二節故自手斷人命下正明所犯之事是比丘下結成所犯之罪律云人者初識至後識而斷其命此識即第八阿賴耶識名曰藏識以其無法不含無事不攝故又名持業識能持一切善惡種子故瑜伽云此識最初於母腹托胎之時如磁石吸鐵是名初識乃至命將終時冷觸漸起唯有此識能執持身此識若捨四大分散是名命終識所謂去後來先作主也是名後識又一切眾生皆以受煖識三色心相連不斷名為命根今使彼色心不相續名為命斷薩婆多論云人中有三皈五戒波羅提木叉戒故又沙門四果多在人中得佛與辟支佛必在人中得漏盡故也是以害人得波羅夷餘道不得又則故字應貫下歎勸此正是作業之心顯非誤錯也咄者是警策令知男子者是呼召之言殺者若自殺謂若以手若瓦石刀杖及餘物而自殺若教殺謂殺時自看殺前人擲水火中若山上推著谷底若使惡獸噉或使蛇螫及餘種種教殺若遣使殺謂比丘遣使斷某甲命隨語往斷若往來使者比丘遣使斷某甲命隨語往欲殺未得殺便還即承前教復往殺若重使殺謂比丘遣使汝去斷某甲命續復遣使乃至四五彼使即往殺若展轉遣使殺謂比丘遣使汝斷某甲命彼使復轉遣使若百若千往斷其命若求男子殺謂是中誰知有如是人能用刀有方便久習學不恐怖不退能斷某甲命彼使即往斷其命若教求男子殺亦如上教人求若求持刀人殺謂自求誰勇健能持刀斷某甲命彼即往殺若教求持刀人殺亦如上教人求若身現相謂身作相殺令墮水火中從山上墮谷底令象蹹殺令惡獸毒蛇噉螫彼因此現身故自殺若口說即正制中歎譽死快勸死也或作是說汝所作惡無仁慈懷毒意不作眾善行汝不作救護汝生便受罪多不如死此以作惡業多而歎勸死若復作如是語汝不作惡暴有仁慈不懷毒意汝已作眾善行汝已作功德汝已作救護汝生便受眾苦若死當生天因此言故便自殺此以作善業多而歎勸死身口現相者亦如是若遣書殺謂執書言汝所作善惡如是廣說如上遣使書殺者亦如上說若坑陷謂審知彼所行道必從是來往當於道中鑿深坑著火若刀若毒蛇若尖杙若以毒塗刺令墮坑中死若倚發謂知彼人必當倚發彼處若樹若牆若柵於彼外若著火若刀若杙若毒蛇若毒塗刺機發使墮中死若與藥謂知彼人病與非藥或雜毒或過限與種種藥使死若安殺具謂先知彼人本來厭患身命惡賤此身即持刀毒若繩及餘死具置之於前若彼用一一物自殺即正制中持刀與人結罪是中犯者若作如是自殺乃至安殺具及餘方便殺人死者一切波羅夷方便不死一切偷蘭遮若天龍八部鬼神及與畜生中有智解人語者若復有能變形者方便求殺死者盡偷蘭遮方便不死盡突吉羅畜生不能變形若殺波逸提方便不死突吉羅實人人想殺波羅夷人疑殺偷蘭遮非人非人想非人人想非人疑皆偷蘭遮第四分云若眾多比丘遣一人斷他命一切波羅夷若比丘呪藥呪華鬘呪熏香衣服呪死盡波羅夷方便墮他胎波羅夷母死兒活無犯但得偷蘭遮所起殺心不因其母本在其兒兒活得偷蘭遮母死無犯此戒具足四緣方成本罪一是人二是人想三有殺害心四令命斷如緣闕一律制有開兼制比丘尼波羅夷此同制同學戒式叉摩那沙彌沙彌尼突吉羅滅擯是為犯隨開不犯者若擲刀杖瓦石誤著彼身死若營事作房誤墮墼石材木椽柱殺人若重病人扶起若扶臥浴時服藥時從涼處至熱處熱處至涼處出入房向廁往返一切無惡心而死及最初未制戒癡狂心亂痛惱所纏是為不犯會採僧祗律云用刀治愛處偷蘭遮愛處者離穀道各四指若比丘在道經行有先怨嫌人來問道便作念我今得是人便當示指令死使無一活便指示惡道若王難若師子虎狠毒螫等惡道指示時得越毗尼罪若受苦痛時得偷蘭遮罪若死波羅夷五分律云入母胎後四十九日名為似人過此盡名為人若似人若人殺者盡波羅夷似人者謂托母胎初得二根始處緣時父母精合自識處中得身命二根過七七日六根具足成人形相故曰似人若作書令彼殺字字偷蘭遮書至彼彼因是死波羅夷若作相似語教人殺彼因此死波羅夷凡發殺心時突吉羅作方便時偷蘭遮死者波羅夷有二比丘相瞋後共道行於路相打一人遂死佛言無殺心不犯重瞋打比丘波逸提從今不聽相瞋未悔者共道行犯者突吉羅欲殺彼而悞殺此偷蘭遮十誦律云若為人作坑桁弶羅等人因是死波羅夷若不即死後因是死亦波羅夷後不因死偷蘭遮若為非人作非人死者偷蘭遮人死畜生死皆突吉羅此因殺心結罪初舉念不在人畜故若為畜生作畜生死者波逸提人非人死皆突吉羅此突吉羅罪此從殺心作坑而得非因人非人而得也若不定一事作諸有來者皆令死人死波羅夷非人死偷蘭遮畜生死波逸提都無死一偷蘭遮二突吉羅自斷陰偷蘭遮自斷指突吉羅殺化人偷蘭遮殺心打人不死偷蘭遮看病久生厭心置令死偷蘭遮令趣得藥食便服死者偷蘭遮破未熟癰瘡死者偷蘭遮破熟癰無罪摩得勒伽云欲殺凡人誤殺羅漢欲殺羅漢誤殺凡人欲殺父誤殺母欲殺母誤殺父皆偷蘭遮不得逆重殺盜二戒論心成罪不論事重今於所欲殺者事猶未遂故結方便然所誤殺者實無殺心故不得重罪若先作殺母方便已而自後死母先死重逆自先死後母死偷蘭遮父羅漢亦如是律攝云若方便遣殺他人後起悔心不欲其死前人雖死但得窣吐羅或於寒夜露地令凍人女人男作有命想因茲致死他勝罪看病比丘情生勞倦或作惡念望彼資財或出忿言任汝死去我不能看因致死者得麤罪現有宜食與不宜者看病之人亦得麤罪見他苾芻病將欲死自己衣鉢更不修治彼若身亡所有衣資我當合得此乃旃荼羅意得越法罪若口疾行刀刺者窣吐羅罪無醫可求刺之無犯若患痔之人不應割截應將藥呪方便蠲除若見有情或被水漂或時渴逼不手接不與水見其欲死有餘方便堪得相濟而不救者或雖不願死作捨受心彼若終並得麤罪苾芻自打生支佛言理應打此翻更打餘無智比丘是得惡作罪薩婆多論云若教一人殺彼人而受使者更使異人如是展轉乃至十人最後人殺時盡得波羅夷若比丘善知星曆陰陽龜易解國興衰軍馬形勢若以比丘語故征統異國有所殺害兼得財寶皆得殺盜二波羅夷若以刀杖欲殺故或杖打刀刺不尋手死十日應死後更異人打即尋杖死打死比丘得波羅夷先打比丘得重偷蘭遮善見律云若比丘有殺心掘地作坑令某甲墮中死初掘出地得突吉羅罪若墮坑受苦得偷蘭遮罪若死得波羅夷罪若餘人墮死者比丘無罪以作坑時唯在某甲行殺而為雖是同偷墮中皆攝悞傷故開若為一切作坑人墮死波羅夷若父母墮死波羅夷逆罪若坑深有人擔食糧落坑中不即死後噉食盡必定死無有出期初落坑作坑者已得波羅夷若作坑本擬殺人人不來而自悞墮坑死初作坑時得突吉羅罪若供養時有怨家比丘在眾中坐為闇所蔽而不知來作是言此某甲賊何不殺之毒蛇何不螫之人何不毒藥之我意極樂彼人死作如是呪悉得突吉羅罪若知來坐去已作如是呪亦得突吉羅罪此戒大乘同制菩薩四弘度生為首大乘木叉殺戒居先應起常住慈悲心方便利濟非若聲聞自利是以尤當更嚴犯懺如上引證首楞嚴經云又諸世界六道眾生其心不殺則不隨其生死相續殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉善見律云比丘病極困諸比丘見彼病重以慈悲心而唱言長老長老持戒具足因畏死故而受今苦長老若死可必定生天病比丘聞語而念言諸比丘皆讚我持戒具足死必生天而不食取死讚者得波羅夷是故有智慧比丘往看病人慎勿讚死正可說言長老持戒具足莫戀著住處及諸衣物知識但存念三寶及念身不淨三界中慎莫懈怠隨壽命長短若此病比丘因語而死如是因說法死無罪或說苦空無常不淨觀人聞此而自取死不犯第四妄語戒妄語者斯乃大妄未證謂證未得謂得心行不真欺貪利養修行分中最不善事此是性業設使不受佛戒詐偽謀財世間法爾有罪但犯佛戒妄言證聖墮三惡道若比丘實無所知自稱言我得上人法我已入聖智勝法我知是我見是彼於異時若問若不問欲自清淨故作是說我實不知不見言知言見虗誑妄語除增上慢是比丘波羅夷不共住緣起此戒有二制時佛遊廣嚴城獼猴江邊重閣講堂時世穀貴人民饑餓乞食難得世尊告諸比丘汝等有同和尚同師隨親厚知識各共於此毗舍離左右隨所宜安居我亦當於此處安居何以故飲食難得念眾疲苦時諸比比如佛教命各散隨宜有婆裘河邊僧伽藍中安居者向諸居士自說我得上人法並讚歎彼某甲比丘亦得上人法而諸居士信其言說即以飲食供養不為飲食所苦安居既竟往見世尊佛慰問已具以上事白佛佛言汝等癡人有實尚不應向人說況復無實而向人說世尊告諸比丘世有二賊一者實非淨行自稱淨行二者為口腹故不真實非己有在大眾中故作妄說自稱言得上人法是中第二是最上大賊何以故以盜受人飲食故以無數方便訶責已與諸比丘集十句義結戒此初制也此由癡故因求利養事及求利養煩惱制斯學處爾時有一增上慢比丘語人言我得道彼於異時精進不懈勤求方便證最上勝法聞佛結戒已自疑有犯語諸比丘白佛佛言除增上慢者不犯是第二制僧祗律云佛成道六年冬分第四半月十三日食後制戒此方正當十月十二日也釋義文分四節實無所知下正明所犯之事彼於異時下是欲清淨發露之詞除增上慢是無罪開條是丘比下結成所犯之罪律云不知不見者實無所知自稱者自稱說有戒施聞智慧辨才人法者人陰五陰人入六入人界十八戒上人法者諸法能出要成就自言念在身自言正憶念自言持戒自言有欲自言不放逸自言精進自言得定自言得正受自言有道自言修自言有慧自言見自言得果自言念在身者有念能令人出離狎習親附此法修習增廣如調伏乘守護觀察善得平等已得決定無復艱難而得自在自言正憶念者有念能令人出離等如上說是為自言正憶念自言持戒自言有欲自言不放逸自言精進亦如上說自言得定得正受者有覺有觀三昧無覺有觀三昧無覺無觀三昧空無相無作三昧狎習親附思惟此定正受餘如上說自言有道者從一支道乃至十一支道狎習親附思惟此道餘如上說自言修者修戒定慧解脫狎習親附餘如上說自言有智者法智比智等智他心智狎習親附思惟此智餘如上說自言見者見苦集滅道若復作如是言天眼清淨觀諸眾生生者死者善趣惡趣知有好醜貴賤隨眾生業報如實知之狎習等如上說自言得者得須陀洹斯陀含阿那含向狎習親附餘如上說自言果者須陀洹乃至阿羅漢果狎習等如上說故云我已入聖智勝法我知是我見是也彼於異時若問若不問等者律攝云異時等言但令犯戒設不自說已得本罪餘人於彼但可生疑未得即作不共住事是故須有異時等言若問者被他清淨有智比丘而來檢問汝言得上人法已入聖智聖法已知見者汝以何法得從誰得於何處得得時為云何如是檢問方答云我實不知不見而言知見是虗誑妄語若不問自生慚愧欲求清淨亦如是說除增上慢者由其原無虗誑之心是故不攝妄語罪彼因在阿練若修習止觀暫得成就降伏煩惱自謂永斷後遊人間不攝諸根煩惱更起大生慚愧勤求方便精進不怠證阿羅漢果斯時稀有如是增上慢者結罪是中犯者若比丘如是虗而不實不知不見向人說言我得上人法前人知者波羅夷說而不知者偷蘭遮若遣手印若遣使若書若作知相他若知者盡波羅夷若不知者盡偷蘭遮若自在靜處作不靜想若不靜處作靜想口自說我得上人法偷蘭遮向天龍神鬼及能變形有智畜生說得上人法偷蘭遮說而不知者突吉羅畜生不能變形者向說得上人法突吉羅若人實得道向不同意大比丘說得上人法突吉羅若為人說根力覺意解脫三昧正受我得是波羅夷人作人想說本罪人疑人非人想非人人想非人疑盡偷蘭遮此戒具足六緣方成本罪一實無所知二所說是上人法三有故妄語心四所對是人五是人想六前人領解若緣不具律制有開兼制比丘尼波羅夷此同制同學戒式叉摩那沙彌沙彌尼突吉羅滅擯是為犯隨開不犯者向同意比丘說上人法若向人說根力覺意解脫三昧正受不自稱言我得若戲笑說或疾疾說屏處獨說夢中說欲說此錯說彼及最初未制戒癡狂心亂痛惱所纏是為不犯會採僧祗律云若說義不說味得偷蘭遮謂自稱說我不稱羅漢若說味不說義得越毗尼罪謂稱說羅漢不自稱說我若說義說味得波羅夷謂自稱說我是阿羅漢若不說義不說味得越毗尼罪謂作阿羅漢相或合眼以手指語前人言汝愚癡人不知其尊譬如優曇鉢華時一出而不知貴五分律云有八種得波羅夷罪一者先作是念我當虗妄說過人法過人即上人也二者當說時作是念我今虗妄說得過人法三者作是念我已虗妄說得過人法四者異見說得過人法異即不見也五者異想說得過人法六者異忍說得過人法異忍即未證也七者異樂說得過人法異樂謂未得真法樂言得八者不隨問答說得過人法即自說也皆得波羅夷又云寧噉燒石吞烊銅不以虗妄食人信施世間有五大賊一者作百人千人主破城聚落害人取物二者有惡比丘將諸比丘遊行人間邪命說法三者有惡比丘於佛所說法自稱是我所造四者有惡比丘不修梵行自言我修梵行五者有惡比丘為利養故空無過人法自稱我得此第五賊名為一切世間天人魔梵沙門婆羅門中之最大賊又云為利養故種種讚歎他戒定慧解脫解脫知見成就而密以自美偷蘭遮為利養故坐起行立言語安庠以此現得道相欲令人知偷蘭遮十誦律云有人問比丘言汝是阿羅漢不若默然者偷蘭遮應言我非阿羅漢薩婆多毗婆沙云自言持戒清淨婬欲不起若不實者偷蘭遮無所誦習而言我有誦習悉偷蘭遮誦習者非經律論師自言經律論師非坐禪住阿蘭若自言是摩得勒伽云若言我不墮三塗偷蘭遮言我已離結使煩惱波羅夷向聾人瘂人聾瘂人入定人說偷蘭遮若問得果不答言得而示以手中果偷蘭遮律攝云苾芻顯勝法在已云有苾芻得如是等勝妙之事然不自言是我者並窣吐羅罪善見律云我欲入聚落乞食著衣持鉢現聖利相乃至食竟悉突吉羅罪若得利養若不得利養悉突吉羅罪若有阿練若比丘立制坐此樹下此處經行者得阿羅漢我等應以香華供養有惡比丘欲得此供養往坐行者犯波羅夷若有白衣作寺入我寺者是阿羅漢有惡比丘入此寺者犯波羅夷若眾僧立制於夏三月中莫語莫眠莫受檀越供養如是非法制不從不犯此戒大乘同制菩薩以直心是道場不妄不誑真語實語若有利益善巧攝生方便有開設因利養有犯懺悔如上引證根本律云芭蕉若結子竹葦生其實如騾懷姙時斯皆還自害利養及名譽愚人所愛樂能壞眾善法如劒斬人頭首楞嚴經云如是世界六道眾生雖則身心無殺盜婬三行已圓若大妄語即三摩提不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果乃至羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種如人以刀斷多羅木永殞善根無復知見沈三苦海不成三昧涅槃經云一切眾生雖有佛性要因持戒然後乃見因見佛性得成阿耨多羅三藐三菩提若有說言佛說一切眾生悉有佛性煩惱覆故不知不見是故應當勸修方便斷壞煩惱作是說者當知不犯四重若有說言我已成就阿耨多羅三藐三菩提何以故以有佛性故有佛性者必定成阿耨多羅三藐三菩提以是因緣我今已得成就菩提當知是人犯波羅夷何以故雖有佛性以未修習諸善方便是故未見以未見故不能得成菩提第四分云死人有五不好一不淨二臭三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處犯戒人亦如是一身口意業不淨二惡聲流布三諸善比丘畏避四諸善比丘見之生惡心言我云何乃見如是惡人五與不善人共住又破戒有五過失一自害二為智者所訶三惡名流布四臨終時生悔五死墮惡道復有五事一先所未得物不能得二既得不護三隨所在眾中有愧耻四無數由旬內人稱說其惡五死墮惡道有五法名為大賊長壽作大罪不被繫縛何等五若住無定處有好伴若多刀杖若大富多財寶有捉者賂之若有大人親友或依止王及大臣有捉者護之若於遠處作賊而還破戒比丘亦有五法多作眾罪不速為他所舉若住無定處有伴黨若多聞能憶持初中下言悉善有文有義具說淨行而不能善心思惟深入正見若能得四事供養有舉者賂之若有大人為親厚或上座及次座有舉者護之若在空野中住來至大家求覓利養是為五法同彼大賊善見律云一切作諸惡法無人不知初作者護身神見次知他心天人知如此之人天神俱見是故大呌喚展轉相承傳至梵天置無色界餘者悉聞優婆塞五戒相經云佛告比丘吾有二身生身戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量附考律攝云何故初三他勝先婬後殺逆次而說不如餘處殺盜婬妄而為次第此依犯緣前後而說又依由前引生後故由不淨行便行偷盜既行盜已遂殺怨家殺已問時便作妄語又復煩惱最強盛者在前而制此四他勝其相云何謂無厭離不忍不證然無厭離最強盛者立為初二一於婬欲二於資財不忍故行殺不證故妄語薩婆多毗婆沙云初破一戒已毀破受道器名波羅夷後更殺人得突吉羅實罪雖重無波羅夷名以更無道器可破故初四波羅夷法竟二僧伽婆尸沙法共有十三條十誦律云僧伽婆尸沙者是罪屬僧僧中有殘因眾僧前悔過得滅是名僧伽婆尸沙根本律云僧伽者若犯此罪應依僧伽而行其法及依僧伽而得出罪伐尸沙者是餘殘義若於四事隨犯其一無有餘殘不得共住此十三法有餘殘可治故名僧殘毗尼母云僧殘者如人為他所斫殘有咽喉名之為殘如二人共入陣間一為他所害命絕二為他所害命根少在不斷若得好醫良藥可得除瘥若無者不可瘥也犯僧殘者亦復如是有少可懺悔之理若得清淨大眾為如法說懺悔除罪之法此罪可除若無清淨大眾不可除滅是名僧殘經云犯僧伽婆尸沙如化樂天壽八千歲墮泥犁中人間八百年為天一晝夜於人間數二十三萬零四百萬年此泥犁即天呌喚地獄謂獄卒置罪人鐵鑊中號咷大呌故第一故弄失精戒若比丘故弄陰失精除夢中僧伽婆尸沙緣起此戒有二制時佛遊舍衛城迦留陀夷欲意熾盛顏色憔悴身體損瘦隨念憶想弄失不淨諸根悅豫顏色光澤親友比丘間知其故具白世尊世尊以此因緣集僧訶責迦留云何於我清淨法中出家作穢污行汝愚人舒手受人信施復以此手弄陰出精與諸比丘集十句義結戒一攝取於僧乃至第十令正法久住此是初制也時佛結戒已有一比丘亂意睡眠於夢中失精有憶念覺已疑犯因是白佛佛言亂意睡眠有五過夫一惡夢二諸天不護三心不入法四不思惟明相五於夢中失精善意睡眠有五功德反上可知故有除夢中無犯第二結戒也由癡無智故依婬事及婬煩惱制斯學處乃初篇婬根本種類釋義文分三節故弄等正明所犯之事除夢中是開條僧伽等結成所犯之罪律云故弄者實心故作精者有七種青色者轉輪聖王精黃色者輪王太子精赤色者犯女色多精白色者負重人精黑色者輪王第一大臣精酪色者須陀洹人精酪漿色者斯陀含人精若為樂故出精為自試故出為福德故出自試者試探己精七種之色福德者為求福德故而弄出精也為祭祀故出為生天故出為布施故出爾時一婆羅門居閑靜處誦持外道呪術彼經所記若故墮精者命終生天彼欲求天道常弄陰失精時有一婆羅門出家為道者聞如是說即便弄失佛知故制有此祭祀生天布施三種之說為種子故為自憍恣故為顏色和悅故出精善見云精離本處本處者以腰為處又云不然舉體有精唯除髮爪及燥乃無精若精離本處至道不至道及出乃至飽一蠅即犯除夢中者善見律云惟除夢中者佛結戒制身業不制意業是以夢中無罪僧祗律云夢者虗妄不實若夢真實於我法中修梵行者無有解脫以一切夢皆不真實是故諸修行者於我法中得盡苦際結罪是中犯者若為樂故為自試故乃至為自憍恣故為顏色和悅故如是一切方便弄失者盡僧殘不失者盡偷蘭遮若比丘教比丘方便弄失者偷蘭遮不失突吉羅若教餘人弄失不失一切突吉羅第四分云若女人捉比丘前彼動身失不淨僧殘不動身失不淨突吉羅捉後亦如是捉足禮亦如是若以男根逆水順水或水灑或逆風順風或口噓或空中想身動失不淨皆僧殘此戒具四緣方成本罪一於九種發心中必有其一二要不作道想三於六種境隨用其一故弄四於七種精中隨失一種若四闕一律有開條兼制比丘尼波逸提式叉摩那沙彌沙彌尼突吉羅薩婆多論云比丘尼犯波逸提者一為令二眾有差別故又女人煩惱深重難拘難制若與制重則罪惱眾生又女人要在私屏多緣多力苦乃出精不同男子隨事能出故所同制不同學也若比丘尼教比丘失者偷蘭遮不失突吉羅是為犯隨開不犯者夢中失覺己恐污身污衣牀褥若以弊物盛棄若以手捺棄若欲想出不淨若見好色不觸失不淨若行時自觸兩䏶若衣觸若大便時若冷水煖水洗浴若浴室中揩摩若大啼哭用力時一切不作失不淨想及最初未制戒等是為不犯會採僧祗律云若於諸煖處煖具身觸若向火向日欲令出者僧殘若道中行婬心自起而失不淨者是應責心行時故作方便令出出者僧殘如行住坐臥亦如是若在空閑處住見有禽獸交會見己欲心起失不淨者是應責心若復為受樂故更方便逐看欲令出出者僧殘若見男女裸形欲心起失不淨者是應責心若為樂故逐看令出出者僧殘根本律云若苾芻量生支作心受樂因而泄精者得窣吐羅底若不泄者得惡作罪寧以手執可畏黑蛇不以染心捉生支若以染心觀視生支得惡作罪五分律云眠時出不淨覺時發心身動偷蘭遮眠時身動覺時發出不淨突吉羅散亂心眠突吉羅憶行婬事突吉羅律攝云覺為方便夢中流泄或復翻此作心受樂或前興方便後乃息心或作方便其精欲動即便攝念皆得麤罪此戒大乘同制梵網經云寧以利斧斬斫其身終不以此破戒之心貪著好觸菩薩戒本經云起五葢心不開覺者是名為犯眾多犯是犯染污起也引證大涅槃經云應於婬欲生臭穢想乃至不生一念淨想若夢行婬寤應生悔善見律云亂意睡眠者以不定意故若白日眠先念某時某時當起如修多羅中說佛告諸比丘若汝洗浴竟欲眠當作是念我髮未燥當起若如是眠善若夜亦應知時月至某處當起若無月星至某處當起當念佛為初此謂六念法今但言佛餘五攝中十善法中一一法中隨心所念然後眠附考根本律云非離欲人有五因緣令生支起謂大小便逼或風所動或為嗢徵加蟲所齧或由染污心若離欲人但有其四無後應知第二女身相觸戒若比丘婬欲意與女人身相觸若捉手若捉髮若觸一一身分者僧伽婆尸沙緣起佛在舍衛國迦留陀夷因聞佛制戒不弄陰墮精便伺婦女至房捫摸嗚口其樂者笑彼所作其不樂者瞋恚罵詈諸比丘白佛佛乃結戒由癡覆故因婬煩惱制斯學處乃初篇婬根本種類釋義文分二節婬欲意下明所犯之事若觸一一身分下結成所犯之罪律云婬欲意者愛染污心根本律云有是染心而非纏心有是纏而非染或俱有或俱無云何是染非纏謂有染心非極染心現在前時云何是纏非染謂心緣外境有所繁著未起染心云何染纏俱有謂有染心極染心貪求前境心有繁著云何染纏俱無謂除前相故女人者堪行欲境身者從髮至足身相觸者摩身前後若牽近於前若推却於後若從下至上逆摩若從上至下順摩若坐捉舉於上若立捉令下坐若捉前後及捉乳捉髀若擪捺前後及乳髀等結罪是中犯者若比丘與女人身相觸欲心染着受觸樂一觸一僧殘隨觸多少皆僧殘女作女想以身相觸欲心染着不受樂動身若染着受樂不動身皆偷蘭此皆無衣隔相觸也若女作女想以身觸彼衣具欲心染着受樂若染着不受樂皆偷蘭遮若以身觸女衣具欲心染着動身不受樂若欲染不動身受樂皆偷蘭遮此比丘無衣隔女有衣隔也若女作女想以身衣觸彼身衣欲心染着受觸樂若不受樂若不受樂動身若受樂不動身若不受樂不動身但有欲心染着一切突吉羅此比丘與女皆有衣隔也若女作女想女人捫摸比丘身身相觸欲意染着受觸樂乃至捉捺一一