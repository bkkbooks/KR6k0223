爾時得偷蘭遮若夫婦鬬諍比丘便勸喻和合得偷蘭遮若彼夫婦不和或於佛事僧事有闕為佛事故勸令和合無罪若有婦女還家勸早還夫舍得偷蘭遮有人多畜馬而無好種生者倩比丘某家有生馬為我求之比丘為求得偷蘭遮有二比丘一有女者語其女言此是汝婿一有兒者語其兒言此是汝婦作是語時俱得僧殘罪十誦律云若夫婦相瞋夫未唱非我婦和合者偷蘭遮已唱非我婦和合者僧殘若受語解意旨僧殘受意旨不受語偷蘭遮但受語不解意旨者無犯若媒事已成比丘後來佐助偷蘭遮根本律云門師苾芻至施主家作如是語此女長成何不出適此男既大何不娶妻若言此女何不往夫家此男何不向婦舍皆惡作罪律攝云以三處定成媒嫁罪一主定以男意語女以女意語男二事定謂於男女婦及私通事三時定乃至須臾頃凡為媒處人有尊有卑尊謂家長取言為定翻此成卑若受言往問及以還報二處皆尊即犯本罪若將卑語報彼尊人得惡作罪有其三事雖不報言亦成返報一期處二定時三現相若見我在某處住時則知事合是謂期處若某時見我則表事成是謂定時若見我持鉢或著新衣則知事合是謂現相作斯三事他解之時便成還報若指腹媒嫁若生男女若俱男俱女若半擇迦謂半月變形也窣吐羅若告云彼家有女何不求之意為媒合便得麤罪但有片言與媒事相應皆惡作罪若弟子語師我欲為他作媒事師聞此語默而許者得窣吐羅師昧律制不善誨徒故招斯罪若明毗尼聞即訶止是為良導戒因緣經云解放畜生合其牝牡僧殘本律媒嫁畜生但預囑比丘未知有不故結突吉羅僧祗為求生馬雖明示其處而婬機尚達事非目覩故結偷蘭遮若解放令合則眼視非法心生隨喜不無欲染故犯本罪推達及近制意存焉此戒大乘同制梵網經云菩薩應救度一切眾生淨法與人而返助人行婬是無慈心也音義獼猴江梵語麼迦吒此云獼猴賀邏䭾此云池而云江乃譯人義立耳此池在毗舍離宮城外約五六里菴羅女園側是昔獼猴羣集為佛穿作此池也婆裘河或云婆裘沫河或云䟦求河又云䟦求摩河正梵音名䟦窶末底此翻勝慧河勿力伽難提應云蜜利伽羅此云鹿難提亦云喜總言之名鹿喜善見律云鹿杖沙門鹿杖其名也沙門者如沙門形剃頭留少許周羅髮著壞色衣一以覆身一以置肩上入寺依止比丘拾取殘食以自活命因此諸比丘僱彼行殺螫音釋蟲行毒也蹹音踏踐蹹也杙音亦橛也樴也左傳臧堅以杙抉其傷而死倚發倚者依也謂依機發舉也桁音衡屋橫木也弶強去聲設罟於道以掩鳥獸也龜易龜謂灼龜易謂卜易皆趨吉避凶之法栴荼羅此翻屠者乃西域最鄙賤之流不與四姓同居唯彼黨類共住凡入城邑手持竹杖挂以赤幟而別其鄙賤也狎音洽親近也玩熟也習也辯才即四無礙辯才亦名四無礙智由其智慧明了通達無滯故一義無礙辯才謂了知一切諸法義理故二法無礙辯才謂通達諸法名字分別無滯故三辭無礙辯才謂於諸法名字義理隨順一切眾生殊方異語為其演說能令各各得解辯說無滯故四樂說無礙辯才謂隨順一切眾生根性所樂聞法而為說之圓融無滯故五陰陰者葢覆義又名五蘊蘊者積聚義謂積聚有為葢覆真性故眾生由此五法積聚成身復因此身積聚有為煩惱等法能受無量生死一色陰色即質礙之義眼耳等六根和合積聚故名為色二受陰受即領納之義謂六識與六塵相應而有六受積聚故名受陰三想陰想即思想之義謂六識與六塵相應而成六想和合積聚故名想陰四行陰行即遷流造作之義謂因六識思想諸塵造作善惡諸行和合積聚故名行陰五識陰識即了別之義謂以眼耳等六種之識於諸塵境上照了分別和合積聚故名識陰六入入即趨入之義謂眼耳鼻舌身意六根為眼耳等六識所依能入色聲香味觸法六種塵故名六入十八界界即界分為眾生心色俱迷故開色為十一界謂五根六塵開心為七界謂眼等六識及意根皆屬於心故開之謂七得定即指三三昧三解脫門也有覺有觀三昧謂初心在禪曰覺細心分別禪味曰觀以空無相無作相應心入於初禪則一切覺觀皆悉正直故名有覺有觀三昧無覺有觀三昧謂以空無相無作相應心將入二禪之時覺知之心已亡分別禪味之念猶在一切定觀皆悉正直故名無覺有觀三昧無覺無觀三昧謂以空無相無作相應心入於二禪乃至滅受想定覺知之心分別禪味之念俱亡故名無覺無觀三昧空無相無作即三解脫門也謂觀一切法皆從因緣而生自性本空無我我所若能如是通達則於諸法而得自在故名空解脫門既知一切法空故觀男女一異等相實不可得若能如是通達諸法無相即得自在故名無相解脫門若一切法無相則於三界無所願求若無願求則不造作生死之業即無果報之苦而得自在故名無作解脫門亦名無願解脫門正受離邪倒想領納所緣名為正受又云不受諸受名為正受法智法智者知現在法是名法智現在法謂五陰等各別自相比智比智者知餘殘法名曰比智餘謂過去未來諸法次現在法後知故名比智所以者何先現知已然後比知等智等智者亦名世俗智知諸有情修行差別及知諸法名字等異故名等智他心智他心智者知諸眾生心心所法無所滯礙故名他心智苦集滅道乃四諦法法界次第云此四通言諦者諦以審實為義此四諦法正為聲聞人說欲從聞生解故必須藉教顯理今明教理不虗故云審實若由因感果則應先因而後果今悉先果而後因者教門引物為便故皆先果而後因前二諦是世間之法令知苦以斷集故先果而次因後二諦是出世間之法使為滅以修道故亦先果而次因也苦諦者苦以痛惱為義一切有為心行常為無常患累之所逼惱故名為苦大論云無量眾生有三種身苦老病死三種心苦貪瞋癡三種後世苦地獄餓鬼畜生總而言之有三苦八苦等皆三界生死之患諦審生死實是苦者故名苦諦也三苦謂苦苦壞苦行苦八苦可知集諦者集以招聚為義若心與結業相應未來定能招聚生死之苦故名為集審一切煩惱惑業於未來實能招集三界生死苦果故名集諦也盡諦者亦名滅諦滅即寂滅滅以滅無為義結業既盡則無生死之患累故名為滅以諸煩惱結使滅故三界業亦滅若三界業煩惱滅者即是滅諦有餘涅槃因滅故果滅捨此報身時後世苦果永不相續名入無餘涅槃諦審涅槃實為寂滅故名滅諦也道諦者道以能通為義正道及助道是二相扶能至涅槃故名為道諦審此二道相扶實能通至涅槃不虗故名道諦也正道者實觀三十七品三解脫門緣理慧行名為正道助道者得解觀中種種諸對治法及諸禪定是名助道手印古人多作印於指環上亦如今人繫圖章於扇柄上取其便用故也按根本雜事佛聽比丘畜印以為記驗但不聽着指環及寶莊飾許用鍮石赤銅白銅牙角五種物作又印有二種一是大眾二是私物若大眾印可刻轉法輪像兩邊安鹿伏跪而住其下應書元本造寺施主名字若私印刻作骨鎖像或作髑髏形欲令見時生厭離故凡律中言手印指印皆准此顛迦此翻極惡又名畢竟以畢竟無涅槃性即無性闡提芭蕉結子四句芭蕉生華狀如蓮瓣中有甘露甜如蜜若生此華則此枝便壞竹葦開華結子則竹林隨敗騾不自生皆驢共馬交遘而生騾若懷姙必傷其母化樂天謂自化五塵之欲而娛樂故此天依空而居按論云人間八百年為此天一晝夜則人間二十八萬八千年方為此天一年若此天壽八千歲則當人間二百三十億零四百萬年矣迦留陀夷亦名烏陀夷此翻黑光又名麤黑由其面黑眼赤故乃婆羅門種與佛同日而生本是王大臣因世尊出家成道父王思見遂命黑光往迎既至佛所佛為說法喚善來比丘鬚髮自落成比丘性而情多欲後於舍衛國有婆羅門女逼行非法而尊者不從其事彼懷瞋忿自破身形反誣尊者以告其父父集五百婆羅門眾共曳尊者然尊者力大乃至不能移足時佛觀知此是最後教誡烏陀夷事佛衰其力時眾共打幾死將曳王所王雖審知事虗猶三反訶責尊者極生慚愧遂至舍利弗所頂禮具陳上事舍利弗與其說法教誡發勇猛心結惑皆除證羅漢果既得果已念報佛恩而行教化佛言我聲聞弟子中教化有情令得聖果者迦留陀夷而為第一如是尊者於舍衛國教化十八億家令得聖果後為暴惡女兒婦通賊斷尊者命將屍棄糞聚中此是尊者先所作業果熟當酬佛於十五日布薩不見尊者而知其死佛與大眾圍繞夜至城門放大光明徧滿城邑其門自開王及夫人臣民婦女驚覺奔馳隨佛往至糞聚處所出尊者屍香湯洗浴乘於寶轝至一勝處香木焚之收取舍利於四衢道側建塔供養為人天福田今所廣引者俾知尊者為建法門以現犯緣也轉輪聖王金轉輪王成就七寶具足四德王四天下七寶者一金輪寶二白象寶三紺馬寶四神珠寶五玉女寶六典財寶七主兵寶四德者一長壽不夭二身強無患三容顏端正四寶藏盈滿以十善法勸化眾生統攝四大部洲外道呪術外道者學乖諦理隨自妄情不返內覺稱為外道其種別有經書世世相承以道學為業或在家或出家多恃己道術我慢人也類分九十六種䏶皮上聲䏶胵胃脘也當念佛為初此謂六念也一念佛慈悲導師二念法三世佛母三念僧人天福田四念戒清淨身心五念施普濟貧窮六念天常受安樂捫摸捫音門撫持也摸音莫按捫也謂以兩手捫摸髀音彼股骨也草秸秸音甲與稭同稭禾槀去其皮以為席擪葉入聲持也按也特牛乃三歲之牛也犛音離郭璞曰犛牛黑曰犛牛黑色出西南徼外牸音字即牝牛摩鄧伽亦云摩登伽此云本性乃大幻術婬女也嘗以呪術迷惑阿難幸如來神呪往護惡呪始滅復預楞嚴獲證三果唄匿此翻為靜又翻止斷又云止息由是外緣已止已斷爾時寂靜任為法事也法苑云尋西方之有唄猶東國之有讚讚者從文以結章唄者短偈以流頌比其事義名異實同毗尼母云佛告諸比丘聽汝等唄唄者言說之辭聽引十二部經中要言妙辭直顯其義故曰唄匿閑三藏閑謂善習精學也三藏教理深玄奧義無不通達異熟果異熟果者謂果報異時成熟即第八識也以此識能含藏一切諸法種子而成熟諸根識之果也如眼等諸根由昔作善惡之因今報得苦樂之果若今作善惡之因亦感當來苦樂之果故名異熟果也迦羅比丘十誦律云鹿子長者兒名曰迦羅聰智利根眾人所問常為斷疑他事怱務若人有女姊妹有來求者往問迦羅應與不應若人為自求婦若為兒求亦往問可取不可取迦羅後時出家為僧猶如本法門師門即三寶真淨濟世之法門若居家善信男女歸依三寶所拜之師稱曰門師也牝牡牝者母畜也飛曰雌雄走曰牝牡
