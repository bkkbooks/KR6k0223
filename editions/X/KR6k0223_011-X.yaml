body:
  text: 金陵寶華山弘律沙門讀體集第四十一與外道食戒若比丘外道男外道女自手與食者波逸提緣起此戒有二制世尊將諸弟子從拘薩羅國遊行至舍衛城諸檀越供養佛僧大得餅食佛敕阿難分餅與眾僧分已故有餘在世尊復令以此餅與乞人彼乞兒眾中有一躶形外道女顏貌端正阿難付餅餅黏相著謂是一餅與此女人女得餅已即問旁人汝得幾餅如是轉相推問彼得一者遂生疑謗時會中有一梵志在此食已便向拘薩羅國道逢一篤信相士問從何來報言從舍衛國於禿頭居士邊得食來復問何者是禿頭居士報言沙門瞿曇是相士言汝是何人食他食已發此惡言篤信相士至僧伽藍中如所聞事語諸比丘以此二因緣佛故制云若比丘與躶形外道若男若女食者波逸提此初結戒也後諸外道等皆有怨言一二外道有過我曹復有何過而不得食耶佛知令置地與若使人與更加自手與之語此第二結戒也由外道事長物譏嫌制斯學處釋義律云外道者躶形異學人薩婆多論云除佛五眾出家餘殘出家皆名外道言躶形者乃據緣起因人而制准薩婆多則無論躶形非躶形一切外道皆不聽自手與食自手與者謂自親手授與致令彼生憍慢而無慚耻也食者謂五正食非五正食也結罪是中犯者若自手與外道男女食而受者波逸提與而不受者突吉羅方便欲與而不與還變悔者一切突吉羅此戒具三緣方成本罪一是外道二親手與三彼已受之兼制比丘尼突吉羅同制別學按尼本律亦犯波逸提式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若捨著地與若使人與若與父母與塔作人僧房作人計作食價與若勢力強奪及最初未制戒等是為不犯根本律云或欲以食因緣除彼惡見與亦無犯此是四攝之一令彼反邪歸正與大乘善權同也會採十誦律云不犯者若彼有病若親里若求出家時與謂於四月羯磨共住試探彼心之時也未受食不應與他先受已後當與彼若父母若繫閉人急須食人姙身女人應正觀多少與之畜生應與一口五分律云若外道來乞應以己分一摶別著一處使其自取不應持僧分與若乞乞兒乞狗乞鳥應量己食多少取分然後減以乞之不得取分外為施若乞謂比丘乞食之時僧祗律云若比丘父母兄弟姊妹在外道中出家者亦不得自手與食當使淨人與食此戒大乘同學或觀機得與引證賢愚經云目連携福增比丘入海行次見一大樹多蟲圍唼其身乃至枝葉無有空處鍼頭許大叫震動如地獄聲比丘問目連目連告曰是瀨利吒營事比丘用僧祗物華果飲食送與白衣受此華報後墮地獄樹唼諸蟲即是得物之人附考阿含經云若復有人以父著左肩上以母著右肩上至千萬歲衣被飲食牀榻臥具病瘦醫藥即於肩上放𡱁溺而猶不能得報其恩婆沙論云如經所說佛告苾芻當知若有孝子一肩擔父一肩擔母經於百年處處遊歷猶非真實報父母恩若有孝子能勸父母於佛法僧因果等法未信者信信者增長無淨戒者勸受持戒有慳貪者勸行惠施無勝慧者勸修勝慧令善住安以自調伏乃名真實報父母恩第四十二詣餘家不囑授戒若比丘先受請已前食後食詣餘家不囑授餘比丘除餘時波逸提餘時者病時作衣時施衣時是謂時緣起此戒有六制佛在舍衛國給孤獨園城中有一長者是䟦難陀親友為䟦難陀故設食請僧待䟦難陀至乃行飲食而䟦難陀小食時更詣餘家時垂欲過方來諸比丘飲食不得飽滿佛知制云先受請小食時至餘家者犯此初結戒也復有一大臣是䟦難陀知舊遣使送新果至僧伽藍待䟦難陀分與眾僧而彼後食已方詣餘家時過乃還使眾僧不得食新果故制先受請前食後食至餘家者犯此第二結戒也又羅閱城中眾僧大有請處諸比丘皆畏慎不敢入城受請白佛佛言聽相囑授入城此第三結戒也時病比丘先語檀越家作羮及粥飯畏慎不敢入城恐犯故開病時此第四結戒也又諸比丘作衣時到或須大小釜瓶杓等器皆畏慎不敢入城故開作衣時此第五結戒也又諸比丘施衣時到或有已得施衣處或有方當求索彼畏慎不敢入城故開施衣時此第六結戒也由俗家事過限廢闕煩惱制斯學處釋義文分二節先受請下明其所犯餘時者下明其隨開律云前食者明相出至食時後食者從食時至日中餘比丘者一界共住也病者如上作衣時者自恣竟無迦絺那衣一月有迦絺那衣五月乃至衣上作馬齒一縫是施衣時者一月五月亦爾除此已餘時勸化作食並施衣也若比丘囑授欲詣村而中道還失前囑授若欲去時當更囑授若囑授詣村乃更詣餘家若囑授至白衣家乃更往庫藏處或聚落邊房或比丘尼寺若即白衣家還出皆失前囑授應更囑授而往結罪是中犯者若先受請已前食後食詣餘家不囑授比丘入村者波逸提若一脚在門內一脚在門外方便莊嚴欲去而不去一切突吉羅莊嚴者謂著衣整儀也此戒具三緣方成本罪一同眾受請而檀越為己二不囑餘比丘而任意他往三兩脚出門兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若無比丘不囑授至庫藏聚落邊房至所囑家若勢力所持或命難梵行難及最初未制戒等是為不犯會採薩婆多論云雖大界內近寺白衣家不白亦犯墮所謂以有村來五意故除如作持結衣界中明若白而還晚令僧惱者突吉羅律攝云若語施主我設不來應與僧食勿令廢闕若施主不以此人而為先首並無犯此戒大乘同學第四十三食家強坐戒若比丘在食家中有寶強安坐者波逸提緣起佛在舍衛國給孤獨園迦留陀夷本處俗時同友白衣婦名齋優婆私彼此顏貌端正各相繫意時迦留陀夷著衣持鉢至家就座而坐時齋優婆私洗浴莊嚴其身夫主心極愛敬未曾相離夫主問迦留陀夷汝須何等報言須食即使婦與食食已坐住不去夫主云汝向者言須食已與食竟何以不去耶齋優婆私現相令其不去時夫主瞋恚言我今捨汝出去隨汝在後欲何所作諸比丘聞知白佛結戒由詣他家及婬煩惱制斯學處乃初篇婬根本種類釋義律云食者男以女為食女以男為食故名食家寶者硨磲碼碯珍珠琥珀金銀強安坐者謂他不許而自縱己情故名為強放身就座名為安坐按此戒因知他男女有欲意時須交合故強安坐以妨他事令其所欲不得隨意致生恚恨得罪不從有寶得罪而言有寶者或有寶則是夫婦可行欲處故耳結罪是中犯者若在食家有寶強安坐者波逸提若盲不聾若聾不盲若立不坐盡突吉羅此戒具四緣方成本罪一必欲心染著二非斷欲食家三無有知男子四須有寶強坐兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若入食家中有寶舒手及戶處坐若有二比丘為伴或有客人在一處不盲不聾不聾不盲或從前過不住或卒病發倒地或為勢力所持或被繫閉或命難梵行難及最初未制戒等是為不犯會採十誦律云若女人受一日戒男子不受若男子受一日戒女人不受是家中坐突吉羅若二俱受者不犯薩婆多論云若斷婬家若受齋家若自有所尊重人在座謂和尚阿闍黎父母若此舍多人出入處皆不犯此戒大乘同學第四十四食家屏坐戒若比丘食家中有寶在屏處坐者波逸提緣起佛在舍衛國給孤獨園迦留陀夷自念言世尊制戒食家中有寶不應安坐應在舒手及戶處坐即便往彼家在戶扇後坐與齋優婆私共語有乞食比丘來至彼家聞迦留陀夷語聲嫌責言云何在食家有寶屏處坐令我等不知為何所作白佛結戒由向俗家為婬煩惱制斯學處乃初篇婬根本種類釋義律云食家如上寶亦如上屏處者若樹牆壁籬障若衣障及餘物障結罪是中犯者食家中有寶在屏處坐者波逸提若盲而不聾若聾而不盲若立而不坐盡突吉羅此戒具四緣方成本罪一欲心染著二食家有寶三無伴獨入四屏坐共語兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若在食家中有寶坐舒手得及戶使乞食比丘見若有二比丘為伴若有客在一處不盲不聾或從前過不住或卒病倒地勢力者所持或被繫閉若命難梵行難及最初未制戒等是為不犯此戒大乘同學第四十五獨與女人坐戒若比丘獨與女人露地坐波逸提緣起佛在舍衛國給孤獨園亦起自迦留陀夷往彼齋優婆私家在露地共一處坐語有乞食比丘來至其家見己嫌責白佛結戒因招譏嫌制斯學處乃初篇婬根本種類釋義律云女人者有智命根不斷獨者一女人一比丘露地坐者揀非屏處結罪是中犯者獨與女人露地共一處坐波逸提若盲不聾若聾不盲若立不坐盡突吉羅此戒具三緣方成本罪一欲心染著二獨無伴侶三露坐共語此並上二戒犯與不犯皆同今一一詳出者為便初學故兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者有二比丘為伴或有識別人在邊不盲不聾或從過不住或卒病倒地或勢力所持或繫閉或命難梵行難及最初未制戒等是為不犯會採十誦律云相去一丈坐波逸提相去丈五坐突吉羅過二丈不犯律攝云若與非人女半擇迦女及未堪行婬境若聾騃等共屏坐時咸得惡作此戒大乘同學第四十六故使他不得食戒若比丘語餘比丘如是語大德共至聚落當與食彼比丘竟不教與是比丘食語言汝去我與汝一處若坐若語不樂獨坐獨語樂以此因緣非餘方便遣去波逸提緣起佛在舍衛國給孤獨園䟦難陀與餘比丘共鬬結恨在心後時語彼比丘言汝隨我行當與汝食俱入舍衛城將至無食處周迴遍行少時念言彼出城至祗桓中日時已過即與彼言未曾有汝是大惡人今由汝故并使我不得食可速去我共汝若坐若語不樂我獨坐獨語樂便自至有食家而食彼比丘出城至寺日時已過不得食乏極有少欲比丘聞已嫌責䟦難陀白佛結戒由伴屬事不忍煩惱制斯學處釋義文分二節語餘比丘下明其誑誘彼比丘竟不教與是比丘食下結成所犯律云聚落四種如上當汝與食者謂欲惱他故作此誑言以誘戲之也食者謂時食非時不得食也語言汝去者是驅遣之詞若坐若語不樂等者是重彰驅遣令生困惱之義根本律云坐謂禪思語謂讀誦也以此因緣非餘者謂正由嫌恨故使他絕食以生惱為緣非為餘利益事而遣去方便遣去者謂假坐語不樂等方便去之結罪是中犯者若方便遣去捨見聞處波逸提捨見處至聞處捨聞處至見處皆突吉羅方便遣去自捨見聞處波逸提捨見處至聞處捨聞處至見處皆突吉羅此戒具四緣方成本罪一心存舊恨欲使斷食二人須稟具三呼作伴往四時將正午遣離見聞處兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者與食遣去若病若無威儀人見不喜者語言汝去我當送食至僧伽藍中彼若破戒破見破威儀若眾中所舉若被擯若應擯若見命難淨行難及最初未制戒等是為不犯會採五分律云作此惱餘四眾突吉羅尼作此惱二眾波逸提惱餘三眾突吉羅薩婆多論云若來未入城門令還者突吉羅若入城門令還者突吉羅若未入白衣家外門中門內門令還者突吉羅若入內門未至聞處令還者突吉羅若至聞處令還者波逸提律攝云若隨醫教為病令斷食者無犯此戒大乘同學第四十七過受藥戒若比丘受四月請與藥無病比丘應受若過受除常請更請分請盡形壽請波逸提緣起此戒有六制佛在迦維羅衛國尼拘律園中釋種摩訶男請僧供藥六羣自相謂言摩訶男供眾僧藥恭敬上座施與好者求者亦與不求亦與於我等無恭敬心惡者施我等求索猶不見與況不求而得我等當詣其家求難得所無之藥即往索之摩訶男報言若家中有當相與若無者當為詣市求買相給六羣即訶彼有愛及以妄語因是不復供給僧藥佛知制云應受四月因緣請與藥不得過受此初結戒也時病比丘畏慎不敢過受藥白佛故開此第二結戒也時諸居士常請比丘受藥皆畏慎不敢受白佛故開此第三結戒也後時摩訶男復作念言我今不可以一人二人故斷眾僧藥耶當更請供給至僧伽藍中言願諸大德受我請供藥諸丘丘畏慎不敢受白佛故開此第四結戒也時諸居士請比丘與分藥不敢受畏慎白佛故開此第五結戒也又諸居士請比丘與盡形壽藥畏慎不敢受白佛聽受此第六結戒也由他施事多求煩惱制斯學處釋義文分二節受四月藥下明其所犯除常請等明其隨開律云四月者夏四月病者醫所教服藥也常請者其人作如是言我常與藥更請者斷已後復更請與不得計前日數應從斷藥還與日數分請者持藥至僧伽藍中分與盡形壽請者其人言我常盡形壽與藥請有四種或請夜有限齊藥無限齊謂彼作夜分齊不作藥分齊我與如許夜藥或請夜有限齊藥有限齊謂彼作夜分齊藥分齊如是言爾許夜與如是藥此二種請應夏四月受所言夜者由日以該夜若其夜分未過猶非越限也或請藥有限齊夜無限齊謂彼作藥分齊不作夜分齊作如是言我與如是藥或請夜無限齊藥無限齊謂彼不作夜分齊藥分齊作如是言我請汝與藥此二種請應隨施時受結罪是中犯者若過受咽咽波逸提此戒具三緣方成本罪一是請藥二無開緣三過受入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者如上隨開及最初未制戒等是為不犯會採僧祗律云或夏四月冬四月春四月檀越請不必定或四月或一月半月期滿已不得更索若請前食不得索後食前謂小食後謂時食若請後食不得索前食藥及餘物亦爾若言盡壽受我四事供養爾時得隨意索十誦律云索得波逸提索不得突吉羅索呵黎勒等苦藥得不得盡突吉羅律攝云四月未竟請麤食更求好者得惡作食便得墮罪請好食更索麤者索得惡作食時無犯善見律云檀越施藥應作藥用不得作食與油乞酥犯突吉羅此戒大乘同學為眾生故索不犯附考五分律云若人施僧藥執事比丘應問為留聚落中為著僧坊內若言留聚落中須時應語我須如是藥為我辦勿使乏若言留僧坊內應白二羯磨差五法比丘不應愛恚怖畏癡知藥知非藥者作守僧藥人彼應以新器盛訶梨勒訶摩勒醯勒卑䟦羅乾薑甘蔗糖石蜜若器不漏應盛酥油蜜應持物結口題上藥名若病比丘須者應歡喜與若病者自知須此藥應自取服若不知應問醫若無醫應問和尚阿闍黎我如是如是病應服何藥若二師不知應取藥再三服不差復取餘藥服第四十八觀軍陣戒若比丘往觀軍陣除時因緣波逸提緣起此戒有二制佛在舍衛國給孤獨園波斯匿王征伐反叛六羣比丘往觀王言諸尊在此軍中欲何所為報言我無所作來看軍陣時王聞已心甚不悅復問今何所至報言詣舍衛見佛王寄石蜜一裹奉上世尊教持己名禮拜問訊六羣以此因緣禮拜問訊佛知訶責此初結戒也後梨師達富羅那二大臣在軍中渴仰欲見比丘遣使來請諸比丘畏慎不敢往白佛故開除時因緣此第二結戒也由觀軍事情亂煩惱制斯學處王寄石蜜以奉世尊者乃藉申信敬暗興制緣而為往觀軍陣之證據也釋義律云陣者若戲若鬬根本律云陣有四種一矟刃勢二車轅勢三半月勢四鵬翼勢軍者有四種軍一象二馬三車四步僧祇律云象軍者四人護象足馬軍者八人護馬足車軍者十六人護車步軍者三十二人執兵杖結罪是中犯者若往觀軍陣從道至道從道至非道從非道至道從高至下從下至高而去見者波逸提不見者突吉羅若方便莊嚴欲觀而不去者皆突吉羅若比丘先在道行軍陣後至應下道避若不避者突吉羅此戒具三緣方成本罪一有心觀看二無緣故往三見境明了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若有事往若彼請去或力勢者將去若先在前行軍陣後至下道避若水陸道斷賊獸水漲難若命難梵行難不下道避及最初未制戒等是為不犯會採僧祗律云軍來詣精舍不作意看無罪作意者越毗尼罪下至人口諍看者越毗尼罪根本律云若見軍時不應說其好惡尼陀那云有打鬬者不應往看若見諍者急捨而去薩婆多論云若不故往以行來因緣道由中過不犯此戒大乘同制第四十九軍中過三宿戒若比丘有因緣聽至軍中二宿三宿過者波逸提緣起佛在舍衛國祗桓精舍六羣比丘有因緣至軍中宿時諸居士見自相謂言我等為恩愛故在此宿耳而此沙門復在此為何耶有知足比丘聞已白佛結戒由觀軍事及掉亂心招譏煩惱制斯學處釋義有因緣者謂有王臣兵將請喚或為三寶有所啟白軍中者謂軍馬營寨欲戰之處二宿三宿者是制其止宿夜分限齊也過者謂違越大聖教敕也結罪是中犯者若有因緣欲至軍中得二宿住至第三宿明相未出時應離聞處見處若不離至明相出波逸提若離見處至聞處離聞處至見處皆突吉羅此戒具三緣方成本罪一是有緣入軍二必宿至三宿三明相已出不離見聞兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若第三宿明相未出離見聞處若水陸道斷如上難事至第三宿明相出不離見聞處及最初未制戒等是為不犯會採律攝云苾芻有緣受請詣彼或有衣利引起貪心而彼軍營或整不整作整兵心停留觀察至第三夜明相出時便得墮罪設方便時亦惡作罪五分律云雖有因緣若書信得了應遣書信若須自往然後往事訖便還勿經宿若不了應一宿一宿不了應再宿復不了應三宿若了不了過三宿波逸提不應宿而宿突吉羅此戒大乘同學或觀機不犯第五十觀軍事戒若比丘二宿三宿軍中住或時觀軍陣鬬戰若觀遊軍象馬力勢者波逸提緣起佛在舍衛國給孤獨園六羣比丘聞世尊制戒聽有因緣二宿三宿得在軍中住彼在軍中住觀軍陣鬬戰觀諸力人象馬時六羣中有一人為箭所射同伴即以衣裹之輿還諸居士皆譏嫌有慚愧比丘聞知白佛結戒由觀軍事譏嫌煩惱制斯學處釋義律云軍者或王軍賊軍居士軍陣者四方陣或圓陣或半月形陣或張甄陣或函相陣鬬戰者或戲鬬或真實鬪遊軍者謂行軍也力勢者僧祇律云兩眾相交強弱相傾也結罪是中犯者若往觀軍陣鬬戰象馬力勢者從道至道從道至非道從非道至道從高至下從下至高而見者波逸提往而不見者突吉羅方便莊嚴欲往而不往者一切突吉羅若比丘先在道行軍馬後至應避不避者突吉羅此戒具三緣方成本罪如前無異兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者有時因緣若有所白若請喚若為勢力所持若命難梵行難若先行軍陣後至下道避若水陸道斷賊盜惡獸水大漲不避道及最初未制戒等是為不犯會採五分律云觀鳥獸鬬突吉羅此防心隨境轉以動殺機而亂正念是故制之此戒大乘同學第五十一飲酒戒若比丘飲酒者波逸提緣起佛在支陀國與千二百五十大比丘俱尊者娑伽陀為佛作供養人時詣辮髮梵志家借宿梵志言我不惜可宿爾但此中有毒龍恐相傷害娑伽陀言但見聽或不害我遂入其家自敷草蓐結跏趺坐繫念在前時彼毒龍見已即放火烟娑伽陀亦放火烟毒龍恚之復放身火娑伽陀亦放身火彼室然似大火娑伽陀自念言我寧可滅此龍火不傷龍身時彼毒龍火光無色娑伽陀火光轉盛有種種色其夜降此毒龍盛著鉢中明日清旦持往梵志所示之時值拘睒彌主在彼梵志家宿作如是念未曾有世尊弟子如是大神力何況如來即白娑伽陀言若世尊來至我國願見告敕欲一禮敬爾時世尊將千二百五十弟子遊行至拘睒彌國王聞知往迎見已篤信心生頭面禮足聞法歡喜顧看眾僧不見娑伽陀問知尊者與六羣相隨在後尊者至王亦迎禮聞法得歡喜已白言何所須欲說之尊者報言止止此即為供養我已王復白何所須欲六羣語王言汝知不比丘衣鉢六物易得更有與比丘難得者與之王問何者難得報言欲須黑酒次日設供王出種種甘饍飲食兼與黑酒尊者飲飽足已從座起去於中路為酒所醉倒地而吐眾鳥亂鳴世尊知而故問阿難具白所由佛訶云如今不能降伏小蛇況能降伏大龍凡飲酒者有十過失一者顏色惡二者少力三者眼視不明四者現瞋恚相五者壞田業資生法六者增致疾病七者益鬬訟八者無名稱惡名流布九者智慧減少十者身壞命終墮三惡道自今已去以我為師者乃至不得以草木頭內入酒中而入口遂為結戒此是遮罪由乞求事譏嫌煩惱制斯學處釋義律云酒者木酒米酒大麥酒若有餘酒法作酒者是木酒者梨汁酒若以蜜石蜜雜作甘蔗蒲萄等酒亦如是有酒色酒香酒味結罪是中犯者若酒酒煑酒和合若食若飲者波逸提若飲甜味酒突吉羅若飲酢味酒突吉羅若食若食酒糟突吉羅酒作酒想波逸提酒無酒想波逸提無酒有酒想無酒疑皆突吉羅此戒具三緣方成本罪一是能醉人酒二自身無病三故飲入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若有病餘藥治不差以酒為藥若以酒塗瘡及最初未制戒等是為不犯會採十誦律云飲酢酒甜酒若若糟一切能醉者咽咽波逸提若但作酒色無酒香酒味不能醉人飲者無犯律攝云凡作酒色酒香酒味或闕一闕二能醉人皆墮罪不醉人得惡作若酒被煎煑飲不醉人不犯若酒變成醋不醉人澄清見面水解為淨以羅濾之同非時漿隨意應飲佛言以我為師而出家者不應飲酒不與他不貯畜乃至不以茅頭滴酒置口中摩得勒伽云若以酒煑時藥非時藥七日藥無酒性得服善見律云若酒煑食煑藥故有酒香味突吉羅無酒香味得食十誦飲酢甜糟因醉人結重本律結輕者雖有酒香味不醉人故無律攝相同此戒大乖同制引證薩婆多論云若過是罪者此酒極重飲之者能作四逆除破僧逆以破僧要自稱為佛故亦能破一切戒及餘眾惡也婆沙論云若不防護離飲酒戒則總毀犯諸餘律儀曾聞有一鄔波索迦稟性仁賢受持五戒專精不犯後於一時家屬大小當為賓客彼獨不往留食供之時至須食鹹味多故須臾增渴見一器中有酒如水為渴所逼遂取飲之爾時便犯離飲酒戒時有隣雞來入其舍盜心捕殺烹鬻而噉於此復犯離殺盜戒隣女尋雞來入其舍復以威力強逼交通緣此更犯離邪行戒隣家憤怒將至官司時斷事者訊問所以彼皆拒諱因斯又犯離誑語戒如是五戒皆因酒犯故遮罪中獨制飲酒又酒令失念增無慚愧其過深重故偏制立准大論飲酒有三十五過失按律部有三十六失此律論過失詳列後之音義中第五十二水中戲戒若比丘水中嬉戲者波逸提緣起佛在舍衛國祗桓精舍十七羣比丘在河水中嬉戲時波斯匿王與末利夫人在樓上見之王語夫人言看汝所事者夫人報王此諸比丘是年少始出家者在佛法未久或是長老癡無所知爾時夫人即下樓遣使問訊世尊以此因緣白佛佛為結戒由王見生譏制斯學處釋義律云戲者放意自恣嬉者戲也遊也又嬉戲笑也結罪是中犯者從此岸至彼岸或順流逆流或此沒彼出或以手畵水或水相澆灒乃至以鉢盛水戲一切波逸提若酪漿若清酪漿若苦酒若麥汁器中戲弄者盡突吉羅此戒具三緣方成本罪一是水中二有放逸心三嬉戲相見兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若道路行渡水或從此岸至彼岸或水中牽材木若竹若𥱼順流上下若取石取沙若失物沉入水底此沒彼出或欲學知浮法擢臂畵水灒水及最初未制戒等是為不犯會採律攝云若以水灑弄他時隨滴多少水咸得墮罪油等滴他者得惡作罪十誦律云槃上有水若坐牀上有水以指畵之突吉羅善見律云水深沒脚背於中戲波逸提若搖船弄水突吉羅五分律云摶雪弄草頭露突吉羅此戒大乘同學第五十三相擊攊戒若比丘以指相擊攊者波逸提緣起佛在舍衛國給孤獨園六羣比丘中有一人擊攊十七羣比丘中一人乃令命終諸比丘聞知白佛結戒釋義律云指者手十脚十擊攊者以指挃其肉令癢而取笑也律攝云十七群苾芻中有一人被惱不樂彼等共來愧謝以指擊攊因笑過分遂致於死制斯學處結罪是中犯者若以手脚指相擊攊者一切波逸提若杖若戶關若拂柄及一切餘物相擊攊者一切突吉羅此戒具三緣方成本罪一前人是僧二有故戲心三以指相擊兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若不故擊攊若眠觸令覺若出入行來若掃地誤觸誤以杖頭觸及最初未制戒等是為不犯會採根本律云若苾芻以一指頭擊攊者得一墮罪乃至五指便得五墮罪若以拳擊攊得一墮罪若以足准手應知五分律云擊攊沙彌乃至畜生突吉羅薩婆多論云若擊攊比丘尼三六法人即六罪人也五法人受破僧法狂心亂心病壞心在家無師僧等人盡突吉羅若教人擊攊皆突吉羅摩得勒伽云若身根壞指挃突吉羅此戒大乘同學第五十四不受諫戒若比丘不受諫者波逸提緣起佛在拘睒彌國瞿師羅園中闡陀欲犯戒諸比丘諫言汝莫作此意不應闡陀不從諫即犯戒有少欲者聞知嫌責白佛結戒由不忍煩惱制斯學處釋義不受諫者謂他以良言勸誡而不忍可亦不納受也結罪是中犯者若他遮言莫作是不應爾然故作犯根本不從語突吉羅若自知我所作非然故作犯根本不從語波逸提隨犯結其本罪不從諫得墮此戒具三緣方成本罪一自作非法二有違諫心三諫己不納兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者無智人來諫報言汝可問汝師和尚學問誦經知諫法然後可諫若諫者當用若戲笑語若獨處語若在夢中若欲說此乃錯說彼及最初未制戒等是為不犯此戒大乘同學附考律攝云若尊人所說不應遮止有所言教不應違逆但應嘿然恭敬而住不嫉不恚除罪惡心恒為敬養毗尼母經云不應受五種人諫一無慚愧二不廣學三常覓人過失四喜鬬諍五欲捨服還俗薩婆多論云若前所諫者有六種人一心有愛憎二鈍根無智三若少見聞四為利養名聞五為現法樂但欲自攝六新出家愛戀妻子如是六種人諫則有損若發教諫出言無補應反語彼言但自觀身善不善行亦不觀他作以不作若反上六者則應展轉相諫也第五十五恐怖他戒若比丘恐怖他比丘者波逸提緣起佛在波羅黎毗國尊者那迦波羅比丘常侍佛左右供給所須諸佛常法若經行時供養人在經行道頭立時初夜已過請佛入房世尊默然中夜後夜亦爾彼心自念言我今寧可恐怖佛令使入房即反被拘執毛衣也作非人恐怖聲沙門我是鬼世尊報言當知此愚人心亦是惡世尊清且集僧訶責彼已為諸比丘結此戒也由戲侮事不寂靜煩惱制斯學處按涅槃經中是善是比丘反被拘執怖佛疑此是梵語也釋義律云恐怖者若以色聲香味觸法恐怖人色者或作象形馬形鬼形鳥獸等形聲者或貝聲鼓聲象馬等聲香者若根香皮華葉果等香及諸臭氣味者醋甜苦澀鹹辛等味觸者若以冷熱輕重細麤滑澀軟堅等觸法者語前人言我夢汝當死若失衣鉢若罷道汝和尚阿闍黎亦爾若父母重病若命終結罪是中犯者若以色聲香味觸法恐怖人若說而了了者波逸提說不了了突吉羅此戒具五緣方成本罪一人必是比丘二作比丘疑想三舉意恐怖四作恐怖疑想五說聽了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者或闇地坐無燈火或大小便處若以色等示人不作恐怖意若實有是事若見如是相或夢中見若當死若罷道若失衣鉢乃至父母病重當死應語彼言我見汝如是諸變相事若戲語若疾疾語若獨語若夢中語欲說此乃錯說彼及最初未制戒等是為不犯會採律攝云若以可惡色聲等事令生畏惱告彼人曰畢舍遮等欲來殺汝隨彼苾芻有怖無怖解其言義便得墮罪若以可愛色聲等事謂王欲來殺害汝者得惡作罪若於受學人亦名得戒沙彌即學悔人及於餘人處驚惱得惡作罪若說地獄旁生餓鬼情存化導彼離生怖者無犯苾芻苾芻想苾芻苾芻疑皆墮罪非苾芻苾芻想非苾芻苾芻疑苾芻非苾芻想苾芻非苾芻疑皆惡作恐怖恐怖想恐怖恐怖疑皆墮罪非恐怖恐怖想非恐怖恐怖疑恐怖非恐怖想恐怖非恐怖疑皆惡作罪此戒大乘同學或觀機折伏不犯第五十六過洗浴戒若比丘半月洗浴無病比丘應受不得過除餘時波逸提餘時者熱時病時作時風雨時道行時此是時緣起此戒有六制佛在王舍城迦蘭陀竹園摩竭國有池水瓶沙王聽諸比丘常在中浴六羣於後夜入浴時瓶沙王與嫌女亦至聞比丘浴聲便寂默以待之六羣用種種細末藥更相洗乃至明相出王竟不得浴諸大臣皆共譏嫌故制半月洗浴此初結戒也諸比丘盛熱時身體皰疿畏慎不敢浴白佛佛聽熱時數數浴此第二結戒也又病比丘身垢臭穢大小便吐污不淨畏慎不敢浴白佛佛聽病時數數浴此第三結戒也又諸比丘作時身體汗垢畏慎不敢浴白佛佛聽作時數數浴此第四結戒也又諸比丘風雨中行身體汗出塵坌畏慎不敢浴白佛佛聽風雨時數數浴此第五結戒也又諸比丘道行身熱皰疿汗垢塵土畏慎不敢浴白佛佛聽道行時數數浴此第六結戒也由洗浴事過分煩惱制斯學處釋義文分二節半月洗浴下明其創制餘時等明其隨開律云熱時者春四十五日夏初一月是謂從三月初一日至四月十五日此一月半是春末四十五日也從四月十六日至五月十五日此一月是夏初一月也此二月半總名為熱時薩婆多論云天竺早熱是名天竺熱時如是隨處熱時早晚數取二月半於中浴無犯病者下至身臭穢是作時者下至掃屋前地是風雨時者下至一旋風一滴雨是道行者下至半由旬若來若往是如是等時若不洗浴身心不安佛慈觀其機時聽聞結罪是中犯者除餘時若過一遍澆身及半澆身皆波逸提若方便莊嚴欲洗浴不去一切突吉羅此戒具三緣方成本罪一自身無開緣二有慢教心三故過浴竟兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者半月洗浴除餘時數數洗浴若為勢力所持強使洗浴及最初未制戒等是為不犯會採十誦律云昨日來今日浴明日去今日浴波逸提此約道行時也五分律云若洗師及病人身體已濕因浴不犯此非自浴所以隨開僧祗律云若無上諸時當作陶家浴法先洗兩䏶兩脚後洗頭面腰背臂肘胸腋此戒大乘同學附考准方等教中若禮懺結壇日須洗浴斯出聖言不犯過浴不應與白衣人共浴除篤信三寶稱讚出家者聽同入浴然今叢林普眾有湯雖非餘時亦無所犯第五十七露地然火戒若比丘無病自為炙身故在露地然火若教人然除時因緣波逸提緣起此戒有三制佛在曠野城六羣比丘在上座前不得隨意言語即出房在露地取諸柴草然火向炙時空樹中有一毒蛇得火氣熱逼從樹孔出諸比丘皆驚取所燒薪散擲東西迸火燒佛講堂此初結戒也有病比丘畏慎不敢然火不教人然白佛故聽此第二結戒也復有欲為病比丘煑粥若羮飯若熏鉢染衣若然燈燒香皆畏慎不敢作佛皆聽之此第三結戒也因掉戲煩惱制斯學處釋義文分二節無病下明其所犯除餘時明其隨開律云病者若須火炙身除餘時因緣者為病比丘煑粥羮飯乃至燒香第四分云向火有五過一令人無顏色二無力三眼闇四令多人闡集五多說俗事僧祗律云然火有七事無利益一壞眼二壞色三身羸四衣垢壞五壞牀褥六生犯因七增世俗言論結罪是中犯者若在露地然草木枝葉牛屎糠糞掃等一切波逸提䴬音亦麥䴬也若以火置草木枝葉乃至等中然者一切波逸提若被燒半者擲火中者突吉羅若然炭突吉羅若不語前人汝看是知是者突吉羅此戒具三緣方成本罪一是未經火然之露地二無開緣自然或非淨語教他然三所然是草木糠等焰火兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語前人言汝看是知是如上除時因緣及最初未制戒等是為不犯會採五分律云若為炙然火𦦨高至四指波逸提薩婆多論云行路盛寒不犯僧祗律云若旋火作輪波逸提若持炬行欲抖擻不得在未燒地當在灰上若瓦上若炬火自落地即在上抖擻不犯若然髮馬尾毛等及燒皮餅毒藥皆越毗尼罪根本律云若故燒林野得窣吐羅底罪此戒大乘同學音義半擇迦此云變今生變作不男者騃涯上聲癡也波斯匿王亦翻和悅亦翻勝軍支陀國或云支提或云制地然支提制地本是塔廟之名即浮圖別號義翻為積集亦云聚相今云國名疑是誤也娑伽陀或修伽陀亦云娑竭陀又云娑婆揭多此尊者初生時容像可愛父見歡喜唱言善來故立為名具德經云我聲聞中能具火界神通修伽陀苾芻是辮髮梵志辮與編同交也織也列也謂以頂髮交列為紒紒同結也草蓐音肉薦也以菱蒲為薦席也拘睒彌主乃優填王也鬻音主烹也大論云飲酒有三十五過一現世財物虗竭何以故飲酒醉亂心無節限用費無度故二眾病之門三鬬諍之本四裸形無耻五醜名惡露人所不敬六無復智慧七應所得物而不得己所得物而散失矣八伏匿之事因向人說九種種事業廢不成辦十醉為愁本何以故醉中多失醒則慚愧憂愁十一身力轉少十二身色壞十三不知敬父十四不知敬母十五不敬沙門十六不敬婆羅門十七不敬叔伯及尊長何以故醉悶憒惱無所別故十八不敬佛十九不敬法二十不敬僧二十一朋黨惡人二十二疎遠賢善二十三作破戒人二十四無慚愧二十五不守六情二十六縱色放逸二十七人所憎惡不喜見二十八貴重親屬及諸知識所共𢷤棄二十九行不善法三十棄捨善法三十一明人智士所不信用何以故酒放逸故三十二遠離涅槃三十三種狂癡因三十四身壞命終墮惡道泥犁中三十五若得為人所生之處常當狂騃如是種種過失是故不飲酒按律部飲酒有三十六失一不孝父母二輕慢尊長朋友三不敬三寶四不信經法五誹謗沙門六訐露人罪七恒說妄語八誣人惡事九傳言兩舌十惡口傷人十一生病之根十二鬬諍之本十三惡名流布十四人所憎嫌十五排斥聖賢十六怨黷天地十七廢忘事業十八破散家財十九恒無慚愧二十不知羞耻二十一無故捶打奴僕二十二橫殺眾生二十三姦犯他妻二十四偷人財物二十五疎遠善人二十六狎近惡人二十七常懷恚怒二十八日夜憂愁二十九牽東引西三十持南著北三十一倒溝臥路三十二墮車墜馬三十三逢河落水三十四持燈失火三十五暑月熱亡三十六寒天凍死末利夫人或云摩利此云鬘末利者花名也其花黃金色故翻云黃色此花堪作鬘故翻為鬘也然此夫人本守末利園善結花鬘又因末利園中將來故名末利增一阿含經云我聲聞中第一得證優婆斯篤信堅固所謂末利夫人是澆灒灒音贊污灑也𥱼音牌大桴也今編竹木以水運為𥱼秦人謂之筏也知浮法根本律云苾芻應習浮恐有難緣不能浮渡六罪人謂犯四重破和合僧出佛身血波羅梨毗國未詳翻譯那迦羅或云那伽波羅此翻龍護亦云象護此比丘現生亦證淨法增一阿含經云我聲聞中第一比丘曉了星宿預知吉凶所謂那伽波羅比丘是也畢舍遮亦云毗舍遮又云毗舍支此啖精氣噉人及五穀之精氣乃顛鬼也
