body:
  text: 金陵寶華山弘律沙門讀體集五波逸提法有九十條然此波逸提究體則總攝前章列名則別居第五前論物為重此以行為非論物要先捨所貪物而後求悔行非必須決心說懺乃可得除故前明三十尼薩耆波逸提法竟今復明九十波逸提法也律攝云波逸底迦者謂是燒煑墮惡趣義雖復餘罪皆是其墮此但目於墮燒煑指其墮處也又諸學處於方便位皆悉許有不敬聖教波逸底迦據斯少分墮義皆通文准此則深窮犯源由心不敬聖教故所多有違犯所犯若成隨事輕重結歸本罪然於最初少分墮義一一俱通第一故妄語戒若比丘知而故妄語者波逸提緣起佛在釋翅瘦迦維羅衛國尼拘類園中釋子象力比丘善能談論與外道梵志論議若不如時便違反前語若僧中間是語時即復違反前語梵志譏嫌諸比丘白佛世尊集十句義為僧結戒此是性罪由詐妄事覆藏煩惱制斯學處乃初篇妄根本種類釋義律云知而妄語者不見言見不聞言聞不觸言觸不知言知見言不見聞言不聞觸言不觸知言不知見者眼識聞者耳識觸者鼻舌身三識知者意識此以六識束為四名以眼耳意三根性利力用偏多又能遠取境界故各分為名鼻舌身三根性鈍力用處少又唯近取境界故合名為觸律攝云故者是決定心表非錯誤妄語者謂對了知人違心異說作詭誑言名為妄語善見律云妄語者口與心相違亦名空語也結罪是中犯者若不見不聞不觸不知彼如是言我見聞觸知知而妄語者波逸提若不見不聞不觸不知是中見想聞想觸想知想彼便言我不見不聞不觸不知知而妄語者波逸提若不見不聞不觸不知意中生疑彼作是言我無有疑便言我見我聞我觸我知知而妄語者波逸提若不見不聞不觸不知意中有疑便言我是中不疑便言我不見不聞不觸不知知而妄語者波逸提若不見不聞不觸不知意中無復疑便言若有疑我見我聞我觸我知知而妄語者波逸提我不見我不聞我不觸我不知意中無疑便言我有疑我不見不聞不觸不知知而妄語者波逸提本作是念我當妄語妄語時自知是妄語妄語已知是妄語故妄語波逸提本作是念我當妄語妄語時知是妄語妄語竟不自憶作妄語故妄語波逸提本不作是念我當妄語妄語時知是妄語妄語竟知是妄語故妄語波逸提本不作妄語意妄語時知是妄語妄語已不憶是妄語故妄語波逸提所見異所忍異所欲異所觸異所想異所心異如此諸事皆是妄語一一說而了了者波逸提說而不了了者突吉羅若說戒時乃至三問憶念有罪而不說突吉羅此九十波逸提懺悔法總於作持中詳明自斯以降不再繁贅此戒具四緣方成本罪一有妄語心二說事不實三言說了了四前人領解兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者據實說意有見聞觸知想依想而說及最初未制戒等是為不犯會採根本一切有部云若苾芻凡有所語違心而說皆得波逸底迦罪若不違心而說者皆無犯薩婆多論云或有妄語入波羅夷實無過人法說有過人法故或有妄語入僧伽婆尸沙以無根法謗他比丘故或有妄語入偷蘭遮如說過人法不滿以無根法謗他不滿不滿者謂說不具足或有妄語入波逸提如無根僧殘謗他故及此戒中所犯或有妄語入突吉羅如三眾妄語或有妄語無罪如先作如在家無師僧本破戒還作比丘既無師僧未曾受戒若破戒已更無戒體可護是以二皆無犯戒罪然作惡業難免苦報若遣使妄語若書信妄語盡突吉羅若先無心妄語誤亂失口妄語者盡突吉羅若說法義論若傳人語若凡說一切是非莫自攝為是常令推寄有本則無過也此戒大乘同制為救濟眾生故得開謂之方便語利益語若非濟救利益者仍犯附考律攝云佛弟子言常說實不應為盟自雪表他不信故設被誣謗亦不應作誓雪者洗也十誦律云不得自呪呪他不得以物自誓誓他不得自投竄令他投竄呪與投竄一種故第三分云時六羣比丘有小事至便作呪詛作呪詛者即今投狀訴神等事言我若作如是事當墮三惡道不生佛法中若汝作如是事亦當墮三惡道不生佛法中佛言不應爾聽作如是語若我作如是事南無佛若汝作如是事亦南無佛若居士嚏及來禮足應呪願言長壽若下座嚏時應呪願言無病若上座嚏時應言南無第二毀呰戒若比丘種類毀呰語者波逸提緣起佛在舍衛國給孤獨園時六羣比丘斷諍事種種罵比丘比丘慚愧忘失前後不得語諸比丘聞知白佛世尊為僧結戒此是性罪由出家人事不忍煩惱制斯學處乃初篇妄根本種類釋義律云種類毀呰人者卑姓家生卑行業卑伎術工巧卑者旃陀羅種除糞種竹師種車師種卑姓者拘湊此是天竺𢍉小之姓拘尸婆蘇晝此是天竺卑下種族婆羅墮此是婆羅門十八姓中之一姓元居𢍉末者若本非卑姓習卑伎術即是卑姓卑業者販賣猪羊殺牛放鷹獵人網魚作賊捕賊者守城知刑獄卑伎者鍛作木作瓦陶作皮韋作剃髮作竹作或言是犯過人謂犯七聚罪多結使人禿盲人禿瞎人躄跛聾瘂及餘眾患所加若面罵言汝是旃陀羅家生乃至眾患所加人等若喻罵言汝似旃陀羅家生乃至眾患所加人等若自比罵言我非旃陀羅家生乃至眾患所加人等若以善法面罵汝是阿蘭若乞食補納衣乃至坐禪人若喻罵汝似阿蘭若乃至坐禪人若自比罵我非阿蘭若乃至坐禪人根本律云毀呰語者謂於他人為毀事出言彰表也所以意和則悅口和不諍此皆違和非律語也結罪是中犯者若比丘種類毀呰語若面罵若喻罵若自比罵說而了了者盡波逸提說而不了了者盡突吉羅若比丘說善法面罵人喻罵自比罵說而了了不了了者盡突吉羅此戒具四緣方成本罪一要有毀呰心二所毀者須是比丘及他父母三必以下賤言毀四說聽了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者相利故說為法故說為律故說為教授故說為親厚故說或戲笑故說或因語次失口說或獨說或夢中說或欲說此而誤說彼及最初未制戒等是為不犯會採僧祗律云種類毀呰有七事種姓業相貌病罪罵結使今因時當末運人多鬬諍是故廣引僧祗詳明犯相莫厭其繁此中凡云偷蘭遮罪皆是獨頭下品與罵僧同科非初二篇從生也種姓有上中下下者汝是旃陀羅毛師織師瓦師皮師若作此語使彼慚羞者得波夜提若言汝父母如是波夜提若言汝和尚阿闍黎如是得偷蘭遮若言汝同友知識如是越毗尼罪中者汝等是中間種姓謂非貴姓所生亦非下流之子作是語欲使彼慚羞者得偷蘭遮汝父母如是得偷蘭遮汝二師如是越毗尼罪汝同友知識如是越毗尼心悔上者語其人言汝是剎利婆羅門種作是語欲使彼慚羞者越毗尼罪汝父母二師如是種皆越毗尼罪汝同友知識如是種越毗尼心悔業者有下中上下者汝是屠兒賣猪人魚獵人捕鳥人張𣚦人守城人魁膾人作是語欲使彼慚羞者波夜提汝父母如是波夜提汝二師如是偷蘭遮汝同友知識如是越毗尼罪中者汝是賣香人坐店肆人田作人種菜人通使人作是語欲使彼慚羞者偷蘭遮汝父母如是偷蘭遮汝二師如是越毗尼罪汝同友知識如是越毗尼心悔上者汝是金銀摩尼銅店肆人作是語欲使彼慚羞者越毗尼罪汝父母二師如是越毗尼罪汝同友知識如是越毗尼心悔相貌者有下中上下者汝是瞎眼曲脊𨀕脚鋸齒等作是語使彼慚羞者波夜提汝父母如是波夜提汝二師如是偷蘭遮汝同友知識如是越毗尼罪中者汝是大黑大白大黃大赤作是語使彼慚羞者偷蘭遮汝父母如是偷蘭遮汝二師如是越毗尼罪汝同友知識如是越毗尼心悔上者汝有三十二相圓光金光若作是語欲使彼慚羞者越毗尼罪汝父母二師如是皆得越毗尼罪同友知識如是越毗尼心悔病者無有下中上一切病盡名下汝等癬疥癩病癰疽痔病黃病瘧病痟瘦顛狂如是等種種病作是語欲使彼慚羞者波夜提汝父母如是波夜提汝二師如是偷蘭遮汝同友知識如是越毗尼罪罪者無下中上一切罪盡名下汝犯波羅夷乃至越毗尼罪若作是語使彼慚羞者波夜提此中言犯棄罪者是以輕心毀訾非同無根謗毀故不結重汝父母如是波夜提汝二師如是得偷蘭遮同友知識如是越毗尼罪罵者無上中下一切罵盡名下作世間罵婬逸污穢一切惡罵作是語欲使彼慚羞者波夜提若言汝父母如是波夜提汝二師如是偷蘭遮汝同友知識如是皆得越毗尼罪結使者無上中下一切結使盡名下汝是愚癡闇鈍無知等作如是種種語使彼慚羞者波夜提汝父母如是波夜提汝二師如是偷蘭遮汝同友知識如是越毗尼罪五分律云比丘毀呰比丘尼式叉摩那沙彌沙彌尼突吉羅比丘尼毀呰比丘波逸提毀呰餘三眾突吉羅此戒大乘同制若但毀呰無事謗他良人即攝謗毀戒結輕若兼自讚即攝自讚毀他戒結重若增上煩惱犯者失菩薩戒第三兩舌戒若比丘兩舌語者波逸提緣起佛在舍衛國給孤獨園爾時六羣比丘傳此屏語向彼說傳彼屏語向此說如是不息遂至眾中未有鬬事而生鬬已有鬬事而不滅諸比丘知已白佛結戒此是性罪由畜眾煩惱制斯學處乃初篇妄根本種類釋義律云兩舌者比丘鬬亂比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷國王及大臣外道異學沙門婆羅門如是乃至外道異學沙門婆羅門還鬬亂種種外道婆羅門比丘比丘尼等亂者某甲說是言汝是旃陀羅乃至婆羅墮種販賣猪羊乃至剃髮師汝犯七聚戒結使人禿盲瞎等眾病人若有比丘破皆是比丘鬬亂准薩婆多論此戒亦名離間語所謂離間恩義挑唆鬬諍令眾不和妨修道業結罪是中犯者兩舌語說而了了者波逸提說不了了者突吉羅此戒具四緣方成本罪一有起事心二往來傳語三人是比丘四說聽了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者破惡知識惡伴黨二人三人非法非律羯磨破與僧與塔與和尚阿闍黎知識親友數數語作無義無利者及最初未制戒等是為不犯會採僧祗律云若作是念欲別離彼令向己若彼離不離波夜提薩婆多論云是中犯者有八種一種二伎三作四犯五病六相七煩惱八罵此八事中種伎作三事傳向剎利婆羅門估客子突吉羅若以八事傳向四眾突吉羅四眾者謂尼及小三眾傳向在家無師僧若遣使書信盡突吉羅根本律云若苾芻先無讎隙偶爾聞之或復聽已欲令鬬諍方便殄息者無犯十誦律云若白衣於寺中欲作惡事侵惱比丘應苦切語令其折伏若不折伏不應直向王言先與是惡人知識次語王夫人及王子大臣等若是人捨便止莫令得事此戒大乘同制梵網經云鬬遘兩頭謗欺賢人罪結輕垢第四與婦女同室宿戒若比丘與婦女同室宿者波逸提緣起佛在舍衛國給孤獨園阿那律從舍衛國向拘薩羅國中路至無比丘住處村聞知有一婬女家常安止賓客即往寄宿門下時諸長者有行緣之便亦來投宿坐相逼近婬女愍念尊者令入舍內尊者結加趺坐繫念在前婬女於初夜來求作夫默然不答亦不觀視到後夜婬女復脫衣來前捉之尊者湧身空中婬女慚愧著衣合掌懺悔至三尊者下在本處為說微妙法婬女得法眼淨受三皈五戒為優婆夷次日尊者受其供養說法而去到僧伽藍以此因緣向眾僧說眾中有少欲比丘譏嫌白佛結戒由女人事婬染煩惱制斯學處乃初篇婬根本種類釋義律云女者人女有知命根不斷室者四周牆壁障上有覆葢或前厰而無壁或雖覆而不徧或覆徧而有開處結罪是中犯者若比丘先宿婦女後至或婦女先至比丘後到或二人俱至若攲臥隨脇著地波逸提攲音溪不正也隨轉側波逸提若天龍夜叉鬼神女同室宿者突吉羅與畜生中女能變化不能變化者同室宿突吉羅晝日婦女立比丘臥者突吉羅此戒具三緣方成本罪一是人女二同室無隔三脇臥地兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若比丘不知彼室內有婦女而宿若比丘先至而婦女後至比丘不知若屋有覆而無四邊障或半障少障若盡障而無覆或少覆半覆或露地此室中若行若坐若頭眩倒地若為強力所捉若為人所縛若命難淨行難及最初未制戒等是為不犯會採僧祗律云一房有隔別戶無罪異房無隔波夜提共房共隔波夜提別房異戶無罪比丘室內女人半身在屋內越毗尼罪女人屋內比丘半身在屋內越毗尼罪律攝云若女在閣上苾芻在下或復翻此若有梯除去有戶牢閉若不去梯應安關鑰或雖同室以物遮障使絕行路若不爾者明相出時咸得墮罪小旁生女不堪行婬者無犯若有父母夫主等守護者同宿無犯五分律云若同覆異隔若大會說法若母姊妹近親病患有知男子自伴不臥皆不犯十誦律云通夜坐不臥不犯此戒大乘同學第五與未受大戒三宿戒若比丘與未受大戒人共宿過二宿至三宿波逸提緣起此戒有二制佛在曠野城六羣比丘與諸長者共在講堂止宿時六羣中有一人散心睡眠無所覺知轉側露形有比丘以衣覆之復更轉側露形如是至三長者譏嫌調弄知足比丘慚愧白佛此初結戒也爾時佛在拘睒毗國諸比丘言佛不聽我曹與未受大戒共宿當遣羅云出時羅云無屋住往廁止宿世尊知之詣廁引入自房共止一宿明日清旦集僧告諸比丘言汝等無慈心乃驅出小兒是佛子不護我意耶故開其二宿此第二結戒也由眠宿事不寂靜煩惱制斯學處釋義文分二節與未受大戒共宿明其正制過二宿下結成所犯律云未受大戒人者除比丘比丘尼餘末受大戒人是此攝小三眾及白衣等同室宿者如上薩婆多論云若不聽二宿必有種種惱事及失命因緣以憐愍心故得共二宿以護佛法故不聽三宿結罪是中犯不犯悉同上此戒具四緣方成本罪一彼是未受具人二自身無病更無難緣三共房至三宿四明相未出不離兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯會採僧祗律云若與未受具人同屋宿第三宿時當異房若露地露地風雨雪寒時當還入房坐至地了地了即明相也若老病不堪坐者當以縵障若齊項若濟掖縵下至地當用緻物作不得容猫子過若道行時無帳縵者若未受具人可信應語言汝眠我當坐比丘欲眠時當喚使覺我眠汝坐若眠汝無福德此同室宿戒罪未悔過後共宿者罪轉增長悔過已當別房宿更得共宿薩婆多論云若共宿過二夜已第三夜更共餘人宿波逸提以前人相續故若共宿二夜已移在餘處過一宿已還共同宿無過若通夜坐無犯律攝云至第三夜令出宿時不應遣出寺外及離簷前但可離自房勢分若恐惡苾芻為破戒緣者至第三夜應令求寂向善友房此若無者應共擯出罪惡苾芻或自將求寂餘處而臥若自安居已不得往者應生心念為防護故於三月中與求寂同宿者無犯根本律云若安居後有惡苾芻來入寺中師主應與求寂同房宿至夏終勿致疑惑或夏罷已能驅者可擯斥之不可擯者應將求寂別詣餘寺如在行路雖過二宿通夜應眠勿生疑惑十誦律云有病比丘使沙彌供給雖臥無犯是中有不病比丘不應臥根本目得迦云不合與俗人求寂授學人別住人等同坐必有難緣無犯此戒大乘同學附考律攝云若有難緣無餘牀席應疊七衣為四重而臥其上以大衣疊安頭下或用覆身五衣以充內服凡臥息時右脇著牀兩足重累身不動搖作光明想安住正念情無嬈惱衣服不亂於睡知量念當早起初夜後夜恒修善品此是沙門睡息之法若無病苦晝不應臥若眠息時有人相惱應向餘處第六與未受戒人共誦戒若比丘與未受戒人共誦者波逸提緣起佛在曠野城六羣比丘與諸長者共在講堂誦佛經語聲高大如婆羅門誦書聲亂諸坐禪者有知足比丘白佛結戒由教授事制斯學處乃初篇妄根本種類釋義律云未受戒人者除比丘比丘尼餘者是誦者句義非句義字義非字義句義者與人同誦不前不後諸惡莫作眾善奉行自淨其意是諸佛教非句義者如一人說諸惡莫作未竟第二人抄前言諸惡莫作字義者二人共誦不前不後諸惡莫作非字義者如一人未稱諸第二人抄前言諸僧祗律云雖比丘尼受具戒亦不得教若授弟子經應教言待我誦斷汝當誦若不受語者不復得教法者佛所說聲聞所說仙人諸天所說佛印可之皆名為法薩婆多論云為諸比丘結戒者為異外道故為與弟子差別故為分別言語令分了故為實義不貴音聲故結罪是中犯者與未受戒人共誦若口授若書授了了波逸提不了了突吉羅共天龍鬼子及畜生能變化者說而了了不了了者盡突吉羅若師不教言我說竟汝可說者師突吉羅此戒具三緣方成本罪一前人未近圓二先不教誨三同誦高聲兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者我說竟汝說一人誦竟一人書若二人同業同誦或疾疾說乃至錯說及最初未制戒等是為不犯會採五分律云若教未受具戒人經並誦波逸提並誦者俱時誦或授聲未絕彼已誦或彼誦未竟此復授句句波逸提十誦律云若以不足句法教未受具戒人若偈說偈偈波逸提以四句為一偈若經說事事波逸提謂法喻中一段之事若別句說句句波逸提別句謂四句偈中但說一句不足味不足句亦如是昧句不足謂一句亦未全律攝云若語喫若性急言若同誦為正文句若教授時先告彼言汝勿與我同時而說雖同無犯此戒大乘同學引證戒因緣經云若比丘向未受戒者說一句戒法波逸提由六群比丘向沙彌說毗尼語佛知故制律攝云若有俗人為求過失或偷法心或無信敬或是外道以與律相應之說令彼聽者彼若聞時皆得墮罪善見律云若法師所撰文字共同誦者不犯准斯三律制意惟重毗尼葢五篇之名是大僧法具沙彌等必不可令聞也附考律攝云有五種人不應為說毗奈耶藏謂性無所知強生異問或不為除疑而發於問或試弄故問或惱他故問或求過失故問返上五人為說非犯其受法者具三威儀為敬故不應眠授弟子之法若老若少到彼師所合掌鞠躬方申請問四大安不應生敬仰直心無諂請決所疑一心善領不令忘失若無疑者如常受法禮足而退若師出行隨後而去若師坐者自應蹲踞或處卑坐其師亦應敬彼學徒勿生輕懱虗心授與於法無悋善領善答有忍有悲無懷恚恨令受業者情無疲惱常給侍者應數教授性愚鈍者亦應偏教若作吟詠之聲而授法者得惡作罪若說法時或為讚歎於隱屏處作吟諷聲誦經非犯不應讚誦外書典籍若為降伏異道自知有力日作三時兩分勝時應學佛法一分下時應習外典不應記年月以為三分夜亦三時初後習禪誦經中間繫心寢息若作婆羅門誦書節段音韻而讀誦者得越法罪若方言若國法隨時吟詠為唱導者斯亦無犯苾芻尼律亦應習學尼來請學如法教示若有疑問善為開釋若講誦時忘其所在方處者於六大城隨一應說若忘國王並大地主反鄔波斯迦名者應隨意稱勝光大王給孤獨長者毗舍佉鄔波斯迦又苾芻住處常月八日及十四日至小食時鳴犍椎集大眾設香華聽經法有外道來應設方便令彼出去應請耆宿情存虔敬善威儀者宣說聖言不應求利以為活命得惡作罪若說非法上座應遮又說法人不應多領門徒以為侍從彼自遮行者無犯遮者要也既至彼處說法之師踞師子座前置高案用承經典嚴設香華若不請輙為人說得越法罪第七說他麤罪戒若比丘知他有麤惡罪向未受大戒人說除僧羯磨波逸提緣起此戒有三制佛在羅閱城耆闍崛山中時有行波利婆沙摩那埵比丘在下行坐六羣語諸白衣言此等犯如是事故僧罰使在下行坐有過比丘聞之慚愧彼樂學戒者譏嫌六羣往白世尊此初結戒也與結戒已時諸比丘或不知麤惡不知不麤惡或有作波逸提懺悔者或有畏慎者佛言不知不犯此第二結戒也爾時舍利弗為眾所差在王眾中及諸人民中說調達過調達所作者莫言是佛法僧當知是調達所作舍利弗聞制戒已便生畏慎心諸比丘白佛佛言眾僧所差無犯故有除僧羯磨之語此第三結戒也由未近圓事不忍煩惱制斯學處乃初篇妄根本種類釋義文分二節知他有下明其所犯除僧下以顯開聽律云未受戒者如前麤惡罪者波羅夷僧伽婆尸沙向未受大戒人說者謂對彼陳說彰露前人所犯過也除僧羯磨者僧謂同一羯磨同一說戒除僧和集公差說罪不犯此法於作持中明結罪是中犯者若說了了者波逸提不了了者突吉羅除麤惡罪更以餘罪向未受大戒人說者突吉羅自犯麤惡罪向未受大戒人說突吉羅除比丘比丘尼以餘人麤惡罪向未受大戒人說突吉羅餘人謂三小眾及在家受戒二眾也麤惡罪麤惡想波逸提麤惡罪疑非麤惡麤惡罪想非麤惡疑皆突吉羅此戒具七緣方成本罪一要有故說心二是麤罪作麤罪想三他人先本不知作不知想四非奉僧差五犯者是受大戒人六向未受戒者說七說聽了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若不知若眾僧差麤惡非麤惡想若白衣先以聞此麤惡罪及最初未制戒等是為不犯會採僧祗律云比丘尼雖受具戒亦不得向說以比丘尊勝恐尼輕慢之佛慈護僧故遮不向彼說根本律云若於不知俗家作不知想疑向彼說他麤罪得墮罪若於知俗家作不知想疑向彼說者得惡作無犯者於不知俗家作先知想若大眾詳說其事或時人眾普悉聞知猶如壁畵人所共觀非我獨知說皆無過人眾普悉聞知謂所集僧眾非指世俗未近圓人也五分律云教向甲說而向乙說教說此罪而說彼罪皆波逸提十誦律云若羯磨此比丘作說罪人餘比丘說者突吉羅此由未被僧差而受差者轉請彼說既越毗尼難免無過若令向此人說此處說向餘人餘處說者突吉羅若僧作隨意隨時隨處說罪羯磨者無犯五分教向甲而向乙說以其心存損陷念無利益是故結重十誦令向此而向彼說皆由誤聽羯磨錯其趨向所以結輕薩婆多論云與諸比丘結戒者為大護佛法故若向白衣說比丘罪惡則前人於佛法中無敬信心寧破塔壞像不向未受具戒人說比丘過惡若說過罪則破法身故若說二篇罪名得波逸提說罪事得惡作罪事者即隨犯婬盜等事此戒大乘同制梵網義疏云說過者有兩一陷沒心欲令前人失名利等二治罰心欲令前人被繫縛等此二心皆是業主必犯重戒若獎勸心說及被差說罪皆不犯又犯七逆十重前人失戒失戒後說但犯輕垢第八向外人說法戒若比丘向未受戒人說過人法言我見是我知是實者波逸提緣起此戒起自婆裘園比丘如初篇中廣說於間異者在虗實之別故犯分重輕也律攝云先所未得而今得之以上人法向未近圓者說因未近圓人似求名利似有貪故制斯學處乃初篇妄根本種類按戒因緣經原為向沙彌說故制釋義律云人法者人界人陰人入上人法者諸法出要自言有念善思惟有戒有欲有不放逸有情進有定有正定有道有修行有智慧有見有得有果諸言有等如初篇內廣釋此中但云過人法而不言過天法者謂佛出於人間於人中詰戒以人中有波羅提木叉戒故又人勝於天故以人能修習善法多證聖道諸天著樂不能勤修是以但言過人則其間已攝過天矣實者謂自身真實證得此法結罪是中犯者若真實有此事向未受大戒人說了了者波逸提說不了了者突吉羅若手印書若作知相遣人了了波逸提不了了突吉羅若向天龍鬼子及畜生能變化者說了了不了了盡突吉羅若向受大戒人非同意者說突吉羅此戒具四緣方成本罪一實有過人法二有貪名利心三向未受戒人說四前人領解兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若增上慢若自言是業報不言是修得若實得向同意比丘說或戲說獨語夢中語及最初未制戒等是為不犯會採薩婆多毗婆沙云若實得四果乃至得不淨觀向他說盡波逸提若為名利故言我清淨持戒實誦得三藏及隨所誦經隨所解義隨能問答向人說者盡突吉羅僧祗律云現阿羅漢相越毗尼心悔五分律云若受大戒人不問而向說語語突吉羅不犯者若泥洹時說若受具戒人問而後說律攝云對俗人現神通得惡作罪不犯者為顯聖教現希有事或欲令彼所化有情心調伏故雖說無犯摩得勒伽云向狂人散亂心人重病人說突吉羅此戒大乘同學第九與女人過說法戒若比丘與女人說法過五六語除有知男子波逸提緣起此戒有三制佛在舍衛國給孤獨園迦留陀夷乞食詣長者家在姑前與兒婦耳語說法姑見生疑云若說法者當高聲說令我等聞何乃耳中獨言耶有乞食比丘聞知訶責黑光往白世尊此初結戒也時有諸女人請比丘說法因佛制戒不敢為說故開聽說不得過五六語此第二結戒也諸比丘復有畏慎心以無有知男子便休不與女人說法又加除有知男子之語故有第三結戒也此是遮罪因說法事譏嫌煩惱制斯學處乃初篇婬根本種類釋義律云五語者色無我乃至識無我六語者眼無常乃至意無常律攝云五六相應所有言語名五六語過者謂應五過五至六應六過六至七有知男子者解麤惡不麤惡事僧祗律云若盲若聾若眠亦名無知男子有知男子者若減七歲若過七歲不解好惡語義味不名有知若七歲若過七歲解好惡義味是名有知結罪是中犯者若為女人說法過五六語除有知男子說而了了者波逸提說不了了突吉羅若天龍鬼女及畜生女能變化者說過五六語了了不了了盡突吉羅此戒具四緣方成本罪一必是在家非幼小人婦女二無在家有知男伴三說法過五六語四言辭了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若五六語說若有知男子前過五六語說若無有知男子前授優婆夷五戒及說五戒法授八關齋及說八關齋法說八聖道法說十善法若女人問義無有知男子應答若不解者得廣為說並最初未制戒等是為不犯會採五分律云為女人說五六語竟語言法正齊此從坐起去更有因緣還復來坐為說不犯若說五六語竟更有女人來為後女人說如是相續為無量女人說皆不犯若自誦經女人來聽若女人問義要使得解過五六語皆不犯薩婆多論云女謂能受婬欲者若石女若小女未堪任作婬欲者突吉羅若說世間常事突吉羅若說布施福報呪願不犯得為尼說法一切尼眾以教誡故無過律攝云或男無欲意女有染心或時翻此皆得惡作縱是聰敏亦不應說雖曰女人智同男子由對此女無邪說故亦不犯此戒大乘同學護譏嫌故必若不起譏嫌方可隨機廣略無犯第十掘地戒若比丘自手掘地若教人掘者波逸提緣起此戒有二制佛在曠野城六羣比丘與佛修治講堂周匝自掘地諸長者見皆譏嫌斷他命根此初結戒也六羣更教人掘地言掘是置是長者復譏嫌此第二結戒也此是遮罪由作鄙業妨廢正修制斯學處釋義律云地者已掘地未掘地若已掘地經四月被雨漬還如本十誦律云地有二種生地不生地多雨國土八月地生此謂驚螯後立冬前也少雨國土四月地生此夏四月也除是名不生地律攝云生地者謂未曾掘若曾經掘被天雨濕或餘水霑時經三月是名生地若無雨濕及水霑潤時經六月亦名生地異此非生善見律云若地四分石一分土及被燒皆非生地結罪是中犯者若用鋤或以钁𠜲或以椎打或鎌刀刺乃至指爪掐傷地打橛入地地上然火一切波逸提若不教言看是知是突吉羅比丘法不得直言掘是置是此是淨語令淨人自知看所應掘所應置也五分律云一一所須語淨人言汝知是若不解復語言汝看是若不解復語言我須是若不解復語言與我是此戒具三緣方成本罪一是生地二無敬教心三自掘教他兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語言知是看是若曳材木曳竹若籬倒地扶正若反塼石取牛屎西域建壇及燒多取用故取崩岸土若取鼠壤土若除經行處土若除屋內土若往來經行若掃地若杖築地若不故掘及最初未制戒等是為不犯會採僧祗律云若河邊坎上以脚蹋墮蹋蹋波逸提坎岸邊行土崩無罪若營事比丘多有塔物僧物欲藏地中若在露處生地不得自掘當使淨人知若在覆處死地得自掘藏若地打栓古橛字越毗尼罪傷如蚊脚波逸提拔栓亦爾若死土被雨已比丘不得取使淨人取盡雨所洽際然後自取無罪掘地波逸提半沙越毗尼罪純沙無罪若土塊一人不勝破者波逸提破減一人重者無罪石薑石糞灰准此應知十誦律云若掘不生地隨一一掘突吉羅若掘生地隨一一掘波逸提若掘泥處乃至沒膝處隨一一掘突吉羅若手畫地乃至沒芥子一一畫突吉羅若生金銀等鑛處若雌黃赭土白墡處生石處黑石處沙處鹽處掘者不犯根本律云若營作苾芻欲定基時得好星候吉辰無有淨人應自以橛釘地記疆界深四指者無犯五分律云餘三眾無事掘地突吉羅若取燥土不犯准此應知三眾有事不禁下斷草木例斯亦爾此戒大乘同學第十一壞鬼神村戒若比丘壞鬼神村波逸提緣起佛在曠野城有一比丘修治屋舍自手斫樹佛知訶責為僧結戒此是遮罪因種子及鬼神村事以譏嫌無悲煩惱制斯學處釋義律云鬼者非人是婆沙論云鬼者畏也謂虗怯多畏故又威也能令人畏其威故神者能也大力者能移山填海小力者能隱顯變化村者一切諸草木是若斫截墮故名壞村有五種本律五種梵語未翻今准根本律云一根種謂香附子菖蒲薑等此物皆由根種乃生故二莖種即枝種也謂石榴楊柳菩提貝多葡萄等樹此等皆由莖生故三節種謂苷蔗竹葦等此等皆由節生故四開種謂蘭香橘柚等此等諸子皆由開裂乃得生故五子種謂稻麥豆芥等此等皆由子還生子故然斯五種鬼神託之棲止猶若人之依村落也故名鬼神村戒因緣經云有神依樹根有神依樹枝有依樹皮裏有依樹皮裂中有依樹蓓蕾有依樹葉有依樹華有依樹果一切藥草樹木盡有神神所以依住者食其香故正法念處經云樹下住鬼者由見人種樹為施人作蔭惡心斫伐取材而用故墮樹中常被寒熱結罪是中犯者於五生種若生生想自斷自炒自煑教他斷炒煑盡波逸提若生疑自斷炒煑教他斷炒煑突吉羅生非生想非生生想非生疑盡突吉羅若生草木生草木想自斷炒煑教他斷炒煑盡波逸提生草木疑自斷乃至教他煑突吉羅生草木非生草木想非生草木生草木想非生草木疑盡突吉羅若釘橛者樹上若以火燒著生草木上若斷多分生草木盡波逸提斷半乾半生草木突吉羅若不言看是知是突吉羅此戒具四緣方成本罪一知是生草木二生草木作生草木想三欲自壞或非淨語教他壞四必斷已兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者言看是知是若斷枯乾草木若於生草木上曳材曳竹正籬障若撥壍塼石若取牛屎若生草覆道以杖披遮令開若以瓦石柱之而斷傷草木若除經行地土若掃經行來往處地誤撥斷生草木及最初未制戒等是為不犯會採第三分云不應不淨果便食應作五種淨法食一火淨乃至以火一觸二刀淨以刀損壞三瘡淨果上自有壞處四鳥淨鳥曾傷五不中種淨不任為種或未成熟是中初後兩種淨已都食餘三種淨應去子食復有五種淨法若皮剝剝去少皮若剝皮皮盡剝去若腐爛壞若破劈裂若瘀燥自薦乾不應噉不淨果菜不應自作淨不應自手捉令人作淨應置地使人作淨作淨已不應不受而食律攝云若葡桃瓜果總為一聚於三四處以火拄之拄音主刺傷也此便為淨若刀爪一一皆須別淨若自將刀等作淨者食時無犯淨時波逸提五分律云若食根種亦應五種淨謂剝截破洗火若食莖葉應三種淨謂刀火洗若作淨時應作總淨於一聚一器中若淨一名為總淨餘三眾無故殺生草木突吉羅若為火燒若折若斫知必不生不犯若比丘住處庭中生草聽使淨人知知乃令彼自知除去僧祗律云有國土作穀聚畏非人偷以灰火燒上作識此即為淨若摩摩帝有倉穀未淨畏年少比丘不知法使淨人火淨至倉穀盡比丘恒得語言舂去不犯若拾乾牛屎合生草者波逸提摩得勒伽云以灰土沙覆生草突吉羅若語餘人言取是果我欲食突吉羅生果未淨全咽突吉羅全咽謂口含也咬破波逸提取木耳突吉羅打熟果落突吉羅打生果落波逸提善見律云若火淨已後生芽生芽處便淨非生芽處得食若須華果得攀樹枝下使淨人取不犯不得令技折若樹高淨人不及比丘得抱淨人取之不犯若木倒笮比丘而不死雖手中有刀斧等寧守死不斫木掘土以脫自命何以故掘土斫木得墮罪智慧人寧守戒而死不犯戒而生若樹押人比丘得斫樹掘地以救其命不犯須知為己遵制勿犯運悲救生聽開全同大乘教意若人放火燒寺為護住處得剗草掘土以斷火不犯根本律云若於生草及青苔地經行之時起念令草損壞者隨所損壞波逸提若但作經行心者無犯若拔地菌突吉羅薩婆多論云有三戒大利益佛法一不得擔二不殺草木三不掘地若不制三戒國王當使比丘種種作役有此三戒國王息心三眾是淨人故不犯本律並諸部式叉尼沙彌沙彌尼皆犯惡作者是制彼等隨律威儀也今云不犯者正明別開非類大僧也此戒大乘同學引證根本雜事云得叉尸羅國有醫羅鉢龍王化身為摩納婆形持滿篋金徧遊諸處說偈問言何處王為上於染而染著無染而有染何者是愚夫何處愚者憂何處智者喜誰和合別離說名為安樂若有解者即以金篋供養然無有人能解釋者漸行至婆羅尼斯國復如是唱有人報言有上智人住阿蘭若名那剌陀當解斯義未幾那剌陀至龍王以偈問彼聞記憶告言十二年後當為汝釋龍言太長太久漸求減至七日時那剌陀即往告五苾芻苾芻答言汝可問佛即詣鹿林禮佛足而坐佛為說法證預流果願求出家佛言先為摩納婆解釋頌義然後出家應如是答第六王為上染處即生著無染而起染說此是愚夫愚者於此憂智者於此喜愛處能別離此則名安樂彼若不解更為說頌若人聞妙語解己勝修定若聞不了義彼人由放逸彼若更疑汝可對彼以爪截葉若問世尊出世報言已出若問何處報言在施鹿林時摩剌陀受佛教已至彼龍所具答如上彼龍化作金轉輪聖王往世尊所佛言汝愚癡人於迦攝波佛時受佛禁戒不能護持感此下劣長壽龍身今者何故還起詐心汝今可復本形龍言世尊我是龍身多諸怨惡恐有眾生共相損害佛敕金剛手為之守護龍王別至一處遂復本形身有七頭頭尾相去有二百驛謂二百由旬也一一頭上各生一醫羅大樹被風搖動膿血皆流霑污形骸臭穢可惡常有蠅蛆諸蟲徧其身上晝夜唼食是時龍王即以本身詣世尊所禮足却住白言惟願世尊為我授記當於何日捨此龍身佛言當來人壽八萬歲時有佛出世號曰慈氏為汝授記當免龍身龍王悲哭諸頭眼中一時淚出成十四河駛流驚注佛令裁止勿致損國龍禮佛足忽然不現大眾問其往因佛言迦攝佛時此龍於佛法中出家修行善閒三藏具習定門經行醫羅樹下以自䇿勵樹葉打頭即便忍受後時繫心疲倦從定而起䇿念經行葉還打頭極痛發瞋恚心以兩手折其樹葉投地作如是語迦攝波佛無情物上見何過咎而制學處令受斯苦彼猛毒瞋心毀戒命終墮此龍中附考根本律云凡授事苾芻為營作故將伐樹時於七八日前在彼樹下設諸祭食誦三啟經謂三誦也耆宿苾芻應為呪願說十善道讚歎善業復應告言若於此樹舊住天神應別求居止此樹今為三寶有所營作過七八日已當使淨人斬伐之若伐樹時有異相現者應為讚歎施捨功德說慳貪過若仍現異相則不應伐若無別相應可伐之要令淨人知非自伐也音義象力比丘或名象首又名法手舍夷國有象首聚落彼因稱名也是釋種子雜阿含經佛記云此人犯三種非法所謂悋貪愚癡瞋恚當墮於地獄中偈云若生不善心成就貪瞋癡此身自作惡還復害於己如芭蕉生實自害於其身若無貪瞋癡是名為智慧不害於己身是名勝丈夫是以應除斷貪瞋癡大患嚏音帝鼻塞噴嚏也西域凡僧俗禮敬時若嚏皆願言長壽無病如此方小兒若嚏僉願言百歲毀呰口毀曰呰根本律云毀訾語者謂於他人為毀辱事皮韋作柔皮熟曰韋生皮曰革作乃卑伎也躄跛上音碧兩足俱廢曰躄一足偏廢曰跛𨀕脚𨃓音匡𨀕躟行步急卒貌阿蘭若亦名阿練若翻云遠離處又云閒靜處又云空寂處魁膾亦云旃陀羅又云旃荼羅應法師言此翻云嚴幟一云主殺人乃西方屠殺之輩以惡業自嚴行時搖鈴執竹以為標幟故以為名若不爾者王必罪之或翻可畏法顯傳云名為惡人與人別居若入城市則繫竹以自異人則識而避之不相搪揬六大城佛生迦羅衛成道摩竭提說法波羅奈入滅俱尸羅並王舍城毗耶離城此六城乃西域十六大國之首五戒法佛初為提謂等在家弟子受三皈已即授五戒為優婆塞優婆夷若在家弟子破此五戒則非清淨士女故經云五戒者天下大禁忌若犯五戒在天則違五星在地則違五嶽在方則違五帝在身則違五臟如是等世間違犯無量若約出世犯五戒者則破五分法身一切佛法何以故五戒是一切大小乘尸羅根本若犯五戒則不得更受大小乘戒者若能堅持即是五大施此五通名戒者以防止為義能防惡律儀無作之非能止三業所起之惡故通名防止八關戒法諸經論中或名八關齋戒或名八關戒或名八戒齋又名八種長養功德法如是名雖不一而戒則同也謂以前八法名為關戒關謂閉八惡不起諸過後一不非時食名之為齋齋以齊中為義即是禁止八惡而令修中道故也十善法能反殺盜邪婬妄語兩舌惡口綺語貪欲瞋恚邪見十不善法即名十善法或名十善道天台云十善有二種一止二行止則但止前惡不惱於他行則修行勝德利樂一切此二通稱善者善以順利為義息倒歸真曰順理止則息於重倒之惡行則漸歸勝道之善故止作二種皆名曰善或以加道名以能通至樂果也鋤音徂與鉏同去穢助苗也又誅也斫也钁匡入聲大鉏也𠜲音卓削也鎌音廉鉤刀亦名楔子掐苦洽切爪刺也赭音者赤土墡音善白土柚音右小者為橘大者為柚蓓蕾上音倍下音壘謂始花也笮音責壓也剗音產削平也菌音郡之小者得叉尸羅國未見翻譯醫羅鉢龍王亦云醫羅鉢羅醫羅樹名此翻云臭氣鉢羅此翻云極由此龍王往昔損此樹葉故致頭上生此臭極之樹也摩納婆此翻儒童篋音怯箱篋也婆羅尼斯國舊云波羅柰河名也去河不遠造立王城或翻為江遶城那剌陀未見翻譯駛音使又去聲馬行疾也五苾芻即憍陳如等五人也
