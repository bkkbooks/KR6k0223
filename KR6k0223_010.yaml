body:
  text: 金陵寶華山弘律沙門讀體集第三十一過受一食施戒若比丘施一食處無病比丘應一食若過受者波逸提緣起此戒有二制佛在舍衛國給孤獨園爾時拘薩羅國有無住處村居士為比丘作住處常供給飲食若在此住者常聽一食六羣比丘至彼處經一宿得美好飲食故復住第二宿復得美好飲食念言我等所以遊行者正為食爾今者已得彼於此住處數數食居士譏嫌此初結戒也後舍利弗遊行詣此得病恐犯此戒扶病而去病遂增劇故更增無病之言此第二結戒也因宿食事招俗譏嫌制斯學處釋義律云住處者在中一宿食者乃至時食乃至者超略其五嚼也病者離彼村增劇者是十誦律云病者下至竹葉所傷結罪是中犯者若無病比丘於彼一宿處過受食咽咽波逸提除食已更受餘襯身衣燈油塗腳油盡突吉羅此戒具三緣方成本罪一無病難二有貪心三過受入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者一宿受食病過受食若諸居士請留食若檀越次第請食今日受此人食明日受彼人食或水陸道阻或諸難緣及最初未制戒等是為不犯會採十誦律云過一宿不食突吉羅餘處宿是中食波逸提此戒大乘同學第三十二展轉食戒若比丘展轉食除餘時波逸提餘時者病時施衣時是謂餘時根本律云餘時者病時作時道行時施衣時此是時緣起此戒有三制佛在羅閲城迦蘭陀竹園與諸比丘遊行人間有沙䨲婆羅門以五百乘車載滿飲食經冬涉夏隨逐世尊伺候空缺設供而不得便往語阿難為我白佛欲以飲食布地令佛僧蹈過則為受供佛乃聽作餅粥供僧時阿那頻頭國諸居士聞佛聽僧食粥及餅皆大歡喜快得作福有一少信大臣見佛及僧大得供養即生福田想辦肥美飲食請僧然僧先受他請復食濃粥不能多食大臣嫌之佛言不得先受請已食稠粥稠粥者以草畫之不合是也時佛還至羅閲城中有一少信樂師其事亦爾由是不聽展轉食亦名數數食此初結戒也諸病比丘所請食處無有隨病藥食若有隨病美食及藥畏慎不敢食恐犯其戒佛聽病比丘展轉食此第二結戒也又有一居士亦請佛僧施食及衣比丘畏慎白佛佛聽施衣時展轉食故有第三結戒也此戒雖開亦不得過午食於後會採中有據此是遮罪因食事過分廢闕寂靜譏嫌煩惱制斯學處釋義文分二節展轉食明其創制除餘時下明其隨開律云展轉食者請也請有二種若僧次請別請也食者飯餅等病者不能一坐食好食令足施衣者自恣竟無迦絺那衣一月有迦絺那衣五月若復有餘時食及衣律攝云謂有施主施與浴衣及餘帔服或貝齒物等以充衣直結罪是中犯者若今日得多請食應自受一請餘者當施與人如是施與言長老我應往彼今布施汝若比丘不捨前請受後請食咽咽波逸提若不捨後請受前請食者咽咽突吉羅此戒具三緣方成本罪一無開緣二不捨前受後三食已入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若請與非食或食不足或無請食者或食已更得食或一處有前食後食及最初未制戒等是為不犯會採十誦律云佛言從今日憐愍利益病比丘故聽三種足食應食謂好色香味若一請處不能飽應受第二請不應受第三請第二處不能飽應受第三請不應受第四請第三請處不能飽應受已漸漸食乃至日中所言日中者不聽過午明矣聽節日數數食下文共有九句初三句明有衣請食中三句明無衣請食後三句明衣不定請食而令比丘知除時因緣中復有遮禁先須酌量然後赴之可也若比丘有衣食請彼有衣食來受請不犯食亦不犯又有衣食請彼無衣食來受請不犯食者波逸提此謂先請時言有衣有食彼比丘來赴請時但有食而無衣是以受請時不犯若受食時即犯又有衣食請彼有衣食無衣食來受請不犯食者波逸提此謂彼比丘知請有衣而作衣不定想來赴請到已食有衣無若食者即犯受請來不犯此初三句竟又無衣食請彼無衣食來受請突吉羅食者波逸提此謂請時無衣不合開緣理當善却請主以護信檀乃名持律清淨比丘設聞請即赴所以來並受食二俱有犯又無衣食請彼有衣食來受請突吉羅食者不犯此謂請時主言無衣彼比丘作有衣想而來赴請到已有衣是故違制受請則犯有衣受食不犯又無衣食請彼有衣食無衣食來受請突吉羅食者波逸提此謂請原無衣彼比丘作衣不定想而來既到已無衣噉食所以二俱有犯此中三句竟又有衣食無衣食請彼有衣食無衣食來受請突吉羅食者波逸提此謂施主請時言衣恐有無不定是以非應開緣彼比丘亦作衣不定想而來到已無衣受食二皆成犯又有衣食無衣食請彼有衣食來受請突吉羅食者不犯此謂請時雖言其衣不定彼比丘作有衣想而來到已有衣有食是以皆開受請則犯有衣受食無犯又有衣食無衣食請彼無衣食來受請突吉羅食者波逸提此謂明知白請不定自作無衣想而來到已若無衣受食者兩罪俱犯後三句竟不犯者若得多有衣食請一一有衣食來悉皆不犯摩得勒伽云若先受無衣請食後受有衣請食不犯律攝云若於一舍或在寺中或阿蘭若為求肥悅或樂美食而數食者得惡作罪若輕賤心矯詐不食者亦得惡作五分律云若僧所差若別房食若白衣來受八戒設供養若常食不犯根本律云作時道行時展轉食皆無犯僧祗律云一切菜一切一切果非處處食非別衆食非足食多積舍里不犯此戒大乘同學引證毗尼序云阿難先受他請時忘不憶復同佛受波斯匿王請以食入口乃憶知有二請不與他一請不敢吐食為恭敬佛故又不敢咽食為持戒故佛知阿難心悔告令心念與他便食優波離問佛餘人亦得爾不佛言除五種人一坐禪人專心在道諸念不生故二獨處蘭若自居無人可對説故三遠行造次就路容有忘念故四長病五飢餓時依親里住餘悉不聽第三十三別衆食戒若比丘別衆食除餘時波逸提餘時者病時作衣時施衣時道行時乘船時大衆集時沙門施食時此是時緣起此戒有八制佛在羅閲城耆闍崛山中爾時調達教人害佛復教阿闍世王殺父惡名流布利養斷絶通己五人家家乞食故制不得別衆食此初結戒也有病比丘畏慎不敢別衆佛知故聽此第二結戒也時自恣竟迦提月中比丘作衣諸優婆塞念衆疲苦來請與食報言但請三人我等不應別衆佛言作衣時聽此第三結戒也時有居士欲施食及衣來請報言但請三人與食我等不得別衆佛言受施衣時別衆食此第四結戒也有諸比丘與衆居士同行險道乞食時至語衆居士我欲詣村乞食少見留待還當共俱居士白言此路有疑恐怖我當供給飲食莫在後來比丘云但與三人我等不得別衆食即入村乞食伴便前進不及為賊所劫衣服佛言若在險道中行聽別衆食此第五結戒也與諸居士乘船順流而去亦如是為賊所劫故開此第六結戒也時衆多比丘遊行詣一小村諸居士念言衆僧多而村落小可與僧作食勿令疲苦即至僧伽藍中白請明日受食比丘報言但請三人我等不得別衆佛言聽大衆集時別衆食此第七結戒也時瓶沙王姊子欲於外道沙門中出家設食已往白王王問言欲於何處出家答言於尼揵子中出家王復問言竟與我曹沙門釋子設食不因而設食請僧亦如上答不受佛言聽沙門施食時得別衆食乃第八結戒也此是遮罪因提婆達多制斯學處釋義文分二節別衆食明其創制餘時等明其隨開律云別衆食者若四人若過四人五分律云若於界內別請四人已上名別衆食根本律云別衆食者謂別別而食律攝云別衆者謂不同處食若四苾芻同一界內下至一人不共同食並名別衆食者飯乾餅等此中所制五正食餘食無犯作衣時者自恣竟無功德衣一月有功德衣五月乃至衣上作馬齒一縫薩婆多論云作衣時食難得者聽別衆食食若易得不聽施衣時者如上一月五月及餘所施食及衣根本律云施衣時者謂如拭巾裙量縵條量等道行者下至半由旬內有來去者乘船行者下至半由旬內乘船上下大衆集者食足四人長一人為患五人十人乃至百人長一人為患此謂人多食不足故薩婆多論云大衆集者或以法事或以餘緣衆僧集會極少舊比丘四人客比丘四人名為大衆雖大衆集食不難得者不聽沙門施食者在此沙門釋子外諸出家者及從外道出家者是若比丘無別衆食因緣因緣即餘時等彼比丘即當起白言我於此別衆食中無因緣欲求出聽使出若二人三人隨意食若四人若過四人應分作二部更互入食若比丘有別衆食因緣欲入尋當起白言我有別衆食因緣欲求入隨上座次入結罪是中犯者若比丘別衆食者咽咽波逸提若有因緣不説者突吉羅此戒具三緣方成本罪一無別衆緣二滿衆而受三得食入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者除餘時若三人四人更互食若有因緣去及最初未制戒等是為不犯會採善見律云別衆食有二種一請二乞如一居士至四比丘所以正食請言願大德受之是名請一時受一處食四人俱得罪即墮罪也若一時受請各去各受各食不得罪若別請別去至居士家一時受食得罪是名受請得罪從乞得罪者如四乞食比丘見居士語言與我等四人食或俱去或各去一時受食得罪是名從乞得罪若請四人有一解法者欲俱食畏犯即作方便行食時覆鉢不受居士問言何以不受答言但與三人食我欲呪願三人食竟後便受食不犯若請與飯至家與粥不犯十誦律云有二利故遮別衆食一者隨護檀越以憐愍故二者破諸惡欲比丘力勢故若三比丘別共一處食第四人取食分不犯若道行乘船昨日來今日受食明日行今日食皆波逸提緣同行不及伴因難許開若前日後日則非開緣受食故犯僧祗律云若三人食一人不食若三圓具一未圓具皆無犯若以食送彼乃至鹽一匙與彼衆處食皆無犯或施主言但來入者我皆與食或施主別造房施住我房者我皆與食斯亦無過律攝云若四苾芻同一界內若四人中一有開緣若僧伽食若私己食並皆無犯薩婆多論云若僧伽食時應作四種相一打揵椎二吹貝三打鼓四唱令令界內聞知此四種相隨定作一勿使雜亂不成僧法若不作相而食僧伽食者食不清淨名為盜僧伽食不名別衆罪盜僧伽食乃計錢多少犯盜也若作相食者設使界內有比丘無比丘若多若少若知有比丘無比丘若來不來但使不遮一切無咎若使有遮雖打揵椎食不清淨名盜僧祗遮謂遮外來客比丘也若大界內有二處三處各有始終僧祗但一布薩若食時但各打揵椎一切無遮清淨無過若檀越請四人已上在布薩界內食應布薩處請僧次一人若送一分食不爾者墮罪若二處三處亦如是此謂有多處共結法食二同界也若各至布薩處僧中請一人若送一分食則清淨隨何處不請僧中一人不送一分食者墮罪若聚落界內雖無僧界設二檀越請四人已上於二處食應打揵椎二處互請一人若送一分若有異處比丘應如法入乃至一人不爾者墮罪若僧食時自在維那自在者謂任其主宰也以僧祗物別作肥美四人共食四人雖在二處無別衆食罪但食不清淨凡是別衆食盡是檀越食若僧祗食一切盡無別衆食但不如法食僧祗食者食不清淨多得盜僧祗罪若檀越舍內請四人已上食雖打揵椎若檀越遮者知一比丘不得食者盡得墮罪遮者謂檀越雖遮未來比丘比丘不應別衆食若知一比丘不得食者得罪戒因緣經云毗舍佉母別請佛及五百阿羅漢食世尊知而故問阿難頗有一比丘於僧中唱使行否答言不也佛言愍此毗舍佉不獲一福云何不食一比丘食一比丘僧者得大福獲大果若比丘衆中不唱私會者犯墮此戒大乘同學附考根本律云五因緣早請食來房中食一是客新來二將欲行去三身嬰病苦四是看病人五身充知事摩得勒迦云若檢校人應於齋食先取自分食之無過按此別衆其義有二一者別為衆如四分等所明二者別於衆如律攝所釋然則乞食不得四人同行受請必須僧次差往僧中常食要打揵椎請食私房無緣不聽聖制昭然豈容廢越嗟今叢席私厨例設美味任餐致令後學倣效而偭規也仰祈智者思幻質非堅美食難保恆壽師模任重嚴制豈可廢亡第三十四過三鉢受請戒若比丘至白衣家請比丘與餅飯若比丘欲須者當二三鉢受還至僧伽藍中應分與餘比丘食若比丘無病過兩三鉢受持還至僧伽藍中不分與餘比丘食者波逸提緣起此戒有二制佛在舍衛國給孤獨園彼有大村女嫁禪國還父母家施比丘食後於異時其夫遣使呼還即辦食莊嚴共往有諸比丘來至父家乞食時女見之即復以所辦食盡與方更辦具未還之間其夫已更取婦矣又波羅奈城外衆多商賈車伴共止宿有一乞食比丘於一信樂商賈處得食去展轉告餘比丘乞食令盡時商主方入城更市糴糧諸伴先去在後不及道路為賊所劫諸比丘聞知白佛此初結戒也於是諸病比丘畏慎不敢過受食佛言聽諸病者過受食乃第二結戒也此是遮罪由食事多貪煩惱制斯學處釋義文分二節至白衣家下明受食法無病下結成所犯律云若比丘至白衣家請與餅食請謂發言敬請與謂施與植福當問其主若彼言是歸婦食商客道路糧者即應食已出還僧伽藍中白諸比丘某甲家有歸婦食有商客道路糧若欲食者食已應出若欲持食還者齊二三鉢我今不持食來二三鉢是其限也鉢量有上中下如上若持一鉢食還共分食之謂一界同居利和均分也當語餘比丘言若有至彼家者即於彼食若持食還者應取兩鉢我已持一鉢還如若持兩鉢還共分食之復語諸比丘言若有至彼家乞者可即彼家食欲持來者應取一鉢還我今已持兩鉢還如若盡持三鉢還共分食之白餘比丘言若欲至彼家乞者可即於彼食若欲持還者慎勿持還我已持三鉢來結罪是中犯者若比丘無病於彼家過兩三鉢受食還出彼門波逸提若一足在門內一足在門外方便欲去而還住者盡突吉羅若不問歸婦食賈客道路糧而取食者突吉羅若持至僧伽藍中不分與餘比丘而獨食者若不語餘比丘盡突吉羅此戒具四緣方成本罪一是歸婦食及商客道路糧二自身無病三受過三鉢四持出彼門兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不違上制若彼自送至僧伽藍中得受若復送至比丘尼寺中得受及最初未制戒等是為不犯會採十誦律云若以上鉢取者應取一鉢不應取二若以中鉢取者極多取二鉢不應取三若以下鉢取者極多取三不應取四過取皆得墮罪根本律云要而言之若苾芻取他食時過四升半米飯分量已上當得墮罪若施主任取多少者無犯律攝云若於非人及外道家過三鉢取咸得惡作若即此座過三而食除餅但將餘物或施主歡喜隨意將去並皆無犯有三種虗損信施一施主信心施持戒者受已與犯戒人二信心施正見者受已與邪見人三過量而受不自噉食乃至長受一掬之食除其施主先有隨意如斯三事並名虗損信施當招惡果掬者為兩手所奉也又撮也此戒大乘同學第三十五不作餘食法戒若比丘足食竟或時受請不作餘食法而食者波逸提緣起佛在舍衛國祗桓精舍讚歎一食法諸比丘即隨所噉根葉華果飯乾餅若飲漿若服藥便當一食形體枯燥顏色憔悴佛乃聽於一座上食飯餅等令飽滿律攝云一座食者若尊者來亦不應起既受食已不應離座下至行鹽及受食葉皆不應起病比丘不能一座食者聽數數食病人無足食法時諸病比丘若得好美食食不能盡瞻病人足食已不敢食便棄之衆鳥爭鳴復聽瞻病人足食已得食殘食時諸比丘清旦受食舉已入村乞食食已還舉所舉食與諸比丘彼已足食皆不敢食佛聽取所受食作餘食法應食有一長老多知識入村乞食大得積聚一處共食持還與諸比丘衆已足食亦不敢食佛聽從彼處持食還作餘食法而食之當作如是餘食法言大德我足食已知是看是此作餘食法彼應取少許食已當語彼比丘言我止汝取食之是名餘食法時舍衛國有一貪餮比丘不知足食不足食不知餘食不餘食得便食之諸比丘嫌責白佛結戒此是遮罪由貪餮無厭制斯學處釋義律云食者五正食於五食中若食一一令飽足有五種足食一知飯謂五正食餘不名足食律攝云粥若初熟豎匙不倒若和水指畫見迹此皆成足食異此不成二知持來謂有人授與從彼受持也三知遮謂足食竟心發言不須也四知威儀謂四儀中皆得受食也五知捨威儀謂坐者行住臥乃至臥者坐住行也結罪是中犯者若比丘足食已捨威儀不作餘食法而食咽咽波逸提若佉闍尼枝葉華果食油胡麻黑石蜜磨細末食足食已不作餘食法得而食之咽咽波逸提若足食已為他作餘食法若知他足食已向之作餘食法若自手捉食作餘食法若持食置地作餘食法若使淨人持食作餘食法若以不好食覆好食上作餘食法若受他餘食法盡持去如是等不成餘食法一切盡突吉羅若足食足食想波逸提足食疑不足食足食想不足食疑盡突吉羅此戒具五緣方成本罪一受食飽足二足食想三已捨威儀四不作餘法五復食入咽兼制比丘尼突吉羅同制別學準五分律尼亦同犯式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者食作非食想不受作餘食法非食不作餘食法自取作餘食法不置地作餘食法乃至手及處若與他他與己作餘食法若病若病人殘食不作餘食法及最初未制戒等是為不犯會採十誦律云以二利故聽受殘食法即作餘食法也一者看病比丘因緣故二者比丘有因緣食不足故律攝云有五蒲膳尼即可噉食此食取含噉之義也一飯二麥豆飯三四肉五餅又五珂但尼即可嚼食此食取嚼嚙之義也謂根莖葉華果若先食五嚼食及乳酪菜等後食五噉食無犯若先食五噉食更食五嚼食及乳酪菜等名犯應知有五未足之言謂授食時未即須者應報言且待且去且有且待我食且待我盡若兼且言名曰未足若無且聲便是遮足若未為足意設作足言亦不成足得惡作罪由言不稱法故若得餘食作法食者自身樂住施主得福欲作法時洗手受食持就一未足苾芻或雖已足未離本座者謂不捨威儀也對彼作法彼若自未遮足應取兩三口食已而報之曰此是汝物隨意應食此據前人自未遮足得食無犯若自足已便不合食應以手按如前報之有五不成作餘食法一身在界內對界外人二不相及處三在旁邊四在背後五前人離座翻此便成若一人作法設餘人食並皆無犯僧祗律云聽一人作殘食餘人皆得食若比丘持食來欲作殘食時即於鉢上碗中作殘者正得碗中名作殘食鉢中食不名作若碗中食汁流入鉢中得俱名殘食若並兩鉢求作殘食前人止食一鉢中食者正一鉢名作殘食若或餅或菜通覆橫二鉢上者二俱得名作殘食餘種種器亦爾若比丘足食已有大檀越持種種飲食至應問有直月維那知事人未足食者後彼作殘食若彼已足食當從上座未足者作若上座羞不能人中作者當合坐舉上座至屏處作若上座已足食有客比丘來應問彼若未足食即向彼作若客已足食僧應作方便勿破檀越善心或衆中有大沙彌大者謂年滿二十也將至戒場與受具教作殘食法已然後當食五分律與此同也其法儀準律於作持中詳明此戒大乘同學引證毗尼母經云比丘受人施不如法為施所墮墮有二種一者食他人施不如法修道放心縱逸無善可記二者與施轉施施不如法因此二處當墮三塗應施者若父母貧苦應先受三皈五戒十善然後施與若不貧雖受皈戒不中施與復有施處治塔人奉僧人治僧房人計其功勞當酬作價若過與為施所墮施病者食當作慈心隨所宜與之若錯誤與食為施所墮嬰兒牢獄繫人懷妊者當以慈心施之勿望出入得報詣僧房乞者若自有糧不須施之若無糧食施之無咎若比丘不坐禪不誦經不營佛法僧事受人施為施所墮若前人無此三業知而轉施與者受者皆為施所墮寧吞鐵丸而死不以無戒食人信施若足食已更強食者不加色力但增其患是故不應無度食也大涅槃經云若一切法無常苦空無我云何為食起身口意三種惡業若為貪食起三惡業所得財物衆皆共言後受苦果無共分者復觀一切衆生為飲食故身心受苦我當云何於是食中而生貪著復次因於飲食身為增長我今出家受戒修道為欲捨身今貪此食云何當得捨此身耶如是觀已雖復受食猶如曠野食其子肉其心厭惡都不甘樂深觀揣食有如是過次觀觸食如被剝牛為無量蟲之所喋食次觀思食如大火聚識食猶如三百䂎矛若有比丘乞食預作是念願得好者願必多得亦願速得不名於食得厭離想所修善法日夜衰耗不善之法慚當增長若欲乞食先當願言令諸乞者悉得飽滿其施食者得無量福我若得食為療毒身修習善法利益衆生作是願時所修善法日夜增長不善之法漸當消滅第三十六使他犯餘食法戒若比丘知他比丘足食已若受請不作餘食法殷勤請與食長老取是食以是因緣非餘欲使他犯波逸提緣起此戒有二制佛在舍衛國給孤獨園有一貪餮比丘被如法比丘所訶言未曾有汝今貪餮嗜食者不知足食不足食餘食不餘食聞此語已心懷恚恨後異時見彼比丘食已不作餘食法殷勤請與食欲令他犯戒彼即受食之貪餮比丘亦如上返訶詰過有少欲者白佛此初結戒也時諸比丘未知已食未食不知足食不足食後乃知已食已足食或作波逸提懺者或有畏慎者佛言不知無犯故更加知此第二結戒也由欲令他犯返詰過故瞋恚煩惱制斯學處釋義律云食有五種如上殷勤請與食者謂再三頻請強勸令噉嚼也欲使他犯者謂欲令彼比丘因此犯罪心生悔惱此非餘時聞聽因緣也結罪是中犯者若彼比丘即受食之咽咽二俱波逸提若與令食彼不食棄之若受而不食舉置若受已轉與餘人其與者皆突吉羅若不作餘食法與彼作餘食而食之與者突吉羅若與病人食欲令他犯若持病人殘食與他欲令他犯若作餘食法已與他欲令他犯其與者皆突吉羅足食足食想波逸提足食疑不足食足食想不足食疑盡突吉羅此戒具四緣方成本罪一彼足食已捨威儀二足食想欲使他犯三以未作法食殷勤請與食四彼受已不作餘食法而復食入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先不知足食不足食若與令棄令舉置令遣與人而彼取食之若未作餘食法與令作已食彼不作食之若持病人餘食與不令他犯作餘食法與不令他犯及最初未制戒等是為不犯會採薩婆多論云若比丘見餘比丘食竟不囑食自恣請噉十五種食隨食何食皆波逸提一切麥粟稻荍未作飯餅盡名似食若變成飯餅盡名正食五不正食及此五似五正故名十五種此戒大乘同學第三十七非時食戒若比丘非時受食食者波逸提緣起佛在羅閲城耆闍崛山中時城中人民節會作衆伎樂難陀跋難陀往看衆人與食食訖故看向暮方還又迦留陀夷日暮入城乞食天陰暗至一懷妊婦家此婦持食出門值天雷電暫見其面謂言是鬼怖而墮身由尊者面黑光故報言我非鬼是迦留陀夷婦即恚言沙門釋子寧自破腹不應夜行乞食諸比丘嫌責難陀跋難陀及黑光具陳白佛為僧結戒此是遮罪因長貪招譏制斯學處釋義律云時者明相出乃至日中按此時法四天下食亦爾非時者從日中乃至明相未出食者有二種佉闍尼蒲闍尼如上僧祗律云日中影過一髮一瞬即是非時結罪是中犯者若非時受食食咽咽波逸提若非時藥過非時波逸提七日藥過七日波逸提盡形壽藥無因緣服者突吉羅若非時非時想波逸提非時疑非時時想時非時想時疑盡突吉羅此戒具三緣方成本罪一是非時食二非時想三食入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者噉黑石蜜若有病服吐下藥聽煮麥令皮不破漉汁飲之若喉中哯出還咽及最初未制戒等是為不犯此戒大乘同學引證婆沙論云世尊性離非時食故如來自誕生王宮以至涅槃於中曾無非時之䬸謂諸佛性恆處中道不著二邊故離非時食以表中道故制中食而中前得食者表前方便得有證義亦令身心獲現利故中後不食則少昏睡無宿食患身輕安隱心易得定有如是義故故令中食毗尼三昧經云諸天早起食三世諸佛日中食畜生日西食鬼神日暮食是故佛制斷六趣因令同三世佛食處世經云佛言中後不食有五福一少淫二少睡三得一心四無下風五身得安樂亦不作病起也舍利弗問經云舍利弗復白佛言有諸檀越造僧伽藍厚置資給供來世僧有似出家人非時就典食者索食與者食者得何等罪其本檀越得何等福佛言非時食者是破戒人是犯盜人非時與者亦破戒人亦犯盜人盜檀越物非施主意施主無福以失物故但有發心置立之善舍利弗言時受時食時不盡者非時復食或有時受至非時食復得福不佛言時食淨者是即福田是即出家是即僧伽是即天人良友是即天人導師其不淨者猶為破戒劫盜餓鬼為罪窟宅非時索者以時非時非時輒與是典食者是名退道惡魔名三惡道破器癩病人壞善果故諸婆羅門不非時食外道梵志亦不邪食況我弟子知法行法而當爾耶凡如此者非我弟子非法之人盜與盜受一團一撮片鹽片酢死墮燋腸地獄吞熱鐵丸從地獄出生豬狗中食諸不淨又生惡鳥人怪其聲後生餓鬼還伽藍中處都圊內噉食糞穢並百千萬歲更生人中貧窮下賤所可言説人不信用不如盜一人物其罪尚輕割奪多人福田故斷出世道故附考毗尼序云比丘病服下藥中後心悶佛令與熬稻華汁飲與竟悶猶不止佛令與竹笋汁與竟不瘥佛令囊盛米粥絞汁與飲病猶不瘥佛令將至屏處與米粥根本尼陀那云有病苾芻醫令以水和非時可食佛言有無齒牛食麥後時便出其粒仍全用此為非時應服服猶不瘥用生麥多將水攪以物漉之然後應服服猶不瘥佛言醫人處方令服飲若稠若團隨意應服凡所有事我為病人非時開者於病瘥後咸不應作根本百一羯磨云有五種果若時非時若病無病並隨意食一訶梨勒此云天主持來二毗醯勒三菴摩勒即嶺南餘甘子形似檳榔食之除風四末粟者即胡椒五畢茇利即蒟醬四分隨機羯磨云有渴病因緣許受非時漿謂果漿蜜漿等澄如水色以水渧淨受之有風熱病因緣許受五種七日藥有諸病因緣聽受盡形壽藥謂一切鹹苦酸辛不任食者如薑椒之類乃至白术散丸湯膏之類若非時漿不得留至明日若七日藥不得畜至八日南海寄歸內法傳云牙中食在舌上膩存未將淨水重漱已來涎唾必須外棄若日時過更犯非時文一往傳來以前展轉食並別衆食戒中開緣言是非時食戒聽許然前戒雖開亦在日中過午任噉訛之又訛慨今久染邪風急難除蕩有云師命令開究詰無典可據有云參學應須佛世尚無煙厨況今叢林與夫蘭若早則小餐晚則茶水備足倍於聖世精修焉及先賢不特西域釋子定日以奉行即此方古德淨齋法者尤多實行芳規俱載傳記願蹈先蹤開發後學又若云晚食稱為藥石者斯非法王永久之軌凡聖同遵莫過古人一時之權勿依恆用今附辨於此明知非有據言是無憑第三十八殘宿食戒若比丘殘宿食而食者波逸提根本部云食曾經觸食昔墮罪緣起佛在羅閲城靈鷲山中時尊者迦羅亦在此住常坐禪思惟時到入城乞食易得作如是念我何為日日入城乞食疲苦寧可食先得者後得食當持還即如所念時諸比丘於小食大食上不見迦羅疑是命終若遠行若罷道若為惡獸所害後見問知其故白佛結戒此是遮罪由非法故制斯學處釋義律云宿食者今日受已至明日一切沙門釋子受大戒者皆不清淨食有二種正食非正食如上結罪是中犯者若舉宿食而食咽咽波逸提非時過非時食者七日過七日食者皆波逸提盡形壽藥無病因緣而服者突吉羅宿作宿想波逸提宿疑非宿宿想非宿疑皆突吉羅此戒具三緣方成本罪一殘食共宿二殘宿食想三復食入咽兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者宿受食有餘與父母與塔作人與作房舍人計價若鉢有孔鏬食入中如法洗餘不出及最初未制戒等是為不犯會採十誦律云大比丘未手受而共宿者名曰內宿噉者突吉羅若己手受舉共宿者名殘宿食噉者波逸提先自取果後從淨人受而食突吉羅有二種觸食無罪一清淨比丘誤觸二破戒比丘無慚愧觸天食過中可受七日受根本尼陀那云所餘餅果持與求寂明旦還得食之若有希望心與時惡作食時犯墮若總無希望心不犯目得迦云若病者貧設是殘觸酥油服之無犯苾芻行路令求寂持路糧亦得為其擎舉擎下又諸苾芻道行應持糧者既無俗人又無求寂應勸施主施主亦無應自持去後見俗人共換而食換處亦無分為兩分告俗人曰汝取一分彼既入手應告彼曰汝取我食我取汝分換易而食此復難求於第一日應須絶食明日如有授人受取而食若無授者自取一彪拳許食之至第三日還無授者食二彪拳至第四日復無授人隨情自取飽食無犯於後路糧罄盡見有熟果墮地應取作淨受已而食若淨人難得者授已應食授者亦無應可自取作北洲想而食樹上果熟未落地者應自上樹搖振令墮自取而食如上開者並為難緣若無難時悉皆制斷善見律云若多比丘共行唯一小沙彌比丘各自擔糧至食時各自分分沙彌得分已語比丘言今持沙彌分與大德易得已復與第二座易展轉乃至衆多食皆無罪若沙彌不解法者比丘自持食分與沙彌展轉易得食不犯此戒大乘同學第三十九自取食戒若比丘不受食若藥著口中除水及楊枝波逸提緣起此戒有二制佛在舍衛國給孤獨園有一比丘常乞食著糞掃衣時城中諸居士為命過父母及兄弟姊妹夫婦男女於四衢道頭或門下或河邊乃至樹下廟中作飲食祭祀供養彼比丘自取食之居士譏嫌有少欲者聞知白佛此初結戒也時諸比丘於中生疑不敢自取楊枝淨水佛言除水及楊枝不犯故有第二結戒也此是遮罪因其非法制斯學處釋義文分二節不受下明其創制除水等明其隨開律云受者有五種受手與手受或手與持物受或持物與持物受或持物與手受或遙過物與與者受者俱知中無觸礙得墮手中復有五種受身與身受衣與衣受曲肘與曲肘受器與器受或有因緣置地與根本律云佛作念言凡諸苾芻由不受食有此過生是故我今敕諸苾芻受取應食令他證知故如佛所教受取而食藥者酥油生酥蜜石蜜楊枝者第四分云佛言應嚼楊枝不嚼有五過一口臭氣二不別味三增益熱陰四不引食五眼不明嚼楊枝有五利益反上可知楊枝極長者聽一磔手極短者聽長四指不應在多人處溫室食堂經行堂嚼應在屏處結罪是中犯者若不受食自取著口中咽咽波逸提非時藥過非時食者七日藥過七日食者皆波逸提盡形壽藥無因緣不受而食突吉羅不受不受想波逸提不受疑受不受想若受有疑皆突吉羅此戒具三緣方成本罪一是未受之食二作未受想三自取而咽咽已兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若乞食比丘風吹鳥銜食墮鉢中除去乃至一指爪餘者食及最初未制戒等是為不犯會採五分律云聽嘗食知鹹淡但不得咽聽從天龍鬼獼猴受食以施主語受食不得受擲食四分遙過聽受為有因緣五分擲食不聽由其輕慢其事是同開遮之緣有異也薩婆多論云凡受食者一為斷竊盜因緣故二為作證明故從非人受食得成受食不成證明所以非人畜生邊受食者曠絶無人授食是故聽之若在人中非人畜生及無智小兒一切不聽也根本目得伽云正受食時未及得遂使墮地應更受食授者若無應自取已除去多分可食之此戒大乘同學引證薩婆多論云昔有一比丘與外道同行至一樹下樹上有果外道語比丘言上樹取果比丘報言我比丘法樹過人不應上又言搖樹取果報言我法不得搖樹落果外道上樹取果擲地與之語取果食報言我法不得不受而食外道生信敬心知佛法清淨即隨比丘於佛法中出家受具尋得漏盡附考內法傳云梵語憚哆家瑟詫憚哆譯之為齒家瑟詫即是其木豈容不識齒木名作楊枝西國柳樹全稀譯者輒傳斯號佛齒木樹實非楊枝那爛陀寺目自親覩然五天法俗嚼齒木自是恆事三歲童子咸即教為近山莊者則柞條葛蔓為先處平疇者乃楮桃槐柳隨意或可大木破用或可小條截為聖教俗流俱通利益第四十無病索美食戒若比丘得美飲食乳酪魚及肉若比丘如此美食無病自為己索者波逸提緣起此戒有二制佛在舍衛國給孤獨園跋難陀有一商主為檀越詣彼家索雜食商主問言今有何患乃思此食報言無所患苦但意欲得雜食耳商主譏嫌有乞食比丘聞知白佛此初結戒也時諸病比丘皆畏慎不敢乞不敢為病比丘乞得已不敢食佛咸聽許此第二結戒也由生譏嫌制斯學處釋義律云美食者乳酪魚肉乳酪是飲魚肉是食病者乃至一坐間不堪食竟結罪是中犯者若無病自為身乞如此美食食咽咽波逸提此戒具三緣方成本罪一是美好雜食二無病自求三入口吞咽兼制比丘尼突吉羅同制別學按尼律此犯可訶法式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者病人自乞為病人乞乞得而食或己為他他為己若不乞而得及最初未制戒等是為不犯會採十誦律云索得波逸提不得突吉羅根本律云無病時乞無病而食乞時惡作食便墮罪無病時乞有病而食乞時惡作食時無犯有病時乞無病而食乞時無犯食時墮罪有病乞有病食無犯若乞食時他持飯出欲須餘者勿受其飯默然而住彼問曰尊者欲何所須作此言時是表其隨情所欲若須者即可隨覓無犯又施主見苾芻時語言有所須者隨意當索苾芻隨覓何物無犯此戒大乘有病亦不得食魚肉若食者罪結輕垢音義無住處村時拘薩羅國有一村無僧伽藍及停留之舍有居士為福德故造立住處備諸飲食供給往來衆僧唯施一食不能多供因以福德施設故餘律皆名福德舍沙䨲婆羅門未見翻譯餘律多云何耆達婆羅門維那梵語羯磨陀那此翻知事亦翻悅衆維那二字華梵雙舉維是綱維華言也那是梵語略去羯磨陀三字偭音麵背也偭規矩而改錯揣食揣吹上聲即摶食亦名段食有形段故觸食前六識相應之觸心所對前境生喜樂如觀劇戲終日不食而自飽等又涼暖諸觸能滋養身思食第六識相應之思心所於可意境而生希望意思資潤諸根增長又思想飲食令人不死如小兒視梁上懸囊及望梅止渴等識食第八識執持之相由前三食勢分所資令此識增勝能持諸根大種故又第七識執第八識為自內我此是三界衆生因名之為食若入滅受想定令第七識染分心心所滅不復執第八識為我便於三界不得久住故知識是食也若約六道分別者人畜具四食段食顯勝鬼神欲天除段食則具三食觸食顯勝禪天除段觸二食則具二食思食顯勝無想四空并無間獄除段觸思三食唯依識食而住喋色洽切衫入聲喋喋水鳥聚食貌䂎音纘與鐏同矛戟柄底鋭者哯出音衍不顧而吐也説文云不嘔而吐也貪餮音鐵貪也貪財曰叨貪食曰餮嗜食音示欲也好也圊音清溷也廁也至穢之處宜常修治使淨潔也蒟音舉果也似王爪蔓生子長大苗為留藤實似桑椹皮黑肉白食之辛香今嶺南人取其葉合檳榔食之迦羅此翻黑或云哥羅是尊者已得阿羅漢果鏬蝦去聲裂也彪補尤切音髟小虎也柞音昨櫟也枝長葉盛叢生有刺櫟音歷詫𠻬去聲荍音喬荍麥也俗作蕎非
