body:
  text: 金陵寶華山弘律沙門讀體集第十二異語惱他戒若比丘妄作異語惱他者波逸提緣起此戒有二制佛在拘睒毗國瞿師羅園中闡陀犯罪諸比丘問言汝自知犯罪不耶即以餘事報言汝向誰語為説何事為論何理為語我為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪諸比丘譏嫌白佛佛令僧為作餘語白乃初結戒云若比丘餘語者波逸提後便觸惱衆僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛令僧復為作觸白此第二結戒也餘語觸惱二種單白羯磨法於作持中明此是性罪由違煩事嗔恚煩惱制斯學處乃初篇妄根本種類釋義律云餘語者汝向誰語乃至我不見犯此罪餘語即異語也僧祇律云異語惱他有八事一者作羯磨時比丘和集作折伏乃至別住羯磨二者如法論時説非常非斷是名如法論三者論阿毗曇時九部修多羅是名阿毗曇四者論毗尼時廣略波羅提木叉是名毗尼五者不異論不得離所論更論餘事是名不異論六者不異人不得離先問人更問餘人是名不異人七者停論當説法時語言住後當更論是名停論八者異語惱他如尊者闡陀異語惱他是名八事結罪是中犯者若僧未作餘語白便作餘語汝向誰語等者一切盡突吉羅若作白已作如是餘語者一切盡波逸提若僧未作觸惱白喚來不來等一切盡突吉羅若作白竟作如是觸惱僧者一切盡波逸提若上座喚來不來突吉羅此戒具四緣方成本罪一自身有過二覆藏違諫三僧曾作白四語默觸惱兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者重聽不解或人語有參差汝向誰説乃至我不見此罪不犯異語若欲作非法非毗尼羯磨若僧若塔寺若和尚同和尚若阿闍黎同阿闍黎若新舊知識等若為作無利益羯磨不與和合喚來不來若一坐食不作餘食法若喚起不起或舍崩火燒惡獸賊難等教莫起便起若惡心問上人法説是不與説不犯觸惱若小語疾疾語夢中語獨自語欲説此錯説彼及最初未制戒等是為不犯會採僧祗律云若僧中問異答異得波逸提若多人中和尚阿闍黎前諸長老前問異答異得越毗尼罪律攝云若於僧伽及尊重類稱理之教垢心違亦得墮罪非稱理教作違惱言得惡作罪若向不解語人而違惱者亦惡作罪若差知衆事以垢惡心應作不作不應作而作皆得墮罪若無垢心得惡作罪根本律云若苾芻見獵人逐麞鹿等入寺內彼問頗見有鹿從此過不不應言見若是寒時報言可入溫室向火若是熱時報言可入涼室飲水若彼云我不疲倦為問走鹿應先自觀指甲報言我見指甲若更問者應觀太虗報言我見太虗若彼云我不問指甲及太虗然問可殺有情於此過不即應遍觀四方作如是念於勝義諦一切諸行本無有情報言我不見有情此皆無犯若餘問時不如實答得墮罪五分律云若輕三師及戒一一波逸提輕餘比丘突吉羅師令掃地不掃教順掃而逆掃皆突吉羅不恭敬戒諸部皆有唯本部無大意與此同今故採集以入其中俾不漏過也此戒大乘同學第十三嫌罵戒若比丘嫌罵波逸提緣起此戒有二制佛在羅閲城耆闍崛山中沓婆摩羅子為差使知僧臥具及差僧食時慈地比丘於眼見耳不聞處自相謂言沓婆摩羅子有愛恚怖癡餘比丘語言莫作是説報言我不面説在屏譏嫌耳佛知初為結戒云若比丘譏嫌波逸提復更於耳聞眼不見處自相謂言有愛恚怖癡諸比丘語言佛不制戒云譏嫌波逸提報言我不嫌是罵耳故有第二結戒也此是性罪由謗讟事瞋恨煩惱制斯學處乃初篇妄根本種類釋義律云若面譏嫌齊眼見不聞處言有愛等若背面罵齊耳聞不見處言有愛等結罪是中犯者若比丘嫌罵比丘説而了了者波逸提不了了者突吉羅若上座教汝嫌罵若受教嫌罵突吉羅其教者例推亦難逃此罪此戒具四緣方成本罪一有瞋恚心二是僧所差人三出言嫌罵四説而了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者其人實有是事恐後有悔恨語令如法發露或戲語或夢中語欲説此乃錯説彼及最初未制戒等是為不犯會採僧祗律云嫌而不訶責者得越毗尼罪訶責而不嫌者得越毗尼罪亦嫌亦訶責者得波逸提罪嫌非訶責者持己器中食比比座器中食作如是言平等不是嫌而非訶責訶責而非嫌者但言有愛恚怖癡不以所分得物相比也亦嫌亦訶準此可知善見律云譏嫌被僧差人波逸提嫌餘人突吉羅摩得勒伽云罵畜生突吉羅此戒大乘同制第十四敷僧臥具不舉戒若比丘取僧繩牀木牀若臥具坐褥露地敷若教人敷捨去不自舉不教人舉波逸提緣起佛在舍衛國給孤獨園時城中有長者飯僧十七羣比丘取僧坐具在露地敷而經行望食時到時到已不收攝便赴食僧坐具即為風塵土坌蟲鳥啄壞污穢不淨諸比丘譏嫌白佛結戒此是遮罪因臥具事由輕慢心制斯學處釋義文分二節取僧繩牀下明僧物僧用若教敷下結成所犯律云衆僧物為僧屬僧物者已捨與僧為僧者為僧作未捨與僧也屬僧者已入僧已捨與僧繩牀者有五種旋腳直腳曲腳入陛無腳木牀有五種亦如是臥具者或用坐或用臥褥者是坐褥也在露地謂無覆蓋楝非屋內若自敷教人敷敷謂安布也若去彼有舊住比丘若摩摩帝若經營人當語言我今付授汝汝守護看此謂教人舉也舉者謂好收攝若都無人者當舉著屏處而去若無屏處自知此處必無有破壞當安隱已持粗者覆好者上而去此謂自舉也若即時得還應去若疾雨疾還不壞坐具者應往若中雨中行及得還者應往若少雨少行少行謂徐徐行也及得還者應去毗尼母云如來所以教諸比丘護敷具者見五種過一不欲令風吹二不令日𭨃三不令天雨四不令塵土坌之五不令蟲鳥敷具上放不淨結罪是中犯者若不作方便而行初出門波逸提本因露地敷具今制約門者是就彼時給孤獨園祇桓太子所建之都門而言其中寬廣不無露地可知如依此時論但出僧伽藍之大門為準若一足在外一足在內欲去而不去還悔一切突吉羅若二人共一牀坐下座應收而去下座謂上座當收而上座竟不收下座犯波逸提復以非威儀突吉羅此謂下座禮失尊𢍉所以更加一非威儀罪上座謂下座當收而下座不收上座犯波逸提此謂上座應教下座既自不舉復不教舉縱是上座亦結本罪若二人不前不後俱不收二俱波逸提若餘空繩牀木牀踞牀若几浴牀或臥具表裏若地敷若取繩索毳貯放露地不收便去突吉羅若敷僧臥具在露地不收而入房坐思惟突吉羅思惟乃習觀坐禪也此戒具四緣方成本罪一私用僧物二敷於露地三不收而去四兩腳出門兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者如上付授乃至少雨少行得還者諸餘空牀等收已而去若為力勢所縛若命梵二難不作次第而去若二人共坐下座應收若收已入房思惟及最初未制戒等是為不犯會採善見律云他人私物不舉突吉羅摩得勒伽云自臥具不舉不使人舉突吉羅十誦律云諸比丘食竟有諸白衣即坐僧臥具牀上應待白衣食竟若有病者不能久待應去隨見者應舉若失戶鉤戶鑰無舉處若八難中一一難起不舉不犯律攝云若無苾芻應告求寂此若無者囑近施主無施主者應觀四方密藏戶鑰方隨意去若憶而不舉得本罪若忘念者但得惡作罪若路逢苾芻來者應須指的告戶鑰處有五種人不堪囑授謂無慚愧有讐隙年衰老身帶病未圓人若苾芻路中許他舉來至寺內初夜不舉乃至明相出不損而舉得惡作罪若損而舉得墮罪附考律攝云凡是僧伽所有衣服不將餘物而襯替者不合受用是所替物亦非疏破若用僧敷具有損壞者不應默然捨不料理有破穿處應須縫補若斷壞者應為連接若不堪修補者用充燈炷或為拂帚或斬和泥用塗牆壁或填孔隙令施福增門人弟子每於月八日十五日二十三日月盡日應觀師主臥具拂拭曬曝若不為者咸得惡作若無門徒自須料理凡聽法時不應與苾芻尼及俗人求寂同一氈席相近而坐授學之人亦不同座有難緣非犯無夏苾芻不應共三夏者同座而坐一夏者不應與四夏者同座二夏以去得共大三夏者同座若白衣舍處所迮時雖塢波馱耶同座非犯塢波馱耶此翻親教師即和尚也於一牀上聽坐三人不應一牀二人同臥有慚愧者無犯若在行途得大帔中間衣隔同臥非犯若有施主以衣物布地延請法衆願為蹈者或寶莊飾師子座上以俗人衣敷設者苾芻應生愍念起無常想蹈坐非犯為令外道生信敬故若施主借僧褥席應與事了應令送歸有污應洗若火燒寺先出己衣鉢次出常住資財令無力人一處看守言無力人者意在能守不能持行也其火若滅不應輒入大水漂亦應準此此戒大乘同學第十五僧房不舉臥具戒若比丘於僧房中敷僧臥具若自敷若教人敷若坐若臥去時不自舉不教人舉波逸提緣起佛在舍衛國給孤獨園時有客比丘語舊住比丘言我在邊僧房中敷臥具宿後異時不語舊比丘便去僧臥具爛壞蟲咬色變舊住者久不見客比丘到房看之見已譏嫌白佛結戒此是遮罪由敷具事不敬煩惱制斯學處釋義文分二節於僧房中下明僧用僧物體通四方物局住處去時下結成所犯律云僧物臥具付授護舉如上若無人付授不畏失當移牀離壁高支牀腳持枕褥臥具置裏以餘臥具覆上而去若恐壞敗當收臥具氈褥枕舉置衣架上豎牀而去前戒露地此以僧房為異十誦律云房者或屬衆僧或屬一人極小乃至容客比丘四威儀行住坐臥結罪是中犯者不作如是方便而去若出界外波逸提一腳在界外一腳在界內還悔而不去一切突吉羅若期去而不去突吉羅若即還二宿在界外至第三宿明相未出若不自往房中不遣使語摩摩帝及知事人言掌護此物者波逸提此戒具三緣方成本罪一受用僧物二去不自舉復不語主三兩腳出界兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者作如上次第事去若舍壞崩落火燒若有難緣第三宿明相出不自往不遣使語及最初未制戒等是為不犯會採善見律云內房敷僧臥具若無籬障去離一擲石外還惡作此以中人擲石處二擲石還墮罪僧祗律云若欲去時房舍內當灑地令淨枕褥曬令燥語知牀褥人知若在俗家宿去時應示語若草敷者去時應問此草欲安何處隨主人語安之若主言但去我自料理應少斂一角而去根本律云苾芻雖在俗舍用草敷時亦應捨去所臥之草白施主知彼云留即留若違得越法罪此戒大乘同制第十六強奪止宿戒若比丘知先比丘住處後來強於中間敷臥具止宿念言彼若嫌迮者自當避我去作如是因緣非餘非威儀波逸提緣起此戒有二制佛在舍衛國祗園精舍時六羣比丘與十七羣比丘在拘薩羅國道路行至無比丘住處村十七羣與六羣言汝是我等上座應先求住處我等當後求六羣報言汝等自去我不求住處十七羣即往求住處自敷臥具止宿六羣知已乃往語言汝等起當以大小次第止十七羣不允即強在座間敷臥具十七羣高聲言諸尊莫爾衆中有少欲比丘譏嫌往白世尊此初結戒也於是諸比丘不知先住處非先住處後乃知是先住處或有作波逸提懺者或有畏慎者佛言不知不犯故復為僧第二結戒也此是性罪由臥具事情生不忍制斯學處釋義文分二節知先比丘下恃尊強宿作如是因緣下結成所犯知者或自了知或他告知顯非不知先比丘住處者謂彼比丘先已在中安靜止宿後來者謂後至比丘恃勢彌為故意放肆於彼臥具中間更重敷己臥具縱身其上坐臥也律云中間者若頭邊若腳邊若兩脅邊臥具者若草敷若葉敷乃至地敷臥具念言等者念言揀非口語乃意內生不善之念謂被迮苦所逼不樂彼自當避我遠去何必加以言遣作如是因緣非餘者謂作如上強緣令他自避非為餘事因緣也非威儀者謂先止者未曾遜請後來者必欲安宿四儀紊亂非僧所宜也結罪是中犯者隨轉側脅著牀波逸提此戒具三緣方成本罪一處先有人二心存惱亂三強敷具竟兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者先不知若語已住若寬廣不相妨礙若有親舊人教於中敷若倒地若病轉側墮上若被繫閉若命難若梵行難及最初未制戒等是為不犯會採僧祗律云若住處少一比丘當一住間敷牀褥尼師壇覆上已向和尚阿闍黎或禮拜問訊或受經去後比丘來却先尼師壇自敷尼師壇坐已作細聲唄先住比丘來見已作是念誰能斷他法即自持尼師壇去是後比丘波逸提坐禪病亦如是若後來眠他牀上若是上座者應語言長老不知世尊制戒耶若眠比丘是下座者應訶責汝不善不知戒相汝不知世尊制戒云何後來眠他牀上若比丘在他處經行者見先比丘來應當避去他處者謂先有他比丘於此處經行後來比丘亦經行此若比丘夜眠時雖振動寱語不作擾亂意無罪擾亂比丘波逸提十誦律云若能敷者波逸提不能敷者突吉羅若為惱他故閉戶開戶閉向開向向謂窗牖也然火滅火然燈滅燈梵唄讀經説法問難隨他不喜事作一一波逸提附考律攝云大小便室不依大小在前至者即應先入便利既了不應久住洗足之處須依長幼僧伽器物下至染器在前用者皆待事畢不應依年大小奪先用者亦不應器中安少染汁作留滯心廢他所用讀誦經時先來已坐不應依大小令彼起避僧伽剃刀既用已了應復本處不應停留更備後須此等不依行者咸得惡罪此戒大乘同學第十七牽他出房戒若比丘瞋他比丘不喜在僧房舍中若自牽出教他牽出波逸提緣起佛在祗桓精舍六羣及十七羣行處同前十七羣入寺掃灑房舍敷臥具止宿已六羣知之即往入房令起隨戒次坐十七羣報言長老實是我等上座然已先語今不能起六羣強牽瞋不喜驅出房佛為結戒此是性罪由臥具事瞋惱他人制斯學處釋義瞋他等者謂情懷不悅於他不安惡行所為故牽出者根本律云或言驅出或以手牽自作使人結罪是中犯者若自牽若教人牽若牽多人出多戶多波逸提若牽多人出一戶多波逸提若牽一人出多戶多波逸提若牽一人出一戶一波逸提若持他物出若持物擲著戶外若閉他著戶外盡突吉羅此戒具三緣方成本罪一有瞋他心二彼是無過比丘三牽出戶外兼制比尼丘波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者無瞋恨心次第出若共宿二夜至三夜遣未受戒人出若破戒破見破威儀若為所擯謂僧已滅擯之若應擯謂比丘所犯事是應滅擯者僧未與作滅擯羯磨也若有命難梵行難驅逐如此等人及最初未制戒等是為不犯會採五分律云若將其所不喜人來共房住欲令自出若出若不出皆突吉羅牽比丘尼及餘三衆出突吉羅若牽無慚愧人若欲降伏弟子而牽出者不犯律攝云若有苾芻是鬬諍者戒見軌式多有虧違如此之人瞋而或出若無善心亦得惡作瞋而或出者乃現權折伏而非實瞋故無罪無善心者謂絶憐愍不以折伏心故得罪若於非僧房處曳出清淨苾芻得惡作罪若破戒人大衆應共驅出若倚門若抱柱咸應斫去并推出之事殄息後所斫截處僧應修補若門徒等冀其懲惡牽出房時無犯然不應令出其住處若無破戒罪但難共語者應為曳韁法而折伏之言曳韁法者謂暫捨置不與共語同事如惡馬難調應合韁杙而捨棄之若於住處龍蛇忽至應彈指語曰賢首汝應遠去勿惱苾芻若告已不去應持軟物而羂去之勿以毛繩等繫勿令傷損於草叢處安詳解放待入穴已然後捨去若棄蚤虱等應於故布帛上觀時冷熱而安置之此若無者應安壁隙柱孔任其自活僧祗律云若駱駝牛馬在塔寺中畏污壞塔寺驅出者無罪此戒大乘同制第十八重閣坐脫腳牀戒若比丘若房若重閣上脫腳繩牀木牀若坐若臥波逸提緣起佛在舍衛國給孤獨園諸比丘在重閣上住坐脫腳牀坐不安詳閣薄牀腳脫墮下止宿比丘上傷身血出有慚愧比丘嫌責佛為結戒由臥具事及不慎威儀制斯學處釋義律云房者若僧房若私房重閣者立頭不至者是脫腳牀者腳入陛謂腳入陛孔不以楔堅故所脫腳薩婆多論云凡坐臥法一切安詳若不審詳者必有所傷兼壞威儀結罪是中犯者若坐若臥隨脅著牀隨轉側波逸提除脫腳已若在獨坐牀或一板牀或浴牀一切突吉羅此戒具四緣方成本罪一住閣板薄二閣下有人三牀壞脫腳四不安詳坐臥兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者坐旋腳直腳曲腳無腳牀若重閣上有板覆若反牀坐若脫去牀腳坐及最初未制戒等是為不犯會採僧祗律云閣下無人坐無犯此戒大成同學第十九蟲水澆泥草戒若比丘知水有蟲若自澆泥若草若教人澆者波逸提緣起此戒有二制佛在拘睒彌國闡陀起大屋以蟲水和泥教人和諸居士見以無慈心害衆生命譏嫌此初結戒也時諸比丘有疑不知有蟲無蟲或有作波逸提懺或有畏慎者佛言不知不犯復與第二結戒也此是性罪由用水事無慈悲煩惱制斯學處乃初篇殺根本種類釋義知者或自察知或他語知水者謂河池井水乃至漿等類蟲者五分律云有蟲水者囊漉所得肉眼所見澆者漓也亦是用水之異名五分律云用有內外內用者飲食之屬外用者澆灌浣濯洗浴之屬此間為外用故制其內用如後所禁此二用皆顯於慈護有情之微細也結罪是中犯者若知水有蟲用澆泥草若以草若土擲有蟲中者波逸提除水已若有蟲酪漿清酪漿若漬麥漿以澆泥若草若教人澆者波逸提若以土若草著如上有蟲等漿中若教人者波逸提若蟲水有蟲水想波逸提蟲水疑無蟲水有蟲水想無蟲水疑盡突吉羅此戒具三緣方成本罪一知水有蟲二作有蟲想三自教澆用兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不知有蟲作無蟲想若蟲大以手觸水令蟲去若漉水灑地教人灑及最初未制戒等是為不犯會採善見律云自澆者隨息一一波逸提息者止也若教他澆隨語語得波逸提根本律云河池水處多有蟲魚苾芻殺心決去水隨有蟲魚命斷之時皆得墮罪若不死者皆得惡作若於此水處堰之令斷於其下半隨蟲命斷或時不死得罪同前此戒大乘同制附考僧祗律云若比丘營作房舍須水若河若池若井漉取滿器看無蟲然後用若故有蟲當重囊漉諦觀之若故有蟲至三重若故有蟲當別作井如前諦觀若故有蟲當捨所營事至餘處去蟲生無常或先無今有或今有後無是故比丘日日諦觀無蟲便用薩婆多論云殺生有三種有貪毛角及皮肉而殺衆生有怨憎恚害而殺衆生有無所貪利有無瞋害而殺衆生是名愚癡殺此戒用有蟲水是謂愚癡殺衆生第二十覆房過三節戒若比丘作大房舍戶扉窗牖及餘莊飾具指授覆苫齊二三節若過波逸提緣起佛在拘睒毗國美音園中闡陀起大房覆有餘草復更重第三猶有餘草彼作念言我不能常從檀越求索草為更重覆不止屋便摧破諸居士見共皆譏嫌時有知足比丘聞之白佛結戒此是遮罪由房舍事貪慢煩惱制斯學處釋義文分二節作大房下明其營造若過下結成所犯律云大舍者多用物律攝云大住處有二種一形量大二施物大此據形大有主為作及餘莊飾者刻鏤綵畫覆者有二種縱覆橫覆按西國所造室宇盡觀板屋平頭壁泥石灰覆以種繫或苫茅苫草及以板木戶牖垣牆圖畫雕鏤種種奇製嚴飾不一今律云及餘莊飾者乃是總句也彼比丘指授二節覆已節謂節度也第三節未竟當去至不見不聞處結罪是中犯者若二節覆已第三節未竟不去至不見不聞處第三節竟波逸提若捨聞處至見處捨見處至聞處一切突吉羅此戒具三緣方成本罪一作房廣求二貪造堅固三過覆看竟兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若水陸道斷賊難惡獸難水大漲或為勢力所持若被繫若命難梵行難指授第二至第三節未竟不去至不見不聞處及最初未制戒等是為不犯會採薩婆多論云凡作房法有三上中下覆房法各自有限若下房以中上房覆法者以鎮重故兼頓成故若用草覆草草波逸提若中房以上房覆法者亦以鎮重故若用草覆草草波逸提若隨上中下覆法者以頓成故房成已一波逸提若不頓壘牆成無罪根本律云若起牆時是濕泥者始從治地築基創起牆壁應二三重布其模墼過者墮罪若是熟磚及以石木或可施主欲得疾成雖過重數並皆無犯按本部與十誦至第三節覆未竟捨去無犯餘部至第四節方成其罪今如本部之制餘部但可通曉此戒大乘同學第二十一自往教尼戒若比丘僧不差教戒比丘尼者波逸提緣起佛在舍衛國給孤獨園大愛道比丘尼請佛聽諸比丘與尼教戒説法敕佛阿難隨次差上座往時次當般陀然尊者所誦唯一偈至往受尼禮請説一偈已即入第四禪六羣尼各相向調戲言我先有此語般陀比丘癡人唯誦一偈若來教我等説已更何所説今者默然果如所言有諸阿羅漢比丘尼聞尊者所説皆大歡喜如是三番説偈三番入第四禪尊者出定觀衆尼心或有喜者或有不喜者即升虗空現諸神變説法而去時六羣比丘自往教戒不説正法但説一切世論乃至笑儛跛行等六羣尼極大歡喜羅漢尼以恭敬心故默然無言大愛道白佛佛制僧中差教授尼白二羯磨於是六羣比丘即出界外更互相差往大愛道重白佛佛制成就十法然後得教授尼一戒律具足二多聞誦二部戒相三決斷無疑四善能説法五族姓出家六顏貌端正七尼衆見便歡喜八堪任與尼衆説法勸令歡喜九不為佛出家而被法服犯重法十滿二十歲若過二十歲即二十夏臘如此等可與尼教戒遂為結戒此是遮罪由尼事貪心希望招世譏嫌待緣煩惱制斯學處乃初篇淫根本種類按根本律云具七法者僧應差教授尼一持戒二多聞三住耆宿位四善都城語五不曾以身污尼六於八他勝法善能分別七於八尊重法善能解釋釋義律云僧者一説戒一羯磨差者僧中所差白二羯磨此法於作持中明教授者八不可違法百臘比丘尼見初受戒比丘當起迎逆問訊禮拜請令坐一不得罵比丘不得誹謗言破戒破見破威儀二不得舉比丘罪作憶念作自言不得遮他覓罪遮説戒自恣比丘尼不得説比丘過失比丘得説比丘尼過失三已學於學式叉摩那從衆僧求受大戒四若犯僧殘應在二部僧中半月行摩那埵五於半月當從僧中求索教授人六不應在無比丘處夏安居七夏安居訖當詣衆僧中求三事自恣見聞疑八如此八事應尊重恭敬讚歎盡形壽不應違此八敬法尼初求度佛即先宣已令半月請僧教誡今大愛道復請者為欲發起羯磨差往因緣故然所教者即此八不可違法也結罪是中犯者若僧不差或非教授日而往與説八不可違法突吉羅若僧差往應尅時到尼亦尅時迎若尅時不到突吉羅尼應出半由旬迎供給所須若不爾者突吉羅若僧不差而往與説法者波逸提此戒具三緣方成本罪一必貪心違制二是教誡比丘尼三兩腳入門兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者如上僧中差往尅時而至若諸難緣留阻不容尅時而至及最初未制戒等是為不犯會採僧祗律云教誡尼不得從日沒至明相未出不得深猥處不得露現處當在不深不露處若講堂若樹下不得十四日十五日月一日二日三日應從四日至十三日往教誡不得教誡不和合尼衆到已應問尼僧和合不若和合應遣使呼來若不得來者應與教誡欲不得偏教誡不得長語教誡五分律云若不差教誡尼語語波逸提教誡式叉摩那沙彌尼突吉羅若僧不差為教授故入尼住處隨入多少步步波逸提若一腳入門突吉羅除比丘尼病善見律云若不説八敬先説餘法突吉羅若説八敬已後説餘法不犯十誦律云比丘應誦尼戒莫令忘失何以故諸女人喜忘智慧散亂我泥洹後當從大僧問戒法此戒大乘同學必若觀機知有大益不犯然在末法尤宜慎重附考薩婆多論問云教誡教授有何差別答曰遮無利益故名教誡與有利益故名教授又教住正念故名教誡教住正知故名教授乃至令修世間善法故名教誡令修出世間善法故名教授以是差別第二十二教尼至暮戒若比丘為僧差教授比丘尼乃至日暮者波逸提緣起佛在舍衛國祗桓精舍時難陀薩婆多論云此非佛弟難陀為衆僧所差教授比丘尼教已默然而住大愛道重請乃至三教難陀好音聲聽者樂聞遂至日暮尼出祗桓入舍衛城城門已閉即依城塹中宿晨旦在前入城諸長者見已謗為與比丘共宿佛知為僧結戒因譏嫌事制斯學處乃初篇淫根本種類釋義律云彼比丘僧所差教授比丘尼應乃至日未暮當還此戒非為比丘往尼寺而制所制者是比丘尼來僧寺暮歸也準前緣起據後開中可知結罪是中犯者若教授至日暮者波逸提除教授若受經若誦經若問若以餘事乃至日暮突吉羅除比丘尼已若為餘婦女誦經若受經若問若以餘事至日暮突吉羅若日暮日暮想波逸提日暮疑日暮不日暮想不日暮疑盡突吉羅此戒具三緣方成本罪一必在僧寺教授比丘尼二尼寺隔城三時至日暮作日暮想兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若船濟處説法尼聽共賈客行夜説法尼聽若至尼寺中説法若説戒日來請教授人值説法便聽及最初未制戒等是為不犯會採律攝云雖在時中若諸尼衆立而不坐或復營務紛擾不息或身有拘礙而為説法者亦名非時若施主本意請法師通夜説法或尼寺近對城門或城門夜不關閉或尼寺在城中或尼衆在白衣舍此皆無犯其教授尼人一被差已盡形壽教授更不須差此戒大乘同學第二十三譏論教尼戒若比丘語諸比丘作如是語比丘為飲食故教授比丘尼者波逸提緣起佛在舍衛國給孤獨園時比丘尼聞教授師來半由旬迎安處房舍辦飲食洗浴處六羣不為僧差生嫉妬心言諸比丘無有真實但為飲食故教授尼有少欲比丘聞知嫌責六羣白佛結戒由懷嫉心制斯學處結罪是中犯者言諸比丘為飲食故教授比丘尼為飲食故教誦經受經若問説而了了波逸提不了了者突吉羅此戒具四緣方成本罪一要有嫉妬心二必教誡比丘尼三妄語為飲食故四説而了了兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者其事實爾為飲食供養故教授尼為飲食故教誦經受經若問若戲笑語獨處語夢中語欲説此乃説彼及最初未制戒等是為不犯會採僧祗律云若言為醫藥者得越毗尼罪五分律云若言為供養故教誡比丘尼及式叉摩那沙彌沙彌尼突吉羅若言比丘行十二頭陀行坐禪誦經作諸功德皆為供養利故語語突吉羅此戒大乘同學第二十四與非親里尼衣戒若比丘與非親里比丘尼衣除貿易波逸提緣起此戒有三制佛在舍衛國給孤獨園城中有一乞食比丘威儀具足時有比丘尼見便生善心數請此比丘比丘不受請異時祗桓衆僧分衣物此比丘持衣分出門見彼比丘尼來欲酬前請意彼不受即以衣與彼尼輒便受之此比丘數數向人説嫌責有少欲慚愧比丘聞知啓白世尊此初結戒也後比丘不敢與親里尼衣佛言聽與第二結戒也時二部僧共分衣僧尼錯取白佛佛言聽貿易此第三結戒也因致譏嫌制斯學處乃初篇淫根本種類須知僧尼衣分錯者為檀越云此是比丘衣此是比丘尼衣然衣本無二式若式有二則不聽貿易披著今訛傳云僧衣邊縫向外尼衣邊縫向內諸部律制並無斯説釋義律云親里者如上衣者有十種如上貿易者共相換易以衣易衣乃至以非衣易衣針貿刀若縷線下至藥草一片結罪是中犯者與非親里尼衣波逸提此戒具三緣方成本罪一必是無過非親里尼二物非貿易及餘因緣三衣財應量兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者與親里共相貿易與塔與佛與僧及最初未制戒等是為不犯會採薩婆多論云若與應量衣波逸提與不應量衣物等突吉羅五分律云若與破戒邪見親里比丘尼衣突吉羅與非親里餘二女衆衣突吉羅若為料理功業事若為善説經法若為多誦經戒與衣皆不犯根本律云若見遭難無衣服者與之或受戒施無犯此戒大乘同學然在末法應須審慎第二十五與非親尼作衣戒若比丘與非親里比丘尼作衣者波逸提緣起此戒有二制佛在舍衛國祗桓精舍時有比丘尼欲作僧伽黎持至寺中迦留陀夷善知作衣法即與裁縫之作男女行欲像尼來即襞衣授與之語言此衣不得妄解披看亦莫示人若白時到謂檀越請僧白時到赴供也著此衣在尼僧後行尼如其教諸居士見拍手高聲大笑大愛道問知其故遂白諸比丘諸比丘轉白世尊此初結戒也時諸比丘畏慎不敢與親里比丘尼作衣佛聽此第二結戒也因致譏嫌制斯學處釋義律云親里如上衣有十種如上律攝云作衣者謂割刺浣染結罪是中犯者與非親里比丘尼作衣隨刀截多少波逸提隨一縫一針波逸提若復披看牽挽尉治以手摩捫若捉角頭挽方正若安帖若緣若索線若續線一切突吉羅此戒具三緣方成本罪一尼非親里二心欲戲弄三自手作衣兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若與親里比丘尼作若為塔若借著浣染治還主及最初未制戒等是為不犯會採五分律云取衣時突吉羅薩婆多論云若尼遣使持衣財來與作衣突吉羅若使人與作突吉羅若與作不應量衣突吉羅若浣隨一一事突吉羅此戒大乘同學第二十六與尼屏坐戒若比丘與比丘尼在屏處坐者波逸提緣起佛在舍衛國祗桓精舍迦留陀夷顏貌端正偷蘭難陀比丘尼亦爾彼此皆有欲意時迦留陀夷清旦至偷蘭難陀所在門外共一處坐諸居士見咸共嫌之有知足慚愧比丘聞已白佛結戒因招譏嫌制斯學處乃初篇淫根本種類釋義律云一處者一是比丘一是比丘尼屏處者見屏處聞屏處見屏覆者若塵若霧若黑暗中不相見聞屏覆者乃至常語不聞聲處是結罪是中犯者若比丘獨在屏處與比丘尼坐者波逸提若盲而不聾聾而不盲突吉羅立住者突吉羅此戒具三緣方成本罪一是屏處二唯一尼三身同坐兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若比丘有伴若有智人智人謂在家知善惡語之男子也若行過卒倒地或病轉倒或為勢所持繫閉若命難梵行難及最初未制戒等是為不犯會採五分律云與餘二女衆屏處坐者亦波逸提薩婆多論云經行已還坐波逸提隨起還坐隨得爾所波逸提律攝云此言坐者據起犯緣設餘威儀亦皆同犯此戒大乘同學第二十七與尼同行戒若比丘與比丘尼期同一道行從一村乃至一村除異時波逸提異時者與估客行若疑畏怖時是謂異時緣起此戒有三制佛在舍衛國給孤獨園六羣比丘與六羣尼在拘薩羅人間遊行諸居士見皆譏嫌此初結戒也時諸比丘不先與尼共期卒道路相遇畏慎不敢共行佛言不共期不犯故加期同一道行此第二結戒也時有僧尼二衆俱欲至毗舍離國以比丘不敢同行諸尼在後為賊所劫因是復開異時故有第三結戒也此是遮罪由譏嫌故制斯學處乃初篇淫根本種類釋義文分二節與比丘尼下明其所犯異時下明其隨開律云期者言共去至某村某城某國道者村間有分齊行處言同一道行顯非異路也異時者謂在難緣有商客同行不犯疑者疑有賊盜劫處畏怖者有賊劫盜十誦律云疑有二種一疑失衣鉢二疑失糧食尼之衣食比丘應取持去至安隱處應還與言姊妹汝等隨意不得共行結罪是中犯者若與尼期同一道行乃至村間分齊處隨衆多少界多少一一波逸提非村若空地行乃至十里波逸提若減一村減十里突吉羅若多村同一界行突吉羅方便欲去共期莊嚴一切突吉羅此戒具三緣方成本罪一有心共期二躬同道行三村里越制兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不共期大伴行若為力勢者所持若命難若梵行難及最初未制戒等是為不犯會採僧祗律云若共隨車伴行止息發去時喚尼來勿使不及伴波逸提若言去去勿使失伴無罪乃至問路檀越家亦爾薩婆多論云不期而偶共同道當使相去語言不聞聲處若相聞已還突吉羅若尼與比丘期比丘不許若比丘與尼期尼不許若相聞語聲突吉羅若與式叉摩那沙彌尼議共道行同尼也此戒大乘同學附考律攝云凡苾芻苾芻尼將行之時預先一日應白和尚阿闍黎我今有事詣彼村坊聽不坊者邑里之名隨師不應違逆若無二師應白上座所有臥具囑他守護苾芻有讐隙者不應共行若有因緣須共行時應懺摩已同去凡涉路時應為法語勿出惡言或為聖默然勿令心散亂若至天神祠廟誦伽陀舊云偈也彈指而進苾芻不應供養天神若路次止息處或泉池取水之處皆誦伽陀其止宿處應誦三啓汲水繩索亦應持行若有機緣與尼同行尼食苾芻應持食時更相授與有病苾芻共舁去若人少者尼亦助舁若至村落為覓醫藥若乞食時令人看物持食來與若尼有病準此應知第二十八與尼同船戒若比丘與比丘尼共期同乘一船上水下水除直渡者波逸提緣起此戒有三制佛在舍衛國祗桓精舍六羣比丘與六羣尼共乘船上水下水諸居士見皆譏嫌此初結戒也於是諸比丘不期而尼來畏慎佛言不期無犯此第二結戒也復有衆比丘及尼欲同渡恆水從此岸至彼岸比丘不允同船先渡尼衆在後天大暴雨江水泛漲船到彼岸未還間日已暮尼衆即在岸邊止宿為賊劫奪因開除直渡不犯故有第三結戒也此是遮罪譏過同前制斯學處乃初篇淫根本種類結罪是中犯者若期同上水下水入船波逸提若一腳在船上一腳在地若方便欲入而不入若共期莊嚴一切突吉羅此戒具三緣方成本罪一有心期行二身已入船三順水上下兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不共期若直渡彼岸若入船船師失濟上水下水或為力勢持縛或命難梵行難及最初未制戒等是為不犯會採薩婆多論云與式叉摩那沙彌尼共期載船同尼犯也尼與比丘議載船突吉羅根本律云若篙棹柁析隨流而去或避灘磧或柁師不用其語此皆無犯此戒大乘同學第二十九尼讚得食戒若比丘知比丘尼讚歎教化因緣得食食除檀越先有意者波逸提緣起此戒有三制佛在舍衛國給孤獨園城中有一居士請舍利弗目犍連食於夜辦具種種美食晨旦露地敷衆多好坐具偷蘭難陀比丘尼先至其家毀謗二尊者是下賤人讚調達等五人是龍中之龍言語之頃二尊者至偷蘭難陀見已語居士言龍中之龍已至居士語比丘尼言向者言下賤人今云何言龍中之龍耶自今已去勿復來往我家二尊者食竟還白世尊世尊呵責調達部黨汝等云何遣尼勸化得食此初結戒也時諸比丘不知有勸化無勸化後乃知或作波逸提懺者或有疑者故開不知無犯此第二結戒也又羅閲城有大長者是梨師達親友待梨師達至供養衆僧後梨師達至城有比丘尼往語長者因即設齋梨師達恐犯戒不受食故更除檀越先有意者此第三結戒也因不敬事制斯學處乃初篇淫根本種類釋義文分二節知比丘尼下明其所犯除檀越先有意者明其隨開律云教化者阿練若乞食人著糞掃衣作餘食法不食一坐食一摶食塜間露地坐樹下坐常坐隨坐持三衣此十二頭陀行讚偈多聞法師持律坐禪也以如是過分讚美其德令檀越生信敬心希冀其惠施也食者從旦至中得食結罪是中犯者彼比丘知比丘尼教化得食食咽咽波逸提除此飯食已教化得餘襯體衣燈油塗足油一切突吉羅知教化教化想波逸提教化疑不教化教化想不教化疑盡突吉羅此戒具四緣方成本罪一知尼讚歎二讚歎想三自有貪心四食已入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若不知若檀越先意若教化無教化想若比丘尼自作若檀越令比丘尼經營若不故教化而乞食與及最初未制戒等是為不犯會採五分律云以餘四衆讚歎因緣得食食突吉羅餘四衆除比丘尼是薩婆多論云若不曲讚功德但説布施沙門福德甚大食者無罪僧祗律云若有如是讚歎食當展轉貿易不得捨食而去若比座垢穢不淨不喜與貿者當作是念此鉢中食是某甲比丘許我當食此謂自具慚愧不退信心故開此戒大乘同制是邪命自活第三十婦女同行戒若比丘與婦女共期同一道行乃至村間波逸提緣起此戒有二制佛在舍衛國祗桓精舍有毗舍離女嫁與舍衛國人後與姑共諍還詣本國時阿那律從舍衛至毗舍離彼婦女欲隨行尊者許之夫主追至謗打尊者幾死尊者下道在一靜處結跏趺坐入火光三昧夫主待其出定禮拜懺悔尊者為説法而去還告衆僧衆僧白佛此初結戒也時諸比丘不共期道路相遇有畏慎不敢共行佛知開聽故有期同一道行之語此第二結戒也由道行事譏謗煩惱制新學處乃初篇淫根本種類結罪是中犯相輕重及不犯等與尼同行戒無別此唯以白衣婦女為異故不重釋此戒具三緣方成本罪一有心期約二自身同行三限滿村里兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯會採根本律云若他遺女人引道或迷於道路女人為指授無犯此戒大乘同學音義一座食謂比丘受頭陀法者不數數食及小食等唯受一坐食法於一坐中食令滿足更無坐食設未滿足有因緣起者亦無更坐食故名一坐食十七羣比丘時羅閲城中有十七羣童子共為親友最大者年十七最小者年十二最富者八十百千最貧者八十千有一童子名優婆離此翻上首最為大者時諸童子要共出家即往僧伽藍中求為見度諸比丘即度令出家與授具足多習嬉戲少學禪誦唯優婆離童子先斷煩惱證阿羅漢果此非持律優婆離尊者啄音捉鳥食物也帔音轡裙屬又衣帔也寱音義睡語也懲音呈止也戒也堰音燕壅水也墼音吉土墼未燒磚坯也般陀或云槃陀伽或云周羅般陀具云周利槃陀伽此云小路邊生又翻繼道以其兄生路邊弟生繼於道邊故名繼從其兄後來出家不久即得阿羅漢其弟後厭俗是兄出家兄教一偈四月不得忘前失後兄自念言此人於佛法無緣當遣還家即牽袈裟驅令出門門外啼哭不欲還家佛以天眼觀見般陀應可度緣往至其所問知安慰其心即以少許白氎與般陀捉此向日而曝當作如是念取垢取垢世尊教已入聚受請時臨日中觀般陀將得道果即説偈言入寂者歡喜見法得安樂世無瞋最樂不害於衆生世間無欲樂出離於愛樂若調伏我慢是為第一樂般陀遙聞此偈即得阿羅漢果此據善見律略録彼教授尼即此一偈薩婆多論云尊者小路於昔迦葉波佛法中具足持彼佛三藏由法慳垢覆蔽其心曾不為他授文解義及理廢忘由彼業故今得如是極暗鈍果大愛道比丘尼增一阿含經云我聲聞中第一比丘尼久出家學國王所敬所謂大愛道瞿曇彌是瞿曇是其姓也難陀文句云亦名放牛難陀此翻善歡喜亦翻欣喜文句記云從初慕道為名歡喜中勝故云善也本是放牛之人因問佛放牛十一事知佛具一切智出家獲阿羅漢果根本律云難鐸迦尊者佛遣彼為尼衆説法教誡時五百苾芻尼聞法得阿羅漢果薩婆多論云往昔惟衛佛出現於世為衆生説法彼佛滅後有王起牛頭旃檀塔種種莊嚴此王有五百夫人供養此塔各發願言願我等將來從此王邊而得解脫爾時王者今難陀是爾時五百夫人者今五百比丘尼是以是本願因緣故應從難陀而得解脫襞音碧襞摺壘衣也尉治尉音畏謂以火申繒從上而按下也俗謂之火斗是也本作尉今俗作尉非舁音于亦音預對舉也磧音迹水渚有石者黎師達此云仙授亦云仙與又云仙施三義皆一謂從仙人求得之子也火光三昧即第四禪定
