body:
  text: 金陵寶華山弘律沙門讀體集第七知足受衣戒若比丘失衣奪衣燒衣漂衣若非親里居士居士婦自恣請多與衣是比丘當知足受衣若過者尼薩耆波逸提緣起佛在舍衛國時有眾多比丘遇賊失衣來到祗桓精舍有優婆塞聞知多持好衣隨諸比丘意取比丘報言止止便為供養已我等自有三衣不須也六羣比丘語云諸大德三衣足者何不取與我等若與餘人耶諸比丘遂取與之時諸少欲比丘白佛結戒此是遮罪由從索衣因生煩惱令他不樂長自貪求因譏嫌事制斯學處釋義文分三節失衣等下明其難緣若非親里居士下明其隨開若過者下結成所犯律云非親里及衣有十種如上若失一衣不應取若失二衣餘一衣或二重三重四重應擿作一一衣若三衣都失彼比丘應知足受知足有二種一者在家人知足隨白衣所與衣受之根本律云俗人上衣長十一肘濶三肘下衣長七肘濶二肘不得過數乞此約在家人所用衣財隨其長短持施比丘不應更多求索古用周尺一尺八寸為一肘二者出家人知足三衣也根本律云苾芻上衣若是新衣兩重作僧伽胝豎三肘橫五肘即僧伽黎也若泥婆珊又名厥蘚洛迦豎二肘橫五肘即下裙也餘二衣量如上所明此約出家人造衣財量不得更多求索若居士自恣請多與衣謂檀越多持衣施請諸比丘隨意而取非是夏滿自恣也若衣細若薄若不牢應取作若二重三重四重當安緣當肩上貼障垢膩處應安鉤紐若有餘殘語居士言此餘殘衣裁作何等若檀越言我不以失衣故與我自與大德耳謂不以失衣來化而與此是我自發心供養所餘衣財何須語我但在大德隨便別用結罪是中犯者若比丘過知足受衣捨墮此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一是自恣請二見境起貪三不知足受兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若知足取若減知足取若居士多與衣若細薄不牢若二三四重作衣安緣貼障垢膩處安鉤紐若有餘殘語居士言此作何等及最初未制戒等是為不犯會採根本律云若苾芻從他乞俗人上下衣時依量而得若更乞時得惡作罪得便捨墮若乞苾芻上下衣時事亦同此律攝云若乞俗人上下衣縱少不足不應更乞若更乞者得罪謂乞時惡作罪得衣捨墮罪若有盈長不須還主若乞苾芻上下衣不足者應須更乞若長應還若不還者得捨墮罪有云苾芻上衣者謂三衣也下者謂裙也善見律云若比丘尼失五衣得受二衣若失四衣得受一衣若失三衣不得受若親友若檀越自恣請若自己物隨意受此戒大乘為眾生故一切所施隨請應受然避譏生信不可無也引證律攝云若三衣肩上垢膩污者於著肩處應以物替代也長一肘半廣一張手一張手即佛一磔手也此則長有二尺七寸廣一尺六寸四邊縫著污即拆洗三千威儀令帖四角今時作三衣者皆取一小方片帖於肩上障垢膩處之外謂云須彌山復於兩畔更加兩小片謂云日月四角貼者謂云四天王如斯之謬出何律典第八貪好乞求戒若比丘居士居士婦為比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請到居士家如是說善哉居士為我買如是如是衣與我為好故若得衣者尼薩耆波逸提緣起此戒有二制佛在舍衛國有一比丘入城乞食聞居士夫婦共議辦價買衣與䟦難陀還以報之䟦難陀問知其家明日即往語云若欲與我衣者當如是廣大作新好堅緻中我受持居士譏嫌諸比丘聞知白佛此初結戒也是後居士自恣請比丘問言大德須何等衣時比丘意疑不敢答復有居士欲為比丘作貴價衣是比丘少欲知足不須大價衣欲須不如者亦意疑不敢隨意索佛言若居士恣比丘所索應答自今聽諸比丘少欲知足索不如者故加先不受自恣之語是第二結戒也由強索好衣因相觸惱制斯學處乃初篇妄根本種類釋義文分三節居士下明私議辦衣是比丘下明自往為好若得衣下結成所犯律云居士居士婦如上此是夫婦篤信同心共議以植福也衣價者若金銀七寶等衣價而言辦者辦謂備辦預為貯畜之衣有十種如上求者有二種一求價檀越與作大價衣乃至增一錢十六分之一分西域一錢此方準十六小錢今云一分者即一小錢也二求衣語居士言作如是廣長衣乃至增一線善哉居士者此是讚勸之詞欲令彼所施者愈更加其精妙如是如是衣者謂廣大新好堅緻之衣也堅謂堅固緻謂緻密厚實為好故者此顯今求無厭正是作業之因心結罪是中犯者若比丘先不受自恣請而往求貴價廣大衣若得者捨墮不得突吉羅此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一有貪好心二自往求索三所求已得兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者先受自恣請而往求索若知足減少求若從親里求從出家人求或為他求或他為己求或不求自得及最初未制戒等是為不犯會採僧祗律云為好者好有三種一知足好若與細衣時便言我須麤者是名知足好得者捨墮二不知足好若與麤衣時便云若與我麤衣者不中觸我是貴人應與我好衣是名不知足好得者捨墮三麤知足好若與細衣時便言我不用是好衣我是阿練若如鹿在林中住空地若與麤者足障寒熱風雨是名麤知足好若得捨墮本律知足須不如者聽其隨索僧祇與細索麤亦犯然聽者在檀越先自恣請時索其衣尚未造其犯者在檀越衣已成時更索麤故恐施主俛仰情不得已雖復與之施心不喜兩律開遮一令息貪制內而殄惡一令息譏護外而增信不無深意也五分律云從親里索好者惡作罪薩婆多論云若遣使書信印信突吉羅若親里豐財多貨從索無過若貧者突吉羅若先請檀越豐有財物勸令好作無過若貧乏者突吉羅律攝云未近圓時已興方便近圓之後方始獲財若過價色量求時惡作入手捨墮若從天等乞或乞縷𦆠及小帛片等無犯此戒大乘同制即是惡求多求不慈愍眾生第九貪好共索戒若比丘二居士居士婦與比丘辦衣價持如是衣價買如是衣與某甲比丘是比丘先不受居士自恣請到二居士家作如是言善哉辦如是如是衣價與我共作一衣為好故若得衣者尼薩耆波逸提釋義此戒緣起亦由前人其中所犯輕重及捨懺還衣與夫不犯等悉皆同前但於二居士家勸令合作一衣使得精好為異第十索衣過六反戒若比丘若王若大臣若婆羅門若居士若居士婦遣使為比丘送衣價持如是衣價與某甲比丘彼使人至比丘所語比丘言大德今為汝故送是衣價受取是比丘應語彼使如是言我不應受此衣價我若須衣合時清淨當受彼使語比丘言大德有執事人不須衣比丘應語言有若僧伽藍民若優婆塞此是比丘執事人常為諸比丘執事時彼使往至執事人所與衣價已還比丘所如是言大德所示某甲執事人我已與衣價大德知時往彼當得衣須衣比丘當往執事人所若二反三反為作憶念應語言我須衣若二反三反為作憶念若得衣者善若不得衣四反五反六反在前默然立若四反五反六反在前默然住得衣者善若不得衣過是求得衣者尼薩耆波逸提若不得衣從所得衣價處若自往若遣使往語言汝先遣使持衣價與某甲比丘是比丘竟不得衣汝還取莫使失此是時緣起佛在舍衛國給孤獨園城中有一大臣與䟦難陀親友遣使送衣價與之䟦難陀即將使入城持衣價與親舊長者掌之異時大臣問使人云我前遣持衣價與䟦難陀作衣為我著不報言不著大臣便使索還衣價䟦難陀聞已即疾疾至彼長者家索衣時城中諸長者集會先有制不至者罰錢五百我今暫往赴之大德小待勿令我輸錢䟦難陀言不得爾先持衣價與我作衣長者為作衣竟會坐已罷輸錢五百時彼長者及諸居士盡共譏嫌佛知為僧結戒此是遮罪由取不淨財不護他意致生惱亂制斯學處釋義文分六節若王若大臣乃至今為汝送衣價受取等明檀越遣使以送信施是比丘應語彼使如是言乃至常為諸比丘執事等明比丘持戒不受錢寶彼使至執事人所乃至往彼當得衣等明付囑還報知時須衣須衣比丘當往執事人所乃至四反五反六反在前默然住得衣者善等明依制索衣護他淨信若不得衣過是求等明違制過索犯本戒體若不得衣從所得衣價處乃至此是時等明不失信施告主知取律云王大臣如上婆羅門者有生婆羅門生者謂是梵天苗裔乃五天竺國之貴姓餘國所無是故五印土皆號曰天方也居士者除國王大臣在家貴人是遣使為比丘送衣價者謂遣男女及黃門等為使衣價謂持金銀七寶貝齒等以為衣直持如是衣價與某甲比丘者乃檀越示其使者自樂敬供之人與即施也我不應受此衣價者律攝云苾芻法不受畜金銀寶等及穀粟米豆村園奴婢牛羊車乘此金銀寶等僧伽應受若田地園圃亦合眾畜應與寺家淨人及餘俗人計分徵課以供僧伽我若須衣合時清淨當受者合時謂合比丘須用衣時或佛開許比丘聽畜之時清淨謂不違世尊禁制及無諸障難若堪可受時我當納取以成衣守持也若僧伽藍民若優婆塞此是比丘執事人常為比丘執事者謂伽藍民即寺家淨人緣從波斯匿王所施不應王差常為僧伽執作眾務紿事比丘者優婆塞此云近事男謂皈依三寶受持五禁堪能親近承事眾僧願為比丘執事人者彼使往至執事人所者謂彼使往至如比丘所示人處以衣價付之囑令合時當買清淨衣與彼比丘著持也大德知時往彼當得衣者謂彼使付衣價已還比丘所報言大德自知須用衣時往彼某甲執事人所當得如法淨衣也須衣比丘當往執事人所者謂此比丘欲須衣時當徐徐至彼所付衣價人所若二反三反為作憶念應語言我須衣者謂二三往返出言令彼執事人自憶念憶念者約於某月日方為作衣也彼執事人若在家若在市買賣之所曰市若在作處謂作眾務等處語言我今須衣與我作衣是為作憶念釋文之巧略其初反但云二三若二反三反為作憶念若得衣者善者謂稱自求心令他悅辦不假餘索也若不得衣四反五反六反在前默然立者彼執事人若在家若在市若在作處至彼前默然而住若彼執事人問言汝何在此立比丘報言汝自知之若執事人言我不知若有餘人知者當語言彼人知之所言餘人知者凡比丘若以物委寄他人或同行者借衣著用時必語一人知之於後索取有證免致鬬諍是佛慈訓若比丘作一語破二反默然作二語破四反默然作三語破六反默然三反憶念之後復聽六反默然索衣若作一反語索則准二反默然乃至三反語索則准六反默然更不得再默索衣言破者謂壞世尊六默之正制也結罪是中犯者若比丘過三反語索過六反默然立得衣者捨墮此戒捨懺還衣等法於作持中明若捨衣竟不還等得罪如上此戒具四緣方成本罪一心存貪取二不護他心三違制過索四衣已入手兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者三反語索得衣六反默然立得衣若不得衣從所得衣價處若自往若遣使往語言汝先遣使與某甲比丘衣是比丘竟不得可還取莫使失若言我不須即相布施是比丘應以時輭語方便索衣若為作波利迦羅故與謂彼人故意作碎雜衲衣而與之方便索得者及最初未制戒等是為不犯會採僧祗律云三反往索六反默住時或緩期或急期云何緩急若比丘至檀越所索衣時語言長壽與我衣直西域凡諸比丘稱呼檀越皆云長壽答言尊者更一月來比丘滿一月往索若檀越復言更一月來比丘仍滿一月復往索若復言更一月來比丘又滿一月復往索過三月已不得復索若言半月來過三半月不得復索若言十日若言五日四日三日二日一日乃至須臾此謂急期也若過三半月乃至三須臾不得復索六反往默時檀越言我知尊者往意更一月來滿一月復往默然住如是滿六月往默然已不得復往若言半月若言十日乃至須臾若滿六半月乃至六須臾已不得復往默然齊幾名默然住時如人入庫取物著店上頃又如裹襆物頃即應去若比丘方便現行相持衣鉢鍚杖水瓶過寄物人前若彼人問言尊者欲那去答言欲去先送物主邊語令自知此物莫使失受寄者言久已辦物不須復往即時與物比丘取者捨墮若不作方便道由彼前彼人如上問比丘如上答與物取者無罪若受寄者言任意去設能破我如破多羅樹亦不與汝一錢此樹斷即死顯死也不與比丘爾時應到物主邊語令自知此物莫使失若是物主言我先施比丘隨方便更索比丘爾時得如前三反語索六反默然住十誦律云若六反默立不得衣是比丘語衣主已有餘因緣到執事人處若問何故來答言我有餘事故來若言持是衣去答言我已語衣主汝自往共分了若言但持衣去我自解語衣主爾時受衣持去無犯善見律云若不口語索得十二默然求若一語索破二默然二語索破四默然乃至六語索破十二默然若使者付執事人衣直已不報比丘比丘不得就執事人求索衣若得衣突吉羅根本律云若苾芻遣使報已彼執事人來作是語聖者可受此衣價苾芻應報言此衣價我已捨訖汝當還彼送衣來處如是報者善若取衣者捨墮若執事人言聖者可受此衣價彼之施主我共平章令其心喜若如是者取衣無犯此戒大乘同學以護譏嫌增他淨信第十一乞綿作具戒若比丘雜野蠶綿作新臥具尼薩耆波逸提緣起佛在曠野國時六羣比丘作新野蠶綿臥具彼索未成綿或索已成綿或索已染或索未染或新或故者至養蠶家語言我等須綿報言小待須蠶熟時來六羣比丘在邊住待看彼曝繭時蠶蛹作聲居士譏嫌諸比丘聞知白佛結戒此是性罪由殺諸生命增長貪求廢自善品損他正信制斯學處乃初篇殺根本種類釋義律云雜者若劫貝若拘遮羅乳葉草若芻摩若麻野蠶綿者僧祇律云憍奢耶有二種一者生細絲也二者作紡絲也作新臥具者根本律云新有二種一謂新造二謂新得此中取新造臥具者氈褥也此有二種一者貯褥二者衧成皆不聽用薩婆多論云以綿作衣此有二種一擘綿布貯如作氈法二以綿作縷織以成衣作此二衣名作敷具敷具者非獨臥具乃衣之都名也結罪是中犯者若比丘自用雜野蠶綿作新臥具成者捨墮作而不成者突吉羅若語他人作成者捨墮作而不成突吉羅若為他作成不成盡突吉羅此應捨是中捨者若以斤斧細斬和泥若塗壁若塗埵此戒具三緣方成本罪一情存貪愛二心無慈愍三臥具已成兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若得已成若以斧剉斬和泥塗壁埵及最初未制戒等是為不犯會採僧祗律云若作三衣若經若緯若中若邊若間紃若緣若褋若補作成捨墮受用越毗尼罪應僧中捨僧不應還亦不得餘用正得敷地及作遮向簾帳幔五分律云應捨與僧不得捨與餘人僧以敷地或敷牀座除捨褥比丘餘一切僧隨次坐臥雖不使人作他施而受亦捨墮此戒本律制嚴而無僧中捨法名曰自壞捨自壞捨者以斧斬壞臥具之時貪愛業心隨斧下斷令永不復興故名自壞捨僧祗雖許捨入僧中聽眾畜用然用中之別未顯五分唯除捨褥人餘隨坐臥則剪除貪愛惜護檀施事義了然故今捨法宜准五分南山云犯過衣財如律所斷或永棄捨或永入僧葢斯之謂於作持中明此戒大乘為利攝眾生故聽得畜但不得自用當護慈體廣運悲心引證緇門警訓引央掘經云繒綿皮物若展轉來離殺者手施持戒人不應受者是比丘法若受者非悲不破戒涅槃經云皮革履屣憍奢耶衣如是衣服悉皆不畜是正經律楞嚴經云若諸比丘不服東方𮈔綿絹帛及此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣附考資持記云已前律制但據蠶家大教轉來不許受用乃知聲聞行劣但取離非菩薩慈深遠推來處離殺者手無非殺來足踏坐具也身披三衣也皆霑業分非大士可忍豈比丘所宜請考經文少懷信仰廣敘利害見章服儀離殺手者非蠶家故不受者應法大小俱順故受者非悲違大順小故小從大出望制雖順約義還違故知持戒行慈方符聖旨縱情受用全乖道儀故章服儀云且自非悲之語終為永斷之言據此為論頗彰深切次引涅槃乃終窮囑累決了正教明文制斷何得遲疑據僧傳中所敘南嶽道休二師不衣綿帛並服艾絮故南山律師云佛法東漸幾六百載唯斯衡嶽慈行可歸第十二黑毛作具戒若比丘以新純黑羺羊毛作新臥具者尼薩耆波逸提緣起佛在毗舍離城獼猴江側樓閣講堂諸離車子多行邪婬以純黑羊毛作氈被體夜行使人不見時六羣比丘效而作之諸離車語言我等為婬欲故作汝等作此何為耶諸比丘聞已白佛佛故為僧結戒由愛上色復求細軟廢業長貪遮無利益故制斯學處釋義律云純黑者或生黑或染黑羺羊毛者羺耨平聲羺䍲乃胡羊之名其毛最軟極細如此方羔羊之絨毛也䍲音倪薩婆多論云此國黑羊毛貴故不聽黑羊毛作衣法亦有二種一以黑羊毛擇治布貯作細氊二作縷織成作衣此二種衣盡名敷具此羊毛得作三衣盡中受持結罪是中犯者若比丘自以純黑羺羊毛作新臥具成者捨墮作而不成者突吉羅若教他人作成者捨墮作而不成突吉羅若為他作成不成皆突吉羅此戒捨懺還臥具等法作持中明於僧中捨臥具竟若不還若教莫還若作淨施若遣與人若數數敷壞者盡突吉羅此戒具三緣方成本罪一有貪慢心二是純黑羺毛三作具已成兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若得已成者若割截壞若細薄揲作兩重若以作褥若作枕若作方小坐具若作臥氈或作襯鉢內氈或作剃刀囊或作帽或作襪及最初未制戒等是為不犯會採根本律云苾芻撩理羊毛時若於一片若於小團若大聚或披或擘或以弓彈而作敷具作時惡作罪竟時得捨墮薩婆多論云若以駝毛羖羊毛牛毛若芻麻衣劫貝衣褐衣欽婆羅衣合作者皆突吉羅作衣下至四肘捨墮十誦律云若為塔作為僧作不犯此戒大乘同學義如野蠶臥具第十三減分作具戒若比丘作新臥具應用二分純黑羊毛三分白四分牻若比丘不用二分黑三分白四分牻作新臥具者尼薩耆波逸提緣起佛在舍衛國祗園精舍時六羣比丘以純白羊毛作新臥具諸居士皆譏嫌謂沙門釋子似王若大臣西域國風唯王及大臣長者著上好貴價細白疊衣以表尊貴餘無敢著諸比丘聞知白佛結戒亦同前由愛上色等制斯學處釋義文分二節作新臥具下明其正制若比丘不用下結成違犯律云白者或生白或染令白牻色者頭上毛耳毛脚毛若餘牻色毛牻音茫雜毛也律攝云頭足腹毛由頭足腹是行動處毛麤惡故若作四十鉢羅臥具者二十鉢羅純黑十鉢羅白十鉢羅牻十誦律云一鉢羅四兩立世毗曇論云一波羅一兩或稱之大小故譯不同今准十誦則四十鉢羅重十斤應用五斤黑二斤半白二斤半牻若作三十鉢羅二十鉢羅臥具者准此斤兩以黑色兩分白牻各一分此據黑者難得白者次難牻者易求故又黑白是細軟貴物長自恣情牻者體麤原非貴價不增己欲也結罪是中犯者若不以二分黑三分白四分牻自作新臥具成者捨墮作不成突吉羅若使他人作成捨墮作不成突吉羅若為他人作成不成皆突吉羅此戒捨懺還臥具等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一有愛好心二分兩違教三作具已成兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若依制作若白不足以牻足之若作純牻者若得已成者若割截若作壞色若作枕氈褥及最初未制戒等是為不犯會採僧祗律云多用黑毛而作等想等用作減想而更益若自作若使人作成者捨墮受用越毗尼罪多用白毛而作等想等用作減想而更益得罪亦爾少用下毛即牻毛也而作等想得罪亦爾十誦律云用黑者乃至多一兩捨墮用白者乃至多一兩突吉羅用牻者乃至減一兩捨墮律攝云或黑者易得餘色難求斤數減增並成無犯此約地土所產觀境隨開此戒大乘同學外息世譏內護僧制故第十四減年作具戒若比丘作新臥具持至六年若減六年不捨故更作新者除僧羯磨尼薩耆波逸提緣起此戒有二制佛在舍衛國時六羣比丘嫌臥具或重或輕或薄或厚不捨故更作新者彼如是常營求臥具藏積眾多知足比丘白佛此初結戒也後時一比丘得乾痟病為小因緣欲遊人間彼思世尊結戒臥具持至六年若減六年不捨故更作新即犯戒我有糞掃臥具重不堪持行當云何諸比丘白佛佛聽僧與彼白二羯磨作新臥具故如除僧羯磨之語此第二結戒也為遮不樂用故愛新好者制斯學處釋義文分三節作新臥具持至六年此明創制若減六年不捨故更作新者結成所犯除僧羯磨此明隨開減六年者僧祗律云不滿六夏也根本律云雖情不樂應持滿六年結罪是中犯者若比丘減六年不捨故更作新臥具成者捨墮作而不成突吉羅若使他人作成者捨墮作而不成突吉羅若為他人作成不成皆突吉羅此戒捨懺還臥具及與羯磨作具等法於作持中明若捨臥具竟不還等得罪如上此戒具足四緣方成本罪一有貪畜心二持不滿年三非羯磨聽許四作已成兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者僧聽及滿六年減六年捨故作新者若復無更自作謂無故者或失或壞等緣若他作與若得已成者及最初未制戒等是為不犯會採僧祗律云故氈現前若捨更作犯氈即臥具故氈現前不捨作亦犯故氈不現前若捨作亦犯故氈不現前不捨作新成皆捨墮受用越毗尼罪根本律云若苾芻於此年中作新敷具即於此歲更復造餘造第二時得惡作罪成犯捨墮初造者無犯雖非同年於第二歲更作餘褥如是三四乃至五年更造新者得罪同前若於此年中造新敷具未了更復造餘若俱了時云我持前捨棄於後或可持後捨棄於前後犯捨墮先造無犯若初作未了於第二年乃至三四五年若俱了時捨持前後得罪亦如是善見律云除僧羯磨者若病未差得隨意作若病差已更發不須更羯磨得用先羯磨僧祗律云是老病比丘僧羯磨已應當自疏記失受持故氈年月日數病差已還受持此故氈從前滿六年若是比丘病差不還補六年捨墮此戒大乘同學愛惜信施降伏貪愛故附考根本律云佛在曠野林住處即曠野國是時嚴風勁急苾芻患寒知事諸人所有敷具皆六年持由制戒故不敢造新由忍寒故所有營作悉皆停息佛知已告阿難言凡諸知事營作苾芻畜其敷具雖未滿六年不免寒者彼苾芻應從僧伽乞六年內更作敷具聽僧伽與彼白二羯磨若其僧伽體知彼人是可信者即與其法或令持舊敷具來至僧中若太長者即應截却若太短者以毛添之太寬太狹准事撩理若有破處應將毛補若皆破碎不堪修補者僧應與法作白羯磨第十五不貼作具戒若比丘作新坐具當取故者縱廣一磔手貼著新者上壞色故若作新坐具不取故者縱廣一磔手貼著新者上用壞色故尼薩耆波逸提緣起佛在舍衛國給狐獨園時世尊遣人請食諸佛常法諸比丘受請後徧行諸房見故坐具處處狼籍無人取攝乃令諸比丘作新坐具取故者縱廣一磔手貼著新者上以壞色故六羣比丘不依佛教世尊種種呵責已與僧結戒為欲遮其輕賤心故制斯學處根本律云世尊有因緣不赴請處遣人請食一為宴默而居二為諸天說法三為觀察病者四為看諸臥具五為苾芻制戒僧祗律云世尊以五事利益故五日一按行僧房一者聲聞弟子不著有為事不二者不著世俗言論不三者不著睡眠妨行道不四者觀病比丘不五者為年少出家比丘見如來威儀庠序起歡喜心釋義文分二節若作新坐具當取故者下明其正制若作新坐具不取故者下結成所犯律云作新坐具時若故坐具未壞未有穿孔當取浣染治牽挽令舒裁割取縱廣一磔手帖新者上若貼邊若中央壞色故根本律云為壞色者欲令受用時得其堅牢故坐具者謂坐時或臥時敷以坐臥亦云隨坐衣為護身護衣護臥具故聽畜之梵語謂之尼師壇亦云尼師但那也結罪是中犯者不取故者帖新者上用壞色故而更作新坐具成者捨墮作而不成突吉羅若令他作成捨墮作不成突吉羅若為他作成不成皆突吉羅此戒捨懺還坐具等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一恣縱貪愛二違制不貼三作新已成兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者裁取故者帖新者上壞色故若彼自無得更作新者若他為作若得已成者若純故者作及最初未制戒等是為不犯會採根本律云若以故者徧覆新者若總破碎不堪補貼新者無犯時諸苾芻不將坐具向餘處宿謂犯離衣佛言我制苾芻不應輙離三衣而宿非謂坐具然諸苾芻不應故心而不持去忘念者無犯苾芻不應無坐具輙出外行違者越毗尼罪十誦律云不應受單尼師壇單作則不堪久用以減施福故不應離尼師壇宿勒伽論云若離宿不須捨但作突吉羅悔過律攝云尼師但那應兩重作疊為三分應截斷作葉與三衣葉同此戒大乘同學引證善見律云故者下至一經坐是名故也四邊隨取一邊或方或圓取帖新者上若不能帖細擗雜新者上亦得戒因緣經云取故者緣四邊以亂其色薩婆多論云取故敷具最長者廣中取一磔手長裂隨廣狹分作緣周帀緣之五分律云取故者貼新坐具四角附考詳稽諸部作尼師壇令以故者緣於四邊帖於四角葢為壞色去好故堅牢久用故為護身衣臥具故為止貪重惜信施故今時作具皆取雜色新財緣帖四邊四角者愈增貪好之心過費信施之物況復妄謂四角而為四天王耶南海寄歸內法傳云禮拜敷具五天所不見行然律制所須者但擬眠臥之時護他氈席若用他物新故並須安替代也如是己物故則不須勿令污染虧損信施非為禮拜南海諸僧人持一布長三五尺疊若食巾禮拜用替膝頭行時塔在肩上西國苾芻來見咸皆莞爾而笑也文准寄歸所論疑是五竺邊僧昔時先入華夏訛規遺效久習成風倘入叢林不免隨眾要知展具禮拜非律正制若作敬重法衣想庶宥違教之愆原夫禮拜意在自卑以表至敬理無敷具盛體而自重也然更有無慚之輩揀好紬綾配色衒美而令侍者展敷撩衣以禮大聖若此乃慢上惑愚其罪何以逃之第十六遠持羊毛戒若比丘道路行得羊毛若無人持得自持乃至三由旬若無人持自持過三由旬尼薩耆婆逸提緣起佛在舍衛國給孤獨園時䟦難陀道路行多得羊毛貫杖頭上擔行諸居士見皆共嫌貴言沙門釋子云何販賣羊毛諸比丘聞已白佛結戒因譏嫌故制斯學處釋義文分二節在道路行得羊毛下明其正制若無人持自持過三由旬下結成所犯律云若在道路行若在住處得羊毛須者應取或他施得或糞掃得若無人持謂無淨人及餘白衣得自持乃至三由旬大約百里之途若有人持應語被人言我有此物當助我持乃至彼比丘於中間不得助持謂既有淨人為持比丘自不得於中路復助彼持而輕僧體結罪是中犯者若比丘自持過三由旬捨墮令餘人持若於中間助持突吉羅若令比丘尼持過三由旬突吉羅若令式叉摩那沙彌沙彌尼持過三由旬突吉羅除羊毛若持一切草葉麻等過三由旬突吉羅若復擔餘物著杖頭行者突吉羅此戒捨懺還羊毛等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一是羊毛二自持過制三心有貪著兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若持至三由旬若減三由旬若有人與持中間更不助擔若使比丘尼及下三眾擔三由旬若擔毳裝獸毛褥細者毳繩若擔頭項脚毛若作帽若作裹革屣及最初未制戒等是為不犯會採僧祗律云若比丘持羊毛著道行至一由延有所忘還取取已還至本處即滿三由延不得復過過者捨墮若一由延半忘物得還還已不得復去去者捨墮若直行齊三由延過一脚越毗尼罪過兩脚捨墮若二人各有擔齊三由延已轉易各復得三由延三人九由延四人十二由延若如是眾多人隨人為限唯不得更重擔五分律云得使淨人擔若無人乃聽自持不得擔擔頭戴背負犯者突吉羅此戒大乘同學第十七使尼染羊毛戒若比丘使非親里比丘尼浣染擘羊毛者尼薩耆波波提緣起此戒有二制佛在釋翅𢯱迦維羅衛尼拘律園時六羣比丘作新臥具使大愛道比丘尼浣染擘羊毛染色污手往禮世尊世尊見已問知其故訶責六羣此初為僧結戒也是後諸比丘各自有疑不敢使親里尼浣染擘羊毛佛更開之故有第二結戒也由自貪愛廢他正修制斯學處乃初篇婬根本種類釋義律云非親里如上浣者下至一入水染者乃至一入染汁擘者下至以手擘一片擘音伯撝也分擘也謂分析揀理結罪是中犯者若使非親里尼浣染擘羊毛各一捨墮若彼浣染而不擘二捨墮一突吉羅若浣不染而擘二捨墮一突吉羅若不浣而染擘二捨墮一突吉羅若彼不浣染擘三突吉羅使非親里沙彌尼式叉摩那浣染擘突吉羅此戒捨懺還羊毛等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一是羊毛二是非親里尼三如語作竟兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者使親里比丘尼浣染擘若為病人浣染擘若為眾僧為佛為塔浣染擘及最初未制戒等是為不犯會採根本律云若於尼作非親想或復生疑令作三事撩理羊毛並得惡作此戒大乘同學附考薩婆多論云與諸比丘結戒者為增上法故若諸尼眾執作浣染廢息正業則無威德破增上法又為止惡法次第因緣又為二部眾各有淨法第十八受金銀戒若比丘自手捉錢若金銀若教人捉若置地受者尼薩耆波逸提緣起佛在羅閱城靈鷲山中時城中有一大臣與䟦難陀親舊知識彼於異時大得猪肉即敕其婦留分與之時城中節會日作眾伎樂竟夜不眠時大臣兒亦在其中竟夜不眠饑乏問母有殘肉不母言肉盡唯有䟦難陀分在兒即取五錢與母言持此錢更市肉與之此肉與我晨朝䟦難陀著持衣鉢詣大臣家就座而坐時大臣婦語其故䟦難陀言若為我故可與我錢不須肉彼即置錢於地與時䟦難陀持錢寄市肆而去王臣居士皆共譏嫌言沙門釋子不捨金銀錢寶時有珠髻大臣而具威勢善能解釋令諸人眾殄息譏嫌歡喜信解即往禮佛以此因緣啟白佛告大臣如汝所說於正法中多有所益無有違失何以故沙門釋子捨離珍寶不著飾好若應捉金銀錢寶則應受五欲若受五欲非沙門釋子法若見沙門釋子以我為師而捉金銀錢寶則決定知非沙門釋子當知日月有四患不明不淨不能有所照亦無威神云何為四阿修羅烟雲塵霧是日月大患沙門婆羅門亦有四患不明不淨不能有所照亦無威神云何為四不捨飲酒不捨婬欲不捨手捉持金銀不捨邪命自活諸比丘聞其中有少欲知足者嫌責䟦難陀已白佛結戒此是遮罪為止誹謗故為滅鬬諍故為成聖種故制斯學處乃初篇盜根本種類釋義律云錢者上有文象其錢外圓象天內方象地以國王之號居中以象天地生人也金銀者薩婆多論云重寶金銀牟尼真珠珊瑚硨磲瑪瑙此諸寶等若作若不作若相若不相作者以寶作諸器物不作者但是寶不作器物相者作器寶或作字相或作印相不相者不作器寶不作字相不作印相教人捉者教人為己捉置地受者不從他手授而得他置地時受取雖非自捉亦非教人捉他置地而受皆由貪畜心故是以俱制結罪是中犯者若比丘自手捉金銀若錢若教人捉者若置地受皆捨墮此應捨是中捨者若彼有信樂守園人或優婆塞當語言此是我所不應汝當知之此是對俗捨寶法對彼俗人如是捨已其墮罪對一淨比丘說悔於作持中明若彼人取還與比丘者比丘當為彼人物故受敕淨人使掌之若得淨衣鉢尼師壇鍼筒應持易受持之此作他物想毫無自畜心縱得衣物名曰為淨仍須持向同梵行者是何物應換何物受持而令淨之更淨者葢為蕩盡貪愛之念不存金銀之想也若彼優婆塞取已與比丘淨衣鉢尼師壇鍼筒應取持之此是俗還寶法由彼淨人知法取已見比丘所闕衣具即為造送比丘得之不必貿易此乃合時清淨即便受持若彼取已不還者令餘比丘語言佛有教為淨故與汝應還彼比丘物此是俗不還寶法言佛有教者謂是佛制而令比丘方便淨寶之法非實與汝爾若餘比丘不語者當自往語言佛有教為淨故與汝汝今可與僧與塔與和尚與同和尚與阿闍黎與同阿闍黎與諸同學親舊知識若還本主何以故不欲使失彼信施故若不語彼人知是看是者突吉羅知是看是即說淨法此戒具三緣方成本罪一有貪慢心二是金銀錢寶三非淨語受持兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語言知是見是若彼有信樂守園人乃至不欲令失彼信施即上捨中全文及最初未制戒等是為不犯第三分云有比丘在塚間得錢自持來佛言不應取彼比丘須銅佛言打破壞相然後得自持去會採僧祗律云病人得使淨人畜莫貪著若犯捨墮物僧中捨已不得還彼比丘僧亦不應分若多者應著無盡物中無盡物即四方招提物也所生息利得作房舍中衣即僧房臥具帳幔不得食用比丘凡得錢及安居訖衣直不應自取當使淨人知若無淨人指脚邊地語言是中知著地已自用草葉磚瓦等遙擲覆上待淨人來令知隨國土中所用若銅錢鐵錢胡膠錢皮錢竹籌悉不應捉或有國土所用相不成就或相成就國土不用捉者皆越毗尼罪國所不用相不成就作銅鐵捉無罪五分律云僧應白二羯磨差一比丘作棄金銀及錢人彼比丘應棄此物著坑中火中流水中曠野中不應誌處若捉著餘處不得更捉彼比丘不應問僧此物當云何僧亦不應教作是作是若不棄不問而使淨人貿僧衣食與僧僧得受若分者唯犯罪人不得受分不犯者雖施比丘比丘不知淨人受之為買淨物有諸比丘欲遠行從長者索道糧彼即使人賚金銀錢物送之既至所在所長甚多使還白主主言我已為施不應還取汝可持至僧房施僧佛言聽淨人為僧受之以易僧所須物諸比丘不應知事十誦律云自手取寶若少應棄若多設得同心淨人應語言我以不淨故不應取汝應取淨人取已語比丘言此物與比丘比丘言此是不淨物若淨當受若不得同心淨人應作四方僧臥具應入僧中言諸大德我自手取寶得波逸提罪我今發露不敢覆藏悔過僧應問汝捨是寶不答言已捨僧應問汝見罪不答言見罪僧應語言後莫復作若言未捨僧應約敕令捨若不約敕一切僧得突吉羅罪若約敕而不捨是比丘突吉羅根本律云若為修營房舍等事應求草木車乘人工不應求金銀錢等若捉方國共所用錢犯捨墮若捉非方國所用錢得惡作罪若捉赤銅鍮石銅鐵鉛錫者不犯若有他施衣價欲須便受受已即作彼人物心而持畜之應委寄淨人使持不應自捉若無淨人持物對一苾芻作如是語具壽存念我某甲得此不淨物我當持此不淨之物換取淨財如是三說隨情受用勿致疑心若復僧寺有賊驚怖所有墖僧金銀錢寶應牢藏舉方可移去若無深信淨人居士應使求寂求寂亦無比丘自手穿坑藏舉如我為難所開事者難去之後則不應行律攝云若他物自他物得墮無捨自他物謂共他人者若夏坐時安居施主持衣價與苾芻眾即作委寄此施主心而受取之諸苾芻應求敬信人若寺家淨人若鄔波索迦為淨施主此乃請金寶穀米淨施主法於作持中明苾芻若得金寶等物時作施主物想執捉無犯擬相去遠得不淨物遙作施主物心持之乃至施主命存已來並皆無犯若無施主可得者應持金銀等物對一苾芻言具壽存念我苾芻某甲得此不淨財當持此不淨財換取淨財如是三說應自持舉或令餘人舉之按懷素師所集四分僧羯磨中亦采取此法今在東震末世誠為易行方便是故作持之中遵奉此也若苾芻於行路中得金銀等為道糧故應自持去或令淨人等及求寂持去應知求寂於金銀等但制自畜不遮執捉此戒大乘為眾生故聽受然須淨人掌舉設無淨人者必也心無染著存施兩田自捉可爾若貪心自畜不行利濟即是多欲不知足名染污犯引證緇門警訓引鈔云一田宅園林二種植生種三貯畜穀帛四畜養人僕五養繫禽獸六錢寶貴物七氈褥釜鑊八象金飾牀及諸重物此之八名經論及律盛列通數顯過不應又律經言若有畜者非我弟子五分亦云必定不信我之法律由此八種皆長貪壞道污染梵行有得穢果故名不淨也乃至云律中在事小機意狹故多開畜涅槃經云若諸弟子無人供須時世饑饉飲食難得為欲護持建立正法我聽弟子受畜金銀車乘田宅穀米易所須雖聽受畜如是等物要須淨施篤信檀越會正記云上明大乘機教俱急下明小乘機教俱緩律在事者違事故輕則顯經宗於理違理故重小機意狹不堪故開反上大乘堪任故重世人反謂小乘須戒大教通方幾許誤哉附考善見律云受施用有四種法一者盜用若比丘無戒依僧次受施飲食是名盜用二者負債用若比丘受人飲食衣服房舍牀席臥具若有聰明智慧信心出家者至受食時口口作念乃至受用臥具亦應作念若鈍根者未食時作一念受用衣時應朝先作一念若不為障寒障熱障慚耻而用衣若不為饑渴病疾而受飲食湯藥是名負債用若受飲食衣服不先作念突吉羅三者親友用謂七學人受用施物如子受父物無異是名親友用四者主用謂真人羅漢受用施物於四種受用中盜用最惡復有四種受用一者有慚愧用謂無慚愧人親近有慚愧人受用無罪二者無慚愧用謂有慚愧人親近無慚愧人是名無慚愧受用得罪有慚愧人親近無慚愧人後必隨其作惡故名無慚愧人無慚愧人親近有慚愧人必當改惡修善是名有慚愧人三者有法用謂有慚愧人依法而得四者無法用謂無慚愧人不依法得如得此物如得毒藥無異僧祗律云有一比丘將一沙彌歸看親里路經曠野中有非人化作龍形右遶沙彌散華讚言善哉大得善利捨家出家比丘到親里家問訊已欲還時親里婦言汝今還去道過多乏可持是錢市易所須沙彌受取繫著衣頭中道非人復化作龍左遶沙彌以土坌上說如是言汝失善利出家修道而捉錢行沙彌便啼比丘顧問其故答言我不憶有過無故得惱師言汝有所捉耶答言持是錢來師令棄已非人復來如前供養比丘以是因緣白佛佛言從今不聽沙彌持金銀錢若比丘使沙彌最初捉金銀錢者越毗尼罪若見沙彌先已捉後使捉者無罪音義舍衛城或云舍婆提此翻聞物謂寶物多出此城又翻豐德天台云舍衛城又名舍婆提者昔有二仙弟名舍婆此云幼小兄名阿䟦提此云不可害合此二人以名城也善見律云舍衛者見道士名也昔有道士居住此地往古有王見此地好就道士乞為立國以道士名號為舍衛又名多有謂諸國珍寶及雜異物歸聚此國故名多有西域記云室羅伐悉底國舊云舍衛國譌也中印土境周六千餘里宮城周二十餘里穀稼豐氣序和風俗淳質篤學好福是勝軍大王所治國都也䟦難陀此翻賢喜或云優波難陀或云鄔波難陀此翻近喜於六羣中最為貪者緻音智近圓即受具足戒也圓謂涅槃若能受持二百五十淨戒為因不毀則近於涅槃果襆物頃上音僕帊也帛三幅曰帊頃乃俄頃謂似以帊裹物之少頃也蠶蛹蠶絲蟲也三俯三起二十七日而老黃帝元妃西陵氏始養蠶為絲下音勇繭蟲也蠶化為蛹蛹化為蛾拘遮羅未見翻譯恐即具蘚摩此云華間紃間去聲紃音巡紡縷也南岳道休二師南岳慧思禪師少以慈恕聞於閭里常夢梵僧勸出俗乃辭親入道及稟具常習坐禪得宿命通後悟法華三昧最上乘門於陳光大六年將四十僧徑趨南岳乃告曰吾寄此山止期十載必事遠遊師習慈忍奉菩薩三聚戒衣服率布寒則加之以艾釋道休恒以頭陀為業住雍州新豐福緣寺南曬山幽谷結草為庵一坐七日乃出其定出山乞食施說禁戒誨人慈善如是積四十年貞觀三年夏內依期不出端拱而卒然休師出家已來常但三衣不服繒纊以傷生也所著布衣積有年稔塵朽零破見者心寒南山宣律師云余曾參翻譯親問西域諸僧皆以布氈而為袈裟都無繒絹者縱用以為餘衣不得加受持也其龜茲於遁諸國見今養蠶唯擬取綿亦不殺害故知休之慈救與衡岳同風離車子善見律云往昔波羅奈國王夫人懷姙月滿生一肉段無有手足恐王見知必生惡賤即取盛貯器中打金作薄以朱砂書題云是波羅奈國王夫人所生葢覆器頂以王印印之使人送放江中棄江流已諸鬼神營護使無風浪飄沒爾時有一道士依止牧牛人住於江邊道士清朝往江邊澡面遙見此器近已而取又見金薄朱字復見王印印之便開器看唯見一肉段而作念云若是死肉久應爛臭必有異相取將歸住安於好處過半月已而成兩片復經半月二片各有五胞又却後半月一片成男如黃金色一片成女如白銀色道士見如是瑞相已心生愛重如自生子以慈心力故兩手母指自然出乳一指飲男一指飲女乳入子腹譬清水入摩尼珠內外明徹道士號兒名離車子此翻皮薄亦名同皮後時牧牛人來乞道士迎此二子供養年十六歲又見地平博處縱廣一百由旬起立舍宅以男立為王女為夫人於後女人生兒王子漸多復各開立舍宅造諸園池故號毗離城為離車子所居而離車是其種姓正音應云栗呫婆此云仙施王種也狼藉狼乃獸名似犬銳頭白頰高前廣後其性多貪故曰貪狼蹂攉其草使之雜亂故曰狼藉釋翅𢯱迦維羅衛尼拘律園釋翅𢯱此云能也迦維羅衛此云赤澤總謂能仁住處赤澤城也鼻奈耶云釋翅𢯱者釋種也迦維羅衛亦云迦毗羅衛又翻赤澤又翻黃頭尼拘律如大房戒釋此園在赤澤城南三四里是釋迦如來成等正覺已還國見父王為說法處時淨飯王知佛不住王宮即於此園造大寺院如祗陀林等無有異迎佛歸國於此而住佛即於此度八王子及五百釋種出家入道八王子者除第九優婆離是也珠髻大臣或云寶髻或云如意頂髮其義一也梵語摩尼此云如意珠摩尼是寶之總名此大臣是王舍城聚落主日月四患謂阿修羅烟雲塵霧四種也或為五患以烟雲分為二患如毗婆沙論云日月輪五翳所翳不明不照不廣不淨一雲如盛夏時有少雲起須臾增長徧覆虗空障日月輪俱令不現二烟如林野中焚燒草木率爾烟徧覆虗空障日月輪俱令不現三塵如亢旱時大風旋擊囂塵卒起徧覆虗空障日月輪俱令不現四霧如秋冬時山河霧起又聞外國雨初晴時日照川原地氣騰湧雰霏布散徧覆虗空障日月輪俱令不現五阿修羅與天鬬時天用日月以為旗幟由日月威天常勝彼時阿修羅常心忿日月欲摧滅之由諸有情業增上力盡其智術不能摧壞遂以手遮令暫隱沒亦名曷邏呼阿素洛曷邏呼是阿修羅名也鍮石銅似金也鉛青金也有銀處有之七學人謂四向及初二三果人三界煩惱未斷盡故名七學人
