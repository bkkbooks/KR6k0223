body:
  text: 金陵寶華山弘律沙門讀體集第七十一拒諫難問戒若比丘餘比丘如法諫時如是語我今不學此戒當難問餘智慧持律比丘者波逸提若為知為學故應難問緣起佛在拘睒彌國瞿師羅園中時闡陀比丘餘比丘如法諫時作如是語按僧祇律云我今不隨汝語我若見餘長老寂根多聞持法深解我當從咨問彼若有所説我當受行諸比丘聞中有樂學戒者嫌責闡陀白佛結戒由違諫事不忍煩惱制斯學處釋義文分二節若比丘下明其所犯若為知下明實學隨開律云如法諫者如法如律如佛所教此謂吐語皆如法律存心本為利人作是語我今不學此戒者然非實不學戒而作抗逆語者意欲拒彼之諫言先緘其口也難問者謂以巧言詰問於他智慧者智即是慧若分別説智知也慧見也又決定審理曰智造心分別曰慧持律者謂嚴持佛制善間律藏為知為學者謂欲廣博深義樂修梵行者斯則應當難問通達明了以便習行可免無罪結罪是中犯者若説而了了波逸提説不了了突吉羅此戒具三緣方成本罪一心存違諫二口出抗言三説解了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者彼比丘癡不解故此比丘作如是語汝還問汝和尚阿闍黎可更學問誦經若戲笑語若獨語或夢中語或欲説此而錯説彼及最初未制戒等是為不犯此戒大乘同制附考律攝云有五種人不應為説毗奈耶藏謂性無所知強生異問或不為除疑而問或試弄故問或惱他故問或求過失故問第七十二輕訶説戒戒若比丘説戒時作是語大德何用説是雜碎戒為説是戒時令人惱愧懷疑輕訶戒故波逸提緣起佛在舍衛國給孤獨園有衆多比丘集在一處誦正法毗尼時六羣自相謂言彼誦律通利必當數舉我等罪乃往語言長老何用此雜碎戒為若必誦者當誦四事及十三事餘者不應誦若誦者使人懷疑憂惱諸比丘聞中有慚愧樂學戒者嫌責六羣白佛結戒此是性罪因輕毀事不忍可煩惱制斯學處釋義律云説戒時者若自説戒時若他説時若誦時自他説戒謂布薩之時誦戒乃讀學之時雜碎戒者善見律云從二不定乃至衆學是名雜碎薩婆多論云結此戒者為尊重波羅提木叉為長養戒故為滅惡故以十二年前佛常説一偈今説五篇名為雜碎戒又有云除前二篇後三篇名雜碎戒也説是戒者令人惱愧等者此乃敘述其情彰憂惱狀由自犯過故聞他説戒情生不喜由不喜故惱悶交胸名之為惱追悔所犯名之為愧不能自決其憂惱名之懷疑何用説此雜碎為一句正是輕訶戒相也結罪是中犯者若説而了了者波逸提説不了了者突吉羅若毀呰阿毗曇及餘契經者突吉羅此戒具四緣方成本罪一自欲覆罪二令他廢學毗尼三所毀是比丘戒四説而了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語言先誦阿毗曇或契經然後誦律若有病者須差然後當誦律語令先勤求方便於佛法中得果證後當誦律不欲滅法故作是語或戲笑語或夢中語或獨語欲説此乃錯説彼及最初未制戒等是為不犯會採五分云若欲令人遠離毗尼不讀不誦而毀呰者波逸提若欲令波羅提木叉不得久住而毀呰者偷蘭遮此攝上品獨頭偷蘭與破法輪僧同科應於一切僧中求悔毀呰經亦如是毀呰餘四衆及在家二衆戒突吉羅比丘尼毀呰二部戒波逸提毀呰五衆戒突吉羅若恐新受戒人生疑廢退心教未可誦戒不犯本律毀呰經論結突吉羅五分結偷蘭者在存心滅法之差別也此戒大乘同制菩薩戒本經云若菩薩如是見如是説言菩薩不應聽聲聞經法不應受不應學菩薩何用聲聞法為是名為犯衆多犯引證薩婆多論云何以訶戒經罪重餘經罪輕以戒是佛法之平地萬善由之生又一切佛弟子皆依而住若無戒則無所依又入佛法之初門若無戒者無由入泥洹城又是佛法之瓔珞莊嚴佛法是故訶毀罪重善見律云若學毗尼者一身自護戒二能斷他疑三入衆無畏四能伏怨家五令正法久住下至五比丘解律在世能令正法久住若中天竺佛法滅邊地有五人受戒滿十人往中天竺得與人具足是名令正法久住如是乃至二十人得出罪是名令正法久住又持律有六德一者守領波羅提木叉二者知布薩三者知自恣四者知授人具足戒五者受人依止六者得畜沙彌若不解律但知修多羅阿毗曇不得度沙彌受人依止以律師持律故佛法住世五千年第七十三無知戒若比丘説戒時作如是語我今始知此法戒經所載半月半月説戒經中來餘比丘知是比丘若二若三説戒中坐何況多彼比丘無知無解若犯罪應如法治更重增無知罪語言長老汝無利不善得汝説戒時不用心念不一心攝耳聽法彼無知故波逸提緣起佛在舍衛國給孤獨園六羣中有一人犯罪當説戒時自知罪障恐清淨比丘發舉便先詣諸比丘所語言我今始知此法乃至戒經中來諸比丘察知其故白佛結戒由不敬事亂心煩惱制斯學處釋義文分三節若比丘下明詐言逃過餘比丘下是證其虗詐彼比丘無知無解下明無益結犯我今始知此法戒經所載者由其自有所犯故作如是不實之語詐言云今日始知四棄乃至七滅諍法是戒經所載半月半月一説皆從戒經中來意謂一往不知或免其過耳餘比丘知是比丘若二若三説戒中坐何況多者謂清衆之中知彼於布薩日共集説戒曾經二三次者應當知其戒相持犯何況爾等過二三次多經布薩而云今日始知其言詐矣無知無解者不識戒相名曰無知不別罪義名曰無解若犯罪應如法治更重增無知罪者謂不以不知故獲免當如所犯罪治之復更重增一不學戒無知罪長老汝無利不善得者此是勸誡之言謂不精攻止作不得持戒之利益也汝説戒時不用心念者謂不善作意思惟也不一心攝耳聽法者謂由不善作意故不一其心以不一其心故耳緣他境由緣他境故不能采聽法音也彼無知故者此句結明所犯謂由輕慢心不學毗尼是故重增此一無知墮罪薩婆多論云實先知言始知犯妄語墮此中正結不專心聽法罪也結罪是中犯者若自説戒時若他説時若誦戒時作是語者波逸提誦戒時揀非布薩日乃聞衆學誦時也若不與彼罪者突吉羅此治清淨作法比丘也此戒具三緣方成本罪一多次在座而輕戒不聽二自知犯罪而復諱不露三詐言始知兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者未曾聞説戒今始聞若未曾聞廣説今始聞若戲笑語若獨語若夢中語欲説此錯説彼及最初未制戒等是為不犯會採律攝云長淨時作不知語或由煩惱或由忘念若睡眠若亂意隨一一戒不聽聞者皆得墮罪若聞苾芻尼不共學處作如是語得惡作罪若共學處便得本罪若老耄無所識知依實説者無犯長淨之時應令純熟善誦戒經者為衆誦之先鳴犍椎時諸苾芻應自憶罪如法説悔然後赴集僧祗律云受具足已應誦二部毗尼若不能者當誦一部乃至若復不能當誦初篇戒及偈布薩時應廣説五篇乃至若復不能當誦初篇及偈餘者僧常聞不誦者越毗尼罪僧中應使利者説餘人專心聽不得坐禪及作餘業若於四事乃至七滅諍法中間隨不聽隨得越毗尼罪一切不聽波逸提此罪不得趣向人悔當衆中持戒有威德人所敬難者於前悔前人應訶言長老汝失善利半月説波羅提木叉時汝不尊重不一心念不攝耳聽法訶已波逸提悔過此中制意為呵一人以警策衆人治一人無知不學戒而令衆人敬信毗尼樂學戒故所以必在衆中向戒德威嚴敬近難者前悔過也此戒大乘同學第七十四違反羯磨戒若比丘共同羯磨已後如是言諸比丘隨親厚以衆僧物與者波逸提緣起佛在羅閲城耆闍崛山中尊者沓婆摩羅子衆中差令典知僧事彼以僧事塔事故有人初立寺初立房初作井而檀越設會布施不暇往赴衣服破壞異時有施僧貴價衣衆僧共議白二羯磨與之六羣亦在衆中後乃更作如是悔言謗僧佛為結戒因鬬亂事不忍煩惱制斯學處僧祇律云典知有九事一典次付牀座二典次差請會三典次分房舍四典次分衣物五典次分香華六典次分果蔬七典次知暖水八典次分雜餅食九典知隨意與堪事人典者主也釋義文分二節若比丘共同羯磨已明一衆和合所作事竟後如是言下明自違情反悔謗僧律云親厚者同和尚阿闍黎坐起言語親厚者是僧物者為僧故作已與僧已許僧物謂衣鉢坐具針筒下至飲水器與者謂以僧物回施一人也此白二羯磨與衣法作持中明結罪是中犯者先共衆中作羯磨已後悔言説而了了波逸提不了了突吉羅此戒具五緣方成本罪一自有貪心二前人當與三同衆羯磨四與後反遮五言説了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯沙彌等不得同僧羯磨若私譏議大僧故亦也隨開不犯者其事實爾或戲笑語乃至欲説此錯説彼及最初未制戒等是為不犯會採僧祗律云若僧中一切應分物來當次應取若意不欲者聽過不取若人問言汝何不取應答言此非我所須欲取餘物後來須者應取無罪若行物者言隨意恣取須者自取無罪遮有三種與時遮得越毗尼罪未與時遮得越毗尼心悔與已遮者得波逸提薩婆多論云凡僧中執勞苦人若大德其貧匱者僧和合與盡得與之但言不應與盡犯此戒大乘同學第七十五不與欲戒若比丘衆僧斷事未竟不與欲而起去波逸提緣起此戒有二制佛在舍衛國給孤獨園衆僧集一處共論法毗尼時六羣自相謂言看此諸比丘共集一處似欲為我等作羯磨即從座起而去衆語言有僧事汝等且住勿去而彼故去其中有樂學戒者嫌責白佛此初結戒也時諸比丘或營僧事塔事或瞻病事疑佛言自今已去聽與欲故有不與欲而起之語此第二結戒也由論法事不寂靜煩惱制斯學處釋義律云僧者一説戒一羯磨斷者謂評論也事者有十八破僧事法非法律非律犯非犯若輕若重有殘無殘粗惡非粗惡常所行非常所行制非制説非説與欲者於作持中詳明此一開三結罪是中犯者若起出戶外波逸提一足在戶內一足在戶外方便欲去而不去若期欲去而不去一切突吉羅此戒具三緣方成本罪一是羯磨事同衆已集二不與欲而輒去三兩腳出戶兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯下三衆無斷事同僧與欲之理其所犯者準後五分律同制也隨開不犯者有三寶及瞻病事與欲若口噤不能與欲若非法非毗尼羯磨或為塔僧二師親友作損減無利益如是不與欲去及最初未制戒等是為不犯會採五分律云若屋下羯磨隨幾過出一一出波逸提若露地羯磨出去僧面一尋波逸提若神通人離地四指波逸提若僧不羯磨斷事出去突吉羅若私房斷事來而去突吉羅若僧不羯磨斷事及私房斷事沙彌得在其中起去突吉羅式叉摩那沙彌尼亦如是僧祗律云若大小便須臾還不廢僧事無罪若説法説毗尼聽多比丘誦經聽他受經聽他誦經盡應白去不白去者越毗尼罪若誦經者止誦作餘語去者無罪若聽他受誦經典不白而去亦結罪者一由輕心鮮信無敬教之念次以威儀鹵莽缺隨喜之緣此戒大乘同學第七十六與欲後悔戒若比丘與欲已後悔波逸提緣起佛在舍衛國給孤獨園六羣中有犯事者恐僧彈舉於一切時六人相隨不離使僧不得與作羯磨異時六羣作衣僧知得便即遣喚之報言我等作衣不得往僧言若不得來可令一二比丘持欲來彼即令一比丘持欲來僧即與此比丘作羯磨此比丘還語六羣六羣悔言彼作羯磨者非為羯磨羯磨不成我以彼事故與欲不以此事諸比丘嫌責六羣遂往白世尊佛故結戒由悔恨煩惱制斯學處釋義與欲已者謂僧有如法事先心樂欲許可已後悔者謂與欲後心生悔恨也此戒與前戒大同中有少別者前以先知其事共許羯磨而後悔誹僧此據不知後悔遮欲二戒俱欲毀破羯磨使先事不成也結罪是中犯者與欲已後悔言説而了了者波逸提不了了者突吉羅此戒具四緣方成本罪一是如法僧事二與欲羯磨三心生悔恨四悔言了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨制沙彌等如前五分隨開不犯者其事實爾非羯磨羯磨不成作如是言非羯磨羯磨不成若戲笑語獨語夢語欲説此錯説彼及最初未制戒等是為不犯會採律攝云已與他欲後生悔恨煩惱既生心無慙耻於可對境作苾芻想言告彼時便得墮罪薩婆多論云除僧羯磨事僧凡所斷事和合作已後悔譏訶突吉羅若僧如法作一切羯磨已後訶言不可波逸提除僧羯磨一切非羯磨事謂不用單二白四羯磨法所辦之事也衆僧和合共斷決之後更訶者若順法順毗尼者波逸提若雖見王制僧制不順毗尼者突吉羅若僧作一切羯磨事作不如法當時力不能轉易故默然而不訶後言不可無犯此戒大乘同學第七十七屏聽諍後語戒若比丘比丘共鬬諍已聽此語向彼説波逸提緣起佛在舍衛國給孤獨園時諸比丘鬬諍六羣聽此語向彼説令僧未有諍事而有已有而不能滅諸比丘察知其故白佛結戒此是性罪由惱亂事不忍煩惱制斯學處釋義律云鬬諍有四種言諍覓諍犯諍事諍聽此語向彼説者謂於屏隱處竊聽他言求覓過失而更相遞説令生忿兢致小事始與而成大諍大諍既成而不能息也結罪是中犯者若聽他諍語從道至道從道至非道從非道至道從高至下從下至高往而聞波逸提不聞突吉羅若方便欲去而不去若共期去而不去一切突吉羅若二人共在暗地語或隱處語或在前行語當彈指若謦咳驚之若不爾者盡突吉羅此戒具三緣方成本罪一知他比丘鬬諍二屏處往聽三聞説明了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若欲作非法非毗尼羯磨若為塔僧二師親友作損減無利益事欲得知之往聽及最初未制戒等是為不犯會採薩婆多論云往聽鬬諍犯者以能破佛法令僧為二部是故制聽者犯所以在高下處聽犯者以諍事重故不同説戒布薩羯磨等也此中諍人及餘不諍人來聽及向人説不説皆犯五分律云默聽餘四衆語突吉羅十誦律云為和合故往聽不犯善見律云往去步步突吉羅至聞處波逸提為欲自改往聽不犯僧祗律云二比丘在堂裏私語若比丘欲入應彈指動腳作聲若前人默然者應還出若故語不止者入無罪一比丘先在堂內坐二比丘私語從外來先坐比丘應作聲若彼默然者堂內比丘應出前後行亦爾若比丘共餘比丘鬬諍結恨作是罵詈我要當殺此惡人比丘聞已得語彼好自警備我聞有惡聲若有客比丘作是言我等當盜某庫藏某塔物某僧淨厨某人衣鉢知事人聞已默然應還僧中唱言諸大德某庫藏某塔物某僧淨厨某人衣鉢當警備我聞惡聲使前知若比丘多有弟子日暮按行諸房知如法不若聞説世俗語不得便入訶責待自來已然後訶責言汝等信心出家食人信施應坐禪誦經云何論説世俗非法事此非出家隨順善法若聞論經説義問難答對不得便入讚歎待自來已然後讚美汝等能共論經説義講佛法事如世尊説比丘集時當行二法一者賢聖默然二者講論法義此戒大乘同制第七十八瞋打比丘戒若比丘瞋恚故不喜打比丘者波逸提緣起佛在舍衛國給孤獨園六羣中有一比丘瞋恚打十七羣比丘其被打人高聲大喚諸比丘聞知嫌責白佛結戒由伴屬事不忍煩惱制斯學處乃初篇殺根本種類釋義不喜者謂忿恚纏心情生不悅也律云打者若手若石若杖僧祗律云打者若身身分身方便身者一切身是身分者若手若腳若肘若膝若齒若爪甲是名身分身分方便者若捉杖木瓦石等打若遙擲是名身方便結罪是中犯者若以手石杖打比丘者一切波逸提除杖手石若餘戶鑰曲鉤拂柄香爐柄挃者一切盡突吉羅此戒具三緣方成本罪一要有瞋恚心二自身行打三前人是比丘兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若有病須人椎打若食噎須椎脊若共語不聞而觸令聞若睡時以身委他上委者棄置也若來往經行時共相觸若掃地時杖頭誤觸及最初未制戒等是為不犯會採薩婆多論云打得戒沙彌即學悔沙彌也盲瞎聾啞波利婆沙摩那埵比丘盡波逸提失雙目名盲失一目為瞎若先有如是病者攝十六輕遮中不得受比丘戒若已近圓後有此病者仍是比丘如是之輩宜當憐愍可也摩得勒伽云打三種人突吉羅謂賊住即賊心入道也本不和合無師憎也本犯戒犯四棄失比丘性者若以把沙把豆等物擲衆比丘隨所著隨得爾所波逸提不著突吉羅律攝云若持戒若破戒有苾芻相起苾芻想或復生疑打者皆得墮罪若非苾芻作苾芻想疑或於柱壁或於餘事作掉亂心而打拍者咸得惡作不以瞋心為利益事無犯五分律云打餘三衆乃至畜生突吉羅善見律云若欲心打女人僧殘罪僧祗律云打尼偷蘭遮打三衆越毗尼罪下至俗人越毗尼心悔若惡象馬牛羊豬狗等來不得打得捉杖木瓦石等打地作恐怖相若畜生來入塔寺觸突形像壞華果樹亦得以杖木瓦石打地恐怖令去此戒大乘同制若以打報打者罪結輕垢若無端起瞋及忿恨上品纏他人求悔而不受懺者此則犯重其為菩薩應與一切衆生樂豈反瞋打之第七十九瞋搏比丘戒若比丘瞋恚不喜以手搏比丘者波逸提摶音博緣起佛在舍衛國給孤獨園六羣以手搏十七羣其被搏人高聲大喚諸比丘聞問其所以白佛結戒由伴屬事不忍煩惱制斯學處乃初篇殺根本種類釋義搏者擬也擬乃形像也謂舉手相向以現其打相而令他人恐怖也前戒本心實欲打之打不著身不得本罪此戒心本無念直以掌擬擬便得本罪所以兩戒有異故別制之結罪是中犯者瞋恚不喜以手搏比丘者波逸提除手已若戶鑰拂柄香爐柄挃一切突吉羅此戒具三緣方成本罪一有瞋他心二前人是比丘三以手腳掌搏及彼身兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若他欲打舉手遮若惡獸盜賊來若持刺來舉手遮乃至一切不故作及最初未制戒等是為不犯會採十誦律云以手腳掌向他波逸提舉餘身分向他突吉羅五分律云手擬及波逸提不及突吉羅律攝云作打心而擬其手初舉時便得本罪若一舉手向多苾芻隨其多少準人得罪若與苾芻相瞋恨時應往詣彼求其懺摩不應瞋心未歇往求辭謝彼亦不得同師子行為堅鞭心不相容恕鞭字該是硬字恐寫之誤堅硬人心瞋心難解若不肯忍應遣智人方便和解速令諍息小者到彼瞋苾芻邊至勢分時即應禮拜彼云無病若見苾芻鬬諍之時無朋黨心而為揮解俗人鬬處不應往看恐引為證故如上所説不順行者咸得惡作此戒大乘輕重如上第八十無根僧殘瞋謗戒若比丘瞋恚故以無根僧伽婆尸沙謗者波逸提緣起佛在舍衛國給孤獨園六羣瞋恚故以無根僧殘謗十七羣諸比丘聞知白佛結戒此是性罪由同梵行事不忍煩惱制斯學處乃初篇妄根本種類釋義律云根者有三謂見聞疑如十三事中釋其間異者彼以四棄無根誹之此唯以十三事中一一事行謗也結罪是中犯者説而了了者波逸提不了了者突吉羅此戒具四緣方成本罪一彼是比丘二自有瞋心三以無根僧殘謗四説而了了兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者見聞疑根若説其實欲令改悔而不誹謗若戲笑語獨語夢中語欲説此錯説彼及最初未制戒等是為不犯會採僧祗律云謗比丘波逸提謗比丘尼偷蘭遮此偷蘭輕於波逸提謗餘三衆越毗尼謗俗人越毗尼心悔此戒大乘同制向同法者説犯輕若向外人説法重第八十一輒入宮閾戒若比丘剎利水澆頭王種王未出未藏寶而入若過宮門閾者波逸提緣起佛在舍衛國給孤獨園時末利夫人禮佛聞法得果證已勸喻波斯匿王令得信樂聽諸比丘入出宮閣無有障礙迦留陀夷乞食次入王宮時王與夫人晝日共臥夫人遙見彼來即起披衣以所披衣拂座令坐夫人失衣露形慚愧而蹲尊者還僧伽藍語諸比丘波斯匿王第一寶者我今悉見諸比丘詰知嫌責尊者白佛結戒由詣王宮並譏染煩惱制斯學處律攝云烏陀夷有緣須詣摩利迦夫人所侵早入宮釋義若比丘下明所行之處若過下結成所犯之罪律云剎利水澆頭王種者王紹位時取四大海水取白牛右角收拾一切種子盛滿中置金輦上使諸小王輿王與第一夫人共坐輦上大婆羅門以水灌王頂若是剎利種水灌頂上作如是立王故名為剎利王水灌頂種剎利此云田主是劫初時有德之人衆立彼為衆處分田土以其尊貴自在故相承以為姓也若是婆羅門種毗舍首陀羅種以水灌頂作如是立王亦名為剎利王水澆頭種未出者王未出婇女未還本處未藏寶者金銀真珠硨磲碼瑙水精琉璃貝玉一切衆寶瓔珞而未藏舉十誦律云諸夫人次第直宿於王時末利夫人下著珠網衣上著磨貝衣內身外露現如共王宿時即著是衣未藏寶者未藏此莊嚴具薩婆多論云王已出外夫人未起其進御時所著寶衣輕明照徹內身外現以發欲意未藏此衣名未藏寶又女為男寶夫人未以餘衣覆身亦名未藏寶五分律云寶者所重之物及諸女色皆名為寶結罪是中犯者王未出寶未藏若過門閾者波逸提若一足在外一足在內發意欲去若共期而不去者一切突吉羅除王剎利種若入餘粟散小王豪貴長者家過門閾者一切突吉羅此戒具四緣方成本罪一必是大王宮二王未出寶未藏三須是內宮門四兩腳入內兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若王已出若婇女還本處所有珍寶已舉藏若有所奏白若被請喚若為勢力所執去若命難梵行難及最初未制戒等是為不犯會採律攝云門閫有其三種一城門閫二王家門閫三內宮門閫入初二門得惡作罪入內宮門便得墮罪閫者門橛也謂門兩旁挾門之短限也此與閾義同也此戒大乘同制末世尤所當慎設令喚請亦不應輒入若具大神通威德不犯附考根本律云入王宮者有十種過失一者王與夫人在一處住苾芻入時夫人便笑王即生疑豈非苾芻於私屏處行鄙惡事若不爾者何因見笑或可有心將為惡事二者苾芻入宮夫人有娠王生是念豈非苾芻共為惡行令其有娠三者苾芻入宮王失珍寶及諸寶類王作是念豈非苾芻偷竊我物四者王有密語聞徹於外王作是念豈非苾芻傳通密語五者苾芻入宮王瞋太子遷移職位太子念曰豈非苾芻於王讒搆令我今時致此憂戚六者苾芻入宮太子於父為不義事諸人聞已豈非苾芻傳通密語令失孝義七者苾芻入宮王之所重尊勝大臣被黜職位便作是念豈非苾芻於王讒説令我墮在不如意處八者卑位大臣王與重賞諸人議曰豈非苾芻為其薦達九者王數出師征伐餘國人皆議曰豈非苾芻共王論説數令我等征伐疲勞十者苾芻入宮王出征伐告戰士曰其所得者悉皆自屬後既平殄王便却奪諸人議曰此是苾芻教王奪我佛告諸苾芻以此因緣不應輒入宮內或令四兵不得安隱此非苾芻之所應作第八十二捉寶物戒若比丘若寶及寶莊飾自捉若教人捉除僧伽藍中及寄宿處波逸提若比丘在僧伽藍中若寄宿處捉寶若以寶莊飾自捉教人捉當作是意若有主識者當取作如是因緣非餘緣起此戒有三制佛在舍衛國給孤獨園有外道弟子在路行止息道邊忘千金囊而去時有衆多比丘後來亦於道邊止息見此金囊自相謂言為且持去若有主識者當還彼行數里乃憶疾還即出囊與之彼反謂少往啓波斯匿王王審知其偽即稅其家財並金入官有樂學戒慚愧者聞知嫌責諸比丘云何自手捉金銀使居士為官治罪并稅家財因是白佛此初結戒也時毗舍佉母入祗桓精舍脫身瓔珞置於樹下往禮世尊佛為説法心存於法忘取還家比丘見已畏恐犯戒不取白佛佛聽在僧伽藍內見有遺物為不失故當取舉之復加除僧伽藍中之語此第二結戒也又衆多比丘途路行次至一無住處村寄宿巧師空舍時彼巧師有已成未成金銀置舍而去諸比丘為守護故竟夜不眠諸比丘以此因緣具白世尊佛聽在他家止宿時若屋中有物為不失故應收舉復加及寄宿處之語乃第三結戒也此是遮罪由珍寶事止貪煩惱制斯學處釋義文分二節若比丘下明其創制除僧伽藍等明其隨開律云寶者金銀真珠琥珀硨磲碼瑙琉璃貝玉生像金寶莊飾者銅鐵鉛錫白鑞以諸寶莊飾也根本律云寶類者謂諸兵器弓刀之屬及音樂鼓笛之流僧伽藍者此言衆園如上又翻為衆院院是順此方之稱乃舍宅庭館之名今稱僧住處為寺者寺亦此方公院之名諸侯所止之處昔西僧初來權止鴻臚寺後造白馬精舍而請居之居止雖遷以不忘其本還標寺號自此以來皆稱曰寺寄宿處者謂寓宿白衣之舍也當作是念等者正明隨開之義謂在僧寺中及寄宿處雖聽自捉教人捉金銀七寶必要先存其念豪無貪愛之心若有主來識認者我便與之然後當取也作如是因緣非餘者謂除如是作念還主因緣更無餘方便得捉也結罪是中犯者若自捉教人捉波逸提若在僧寺中若在俗舍內若寶若寶莊飾自捉若教人捉當識囊器相識裹相識繫相應解囊器看知幾連綴幾未連綴幾方幾圓幾故幾新若有求索者應問汝物何似若相應應還若不相應語言我不見如是物若二人俱來索亦如是問答若二人語俱相應應持物著前語言是汝等物各取若不爾者一切突吉羅此戒具三緣方成本罪一是真七寶及寶莊嚴具二無開緣三自捉教他捉兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若是供養塔寺莊嚴具為堅牢故收舉乃至最初未制戒等是為不犯會採根本律云若自手使人捉諸寶物已磨治者皆得墮罪未磨治者皆得惡作乃至捉假琉璃亦惡作若捉嚴身瓔珞之具皆得墮罪乃至麥莛結為鬘者捉亦惡作若捉琵琶等諸雜樂貝有絃柱者便得墮罪乃至竹筒作一絃琴執亦惡作若諸螺貝是堪吹者捉得墮罪不堪吹者亦得惡作諸鼓樂具堪與不堪得罪輕重亦同若執弓時有絃𭛆者便得墮罪無者惡作若刀有刃箭有鏃頭皆得本罪異斯惡作十誦律云捉偽珠突吉羅若人間金銀寶地牀座比丘不應行坐用天上金銀寶地牀座比丘應坐用根本雜事云不應於寶器中食或往天上或至龍宮無餘雜器者設金寶器亦應取用若果證無漏方能天上海中隨意赴供以其無餘雜器故開若在人間器多磁瓦是故全遮縱得無漏真聖必須遵守佛制以凡聖同軌故律攝云若月光珠及日光珠為出水火觸亦無犯此戒大乘為衆生故不問處所但約機緣引證律攝云佛在鷲峰入城乞食遇大雨水蕩崖崩有伏藏現告阿難陀汝應觀此是大害毒阿難言實是可畏毒有一採根果人聞而往觀見是伏藏念言願此害毒恆螫於我父母妻子眷屬亦不辭痛遂盡持歸隨意受用未生怨王見其富盛遣使往問汝於何處得王伏藏報言不得捉以送王王自問之亦云不得王即準法繫其眷屬將付屠人彼人悲泣隨屠者去高聲大喚阿難陀此是害毒此是害毒將刑有言法須返奏王便喚返問之彼人具答昔緣王時初信佛法不覺流淚告曰汝緣世尊獲斯珍寶罪雖合死我今釋汝并及眷屬應將此物供養佛僧既蒙釋免遂辦上供奉請佛僧佛為説法便獲初果緣此不聽比丘捉寶附考律攝云若於寺外見他物時以葉草等蓋覆令密不應以此為輕棄心無主來索收歸住處私自舉掌經七八日無人索者收貯僧庫經五六月又無索者應供僧伽買堅牢器具若後主索應勸諭彼令施僧伽若不肯施應酬本直若索利者應告之曰由佛制戒還汝本物更索其利是所不應僧祗律云比丘見寶物若無人識者應停至三月已若塔園中得者即作塔用若僧園中得者當作四方僧用若來索者問答相應應集衆人出寶示言長壽此是汝物不若言是應教言汝歸依佛法僧若世尊不制戒者汝眼見猶不可得若云更有餘物應言長壽我止得此更不見餘汝是惡人汝但得此已為過多云何方便妄索餘物謗人若世尊不制戒者汝尚不能見此物而況得耶若如是猶復不了者應將至優婆塞邊語言我本止得此物盡以還歸而今方見誣謗爾時優婆塞應罵言子汝得此物已為過多而今反謗比丘汝但去我當與汝作對斷理此事若是貴重寶物無人來索者至三年如上隨所得處當界用之若故壞僧房塔院欲更修治掘地得寶藏者淨人不可信應白王王若須應與若施應用設已用王知索者應乞塔物僧物還若有淨人可信者得取停至三年已用作塔事僧事如上若寶藏上有鐵券姓名亦應如實答作新僧房得物亦爾善見律云若寺內得遺寶為掌護故若去時應付與知法畏罪者囑言有主來索當還若久無主得僧舍用後主來索應將示僧房言此是檀越物若不允施欲得本者應語信心居士及廣教化之第八十三非時入聚落戒若比丘非時入聚落不囑比丘者波逸提緣起此戒二制佛在舍衛國給孤獨園時跋難陀非時入村與諸居士共摴蒲賻戲也居士不勝以慳嫉故便言比丘晨朝入村為乞食故非時入村為何事耶諸比丘聞嫌責跋難陀具白世尊此初結戒也復因比丘中或有僧事塔寺事或瞻病事等佛聽有事緣囑授已入聚落故加不囑比丘之語此第二結戒也由入村事招俗譏謗制斯學處釋義律云時者從明相出至中非時者從中後至明相未出律攝云非時有二種分齊一過午二明相未出聚落者有四種村如上不囑比丘者謂不告知餘比丘也若有僧事塔事瞻病等事當囑授餘比丘而去若獨處一房當囑授比房應作如是囑至一比丘所具儀云大德一心念我某甲比丘非時入聚落至某城邑聚落某甲舍前人答言可爾結罪是中犯者若非時入村不囑授動足初入村門波逸提一足在門內一足在門外方便欲去而不去若期不去一切突吉羅此戒具四緣方成本罪一心存放逸二時已過午三無緣不白四已入聚落兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若道由村過若有所啓白若為喚若受請若為勢力所執或被繫縛將去或命難梵行難及最初未制戒等是為不犯會採十誦律云餘比丘者謂眼所見諸凡告白應與前人面對方成故云眼所見也若白已入聚落還所住處即已先白復至聚落波逸提若不白入聚落隨所經過大小巷隨得爾所突吉羅隨入白衣家一一波逸提若八難中一一難起不犯薩婆多論云若寺在聚落外不白出寺至城門犯突吉羅僧祗律云若二比丘在阿練若住欲行展轉相告若一人説已行後人復欲行應白餘比丘若無餘比丘應作是念若道中若門若聚落邊見比丘當白白已然後入摩得勒伽云若無比丘應白比丘尼式叉摩那沙彌沙彌尼此謂或遇尼三衆白之非是特往尼寺中白也律攝云若無苾芻囑餘俗人者無犯謂寺家淨人也此戒大乘同學第八十四作高牀戒若比丘作繩牀木牀足應高如來八指除入陛孔上截竟若過者波逸提緣起佛在舍衛國給孤獨園時迦留陀夷預知世尊必從此道來即於道中敷高好牀座請佛觀看佛集諸比丘告云此癡人內懷弊惡敷高廣大牀但自為己訶責迦留陀夷與衆結戒由臥具事憍恣煩惱制斯學處釋義律云牀者有五種旋腳牀直腳牀曲腳牀插腳牀無腳牀如來八指者薩婆多論云八指者如來一指二寸也除入陛孔上者謂除牀腳上入陛木下高八指也截竟者謂量過八指應須截却已方受用也若過者謂高過八指即非應制也結罪是中犯者自作教人作成者盡波逸提自作教人不成盡突吉羅此戒具三緣方成本罪一慢敖憍恣二過量愛好三作牀已成兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若足高八指若減八指若他施已成者截而用之若脫却腳及最初未制戒等是為不犯第三分云除寶牀餘在白衣舍應坐西域國風無諸椅唯以小牀於上趺坐牀言寶者乃王及大臣長者所用會採十誦律云應截已悔過若未截僧應敕令截不敕不聽皆突吉羅五分律云得高牀施應作是念此牀不如法我當更截不作是念受波逸提僧祗律云若自作終日坐上一波逸提起已還坐一一波逸提他牀而坐上越毗尼罪若客比丘來次第付得過量牀應語知事言借我鋸來問作何等答言此牀過量欲截如法若言莫截檀越見或不喜若不久住鑿地埋腳齊量止若久住應齊埋處木筒盛腳勿使壞若檀越家坐牀腳高不得懸腳坐應索承機或索磚木承足若福德舍中牀高坐者無犯福德舍即施一食處此以護他心故爾隨開也薩婆多論云此所以不入捨墮者以截斷故截使應量入僧中悔此戒大乘同學第八十五兜羅綿貯褥戒若比丘作兜羅綿貯繩牀木牀大小褥成者波逸提緣起佛在舍衛國祗桓精舍時六羣作兜羅綿貯繩木牀大小褥諸居士見譏謂無慈心斷衆生命亦如王臣諸比丘聞白佛結戒亦由臥具事憍恣煩惱制斯學處釋義律云兜羅綿者白楊樹華楊柳樹華蒲臺華兜羅綿或云妬羅綿妬羅是樹名綿從樹生因而立稱如云柳絮也薩婆多論云兜羅綿者是草木華綿之總名也所以本律以白楊華等釋之貯者律攝云謂於牀上散布其綿便用布襌隨時掩覆大褥者為坐臥故小褥者為坐故薩婆多論云兜羅綿以是貴人所畜故人所嫌故喜生蟲故又若臥軟暖上後得寒及粗硬不堪忍故所以制之不聽結罪是中犯者若自作教他作成者盡波逸提自他作不成盡突吉羅若為他作成不成一切突吉羅此戒具四緣方成本罪一有憍貪慢敖心二是兜羅綿三自他作貯已成兼制比丘尼波逸提同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若鳩羅耶草文若草娑婆草若以毳劫貝碎弊物若用作支肩物及最初未制戒等是為不犯會採五分律云若坐坐坐波逸提若臥臥臥波逸提若他與受波逸提要先棄然後悔過若不爾罪亦深十誦律云摘破却之然後悔過若未破僧應敕令破根本律云若僧私牀座以木綿等散貯者皆得墮罪絮應撤去罪應説悔對説罪者應可問言絮撤去未若不問者得惡作罪僧祗律云若貯枕枕頭支足越毗尼罪若病無罪此戒大乘同學音義挃音質撞也謂手指觸挃也閾音域門限也謂門下橫木為內門之限也閣音蛤內中之小門也輦連上聲人步挽車駕人以行曰輦輿車也黜音出貶斥也筳音亭草莖也𭛆音讚弓絃也鏃音贖利也今為箭鏃白楊樹華楊樹略有四種白楊葉圓如梨皮白木似楊故名白楊其青楊葉長赤楊霜降則葉赤材理亦赤黃楊木性堅緻難長楊柳華是垂條細柳也本草云直木高丈餘許秋瘁春榮初生有黃蘂者是華華漸乾絮方出謂之柳絮人收取之以為裀褥絮之下有黑子隨絮而飛得水濕處便生飛入池沼於陰暗處即為浮萍人常以器盛水置絮其中數日覆之即成多積亦可以捍作氈以代羊毛也極柔軟清涼之甚宜與小兒臥加以性涼也蒲臺華或云蒲梨華蒲應作蒱臺應作薹是夫須草也襌音單衣無裏也鳩羅那草未見翻文若草十誦律云文闍草五分律云文柔草皆一也娑婆草或云婆婆草此草甚柔軟翻云膩支肩支猶薦也
