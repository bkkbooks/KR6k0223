body:
  text: 金陵寶華山弘律沙門讀體集不得佛塔下大小便應當學第七十四釋義緣處發起如上其中所犯不犯並餘四衆悉皆同前凡大小便應遠塔所在於常處不得處處漫為便利引證優鉢祗王經云伽藍法界地漫大小行者五百世身墮拔波地獄後經二十小劫常遣肘手抱此大小便處臭穢之地乃至黃泉不得向佛塔大小便應當學第七十五釋義緣處發起如上其中所犯不犯並餘四衆悉皆同前前制不聽塔下此中雖遠塔處而不應在前對向須知塔影輪相乃如來衆德所聚人天瞻仰善神守衛宜加深敬可爾為比丘者豈得褻慢不得繞佛塔四邊大小便使臭氣來入應當學第七十六釋義緣處發起如上其中所犯不犯並餘四衆悉皆同前前制四方此中兼其四隅故曰繞也則塔之周圍勿論遠近皆不得穢污使不淨之氣而熏褻也不得持佛像至大小便處應當學第七十七釋義准佛像例之則菩薩聲聞一切聖賢等像及三藏法寶皆不得持於穢處往來結罪其中所犯並餘四衆悉皆同前不犯者或道由中而過或強力者所持呼去及最初未制戒等不得在佛塔下嚼楊枝應當學第七十八不得向佛塔嚼楊枝應當學第七十九不得佛塔四邊嚼楊枝應當學第八十釋義此上三戒緣處發起其中所犯並餘四衆悉皆同前不犯者或為大鳥銜置塔邊或為風吹去及最初未制戒等律云嚼楊枝有五利益一口無臭氣二能別味三不增益熱陰四能引食五眼明若不嚼有五過反上可知會採十誦律云佛前和尚阿闍黎一切上座前佛塔前聲聞塔前俱不得嚼楊枝嚼者突吉羅同歲比丘前不犯律攝云嚼頭寸許令使柔軟然後徐徐揩齒齗牙皆使周遍僧祇律云若楊枝難得者當截所嚼處棄之洗已殘者明日更用寄歸傳云每日且朝須嚼齒木楷齒刮舌務令如法盥漱清淨方行禮敬若其不然受禮禮他悉皆得罪不得在佛塔下洟唾應當學第八十一不得向佛塔洟唾應當學第八十二不得塔四邊洟唾應當學第八十三釋義此上三戒緣處發起佛為結戒如前洟唾者乃身中流液不淨縱鼻出曰洟從口出曰唾凡為洟唾當在屏處仍須彈指謦咳而棄若老病者聽安唾器然於僧房且禁不污呪乎佛塔而不嚴慎結罪其中所犯並餘四衆悉皆同上不犯者或有如是病或大鳥銜置塔邊或為風吹去及最初未制戒等會採根本雜事云寺中四角柱下各安唾盆雖聽安置以備衆用然須蓋掩不宜恆現不得向塔舒腳坐應當學第八十四釋義緣處發起如前佛為結戒舒腳者乃縱情放逸大失威儀全無畏敬故爾禁之結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病若中有間隔或為強者所持及最初未制戒等等四分云若僧伽藍內塔滿聽在中間舒腳坐西城比丘凡得向果者涅槃皆收靈骨以建制底於寺供養故爾垢藍塔滿也不得安佛塔在下房己在上房住應當學第八十五緣起佛在拘薩羅國遊行向都子婆羅門村爾時六羣比丘安佛塔在下房己在上房諸比丘聞嫌責六羣白佛結戒上房有二種一者處所高顯為上二者妙好嚴麗為上下房亦有二種一者處所低下名下二者粗弊名下亦可以指重樓為上房結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病持如來塔在下房己在上房住或命難梵行難及最初未制戒等第四分云六羣安如來塔置不好房中己在上好房中宿佛言不應爾應安如來塔置上好房中己在不好房宿此言妙好嚴麗為上房彼安如來塔置下房己在上房宿此言重樓為上房佛言不應爾應安如來塔在上房己在下房中宿彼共如來塔同屋宿佛言不應爾有比丘為守護堅牢故而畏慎不敢共宿佛言聽安杙上若頭邊而眠彼腋下挾如來塔行反抄衣纏頸裹頭通肩披衣著革屣擔如來塔佛言不應爾應偏露右肩脫革屣若頭上若肩上擔如來塔行附考僧祗律云起寺時先規度好地作塔處應在東應在北僧地佛地不得相侵不得使僧地流水入佛地佛地水得流入僧地塔應在高顯處作不得在塔院中洗染曬衣著革屣覆頭覆肩洟唾地不得塔池中浣衣洗浴浣手面洗鉢下頭流出水得隨意用人坐己立不得為說法除病應當學第八十六釋義緣處發起如上佛結戒已時諸比丘疑不敢為病人說法故開除病乃第二制也下皆准此說法者以法自尊不為利養而弘化聽法者信樂至誠因聞解義而入理斯則兩皆獲益若說者聽者二俱失儀則彼此招過故佛大慈一一禁之結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或為王王大臣捉去及最初未制戒等會採僧祗律云若放恣諸根立為無病坐人說者越學法若比丘為塔事為僧事詣王若地主彼言為我說法不得語令起恐生疑故若邊有立人者即作意為立人說雖王聽比丘無罪人臥己坐不得為說法除病應當學第八十七釋義緣處發起其中所犯不犯並餘四衆悉皆同前臥者偃臥也縱身憍傲全無信敬故爾不得為說人在座己在非座不得為說法除病應當學第八十八釋義緣處發起所犯不犯並餘四衆悉皆同前座者乃正座也非座者不正座也乃至木枮土埵並地下皆攝非座人在高座己在下座不得為說法除病應當學第八十九釋義緣處發起其中所犯不犯並餘四衆悉皆同前高座者僧祗律云高有二種高大名高妙好者亦名高准義則下座例可分二𢍉小名下粗弊者亦名下引證善見律云世尊訶責六羣云何自在下人在高而為說法佛語比丘往昔於波羅奈國有一居士名曰車波迦其婦懷妊思菴羅果夫曰此非菴羅果時復思云唯王園中有夫夜入王園偷取未得明相出不得出園即於樹上藏住時王與婆羅門入園欲食菴羅果婆羅門在下王在高座婆羅門為王說法偷果人在樹上心自念言我今偷果事應合死我今得脫我無法王亦無法婆羅門亦無法何以故我為女人故而偷王果王猶憍慢故師在下自在高座而聽法婆羅門為貪利養故自在下座為王說法我與王婆羅門相與無法我今得脫即下樹向王說偈云一人不知法一人不見法教者不依法聽者不解法為食粳米飯及諸餘肴膳是為餐食故我言是無法為以名利故毀碎汝家法我為凡人時見人在上說法者在下言其非法何況我今汝諸弟子為在高人說法而自在下時偷果人者即如來是人在前行己在後行不得為說法除病應當學第九十釋義緣處發起其中所犯不犯並餘四衆悉皆同前若在道行而人前己後此中除病准義應是說者或眼目失明或身足有疾須人相牽故爾在後說法或強力者將去於行次間教令說法比丘故在後也會採僧祗律云若比丘眼患前人捉杖牽前為說無罪人在高經行處己在下經行處不應為說法除病應當學第九十一釋義緣處發起其中所犯不犯並餘四衆悉皆前同此中高有二種一者本自高二者壘石為基所以顯高也經行處者如佛聽作經行堂有五事利一好堪遠行二能思惟三少病四消餐食五得定久住人在道己在非道不應為說法除病應當學第九十二釋義緣處發起其中所犯不犯並餘四衆悉皆同前道者正路也非道者乃左右之旁路也不得携手在道行應當學第九十三緣起佛在舍衛國住給孤園六羣比丘携手在道行或遮男女諸居士見已皆譏嫌謂携手道行如王王大臣豪貴長者諸比丘聞有樂學戒者嫌責六羣白佛結戒携手者謂連手也比丘之儀不宜連手在道並行也結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病或有比丘患眼暗須扶接及最初未制戒等不得上樹過人除時因緣應當學第九十四緣起佛在舍衛國住祗陀林有一比丘在大樹上受夏安居於樹上大小便下樹神瞋恚諸比丘聞有知慚愧者嫌責白佛佛告比丘自今已去不得樹上安居不得繞樹大小便若先有大小便大小便無犯故為結戒時有衆多比丘向拘薩羅國遊行於道中值惡獸恐怖上樹齊人不敢過上即為惡獸所害故加除時因緣之語乃第二制也結罪其中所犯並餘四衆悉皆同前不犯者或命難梵行難及最初未制戒等此中兼制小衆為無開緣若為大僧取楊枝及華果等沙彌沙彌尼上樹無罪安居揵度云欲取樹上乾薪聽作鉤鉤取作梯取若繩取若樹通身乾聽上樹乾則無神依故開不得絡囊盛鉢貫杖頭著肩上而行應當學第九十五緣起佛在舍衛國給孤獨園時跋難陀絡囊盛鉢貫杖頭肩上擔諸居士見已謂是官人皆下道避於屏處看之乃知是跋難陀故生譏嫌有知足者聞白佛結戒結罪其中所犯並餘四衆悉皆同前不犯者或為強力者逼若被縛若命梵二難及最初未制戒等第四分云不應背負物行除寺內有老比丘須杖絡囊聽與作白二羯磨此法於作持中明人持杖不恭敬不應為說法除病應當學第九十六釋義緣處發起如前佛為結戒時諸比丘疑不敢為病人持杖者說法又開除病乃第二制也結罪其中所犯並餘四衆悉皆同前不犯者或為王王大臣及最初未制戒等會採僧祗律云若比丘在怖畏險道時防衛人言尊者為我說法彼雖持杖為說無罪人持劒不應為說法除病應當學第九十七釋義緣處發起其中所犯不犯並餘四衆悉皆同前劒者檢也所以防檢非常也或有病心亂神虗怖畏者以劒防身為說法開導安慰無犯下二戒亦爾人持鉾不應為說法除病應當學第九十八釋義緣處發起其中所犯不犯並餘四衆悉皆同前鉾乃兵器之屬如鋋而作三亷也人持刀不應為說法除病應當學第九十九釋義緣處發起等一一同前刀者有種種形亦防衛之器也人持蓋不應為說法除病應當學一百釋義緣處發起等悉皆同上蓋者傘蓋也會採僧祗律云種種能遮雨日者皆名為蓋若丘比為塔事若僧事詣王若地主彼言比丘為我說法不得令却蓋恐生疑故若邊有淨人應作意為淨人說王雖聽無罪若法師若律師風雨寒雪大熱時捉蓋為說無罪此開法律之師者為弘化功博時逢寒熱若為顯異邀名以謀利養者豈同斯例所以有益方開無功不聽非一槩允也第四分云跋難陀在道行持好大圓蓋諸居士見謂是王王大臣皆避道去不遠諦視乃知比丘佛因是譏嫌故制不聽持亦不應畜有諸比丘天雨時往大小食上若布薩時雨漬衣壞聽護衣故在寺內持以樹皮若葉若竹作蓋不應捉王大圓扇若得已成者聽受與塔若患熱聽以樹葉若枝若草若衣作扇衣謂衣財乃布帛也鼻中毛長聽以鑷拔若爪極長如一麥應剪不應綵色染爪不應以剪刀剪鬚髮應鬚髮盡剃髮極長長兩指若二月一剃不應梳鬚髮不應油塗髮不應畫眼臉患眼痛聽著藥不應以鏡若水照面若面患瘡著藥聽獨在一房以水若鏡照根本雜事云若為觀瘡或窺昔時老少形狀者覽鏡無咎不應著耳璫耳環頸瓔臂腳釧指環指印不應作鉛錫腰帶不應用五色線絡腋繫腰臂十誦律云聽載犍牛車當使餘人御不得自御梳頭刷頭突吉羅頂留少髮突吉羅留髮令長突吉羅若阿蘭若比丘長至二寸無罪若頭有瘡當以剪刀剪手摩鬚髮突吉羅洗腳時不得共他語七衆學法竟八七滅諍法諍者第三分中佛言有四種諍一言諍二覓諍三犯諍四事諍云何言諍若比丘共比丘諍言引十八諍事法非法律非律犯非犯若輕若重有殘無殘粗惡非粗惡常所行非常所行制非制說非說若以如是相共諍言語遂彼此共鬬是為言諍僧祗律名相諍律攝名評論諍云何覓諍若比丘與比丘覓罪以三舉事破戒破見破威儀見聞疑作如是相覓罪是為覓諍僧祗律名誹謗諍五分律名教誡諍律攝名非言諍云何犯諍犯七種罪波羅夷僧殘墮罪悔過法偷蘭遮突吉羅惡說是為犯諍云何事諍言諍中事作覓諍中事作犯諍中事作是為事諍滅法者言諍以二毗尼滅謂現前多人語或一毗尼滅謂現前覓諍共四毗尼滅謂現前憶念現前不癡或現前罪處所罪處所即覓罪相犯諍共三毗尼滅謂現前自言治或現前草覆地事諍以一切毗尼滅隨所犯一切者即七種滅法也隨所犯者謂於言覓犯三諍中隨作何諍之事即隨事與法也今以所起之四種諍能滅之七種法合而為名故云七滅諍法也若准犯結罪正攝第五波逸提為順戒相是以科列第八也十誦律云有六諍本本即因也一瞋恨不語二惡性欲害三貪嫉四諍曲五無慚愧六惡欲邪見是為六也僧祗律云比丘成就五法能滅諍事知是實非是不實一是利益非不利益二得伴非不得伴三得平等伴非不平等伴四得時非不得時五現前滅諍法第一應與現前毗尼當與現前毗尼緣起佛在舍衛國給孤園迦留陀夷與六羣在河中浴浴竟先上岸著六羣衣謂是己衣不看而去六羣上岸不見衣即謂彼偷去彼不現前便作滅𢷤羯磨迦留陀夷聞已有疑以此因緣白佛佛問汝以何心取答言謂是我衣不以賊心取佛言無盜心不犯不應不看衣而著不應人不現前而作羯磨自今已去為諸比丘結現前毗尼滅諍釋義律云現前者謂法毗尼人僧界也云何法現前所持法滅諍者是謂滅諍時現前有所受持之七滅諍法可據云何毗尼現前所持毗尼滅諍者是謂現前有所持學之毗尼藏滅諍非捨正義而用餘滅云何人現前言義往返者是謂諍者滅者現在前言義往返問答云何僧現前同羯磨和合集一處不來者囑授在現前得訶而不訶者是反此為之不現前云何界現前在界內羯磨作制限者是謂四方唱相白二作法已僧居法食出入有限應與當與者應者科度也當者理合如是也若明止作臨機秉御先須料度得宜然後准事施法若不當與而與者皆由罔諸毗尼不先稱量縱強施功無益招咎豈但滅諍之法應與當與凡行一切作持亦復如是若一比丘在一比丘前好言教語如法如毗尼如佛所教彼作如是言此是法是毗尼是佛所教彼即執諍者而云是法等乃信其言教心欲捨也復語云汝當受是忍可此句正是善能滅諍者誡令息諍勸共衆僧和合也若作如是諍事得滅是為言諍以一滅滅現前毗尼不用多人語也結罪若比丘諍事如法滅已若更發起者波逸提若後來比丘新受戒者謂是初諍若更發起者波逸提若一比丘為二比丘為三比丘及為僧亦如是若二比丘為一比丘為三比丘及為僧亦如是若三比丘為二比丘為一比丘及為僧亦如是若僧為一比丘為二比丘為三比丘及為僧亦如是是中現前義若能滅者四人已上其法毗尼人僧界五種一不現前則不名現前毗尼也若能滅者或但二比丘三比丘一比丘唯以法毗尼人三種現前僧界二種不現前亦名現前毗尼也上所明者是本處僧中滅法下復明異住處僧中滅法然往異處復有中途減法及到彼處滅法由言諍難滅現前事繁是以依律詳録若諍比丘不忍可僧作如是滅聞異住處有好僧好上座智人彼比丘以此諍事故應往彼住處若在道路能得如法如毗尼如佛所教滅諍者是為言諍以一滅滅為現前毗尼不用多人語若道路不能得如法滅至彼僧中上座有智慧人前作如是言我此諍事如是起如是實因是起僧作如是滅我不忍可是故來至長老所善哉長老為我如法如毗尼如佛所教滅此諍事若長老能為我等滅此諍事者我等當於長老前捨此諍事若長老不能如法如毗尼如佛所教滅此諍事者我自在作諍更令罪深重諸比丘住止不安樂彼諍比丘應如是在僧前捨諍事此僧應語彼言長老諍事若如是起如實如所因起如彼衆僧滅諍若能如實說者我等當量宜能滅此諍不若不如實說此諍事更深重非法非毗尼非佛所教諍事不得滅諸比丘不得安樂住彼僧應作如是受諍已應斷決若彼諍比丘是下座者應語言小出我等自共平此事如法律教若比丘是上座者僧應自避至餘處共平斷僧作是念我等若在僧前平此事恐更有餘事起令彼此善惡言說不了我等寧可與諸智慧人別集一處共平此事即應作白平斷此事此是作持中單白羯磨綱目內所列簡集智人法作前方便已白云大德僧聽若僧時到僧忍聽僧今集諸智慧者共別平斷事白如是白已平斷若比丘有十法者應差別平斷一持戒具足二多聞三誦二部毗尼極利四若廣解其義五若善巧言語辭辨了了堪任問答令彼歡喜六若諍事起能滅七不愛八不恚九不怖十不癡斷事比丘中有不誦戒者不知戒毗尼便捨正義作非法語者僧應白遣此比丘出應如是白此是作持中遣不誦戒者出單白法大德僧聽彼某甲比丘不誦戒不知戒比丘便捨正義作非法語若僧時到僧忍聽僧今遣此比丘出白如是白已遣出彼座斷事比丘中有誦戒不誦戒毗尼彼捨正義說少許文僧應作白遣出應如是白此是作持中遣不誦戒毗尼者出單白法大德僧聽彼某甲比丘誦戒不誦戒毗尼彼捨正義說少許文若僧時到僧忍聽僧今遣此比丘出白如是白已遣出若平斷事比丘中有法師在座彼捨正義以言辭力強說者僧應作白遣出作如是白此是作持中遣捨正義者出單白法大德僧聽此某甲比丘法師捨正法義以言辭力強說若僧時到僧忍聽僧今遣此比丘出白如是白已遣出若斷事比丘座中誦戒誦毗尼順正義如法說僧應佐助之若彼僧不如法律教滅諍者此指前本處僧而言今僧應如法律教滅此指後異住處僧言若彼僧如法律教滅今此僧亦忍可此事此所謂律無二制滅法相應也僧應語彼諍比丘言若彼僧如法律教滅此諍事我等亦忍可此事如法滅諍今我等亦當作如是滅諍若作是得滅諍者是為言諍以一滅滅現前毗尼不用多人語結罪若比丘諍事如法滅已後更發起者波逸提若後來比丘新受戒者謂是初諍而更發起者波逸提與欲已後悔者波逸提此中因有簡集人單白羯磨法所以同界住者必須依律與欲若彼諍比丘不忍可第二僧作如是滅聞異住處有衆多比丘持法持律持摩夷持論也應往彼所若至中道能滅者是為言諍以一滅滅現前毗尼不用多人語若中道不能如法滅應到彼持法律論等比丘所言長老我此諍事因如是起如是實因是起僧作如是滅第二僧亦作如是滅我不忍可故來至長老間善哉長老能如法律教滅此諍事者我當於長老間捨此事若長老不能如法律教滅我等便自在作諍更令罪深重諸比丘住止不安樂彼諍比丘應在衆多比丘前捨此事衆多比丘應語此諍比丘言若長老此諍事如實所因起如第二僧滅如實說說已捨諍我等當量宜能滅不若不如實說者此諍事自在作罪更深重諸比丘住止不安樂衆多比丘應作如是受諍受已決斷彼諍比丘若是下座者應語言小避我等欲平斷事若是上座者應自避餘處共平若彼僧不如法律教滅第二僧亦不如法律教滅衆多比丘應如法律教滅若彼僧及第二僧如法律教滅衆多比丘亦應忍可此事應語諍比丘言如彼僧滅諍我等亦忍可今當作如是滅諍是為言諍以一滅滅現前毗尼不用多人語是中現前者法毗尼人如上結罪若比丘諍事如法滅已若更發起者波逸提若後來比丘新受戒者謂是初諍若更發起者波逸提若往一比丘持法律論住處及至中道亦如上往二比丘持法律論住處及至中道亦如上比丘尼同學會採十誦律云現前毗尼有二種非法若非法者約敕非法者令折伏若非法者約敕如法者令折伏有二種如法若如法者約敕如法者令折伏若如法者約敕非法者令折伏大乘比丘同學應善和鬬諍故附考薩婆多摩得勒伽云十種不現前作羯磨一覆鉢二捨覆鉢謂俗人罵謗比丘等僧應與作羯磨不相往來然後自見過行隨順心求僧乞解僧應羯磨為解捨即解也三學家四捨學家如悔過法中所明五作房謂以故廢寺地羯磨施與居士任其更為僧修造房舍六沙彌謂擯惡見沙彌已上皆未受大戒人不得聞羯磨法故不須現前其二解及作房擯沙彌令在眼見耳不聞處立七狂謂無知故不須現前八不禮拜九不共語十不供養謂比丘非法觸惱比丘尼尼不得面治大僧唯遵佛制遙作此三種羯磨除是十法餘咸現前明矣於作持中詳顯第四分云比丘以二十二種行知是平斷事人一具足持二百五十戒二多聞三善解阿毗曇毗尼四不與人諍五亦不堅住此事六應訶者訶然後住七應教者教然後住八應擯者擯然後住九不愛十不恚十一不怖十二不癡十三不受此部飲食十四不受彼部飲食十五不受此部衣鉢坐具針筒十六不受彼部衣鉢坐具針筒十七不供給此部十八亦不供給彼部十九不共此部入村二十亦不共彼部入村二十一不與作期要二十二亦不至彼後來後坐僧祗律云有七事非他邏哋似他邏哋亦作闥賴吒薩婆多論云闥賴名地吒利名住智勝自在於正法不動如人住地無傾覆也何等七或有狂故不著此衆不著彼衆謂是他邏咃是最初非他邏咃似他邏咃如是心亂鈍癡病病故不著此衆不著彼衆復次或有人為利故作是念若我著此衆失彼利著彼衆失此利是二俱不著復次或有人得二衆利故作是念我為得二邊利故不著此衆不著彼衆是名非他邏咃似他邏咃有二他邏咃一者自護心見他是非作是念業行作者自知譬如失火但自救身焉知他事二者待時見他諍訟相言作是念此諍訟相言時到自當判斷是二他邏咃共此衆法食味食亦共彼衆法食味食或請斷當事或不請而斷當事十誦律云闥利吒比丘取諍時應以五事觀此中誰先來持戒清淨誰多聞智慧善誦阿含誰於師如法誰信佛法僧誰不輕佛戒烏回鳩羅比丘有十事僧應差薩婆多論云烏𢌞名二鳩羅名平等心無二其平如稱知諍來往處根本善知諍能分別諍知諍起因緣知諍義善滅諍滅已更不令起持戒清淨多聞多智闥利吒比丘行有二十二法當知是利根多聞一善知事起根本二善分別事相三善知事差別四善知事本末五善知事輕重六善知除滅事七善知滅事更不起八善知作事人有事人九有教敕力十能使人受力十一有方便軟語力十二亦能使人受十三有自折伏力十四亦能使人受十五知慚愧十六心不憍慢十七無憍慢語十八身口意業無偏著十九不隨愛行二十不隨瞋行二十一不隨怖行二十二不隨癡行憶念滅諍法第二應與憶念毗尼當與憶念毗尼緣起佛在王舍城沓婆羅子不犯重罪諸比丘皆言犯重罪問言汝犯重罪波羅夷僧殘偷蘭遮彼不憶犯便答言我不憶犯如是重罪長老莫數數詰問我而諸比丘故詰問不止彼作如是念我當云何諸比丘白佛佛言自今已去與諸比丘結憶念毗尼滅諍白四羯磨此羯磨法於作持中詳明釋義律云憶念毗尼者彼比丘此罪更不應舉不應作憶念者是憶者記憶也念者明記不忘也由諸比丘數數令其憶念不止佛聽僧作憶念毗尼已使諸比丘不得數數詰問故作如是諍事滅是為覓諍以二滅滅現前毗尼憶念毗尼不用不癡毗尼罪處所是中現前法毗尼人僧界如上結罪若比丘諍事如法滅已後更發起者波逸提比丘尼同學會採十誦律云憶念毗尼有三非法有比丘犯無殘罪自言犯有殘罪從僧乞憶念毗尼若與者非法應滅擯故有比丘狂癡還得心從僧乞憶念毗尼若與者非法應與不癡毗尼故有比丘有見聞疑罪自言我有是罪後言我無是罪從僧乞憶念毗尼若與者非法應與實覓毗尼即覓罪相有三如法有比丘被無根謗若人常說是事應與憶念毗尼有比丘犯罪已悔除若人猶說是事應與憶念毗尼有比丘未犯是罪將必當犯若人說犯是事應與憶念毗尼薩婆多論云此法是守護毗尼五衆五篇盡與憶念必要白四羯磨小三衆不現前不癡滅諍法第三應與不癡毗尼當與不癡毗尼緣起佛在王舍城難陀比丘癡狂心亂多犯衆罪後還得心諸比丘詰問不止以此因緣白佛佛言自今已去與諸比丘結不癡毗尼滅諍白四羯磨此羯磨法於作持中詳明釋義律云不癡毗尼者彼比丘此罪更不應舉不應作憶念者是若如是滅者是為覓諍以二滅滅現前毗尼不癡毗尼不用憶念毗尼罪處所是中現前如上五種結罪彼比丘諍事如法滅已後更發起者波逸提比丘尼同學會採十誦律云不癡毗尼有四種非法有比丘不癡狂現癡狂相問時答言我憶念癡故作一他人教我使作二憶夢中作三憶裸形東西走立大小便四是人乞不癡毗尼若與者非法有四種如法有比丘實狂癡心顛倒問時答言不憶念一他不教我二不憶夢中作三不憶裸形東西走立大小便四是人乞不癡毗尼若與者如法薩婆多論云此亦是守護毗尼五衆盡與不癡毗尼必要白四小三衆不現前自言治滅諍法第四應與自言治當與自言治緣起佛在瞻波城十五日布薩時衆僧圍繞在露地坐初夜已過阿難起座禮畢白言初夜已過願世尊說戒世尊默然阿難却座中夜後已過明相已出阿難復請世尊說戒佛告阿難衆不清淨欲令如來於中羯磨說戒無有是處目連以淨天眼觀察衆中見彼比丘去佛不遠坐非沙門非淨行自言是沙門是淨行起座往彼比丘所語言汝今可起世尊知汝見汝出去滅去便捉臂牽出門外還白世尊衆已清淨願世尊說戒佛告目連不應如是若於異時亦不應如是令彼伏罪然後與罪不應不自伏罪而與罪自今已去為諸比丘結自言治滅諍釋義律云自言者說罪名說罪種懺悔者是云何治自責汝心生厭離者是五篇禁制為之罪名也一一戒中所犯不同各有罪種也若比丘犯罪欲在一比丘前懺悔應至一清淨比丘前偏袒右肩若是上座禮足胡跪合掌說罪名說罪種作如是言長老一心念我某甲比丘犯某罪今從長老懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不敢覆藏願長老憶我清淨戒身具足清淨布薩如是三說受懺者應語言自責汝心生厭離答言爾若作如是諍事滅者是為犯諍以二滅滅現前毗尼自言治不用如草覆地是中現前者法毗尼如上人現前者受懺悔者是也結罪若比丘諍事如法滅已後更發起者波逸提若欲二比丘前懺悔者唯異受懺者應先問彼第二比丘若長老聽我受某甲比丘懺者我當受第二比丘應言可爾餘詞同上若三比丘前懺亦如是若僧中懺者其受懺者應先作白餘詞同上更有八品小罪及心念責心等法此不繁於作持中詳明比丘尼同學會採十誦律云自言滅諍有十種非法若犯五篇罪自言不犯又不犯五篇罪自言犯有十種如法若犯五篇罪自言犯若不犯五篇罪自言不犯薩婆多論云自言滅諍法五衆有事及五篇戒有犯不犯事盡自言治而滅之覓罪滅諍法第五應與覓罪相當與覓罪相緣起佛在釋氏國象力比丘喜論議共外道論得切問時前後言語相違於僧中問時亦復如是言語相違在衆中故作妄語外道譏嫌諸比丘白佛佛言自今已去為諸比丘結罪處所滅諍法白四羯磨此羯磨於作持中詳明釋義律云覓罪相亦名罪處所云何罪處所彼比丘此罪與作舉作憶念者是根本律作求罪自性十誦律作實覓罪勒伽論云實覓罪者先犯罪已發露後覆藏五分律作本言治若如是諍事滅是為覓諍以二滅滅現前毗尼罪處所不用憶念毗尼不癡毗尼現前義如上五種結罪若比丘諍事如法滅已後更發起者波逸提比丘尼同學律云有三非法與罪處所毗尼不作舉不作憶念不自言有三如法反上即是復有三非法無犯犯不可懺罪若犯罪已懺有三如法反上是復有三非法不舉非法別衆不作憶念非法別衆不現前非法別衆反上即是三如法會採十誦律云實覓滅諍有五非法有比丘犯五篇罪先言不犯後言犯若與實覓毗尼者非法應隨所犯治故有五如法有比丘犯五篇罪先言犯後言不犯是人應與實覓毗尼僧祗律云與覓罪相羯磨已此人盡壽應行八事一不得度人二不得與人受具足三不得與人依止四不得受比丘按摩五不得受比丘供給六不得作比丘使七不得次第差會八不得為僧作說法人薩婆多毗婆沙云此覓罪相是折伏毗尼一切五篇一切五衆盡與實覓毗尼白四小三衆不現前多人語滅諍法第六應與多人語當與多人語緣起佛在舍衛國比丘共諍時舍衛衆僧如法滅諍彼諍比丘不忍可僧滅諍事聞異住處僧及衆多比丘住處滅諍皆不忍可如現前毗尼中往返由現前毗尼不能滅故復制此法便至佛所禮足已具白不忍滅諍因緣佛種種訶責已告諸比丘應求多人覓罪自今已去為諸比丘結用多人語滅諍法釋義律云用多人語者用多人知法者語聽行籌薩婆多論云多覓毗尼者多求因緣斷謂廣尋三藏決了是佛非佛多處求斷謂遍詣諸僧伽藍處所是佛非佛從多處斷謂以如法籌者為是所以行籌者以籌表語也應差行籌人白二羯磨此法於作持中詳明有五法不應差有愛有恚有怖有癡不知已行未行反上為五如法應差十誦律云一切應和合集一處不得取欲有三種行籌一顯露二覆藏三就耳語云何顯露行籌若衆中雖如法比丘多然彼和尚阿闍黎皆如法又上座智人持法持毗尼持摩夷皆如法說應顯露行籌應作二種籌一破二完應作白此即受差人於衆僧前正中而立手捧籌盤口白衆云作如是語者捉不破籌謂言是法是毗尼是佛所教者捉此不破籌作如是語者捉破籌謂言非法非毗尼非佛所教者捉此破籌行已應別處數於屏處先數所捉完破之籌多少其諍能滅不能滅唯行籌者密諳若法不密恐事增紛若如法語比丘多者彼應作白云作如是語者諍事滅此處准義加儀彼行籌者於衆中作是白已僧中上座應讚言善哉今諍已滅住止安樂諸長老一齊起座作禮三拜各歸本所勤修道業普衆作禮已散去若法語比丘少者即應作禮已便起去應遣信往比丘住處僧中白言彼住處非法比丘多善哉長老能往至彼若如法語比丘多諍事滅功德多此比丘聞應往若不往如法治若作如是諍事滅者是為言諍以二滅滅現前毗尼用多人語現前義五種如上云何覆藏行籌謂蓋覆非顯露籌盤而行使衆不見若衆中雖如法比丘多而彼二師不如法又上座智人等皆住非法若顯露行籌恐諸比丘隨二師上座等捉籌應覆藏行籌應作白作如是語者捉不破籌作如是語者捉破籌行已應別處數乃至此比丘聞應往若不住如法治若作如是諍事滅者是為言諍以二滅滅現前毗尼用多人語現前義如上云何耳語行籌若衆中雖如法比丘多而彼二師非法說及上座等皆住非法應耳語行籌應作白作如是語者捉不破籌作如是語者捉破籌行籌時應稀坐間容一人身小障翳此為行籌人便於曲身就耳語以遮障捉籌者令彼二師上座等不能見籌及聞聲故語言汝和尚同和尚阿闍黎同阿闍黎親厚知識等已捉籌此籌指不破者言善哉汝亦當捉籌若如法比丘多諍事得滅功德多此乃方便勸誘之令捉如法籌也行捉已在一面數之乃至諍事滅功德多此比丘聞應往不往如法治若作如是諍事滅者是為言諍以二滅滅現前毗尼用多人語現前義如上五種結罪若比丘行三種籌如法滅諍已後更發起者一一波逸提比丘尼同學律云有十種不如法捉籌一不解捉籌於此諍事不決了不知是法非法乃至是說非說二不與善伴共捉籌若比丘多聞持法持毗尼持摩夷不與作伴法非法乃至說非說三欲令非法者多捉籌彼比丘作念此諍事多有如法比丘我今當捉非法籌令非法者多四知非法多捉籌彼比丘作念此諍事非法比丘多為非法伴捉籌五欲令僧破捉籌彼作念此諍事如法者多我今捉非法籌令僧破六知衆僧當破捉籌彼比丘知非法者多為非法伴黨捉籌七非法捉籌白二白四羯磨白異羯磨異八別衆捉籌同一界羯磨不盡集應囑授者不囑授現前應訶者便訶九以小犯事捉籌或念犯罪或不故犯或發心作如是捉籌十不如所見捉籌異見異忍是為不如所見此十種中一一皆以越毗尼治之有十種如法捉籌反上即是會採十誦律云說如法者為作長籌說非法者為作短籌說如法者為作白籌說非法者為作黑籌說如法籌以右手捉說非法籌以左手捉先行說如法籌後行說非法籌一切僧應和合集一處不得取欲僧祗律云行籌訖若非法籌乃至多一者不應唱非法人多如法人少當作方便解坐或前食欲至者應唱令前食或後食時或浴時說法時說毗尼時隨應唱之若非法者覺言我等得勝為我等故解坐我等今不起即要此坐決斷是事爾時精舍邊若有小屋無蟲者應使淨人故放火已唱言火起火起即便散起救火乃往覓如法伴附考五分律云若如法人多應白二羯磨滅之唱言大德僧聽若僧時到僧忍聽僧今以多人語滅此諍事白如是大德僧聽僧今以多人語滅此諍事誰諸長老忍僧以多人語滅此諍事者默然誰不忍者說僧已忍僧今以多人語滅此諍事竟僧忍默然故是事如是持草覆地滅諍法第七應與如草覆地當與如草覆地緣起佛在舍衛國諸比丘共諍多犯衆罪非沙門法亦作亦說出入無限後諸比丘作是念我曹若還共問此事或能令此諍轉深重經歷年月不得滅令僧不得安樂住以是白佛佛言應滅此諍事自今已去為諸比丘結如草覆地滅諍法釋義律云草覆地者不稱說罪名罪種懺悔者是五分律云草布地者彼諸比丘不復說鬬原僧亦不更問事根本彼一衆中有智慧堪能比丘從座起偏露右肩右膝著地合掌作如是言諸長老我等此諍事多犯衆罪非沙門法言無齊限出入行來不順威儀若我等尋究此事恐令罪深重不得如法如毗尼如佛所教諍事滅令諸比丘住止不安樂若長老忍者我今為諸長老作如草覆地懺悔此罪第二衆中亦如是說彼兩衆比丘各向大衆說已俱還本座彼諸比丘應作如是白即此衆中能羯磨者坐白此法是作持中之草覆地單白羯磨法也大德僧聽若僧時到僧忍聽僧今此諍事作草覆地懺悔白如是白是已作草覆地懺悔是一衆中有智慧堪能者仍是前人從座起右膝著地合掌作如是白諸長老我今此諸諍事己所犯罪除重罪遮不至白衣家羯磨若諸長老聽者為諸長老及己作草覆地懺悔此處宜會十誦五分用之以法喻雙明則草覆地之名愈顯矣推本律義足文缺故當補第二衆亦應作如是說是中言除重罪等者謂一切因諍所犯波逸提突吉羅惡說等罪以草覆地懺悔悉皆除滅唯除前二篇及遮不至白衣家羯磨此則或擯或治不以草覆地而能同懺解也若作如是諍事滅者是為犯諍以二滅滅現前毗尼草覆地不用自言治現前義如上結罪若比丘諍事如法滅已後更發起者波逸提比丘尼同學會採十誦律云草覆地有二義一鬬諍數起諍人亦多其事轉衆推其原本難可知處佛聽布草除滅如亂草難可整理亂來棄之二者有德上座勸喻諍者使向兩衆羊皮四布悔過即五分律所謂皆舒手腳伏地今云羊皮四布者是喻也兩衆者各有所助故令各在一處此謂會集作法皆令兩分各衆五分律云若有比丘鬬諍相罵作身口意惡業後欲於僧中除罪作草布地悔過應三乞已皆舒手腳伏地向羯磨者一心聽受彼為白四羯磨又十誦律云有五事諍難滅不求僧斷一不信佛語二不如法白三二衆諍心不息四所犯不求清淨五反上五事者易滅根本目得迦云有二苾芻共生瑕隙種種異言互相讟謗於此二人應信持戒者若二俱持戒應信多聞者若二俱多聞應信少欲者若二俱少欲應信極少欲者若二俱極少欲而生瑕隙無有是處此顯凡情未盡習氣全存遇境逢緣八七滅寧不嚴慎若無欲情亡則是非絶諍諍法竟音義都子婆羅門村五分律云都夷婆羅門聚落在拘薩羅國界舍衛大城西北六十餘里元是迦葉佛本生之處也菴羅果亦云菴婆羅亦云菴摩羅舊翻為奈新翻難分別其果似桃非桃似奈非奈又生熟難分鋌音禪小矛也臉音檢目上下臉也杙音亦橛也門中橛為闑又木段即杙也曲禮云大夫士入君門由闑右闑音孽
