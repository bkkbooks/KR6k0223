body:
  text: 金陵寶華山弘律沙門讀體集第八十六作骨牙針筒戒若比丘作骨牙角針筒刳刮成者波逸提緣起佛在羅閲城靈鷲山中時有信樂工師為比丘作骨牙角針筒以是故廢家事業財物竭盡無復衣食世人譏其求福得殃有慚愧比丘聞知白佛結戒由針筒事譏嫌煩惱制斯學處釋義作者若自作若遣人作骨牙角者僧祗律云骨者象馬牛駝龍骨等牙者象魚豬牙等角者牛犀鹿羊角等針筒者是比丘六物中之一也有二種作一筒形二合形若用上三種作此二形皆不聽律攝云針筒有二種應畜一葦二鐵復有自種應畜謂銅鐵鑰石及以赤銅刳刮者刳謂剖內以空其中刮謂剗削其外以瑩其表也結罪是中犯者自作教他成者盡波逸提若自若教他作作而不成盡突吉羅此戒具三緣方成本罪一有貪愛心二是骨牙角三作成受用兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者用鐵銅鉛錫白鑞竹木葦草作及最初未制戒等是為不犯會採十誦律云應破已悔過若未破僧應敕令破根本律云應打碎其罪說悔其所對之人應問云爾針筒打碎未若不問者得惡作罪薩婆多論云以是小物故所以不入三十事又應破故若還主主不受若與他則生惱施僧則非法惟毀棄也此戒大乘同學附考律攝云畜針筒者應密藏舉若無慚愧苾芻及未具人借不應與能善愛護者應與貯畜針刀恐鐵生垢應以蠟布裹之謂灸蠟拭布帛第八十七過量作坐具戒若比丘作尼師壇當應量作是中量者長佛二磔手廣一磔手半更增廣長各半磔手若過截竟波逸提緣起此戒有二制佛在舍衛國給孤獨園按行僧房見衆僧臥具敷在露地不淨所污諸比丘受供還園世尊以此因緣集僧告衆而訶責云當知此污是有欲人是瞋恚人是癡人非是無欲無瞋癡人若比丘念不散亂而睡眠無有是事況阿羅漢自今已去聽諸比丘為障身障衣障臥具故作尼師壇六羣便廣大作有慚愧者見知白佛此初結戒也時迦留陀夷體大尼師壇小不能坐向佛所從來道邊以手挽尼師壇欲令廣大佛知而故問乃聽更益廣長各半磔手此第二結戒也由臥具事制斯學處釋義文分三節若比丘下明其創制更增下明其隨開若過者結成所犯尼師壇者亦云尼師但那唐言敷具或云隨坐衣又云襯足衣謂坐臥時敷於坐臥之上隨坐隨臥無令垢穢污於臥具所以制意本為障身障衣障臥具故事鈔云為身者恐坐地上有所損故次為衣者恐無所替三衣易壞故為臥具者恐身不淨污僧牀褥故量者是所制數量以定廣長之式也長佛二磔手廣一磔手半佛一磔手唐尺一尺六寸謂長量三尺二寸廣量二尺四寸更增廣長各半磔手者半磔手八寸也謂廣長正量之外各增益八寸此則長量有四尺廣量有三尺二寸足堪坐臥也截竟者謂不依量而作當令截却如量罪應求悔也結罪是中犯者若長中過量廣中不過廣中過量長中不過廣長俱過量自作若教他使作成者盡波逸提作不成者盡突吉羅此戒具三緣方成本罪一心貪廣長二故慢聖制三作已成兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者應量作減量作若從他得已成者截割如量若疊作兩重及最初未制戒等是為不犯會採十誦律云應截斷已悔過若未截僧應敕令截僧祗律云若過量者截已波逸提悔過不截而悔越毗尼罪此不截而悔罪治不敕不聽此戒大乘同學附考根本羯磨云時有苾芻以雜色物作尼師但那守持長留縷𦆠𦆠音衛織餘也時婆羅門及諸俗侶便生譏笑佛言凡為坐具應作兩重染令壞色第三分云必須截斷縫刺為葉四邊帖緣律攝云尼師但那應兩重作疊為三分在下一分應截斷作葉與三衣葉同所以南山錯裁臥具天人指受蓋式如此也十誦律云新者二重故者四重不應受單尼師壇先受者不應捨僧祗律云聽兩重作不得趣爾厭課持小故㲲復課者試也謂厭用也及疊量縮量水濕量欲令乾已長大若用欽婆羅一重作劫貝二重作此是隨坐衣不得作三衣不得淨施取薪草盛雜物唯得敷坐若道路行得長疊著衣囊上肩上擔至坐處取坐之若置本處當中掩之欲坐徐舒先手按後方坐義淨師注云此中制意者尼師但那本為襯替臥具恐有所損不擬餘用然其大量與自身等頂上餘有一磔手在斯乃正與臥具相當若其量小不堪替臥又按諸部多云長中增一磔手唯本律文云更增廣長各半磔今故贅之俾曉根本律云長中更增一張手十誦律云縷邊益一磔手薩婆多論云聽益縷際者謂從織邊唯於一頭更益一磔五分律云續方一磔手謂截作三分續長頭餘一分帖四角不帖則已僧祗律云益磔者二重三重對頭却刺第八十八過量作覆瘡衣戒若比丘作覆瘡衣當應量作是中量者長佛四磔手廣二磔手截竟過者波逸提緣起佛在舍衛國給孤獨園時諸比丘患種種瘡膿血污身污衣污臥具佛聽畜覆瘡衣所作衣粗多毛著瘡舉衣患痛白佛復聽以大價細軟衣覆瘡上後著衣裙若至白衣家請坐時應語言我有患若言但坐當褰上涅槃僧以此衣覆瘡而坐時六羣聞已便多作廣長覆瘡衣諸比丘見知白佛結戒由過量而作制斯學處釋義文分二節若比丘下明制衣量截竟等結成所犯律云覆瘡衣者有種種瘡病持用覆身長佛四磔手者謂長量六尺四寸廣二磔手者謂廣量三尺二寸截竟等如上結罪是中犯者若長中應量廣中不應量長中不應量廣中應量若廣長俱不應量自作教人作成者盡波逸提若不成盡突吉羅若為人作成不成盡突吉羅此戒具三緣方成本罪一有貪慢心二過量作成三自他作竟兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者應量減量作若從他得裁割如量若疊作兩重及最初未制戒等是為不犯會採僧祗律云此覆瘡衣是隨身衣不得作三衣及淨施乃至雜用瘡瘥已得作三衣及淨施餘用十誦律云乃至瘡瘥後十日若過是畜波逸提此恐譯筆之誤應同長衣犯捨墮應截斷悔過若未截僧應敕令截僧祗律云若過量截已悔過不截而悔越毗尼罪不截亦兼能所此戒大乘同學附考按根本部令加法受持既受持已則無長衣之過向一如法苾芻所具儀言云大德一心念我苾芻某甲此覆瘡衣應量作今受持三說彼應報言爾答云善准此則十誦筆誤可知第八十九過量作雨浴衣戒若比丘作雨浴衣當應量作是中量者長佛六磔手廣二磔手半過者截竟波逸提緣起佛在舍衛國給孤獨園時六羣比丘聞毗舍佉母請願佛聽諸比丘作雨浴衣輒多作廣大雨浴衣有樂學戒者嫌責白佛結戒由雨衣過量制斯學處釋義律云雨浴衣者謂比丘著在雨中洗浴用覆身故長佛六磔手者謂長量九尺六寸廣二磔手半者廣量四尺截竟如上結罪是中犯者若長中不應量廣中應量長中應量廣中不應量若廣長俱不應量自作教他作成者盡波逸提不成者盡突吉羅若為人作成不成盡突吉羅此戒具三緣方成本罪一是雨浴衣二故過量作三作已成兼制比丘尼突吉羅尼無雨浴衣按尼律中唯聽畜浴衣若過量犯波逸提式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者應量減量作若從他得裁割如量若疊作兩重及最初未制戒等是為不犯會採十誦律云應截斷已悔過若未割截僧應敕令割截僧祗律云不截而悔越毗尼罪此戒大乘同學第九十等佛衣量戒若比丘與如來等量作衣或過量作者波逸提是中如來衣量者長佛十磔手廣六磔手是謂如來衣量緣起佛在釋翅搜尼拘類園尊者難陀此是佛弟難陀短佛四指諸比丘遙見來皆謂是佛即起奉迎至乃知之彼此俱懷慚愧佛聽難陀著黑色衣以別之謂以黑泥染成壞色薩婆多論云佛衣色如金結施加毛㲲色亦爾故難陀宜當覆沙覆沙此翻壞色時六羣與如來等量作衣或過重作諸比丘嫌責白佛結戒根本律云塢波難陀作大支筏羅縫刺既竟但披一邊餘聚肩上詣諸住處因招譏過制斯學處此由身小衣大不相應故所以半披半聚肩上釋義文分二節若比丘下明其所犯是中下正明衣量律云衣者有十種如上如來者是佛十號之首謂凡夫來而不如聲聞如而不來唯世尊來而能如如而能來有異凡夫聲聞也如來衣量等者長佛十磔手准今一丈六尺廣六磔手有九尺六寸寬薩婆多論云佛衣量佛身丈六常人半之衣量廣長當應半也結罪是中犯者若比丘等如來衣量長中不應量廣中應量廣中不應量長中應量若廣長中俱不應量自作教他作成者盡波逸提自他作不成盡突吉羅若為他作成不成盡突吉羅此戒具三緣方成本罪一有慢教心二貪廣長三過量作成兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若從他得作成衣當截割如量若不割截疊作兩重及最初未制戒等是為不犯會採十誦律云應截已悔過若未截僧應敕令截僧祗律云若不截而悔過越毗尼罪此戒大乘同學附考僧祗律云當隨自身量僧伽梨有三種上者長五肘廣三肘肘者從臂節腕至舒指尖為一肘中人一肘一尺八寸中者長五肘一不舒手謂四肘舒指尖一肘拳手也廣三肘一不舒手下者長四肘半廣三肘一不舒手多羅僧亦復如是安陀會上中二種亦爾下者長四肘半廣二肘一不舒手律攝云總有三品僧伽胝衣上者用自肘量竪三橫五下者各減半肘二內名中七條五條亦有三品並同此量復有二種五條衣竪二橫五竪二橫四但蓋三輪是謂守持衣極之小量謂上但蓋臍下掩兩膝若肘長者則與此相當如臂短者不及於膝宜依肘長為準若身長大而肘短者依身為量不依肘量若翻此者亦依身量五分律云肘量長短不定佛令隨身分量本律云度身而衣五九十波羅提法竟六波羅提提舍尼法有四條然此皆由貪故而長貪惑壞他信敬故佛禁之波羅提提舍尼者此無正翻事鈔准義翻云向彼悔然一切罪皆應向他說悔何故此中獨名向彼悔根本律攝云謂於住處現有苾芻皆須一一別對陳說不同餘罪故受別名又犯罪已即須陳說不得停息亦異餘罪按僧祗十誦及本部此罪應向一人邊一說發露悔過罪便得除也經云犯波羅提提舍尼如三十三天壽千歲墮泥犁中人間一百年彼天一晝夜於人間數三千六百萬歲此泥犁即黑繩地獄謂以熱鐵繩絣量肢體後方斬鋸故第一受非親里尼食戒若比丘入村中從非親里比丘尼若無病自手取食食者是比丘應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法緣起此戒有二制佛在舍衛國給狐獨園時世穀貴人民饑餓乞求難得蓮華色比丘尼初日乞所得食持與比丘二日三日亦如是復持鉢入城乞食路逢長者乘車覲王從者驅人尼因避道墮深泥中面掩地而臥長者慈愍敕人扶出問知其故乃嫌責比丘不知義讓即請尼還家浣衣供食語言自今已去可常在我家食勿復餘去若外有所得者隨意與人諸比丘聞知白佛世尊集十句義初為僧結戒也時諸比丘皆有疑不敢取親里尼食復有諸病比丘不敢受非親里尼食佛皆聽之故有非親里及無病自手取食之語此第二結戒也由苾芻尼事譏嫌煩惱制斯學處乃初篇殺根本種類釋義文分二節若比丘下明所犯之事是比丘下明悔過之法入村中者言村中揀非村外空處村有四種如上明非親里比丘尼者親里如上尼既非親則不應向彼求索無病自手受食者無病則無開緣僧祗律云病者不謂小病謂疥癩黃爛瘡痍癰痤人所惡賤自手取食者揀非置地與使人授與謂是自手或持器從他受取二五食以吞咽也是比丘者即犯過之人餘比丘者謂善受具足持戒之人可訶法者謂所作非善是佛遮止既違所制理應訶責也所不應為者謂非知足慚愧比丘所應為也今向大德悔過者謂不敢隱覆自言以雪其所犯也是法名悔過法者此句結歸篇聚之名令知守持善見律云此戒體無罪名一人邊一說悔過結罪是中犯者若不病而自手受如是食食咽咽波羅提提舍尼此戒具五緣方成本罪一尼非親里二非親尼想疑三自身無病四村中自取五隨食入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者受親里尼食若有病若置地與若使人授與若在僧伽藍中若在村外在村外聽者由犯緣於城中發起也若在比丘尼寺內與及最初未制戒等是為不犯會採五分律云若比丘在村外尼在村內若比丘在村內尼在村外若比丘在空尼在地若尼在空比丘在地皆突吉羅薩婆多論云若一時取十五種食一波羅提提舍尼若一一取十五波羅提提舍尼十五種食謂五正食非五正食及麥粟稻麻荍未作飯餅盡名五似食律攝云實非親尼作親尼想及疑皆得本罪親作非親想及疑皆得突吉羅於親作非親想無犯此戒大乘不問親里非親但觀可受不可受然在末法世更宜與尼疏絶為善第二不止尼代索食戒若比丘至白衣家內食是中有比丘尼指示與某甲羮與某甲飯比丘應語彼比丘尼如是言大姊且止須比丘食竟若無一比丘語彼比丘尼如是言大姊且止須比丘食竟者是比丘應悔過言大德我犯可訶法所不應為我今向諸大德悔過是法名悔過法緣起佛在舍衛國給狐獨園有衆多比丘與六羣在白衣家內共座食時六羣尼與六羣索羮飯語言與此羮與此飯而捨中間不與乃越次與諸比丘聞中有少欲者嫌責六羣白佛結戒由飲食事譏嫌煩惱制斯學處乃初篇妄根本種類釋義文分三節若比丘下明受食之儀若無一比丘下明所化之事是比丘下明悔過之法指示者謂處分其事也與者謂非平等行食乃越次偏與也羮飯者顯非粗食也大姊且止者女兄曰姊律制比丘稱諸尼衆通言大姊且止二字是出訶止之言止其少停須待衆人食竟也若無一比丘等者謂現前大衆中乃至無一人訶止彼比丘尼是食比丘即得本罪向諸大德悔過者謂是食比丘應對現前衆比丘說悔其罪不同餘三戒但對一人邊露悔即得除滅故云向諸大德悔過也結罪是中犯者若無一比丘訶止而食者咽咽波羅提提舍尼此戒具四緣方成本罪一是白衣家二比丘尼指示三不遮令止四受食入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語言且止若比丘尼自為檀越若檀越設食令比丘尼處分若不偏為與此置彼及最初未制戒等是為不犯會採僧祗律云語言大姊小止須諸比丘食竟若止者善若不止者若二若三語若不語受者越毗尼罪食犯悔過法薩婆多論云若二部僧共坐一部僧中若有一人語是比丘尼者第二部僧亦名為語若別入別坐別食別出者是中入檀越門比丘應問出比丘何比丘尼是中教檀越與比丘食若言某應問約敕未答言已約敕是入比丘亦名約敕有諸比丘出城門時有比丘入者應問出者若出未約敕入者應約敕若出約敕入者亦名約敕五分律云若式叉摩那沙彌尼教益食不語言小却者突吉羅此戒大乘同學附考按本部及僧祗部若衆中無一比丘訶止一切比丘食者皆得罪而僧祗惟令向一人悔過准義須知若食者是下座應依本部若食者是上座當如僧祗第三學家受食戒若先作學家羯磨若比丘於如是學家先不請無病自手受食食是比丘應向餘比丘悔過言我犯可訶法所不應為我今向大德悔過是法名悔過法緣起此戒有二制佛在羅閲城耆闍崛山中有居士家夫婦俱得信樂為佛弟子然諸佛見諦弟子常法於諸比丘乃至身肉無所愛惜常與供養遂貧窮衣食乏盡比居諸人皆云家先大富從供養沙門釋子已來貧窮乃爾有少欲慚愧比丘聞知白佛佛聽僧與居士作與家白二羯磨此羯磨法於作時中明故制云若比丘知是學家與作羯磨竟而在其家受飲食食當向餘比丘悔過此初結戒也於是比丘中先受學家請皆有疑不敢往復有病比丘有疑不敢受學家請佛俱聽之故加先不受請無病自手受食之語此第二結戒也由乞食事譏嫌煩惱制斯學處乃初篇盜根本種類釋義文分二節若先作學家羯磨下明所犯之事是比丘下明悔過之法學家者律攝云謂預流果一來果不還果以其初二三果惑漏未盡還須學斷故名為學家乃四姓之家惟此學人處在居家而獲果證若阿羅漢名無學人必要遠離欲愛盡諸有漏方證四果非處居家而能獲也羯磨者謂彼夫婦俱證聖果於三寶中無所慳惜家事貧乏僧乃為作遮護法不至其家而受飲食不同治罪遮不至白衣家法也如是學家者謂僧已作羯磨之學家也先不受請無病者謂雖與作羯磨而彼未請亦非有病則無開緣也結罪是中犯者先不受請又無病於如是學家中自手受飲食者咽咽波羅提提舍尼此戒具三緣方成本罪一是羯磨學家二不請無病三受食入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先受請若有病若置地與若從人受取若學家施與後財物還多彼從僧乞解學家羯磨及最初未制戒等是為不犯此戒大乘同學附考五分律云若婦是聖夫是凡或夫是聖婦是凡皆不應與作學家羯磨若夫婦俱是聖無慳貪心財物竭盡乃與作學家羯磨若僧有園田應與令知使畢常限餘以自供若無園田乞食得已就其家食與以所餘若不能爾應將至僧坊給其房舍臥具次第與食非時漿飲皆悉與之有可分衣亦應與分彼學家婦女諸尼亦應如是料理第四恐處受食戒若比丘在阿蘭若逈遠有疑恐怖處若比丘在如是阿蘭若處住先不語檀越若僧伽藍外不受食在僧伽藍內無病自手受食食者應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是名悔過法緣起此戒有二制佛在釋翅搜國尼拘類園中時舍夷城諸婦女持飲食詣僧伽藍中供養盜賊聞之於道路嬈觸諸比丘白佛佛言自今應語諸婦女莫出道路有賊恐怖若已出城應語言莫至僧伽藍中道路有賊恐怖此初結戒也時諸檀越先知有疑恐怖而故持食來諸比丘有疑不敢受復有病比丘亦疑不敢受又有施主以食置地與若教人與諸比丘疑不敢受佛皆聽之更加先不語檀越及無病自手受食之語此第二結戒也由飲食事譏嫌煩惱制斯學處乃初篇淫根本種類釋義文分二節若比丘下明所犯之事應向餘比丘下明悔過之法律云阿蘭若處者去村五百弓謂一拘盧舍即五里也律攝云此據緣起作是言若更遠處亦同此處疑恐怖者疑有賊盜恐怖檀越者檀是梵語此翻為捨越是華言謂其能破慳嫉行於捨施自可越渡貧窮之海後獲巨富而引生福德資糧也病者僧祗律云下病冷病風病不堪出外前之三戒由在聚落家內成犯此戒因在寺中生過故也結罪是中犯者若阿蘭若比丘在如是逈遠處住若先不語檀越於僧伽藍外不受食僧伽藍內無病自手受食食咽咽波羅提提舍尼此戒具五緣方成本罪一是在寺內二路逈疑怖三不先語施主四身無病緣五自受食入咽兼制比丘尼突吉羅同制別學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若先語檀越若有病若置地與若教人與若來受教敕聽法時比丘自有私食令授與及最初未制戒等是為不犯此戒大乘同學附考按根本部及十誦律俱令白二羯磨差一比丘為觀察看守險路人薩婆多論云若比丘受僧羯磨已是比丘知是中有賊入應將淨人是中立若是中見人有似賊者應取是食語諸持食人莫來是中有人似賊若是持食強來不犯所差羯磨人必使勇健多力能却賊者若不能卻一切僧盡應至有賊處若復不能應語聚落檀越令多人防護也因此戒中明阿蘭若故録阿蘭若行法第三分云清旦洗手取衣抖擻著大衣著頭上或肩上洗鉢放絡囊中取革屣打露杖持鑰出房閉戶推看牢不若不牢應更安居音簟戶牡所以閉戶也若牢應推繩著內四顧看若無人見應藏戶鉤若有人見應更著隱處或持去在道路行應常思惟善法若見人應先問訊言善來若欲入村安鉢置地著大衣以革屣打露杖寄村邊入村時應看巷相若空處相市相門相糞掃相入白衣家應看第一門相乃至第七門相若欲正衣應向璧右手捉杖左手捉鉢不應當道住不應屏處住不應迎取食若喚應往若得飯乾飯等不應并著一處若是一鉢應以物隔若樹葉皮若鍵𨩲若次鉢若小鉢應手巾裹不應選大家乞不應強要得若知當得應待乞已出村下道安鉢置地褋大衣著頭上肩上行時常思惟善法見人應先問訊善來至常所食處灑掃具水器殘食器牀座洗腳石水器拭腳巾若有餘阿蘭若比丘來應起遠迎為取鉢與座與水器等乃至澡豆洗手已淨潔別留殘食若有娑那來應與娑那此云賊次授水與彼阿蘭若比丘次授食與彼食時應看供給所須鹽醋菜水扇等若日時欲過應俱食食已應為取鉢與洗手若有餘食應與人非人等洗盛殘食器牀座等物復本處灑掃食處若有娑那來應語此是水此是洗足物此是食為汝等故別留清潔欲食便食阿蘭若比丘應善知夜時節善知方相善知星不應敷好臥具應初夜後夜警心思惟律攝云非愚癡人堪住阿蘭若處設非多聞但明戒相亦得住阿蘭若亦云精舍謂其處非粗暴者所止乃精練行者所居今人一無所知而云住靜深可嘆之六四可呵法竟七衆學法共有百條事鈔云律言式叉迦羅尼義翻衆學法謂是應學事也律攝云衆學法者謂於廣釋中所有衆多惡作惡說咸悉攝在衆學法中是故總言衆學法也薩婆多論中問曰餘篇不言應當學而此戒獨爾答餘戒易持而罪重犯則成罪或衆中悔或對首悔此戒難持而罪輕脫爾有犯心悔念學罪即滅也以難持易犯故常慎心念學不結罪名直言應當學也經云犯衆學戒如四天王天壽五百歲墮泥犁中人間五十年彼天一晝夜於人間數九百萬年此泥犁即等活地獄謂諸罪人各各手生鐵爪相摑肉墮或獄卒唱或冷風吹活二緣雖異等一活故斯衆學法文句簡略事多同軌不繁條列科名唯隨下贅其數目至於緣起釋義藏卷未全稽諸犍度皆由六羣所興此是行護威儀非類餘篇故諸部中開合不等數無一定或百十以外或五十以內獨本律文具足百法今就百法約為九例一著衣事二入村事三坐起事四食噉事五護鉢事六說法事七塔像事八便利事九觀望事此准律攝唯增塔像事以諸部中無故律攝不載附考應當學戒僧祗律六十七法五分律一百八法十誦律一百十三法解脫戒本七十六法此出迦葉毗部根本律四十三法當齊整著涅槃僧應當學第一緣起佛在舍衛國給孤獨園時六羣比丘著涅槃僧或高或下或作象鼻或作多羅葉或時細褶諸居士見皆共譏嫌謂似國王大臣亦似節會戲笑俳說人著衣有少欲比丘聞知白佛佛集十句義為僧結戒律攝云衆多學法等皆由法式事譏嫌煩惱制斯學處於此總出下不別名釋義當齊整著涅槃僧者涅槃僧亦云泥洹僧此翻云裙當齊整著者律攝云謂離不齊整著衣之過也律云不齊整者或繫帶下或高褰齊腰或垂前一角如象鼻或垂前兩角如多羅樹葉或腰繞細褶律攝云謂從裙邊細疊成褶腰間總壓形似多羅葉上聚下散者是也其如法著式詳載內法傳中結罪是中犯者若故作犯應懺突吉羅以故作故犯非威儀突吉羅若不故作犯突吉羅善見律云突者惡也吉羅作也應懺突吉羅是根本罪非威儀突吉羅是從生罪謂以故作犯本罪時有乖僧儀故又從本罪上犯一非威儀突吉羅須知若犯時則根本從生二罪皆成若懺時則根本滅從生隨滅以名殊體同法無兩懺今唯約不覆藏懺法論之若犯已覆藏或一日多日方說悔者理具八品詰問有無懺法非總應前後辦制有明文慎勿相紊若不故作犯突吉羅者此開誤犯不必對人求悔但自責其心更不再作罪則消滅今於首條詳釋重輕以下結罪准此無異此戒應懺故作法及不故犯責心悔法皆於作持中詳明兼制比丘尼並下三衆突吉羅隨開不犯者或時中生瘡下著或腳有瘡高著若僧伽藍內若村外若作時若在道行及最初未制戒等是為不犯會採律攝云苾芻不依佛教不顧羞耻欲為非法者捉衣開張得責心惡作若披著身得對說惡作若有順奉心而著衣不如法式或時忘念或是無知非法著者唯犯責心惡作如是於餘學處准此應知五分律云若不解不問而作此著突吉羅若解不慎而作此著突吉羅若解輕戒輕人而作此著波逸提僧祗律云不得如淫女法賣色左右顧視為好不好應看令如法齊整著若放恣諸根不欲學齊整著內衣者越學事鈔云世尊處出深達物機凡所施為必以威儀為主故此百事大乘悉皆同學息譏生信自護護他倍應嚴淨除是諸大菩薩示現逆行在處不論若是學地凡夫難越準繩附考根本律云佛在施鹿林中初度五苾芻出家服飾尚俗佛作是念過去諸佛云何教聲聞衆著衣服耶是時諸天前白佛言如淨居天所著衣服世尊即以天眼觀知如諸天所說事無差異即告苾芻曰汝從今後應同淨居天齊整著涅槃僧薩婆多論問曰結既在初而在後也答曰佛在初結後集法藏者詮次在後何以故罪名雖一而輕重有五以重戒在前輕戒在後此戒於五篇中最輕是故在後又以一是實罪二是遮罪以實在初遮在後實罪即性罪也又以一是無殘二是有殘是故重者在初而輕者在後也又問五篇戒中佛何以止制著涅槃僧及三衣觀去來現佛及淨居天耶答曰佛結五篇戒此最在初以此貫初故餘篇不說又此戒於餘篇是輕者將來弟子不生重是故如來以佛眼觀去來諸佛及淨居天而後結也又三世諸佛結戒有同不同於五篇中不必盡同此著泥洹僧袈裟三世諸佛盡同是故此戒觀諸佛及淨居天餘篇不觀也當齊整著三衣應當學第二釋義緣處發起招世譏嫌如上佛為結戒律云三衣者安陀會多羅僧僧伽梨也不齊整者或下著過肘露脅或高著過腳上或下垂一角作象鼻或垂前兩角後褰高作多羅樹葉或細褶已安緣結罪是中犯者並餘四衆悉皆同前不犯者或肩臂有瘡下著或腳有瘡高著若寺內若村外若道行若作時及最初未制戒等會採僧祗律云若泥時作時手得抄舉根本律云苾芻熱時於自房內但著下裙及僧腳崎隨情讀誦說法作衣服等於四威儀悉皆無犯僧腳崎舊云僧祗支此翻掩腋衣用掩右腋覆左肩上舍利弗問經云修供養時應偏袒以便作事作福田時應覆兩肩現田文相云何修供養如見佛時問訊師僧時應拂牀掃地卷衣裳乃至移種種供養云何作福田時應時乞食坐禪誦經經行樹下人見端嚴有可觀也不得反抄衣入白衣舍應當學第三釋義緣處發起如上佛為結戒律云白衣舍者村落也反抄衣者或左右反抄衣著肩上行也結罪其中所犯並餘四衆悉皆同前不犯者或脅肋邊有瘡若寺內村外作時道行及最初未制戒等會採律攝云上下衣服不得偏抄一邊露現形體不得雙抄兩邊置於肩上凡是行步非大人相者皆應遠離僧祗律云若風雨時得抄一邊若偏袒右肩得抄左邊若通肩披得抄右邊不得令肘現乞食畏污衣故得反抄不現肘無犯不得反抄衣入白衣舍坐應當學第四釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前前戒是行威儀此戒是坐威儀也在白衣家坐時應好遮身勿為撩亂失比丘儀當整衣如法直身正意生他信敬若放恣諸根抄衣露體令他譏謗則自損損他是以禁之採採僧儀律云若乞食若取食肘畏污衣故得抄衣但莫令肘現若精舍中和尚阿闍黎前坐不得抄衣若抄者得抄一邊不得抄兩邊若偏袒者抄左邊若通肩披者抄右邊若見長老比丘應還下不得衣纏頸入白衣舍應當學第五釋義緣處發起譏嫌等如上佛為結戒律云纏頸者總捉衣兩角著在肩上結罪其中所犯並餘四衆悉皆同前不犯者或時肩臂有瘡若寺內村外道行作時及最初未制戒等不得衣纏頸入白衣舍坐應當學第六釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前此中於坐有異前是行也不得覆頭入白衣舍應當學第七釋義緣處發起如上見者譏嫌謂如盜賊佛為結戒律云覆頭者若以樹葉若以碎段物若以衣覆律攝云以衣覆頭如新嫁女故招世譏嫌結罪其中所犯並餘四衆悉皆同前不犯者或時患寒或頭上瘡生或命難梵行難覆頭而走若寺內若村外若道行若作時及最初未制戒等會採僧祗律云若風寒雨及病不得全覆當覆半令一耳現若見和尚阿闍黎上座當却不得覆頭入廁若在屏私房覆無罪一往律家教授新受戒者令入廁時以巾覆頂勿許露之然律中因比丘蹲踞小便俗人為是尼僧窺視及至起身乃識比丘而生譏誚故制便利時尼則以巾覆頭而別知二部今令男僧覆巾訛之極矣明律者速當改革不得覆頭入白衣舍坐應當學第八釋義緣處發起譏嫌等其中犯所不犯並餘四衆悉皆同前此唯異坐威儀也不得跳行入白衣舍應當學第九釋義緣處發起如上見者譏嫌謂如鳥佛為結罪律云跳行者雙腳跳也結罪其中所犯並餘四衆悉皆同前不犯者或時有瘡若為人所打若有賊若有惡獸若有棘刺或渡渠或渡坑塹或渡泥及最初未制戒等會採僧祗律云不得先下腳指後下腳跟當先下腳跟後下腳指若腳心有瘡當側腳行作蔽物繫之不得跳行入白衣舍坐應當學第十釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前此別坐威儀也不得白衣舍內蹲坐應當學第十一緣起佛在舍衛國住祗園中有居士請僧設供往白時到諸比丘到家就座而坐六羣蹲坐比座以手觸之即倒露形居士見譏嫌謂無慚愧如裸形婆羅門佛為結戒律云蹲坐者若在地若在牀上尻不至地也尻考平聲脊骨盡處是也謂以雙腳蹈地兩膝並竪也結罪其中所犯並餘四衆悉皆同前不犯者或時尻邊生瘡若有所與若禮若懺悔若受教誡及最初未制戒等會採僧祗律云不得抱膝坐不得交腳坐若有病無犯不得叉腰行白衣舍應當學第十二釋義緣處發起如上見者譏嫌謂如世人新婚娶得志驕奢佛為結戒律云叉腰者以手叉腰匡肘也謂橫舉手也結罪其中所犯並餘四衆悉皆同前不犯者或時脅下生瘡若寺內村外道行作時及最初未制戒等會採僧祗律云若腰脊痛若風腫者得叉腰若癰痤瘡癬以藥塗上畏污衣故叉腰無罪不得叉腰入白衣舍坐應當學第十三釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前此但明坐威儀也律云以手叉腰匡肘白衣舍坐妨其比坐也縱無比坐而獨受請者更應嚴肅威儀惜護僧體會採十誦律云不得掌扶頰坐不得搖身行入白衣舍應當學第十四釋義緣處發起如上見者譏嫌謂如王似大臣佛為結戒律云搖身者左右戾身趨行也戾音例斜也曲也字從犬出戶曲戾也結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或為人所打回戾身避杖或惡獸所觸或逢擔棘刺如是戾身或渡抗渠泥水處於中搖身過或著衣回身看衣齊整及最初未制戒等會採僧祗律云不得搖頭行若老病身振風雨寒雪搖無犯不得搖身行入白衣舍坐應當學第十五釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前內不同者此是坐威儀也音義刳音枯剖也剗音産削平也葦音委大葭也葭音嘉葦初生名葭稍大為蘆長成乃名為葦其華遇風吹揚如雪聚地如絮取其莖以為針筒褰音牽謂揭開衣也涅槃僧或云泥縛些那或云泥伐𦺻那此翻裙也瘡瘡痍傷也痤癤也癤音節癕也機左傳云設機而不倚戶牡音畝門關鍵也關鍵即戶鑰大抵關有鍵以止之又有鎖鑰以固之三十三天即忉利天大智度論云昔有婆羅門姓憍尸迦與知㕛三十二人共修福德命終皆生須彌由頂憍尸迦為天主名帝釋天三十二人為輔臣周圍列居獨帝釋處其中三十二天人名字經論不載唯正法念處經明之四王天東方持國天王謂能護持國土故居須彌山黃金埵南方增長天王謂能令他善根增長故居須彌山琉璃埵西方廣目天王謂以淨天眼常觀擁護此閻浮提故居須彌山白銀埵北方多聞天王謂福德之名聞四方故居須彌山水晶埵摑音國批打也淨居天淨居天有五謂聲聞之人斷欲界九品思惑盡證第三阿那含果而居其中亦名五不還天若據俱舍圖言此五天次第而上若據楞嚴經言此五天皆橫在第四禪天中彼第四禪天但能聞此五天之名而不能知見如世間聖地道場多有羅漢所居而人不能見也一無煩天二無熱天三善見天四善現天五色究竟天佛眼謂具肉天慧法四眼之用無不見知如人見極遠處佛見則為至近人見幽暗處佛見則為明顯乃至無事不見無事不知無事不聞聞見互用無所思惟一切皆見也褶皺上音摺衣褶也下音皺蹙也謂多作細褶也膊與腨同音軟腓腸即腳肚也襻音盼衣下系也擪音葉按也矗音畜齊也踝音化脛兩旁內外曰踝足骨也紐上音樞衫也下音鈕結會衫紐也匡肘謂橫舉手也未詳字出如禮記云並坐不橫肱是也趨行疾行曰趨疾趨曰走
