body:
  text: 金陵寶華山弘律沙門讀體集第十九賣買寶物戒若比丘種種賣買寶物者尼薩耆波逸提緣起佛在王舍城耆闍崛山時跋難陀往市肆上以錢易錢將去諸居士見已皆譏嫌有少欲比丘聞知白佛結戒由貪慢煩惱制斯學處乃初篇盜根本種類釋義律云種種賣買者以成金未成金成銀未成銀根本律云成者謂金銀等器未成者謂金銀鋌及碎金銀及錢錢有八種金錢銀錢鐵錢銅錢白鑞錢鉛錫錢木錢胡膠錢結罪是中犯者若比丘種種賣買寶物以成金易成金乃至易錢捨墮此應捨是中捨者准上捉寶戒無異三十尼薩耆波逸提唯有二十七種還法其第十一雜野蠶綿作臥具第十八自捉寶並此戒無還法於作持中明此戒具三緣方成本罪一有貪慢心二畜寶轉易三轉易已成兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若語彼人言看是知是乃至若還與本主何以故不欲令失信施故與上戒文同故不全録若以錢貿瓔珞具若以瓔珞具易錢為佛法僧及最初未制戒等是為不犯此戒大乘同制引證律攝云若為三寶出納若施主作無盡藏設有馳求並成非犯然此等物出利之時應一倍納質求好保證明作契書年終之日應告上座及授事人皆使同知或復告彼信心塢波索迦根本律云時諸苾芻得無盡物置房庫中時施主來問言聖者何意毗訶羅此云寺仍不修補報言為無錢物主曰我豈不施無盡物耶報言其無盡物我豈食之安僧庫中今現在主曰其無盡物不合如是我之家中豈無安處何不回易求生利耶時諸苾芻以此因緣白佛佛言若信心居士等為佛法僧故施無盡物此三寶物應回轉求利所得還於三寶而作供養時諸苾芻即與彼原施主索利之時多與諍競便作是語豈我己物生鬬諍耶又共富貴者而為出息索物之時恃官勢故不肯相還復共貧人而為出息索時無物佛言不應共施主富貴人貧人而交易若與物時應可分明兩倍納質書其券契并立保證記其年月安上座名及授事人字假令信心塢波索迦受五學處亦應兩倍而納其質根本令兩倍納質律攝云一倍納質二律皆義淨師所譯事豈弗同恐後人傳寫之誤二倍想是一倍稱量當准律攝也薩婆多毗婆沙云此戒體正應言種種用寶不得言種種賣買此戒直往成罪不同販賣戒販賣戒為利故買已還賣成罪第二十販賣戒若比丘種種販賣尼薩耆波逸提緣起佛在舍衛國給孤獨園時跋難陀在拘薩羅國道行往一無住處村謂此村無有僧伽藍至村中已持生薑易食而去時舍利弗亦遊行至此乞食至賣飯家彼即索價報言居士勿作此言我等所不應時彼人言向者跋難陀以生薑易食而去云何不應又舍衛城中有一外道得一貴價衣持至僧伽藍貿易跋難陀言明日來彼善能治衣即其夜浣故衣搗治光澤如新晨朝易之外道得衣還所止園中示諸外道中有智慧者語言汝為彼所欺汝是新衣廣大堅緻此是故衣但搗治光澤如新耳此外道即持衣欲相還跋難陀不允外道譏嫌諸比丘聞知白佛結戒由非法貪制斯學處乃初篇盜根本種類釋義律云種種販賣者賤買貴賣曰販以時易時以時易非時易七日易盡形壽易波利迦羅以非時易非時易七日盡形壽及時等乃至以波利迦羅易時非時等賣者價直一錢數數上下增言直三錢五錢買亦如是結罪是中犯者若比丘種種販賣得者捨墮不得突吉羅此戒捨懺還物等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一有貪利心二是販賣三販賣已成兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者與五衆出家人貿易自審定不相高下如市易法不與餘人貿易餘人謂外道及在家白衣等若使淨人貿易若悔者應還若以酥易油以油易酥及最初未制戒等是為不犯會採僧祗律云若自問價若教人問價若自上價若使人上價若自下價若使人下價作不淨語時越毗尼罪得時捨墮若肆上物先有定價比丘持直來買置地時應語物主言此直知是物若不語默持去越毗尼罪若彼物應直五十而索百錢比丘言我以五十知是如是求者不名為下若知前人欲買物不得抄買買者越毗尼罪若見賣鉢時作是念此鉢好至某方當得利買時越毗尼罪若作是念我有是物無有淨人此是淨物得買去無罪到某方或和尚阿闍黎所須或自為病或作功德買去本不為利臨時得貴價賣無罪若比丘糴穀時作是念此後當貴糴時越毗尼罪糶時捨墮若恐某時穀貴我今糴此穀當依是得誦經坐禪行道到時穀大貴若食長與和尚阿闍黎若作功德餘者糶得利無罪若營事比丘雇一切作人賃車馬人船等作不淨語者皆越毗尼罪若比丘為僧直月行市買酥油糴米豆麥求一切物時作不淨語越毗尼罪若自為買如是等一切不作淨語捨墮若比丘市買時得呵嫌說實前人物此好此惡若粗若細斗稱大小香臭等無罪有檀越為比丘故與店上錢語言若某甲比丘日日來有所索從意與彼比丘後來索時作淨不淨語無犯五分律云若欲貿易應使淨人語言為我以此物易彼物又應心念寧使彼得我利我不得彼利若自貿易應於五衆中若與白衣貿易突吉羅根本律云若為利買不為利賣買時惡作賣時無犯若不為利買為利賣買時無犯賣時捨墮若向餘方買物而去元不為利到彼賣時雖得利無犯律攝云若買賣時不依實說或以僞濫斗稱欺誑於他得妄語罪獲物之時便犯盜罪凡持財物欲買賣時先須定意無求利心隨處獲利悉皆無犯設為三衣不應規利而作販賣若現前衆物欲賣之時上座應先為作本價不可因斯唱斷應取末後價極高者方可與之若實不欲買妄增他價得惡作罪唱得衣時未還價直便著者得惡作罪尼陀那云苾芻不應為俗人斷價不應酬價高下若無俗人代酬應可二三得自酬價過此得惡作罪十誦律云以此不淨物買食口口突吉羅買衣著隨著波逸提若共貿物前人心悔應還若過七日不應還若以減價索他貴衣突吉羅若必須是物三索不肯者應覓淨人使買此戒大乘同制引證薩婆多毗婆沙云此販賣罪於一切波逸提中最是重者寧作屠兒不為販賣何以故屠兒正害畜生販賣一切欺害不問道俗賢愚持戒毀戒無往不欺又常懷惡心設若居穀心恆希望使天下荒餓霜雹災害若居鹽貯積物意常企望四遠反亂王路隔塞夫販賣者有如是惡此販賣物設與衆僧作食衆僧不應食若作四方僧房不應住中若作塔作像不應向禮又云但佛作意禮凡持戒比丘不應受用此物若此比丘死此物衆僧應羯磨分問曰不死時不受用此物何以死便羯磨答曰此販賣業罪過深重若生在時衆僧食用此物者雖復犯戒有罪僧福田中故與受用以受用故續作不斷是僧福田中不聽受用今世無福後得重罪以此因緣不敢更行比丘既死更無販賣因故是故聽羯磨取第二十一畜長鉢戒若比丘畜長鉢不淨施得齊十日過者尼薩耆波逸提緣起此戒有二制佛在舍衛國給孤獨園時六羣比丘畜鉢好者持不好者置如是常覓好鉢遂畜甚多衆居士詣房觀見譏嫌如陶師賣鉢肆諸知足比丘聞已白佛此初結戒也時阿難得蘇摩國貴價鉢此國之鉢色青好如閻浮樹意欲與大迦葉而迦葉不在畏犯畜長鉢往白世尊佛問迦葉更幾日當還報言却後十日當還由是聽畜齊十日此第二結戒也由情貪積聚增長煩惱妨修正業為遮斷故制斯學處釋義律云鉢有六種鐵鉢蘇摩國鉢烏伽羅國鉢優伽賖國鉢黑鉢赤鉢大要有二種鐵鉢泥鉢大者受三斗小者受一斗此是鉢量梵語波咀囉或云鉢多羅此翻為鉢也義翻應器謂體色量三皆須應法也體者泥及鐵也色者熏作黑赤色或孔雀咽色或鴿色也量者如律所分小大也薩婆多論云諸論師有種種異說然以一義為正鉢者三種上者受三鉢他飯一鉢他羮餘可食物半羮下者受一鉢他飯半鉢他羮餘可食物半羮上下兩間是名中鉢梵語鉢他此翻云升三鉢他飯可秦升二升秦升止有今之七合一鉢他羮餘可食物半羮者是一鉢他半也受食之時留鉢上空處不得太滿須令指不觸食為善結罪是中犯者若比丘一日得鉢二日三日四日乃至十日得鉢畜至十一日明相出十日中所得鉢盡捨墮若十日內超間得或但一日得若不作淨施若不遣與人若不失若不故壞若不作非鉢謂棄捨之不作受持應用如長衣戒中所明皆犯捨墮此戒捨懺還鉢等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一是長鉢二有貪畜心三過十日兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者十日內若淨施若遣與人若劫奪想失破漂等想若失鉢燒鉢取用謂熏時火性燒壞若與他用若受寄鉢比丘死若遠行若休道若被賊獸水漂等難不遣與人及最初未制戒等是為不犯第三分云鍵鎡小鉢次鉢聽不淨畜第四分云比丘不應畜木鉢此是外道鉢若畜如法治越毗尼罪也不應畜石鉢此是如來法鉢若畜得偷蘭遮不應畜金銀雜寶香鉢是白衣法若畜得突吉羅聽受鐵鉢如法熏治會採僧祗律云不聽鉢中安隔若以餅隔及飯隔者無犯十誦律云鉢是恆沙諸佛幖幟比丘不得盛不淨物五分律云持鉢應如法不得除糞掃盛殘食盛過中飲盛香及藥當淨舉謹護如眼過中不得用鉢飲聽飲器用銅鐵瓦聽別作啜粥器若得二鉢應問和尚阿闍黎此二鉢何者勝若二師不善分別應各五日用自勝者受持不如者與人善見律云若買他鉢未還直不得受持若鉢主言但用然後還直鉢主雖作此語亦不得受持還直然後受持此謂市易之人恐言不定價有增添凡比丘與俗交易必先決斷分明免致譏諍若買鉢已度直竟鉢主為熏竟報比丘比丘不往取過十日犯捨墮若鉢主熏竟他人知傳向比丘道比丘雖聞過十日不犯摩得勒伽云若比丘有一鉢不受持犯捨墮律攝云若減量若過量若擬與人出家近圓濟其所用雖不分別無犯不分別謂滿十日不滿也若貯羮菜或飲水畜二小鉢及安鹽盤子並匙悉皆無犯又於大鉢之中隨容小鉢若順所須多畜非犯應更畜一大鉢防闕事故此異外道縫葉為器或於手內立拱而食難養難供非福田相世尊許一非多非少善順中道資身修業薩婆多論云若畜白鐵鉢瓦鉢未燒一切不應量鉢突吉羅律攝云若順所須多畜非犯乃必用之具縱多亦有分限故開此中若畜白鐵等鉢結成所犯者既非堪用之物而仍積畜則慳貪至極故爾治之然犯實在於心非在於物也此戒大乘為衆生故不同學附考第四分云不應鉢中畫蒲萄蓮華像及作卍字作己名字不應纏鉢四邊若口不應都縵纏鉢應縵兩分留一分若有星孔應盡縵食入孔中隨可擲出便擲出餘者不可出無犯聽作囊盛作帶絡肩挾鉢腋下令口向外因比丘挾鉢腋下鉢口向脅道行遇雨腳跌倒地鉢隱脅遂成患故制口向外今時謂入里乞食則口向外若受食已則口向脅斯乃訛傳無本可據鉢破聽補綴若作鉢者出家聽為諸比丘作鉢聽畜作具聽熏鉢應作熏爐若釜若瓨種種泥塗以杏子麻子泥裹以灰平地作熏鉢場安支以鉢置上鉢爐覆上以灰壅四邊手按令堅若新牛糞壅四邊燒之當作如是熏薩婆多論云佛初出世衆僧無鉢佛敕釋提桓因令天巧工作十萬鉢在於世間肆上梵語鍵鎡母論譯為淺鐵鉢十誦律云鉢半大鍵鎡小鍵鎡本律云鍵鎡入小鉢小鉢入次鉢次鉢入大鉢據鍵鎡乃四鉢中之最小者一往律家云一鉢三鐼稽考諸部曾無此說其鐼字海篇音墳鐵也又音飾也又音奔平聲木器也雖字彚音訓亦鐵屬也第二十二畜鉢求好戒若比丘畜鉢減五綴不漏更求新鉢為好故尼薩耆波逸提彼比丘應往僧中捨展轉取最下鉢與之令持乃至破應持此是時緣起佛在舍衛國給孤獨園時跋難陀鉢破入舍衛城向居士求鉢時居士即市鉢與復至諸居士家亦如是求破一鉢得衆多鉢異時諸居士於一處集各各自言得福無量以市鉢與跋難陀故由是諸居士皆共譏嫌無有慚愧破一鉢而得多鉢畜雖施者無厭而受者知足諸比丘聞知白佛結戒由情貪好故增長煩惱招世譏嫌制斯學處釋義文分三節若比丘下明故犯結罪彼比丘下明僧中捨法乃至下明守護綴鉢法律云五綴者相去兩指間一綴綴者聯綴也謂合著連補減五綴不漏者謂現前守持之鉢雖破補綴尚未滿五盛貯羮飯不漏仍堪受用行持而為貪新好勝妙故更從他人乞求第二鉢也結罪是中犯者若比丘鉢破減五綴不漏更求新鉢捨墮若滿五綴不漏更求新鉢者突吉羅此應捨是中捨者彼比丘應於此住處僧中捨揀非餘住處捨已懺悔竟僧應羯磨與鉢此比丘鉢若貴價好者應留置取最下不如者白二羯磨與之白二羯磨已彼比丘鉢應作白次第問僧當持與上座若上座欲取此鉢與之應取上座鉢與次座若與彼比丘彼比丘應取不應護衆僧故不取謂應取即取不必𢌞護衆僧亦不應以此因緣受持最下鉢若受突吉羅此謂衆僧不應以此行有犯鉢因緣而故受持最下鉢來集欲換彼好鉢若受來者先存貪好之心豈為清淨衆所以治罪此於根本律中顯本部文略義隱若第二上座取此鉢應取第二上座鉢與第三上座若與彼比丘彼比丘應受不應護衆僧故不受不應以此因緣受持最下鉢若受突吉羅如是展轉乃至下座若持此比丘鉢還此比丘若持最下座鉢與之此戒捨懺及還鉢行鉢付鉢單白白二羯磨等法於作持中明准根本律差一五德人行鉢有白衆法亦補作持內彼比丘守護此鉢不得著瓦石落處不得著倚杖下及著倚刀下不得著懸物下不得著道中不得著石上不得著果樹下不得著不平地比丘不得一手捉兩鉢除指隔中央不得一手捉兩鉢開戶除用心不得著戶閾內戶扇下不得持鉢著繩牀木牀下除暫著不得著繩牀木牀間不得著繩牀木牀角頭除暫著不得立蕩鉢乃至足令鉢破比丘不得故壞鉢不應故令失若故壞不應作非鉢若捨竟不還等得罪如上此戒具三緣方成本罪一有貪積心二受持鉢減綴不漏三乞求好鉢已得兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者五綴漏若減五綴漏更求新鉢若從親里索若從出家人索若為他索他為己索若不求而得若施僧得鉢時當次得若自有價買畜及最初未制戒等是為不犯會採根本律云若苾芻鉢破堪為一綴雖未安綴尚得受用更求餘鉢者求時犯惡作得便犯捨墮律攝云非好好想但得惡作好與不好作不好想無犯僧祗律云是持綴鉢比丘若故打破犯波逸提若和尚阿闍黎及知識等憫其洗鉢妨道藏去不見已更乞無罪乞得一鉢應受持若得兩鉢一鉢入僧淨廚乃至得十鉢九鉢入僧淨廚僧淨厨乃白羯磨所結淨地非今之厨也如得鉢直亦如是薩婆多摩得勒伽云若乞得衆多鉢應捨一意所貪樂者餘者應與同意此戒大乘同學附考律攝云有五種鎔濕物不應用綴鉢謂黑糖黃蠟鉛鍚紫礦根本律云此五種著熱物時便脫落有五種綴鐵鉢法一以細釘塞孔二安小鐵片打入令堅三如魚齒四邊鉸破內外相夾四以鐵片掩孔周圓釘之五用屑末此有二種一銼鐵末二磨石末初補鐵鉢次補瓦鉢用末綴時以油和未於鐵鉢中用鐵鎚熟研方用塞孔即以微火燒之使硬若粗澀者更以油塗依法熏之若瓦鉢有孔隙者用沙糠和泥塞之以火乾炙若舋破者刻作鼓腰以鐵鼓填之上以泥塗火熏應用泛論鉢者有四圓滿一體圓滿謂是鐵也二相圓滿謂堅牢無穴無綴不受垢膩三量圓滿謂是大鉢四得處圓滿謂衆中分得或施主處得第二十三非親織衣戒若比丘自乞縷線使非親里織師織作三衣者尼薩耆波逸提緣起佛在舍衛國祗桓園中時跋難陀欲縫僧伽黎入城至諸居士家處處求線乞得線多遂持與織師使織作三衣彼自手作繀自看織居士見而譏嫌諸比丘聞知白佛結戒由惱物生譏制斯學處乃初篇盜根本種類釋義律云自乞者在在處處自行求乞縷線者有十種如上十種衣線也織師非親里與線者非親里織師非親里與線者親里織師是親里與線者非親里但非親里制遮不聽結罪是中犯者若織師非親里與線者非親里捨墮若自看織若自織若作繀盡突吉羅罪此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一貪求慢教二從非親乞縷三不與價而使非親里織衣兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者織師是親里與線者是親里若自織作鉢囊革屣囊針氈禪帶若作腰帶若作帽若作襪及最初未制戒等是為不犯會採僧祗律云自行乞縷越毗尼心悔得者越毗尼罪織成者捨墮十誦律云若自織若令五衆織突吉羅律攝云若彼施主自有信心令彼為織或以價酬織者無犯若虗誑心陳己勝德乞得物時惡作他勝一時俱得他勝謂棄罪也實有德者得惡作墮罪雖親織師不知時故令他生惱或現異相皆得惡作薩婆多論云少衣正應乞衣不應乞縷作衣須縷縫衣作帶無犯摩得勒伽云為僧乞不犯此戒大乘為衆生故不同學第二十四勸織好衣戒若比丘居士居士婦使織師為比丘織作衣彼比丘先不受自恣請便往織師所語言此衣為我作與我極好織令廣大堅緻我當少多與汝價是比丘與價乃至一食直若得衣尼薩耆波逸提緣起此戒有二制佛在舍衛國給孤獨園時城中有一居士出好線令織師為跋難陀織衣織師詣寺語跋難陀彼即遣織廣大堅緻者織師言線少跋難陀至居士家更乞線居士婦出線箱即恣意擇取好者持與織師織師言價少即更許與價居士從他處還問婦言前所織衣今成未婦報已成持衣與看居士言此非我先所織衣婦即具說因緣居士便生譏嫌諸比丘聞知白佛此初結戒也如是結戒已諸居士自恣請與比丘衣諸比丘疑不敢答又有居士欲與比丘貴價衣然比丘少欲知足欲得不如者疑不敢答佛言若先自恣請及索不如者隨意答故更加先不受自恣請之語此第二結戒也由招世譏嫌制斯學處乃初篇盜根本種類釋義文分二節居士居士婦使織師下明貪求之事是比丘與價下結成所犯律云居士居士婦如上衣有十種如上與我極好織者謂令精妙也亦是令衣廣大堅緻之義廣者令足豎量大者令足橫量堅者謂牢固緻者謂細密乃至一食直者謂下至極少與一餐之工價也結罪是中犯者若比丘先不受自恣請便往求衣若得者捨墮不得突吉羅此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具五緣方成本罪一貪慢求好二先未受請三往囑織者四許增價直五衣成取獲兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者先受自恣請往求知足減少求若從親里索或為他或他為己或不索而得者及最初未制戒等是為不犯會採僧祗律云若語織師言與我好織堅織緻打得越毗尼罪織師下手打織時下下波逸提作是得者捨墮若但往勸不許價得衣者越毗尼罪根本律云為求衣故從座而起整理衣服持二五食等至織師所而授與之勸令好織皆得惡作罪薩婆多論云此衣不問應量不應量盡皆得罪若為織師說法令好織不與食具食直得好衣突吉羅若遣使書信印信許與食具食直得好衣捨墮若自有縷令織師織無罪此戒大乘同制即是惡求多求第二十五與衣瞋奪戒若比丘先與比丘衣後瞋恚若自奪若教人奪取還我衣來不與汝若比丘還衣彼取衣尼薩耆波逸提緣起佛在舍衛國給孤獨園難陀弟子善能勸化跋難陀語言與我共行人間當與汝衣跋難陀與衣已餘比丘語言汝以何事共跋難陀行彼癡人不知誦戒不知說戒布薩羯磨後彼比丘即不隨行跋難陀乃索前衣比丘不還即瞋恚強奪比丘高聲言莫爾莫爾比房諸比丘聞聲盡來集聚問知其故白佛結戒因取衣事不忍廢闕譏嫌煩惱制斯學處乃初篇盜根本種類釋義文分三節先與比丘衣者明其自樂施後瞋恚下明其瞋奪取若比丘還衣下結成所犯律云衣有十種如上律攝云與衣者是句總標若與衣時告言汝可與我作使若不為我作使奪衣後瞋恚者後是別時瞋者以身業現惱相故恚者謂於內心結忿恚故奪者據本心有所希望情既不遂所以仍返奪之結罪是中犯者若比丘先與比丘衣後瞋恚若自奪若教人奪取藏舉者捨墮若奪而不藏舉者突吉羅若著樹上牆上籬上乃至衣架牀褥上若取離處捨墮取不離處突吉羅此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具四緣方成本罪一先本與他二人是清淨比丘三因瞋復奪四離處藏舉兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者不瞋恚言我悔不與汝衣還我來若彼人亦知其人心悔即還衣若餘人語言此比丘欲悔還他衣若借他衣著他著無道理奪取若恐失衣若恐壞若彼人破戒破見破威儀若被舉若滅擯若應滅𢷤若為命難梵行難如是一切奪取不藏舉及最初未制戒等是為不犯會採僧祗律云或合與別奪或別與合奪或合與合奪或別與別奪合奪者得一波逸提別奪者得衆多波逸提若與衣時作是言住我邊者與不住者奪或言汝適我意者與不適意還奪或為受經故與不受經還奪一切無罪或賣衣未取直直未畢仍取衣無罪或弟子不可教誡為折伏故奪後折伏已還與無罪根本律云若教比丘奪彼衣時衣未離身二俱惡作若離身者俱得波逸底迦罪主有捨過罪主即先與衣者捨過謂得尼薩耆波逸提罪薩婆多論云奪比丘尼式叉摩那沙彌沙彌尼衣突吉羅若奪得戒沙彌行波利婆沙摩那埵盲瞎聾啞不見擯惡邪不除擯盡突吉羅若奪狂心亂心病壞心犯四重五逆人五法人衣盡突吉羅若比丘尼奪比丘尼衣奪得戒沙彌尼乃至五逆五法人衣盡捨墮奪比丘衣突吉羅若先根本與他衣根本與謂是實意與他而衣已屬彼彼為主故後為惱故暫還奪取捨墮衣捨他波逸提懺衣捨他者謂仍與彼人若先根本與他衣後根本奪應計錢成罪以直五錢犯重故若先暫與他衣後便奪取以忿恚欲令彼惱突吉羅若為折伏令離惡法暫奪無罪本律奪破戒見等衣不犯者先為持戒與衣後因犯戒等故奪此是折伏心所以不犯薩婆多制奪得戒沙彌乃至被舉人衣盡犯捨墮由其本是與學被舉人先以憐愍與後以瞋恚奪則是喜怒不恆恣任情見所以結過也此戒大乘同學第二十六過七日藥戒若比丘有病殘藥酥油生酥蜜石蜜齊七日得服若過七日服者尼薩耆波逸提緣起佛在舍衛國時諸比丘秋月風病動形體枯燥又生惡瘡佛聽時非時有病服五種藥畢陵伽婆蹉在羅閲城多有所識亦多徒衆大得酥油生酥蜜石蜜五種藥諸弟子積聚藏舉處處流漫房舍臭穢時諸長者見如是儲積狼藉皆共譏嫌謂如瓶沙王庫藏有知足比丘聞已白佛結戒此是遮罪因病藥事貪煩惱故制斯學處釋義文分二節有病下明聽服藥若過下結成所犯律云病者醫教服爾所種藥也藥者酥油生酥蜜石蜜根本律云病有二種一饑渴為主病二四百四病為客病諸病緣不出三種謂風熱痰廕此三種病以三藥能除油除風氣酥與石蜜除黃熱病蜜及陳砂糖能除痰癊雜病者應盡用上藥可治僧祇律云四百四病者風病一百一火病一百一水病一百一雜病一百一結罪是中犯者若比丘一日得藥畜二日三日四日乃至七日得藥畜八日明相出七日所得藥盡捨墮言一日者如畜長衣戒中所明若七日中或間日得藥或唯一日得藥至八日明相出盡捨墮若七日內所得藥不淨施不遣與人若不失不故不壞作非藥作非藥者若是酥及油用然燈或塗腳或塗戶嚮若是蜜乃石蜜施與寺中淨人若不作親厚意取不忘去至八日明相出盡捨墮若犯捨墮藥不捨更貿易餘藥一捨墮一突吉羅此戒受諸藥法及捨懺還藥等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一是七日藥二有貪畜心三過七日已兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若彼過七日藥若酥油塗戶響若蜜石蜜與守園人若至七日所捨與比丘食之若未滿七日還彼比丘彼當用塗腳若然燈及最初未制戒等是為不犯會採律攝云若七日滿作滿想並疑捨墮不滿作滿想並疑得惡作罪若為好容儀或著滋味或求肥盛戒詐僞心服食諸藥皆惡作罪受七日藥正服之時應告同梵行者作如是語我已一日服藥訖餘有六日在我當服之乃至七日准知十誦律云若重病不犯食是四含消時應作是念我以治病故含不為美味四含消即酥油蜜石蜜也石蜜非時不聽輒噉有五種人得非時食謂遠行人病人不得食人少食人若施水處和水得飲邇來或有講演禮懺謂米糖及陳皮橘餅可充藥食於非時輒噉不禁者斯皆師心自許致令後學倣效研窮五部律章未見如是開聽此戒大乘同學第二十七雨衣求用非時戒若比丘春殘一月在當求雨浴衣半月應用浴若比丘過一月前求雨浴衣過半月前用浴尼薩耆波逸提緣起佛在舍衛國給孤獨園毗舍佉母請佛及僧明日食時天大雨佛言此雨是最後雨四天下亦如是令諸比丘盡出在雨中浴婢來白食時到遙見比丘皆裸形浴疑是外道還白主母重敕往請佛至其舍既受供訖毗舍佉母從佛請求八願願與客比丘食為諸客比丘遠來不知所趣願與遠行比丘食為或以食故不及伴願與病比丘食為若不得隨病食便命終若得隨病食便除差願與病比丘藥為若不得隨病藥便命終若得隨病藥便得差願與瞻病人食為彼自求故闕看病願供給比丘粥我晨朝遣婢至僧伽藍請僧白時到諸比丘盡露形雨中浴願供給比丘比丘尼雨浴衣如是八願盡形供給佛皆聽之時六羣比丘聞佛聽畜雨浴衣即一切時春夏冬常求雨浴衣不捨雨衣便持餘用現有雨衣猶裸形浴諸比丘白佛結戒因貪慢煩惱制斯學處釋義文分二節春殘一月下明制求用若比丘過一月下結成所犯律云雨浴衣者有十種如上彼比丘三月十六日應求雨浴衣四月一日應用此准四月為一際從臘月十六日至四月十五日為春際也今云春殘一月在當求雨浴衣者謂春際三月已過唯殘一月在即三月十六日至四月十五日也即於此一月中應求至四月初一日應用其量長短於單墮中第八十九戒明之然此衣以防其倉卒難辦雨時將至安居日近故聽去夏前一月預求不應更此時復不聽夏中求以安居時宜當修道為本不應經營求覓恐防廢正業故結罪是中犯者若比丘三月十六日前求衣四月一日前用捨墮此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具三緣方成本罪一無敬教心二過一月前求得衣三過半月前受用兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者三月十六日求四月一日用若捨雨衣已乃更作餘用若著浴衣浴若無雨衣若作浴衣及最初未制戒等是為不犯會採根本律云若苾芻欲作前安居即於春殘一月求雨浴衣若苾芻欲作後安居者便作是念彼尚求衣我何不求若求得者犯捨墮若苾芻作後安居彼持雨浴衣至八月盡仍尚持衣若前安居人作如是念彼尚持衣至八月盡我何不持若持者得捨墮若苾芻各依自夏求衣持衣者無罪安居雖分前後期限各滿九旬不可前後為例僧祗律云此衣不得受當三衣不得作淨施不得著雨衣入河中池中浴不得小小雨時著浴亦不得裸身浴當著舍勒內短小裙也若餘故衣不得著雨衣種種作事當須大雨時被浴若雨卒止垢液者得著入餘水中浴無罪若比丘食時欲以油塗身若病時若多人行處得繫兩頭作障此雨浴衣得四月半受用謂春殘半月夏際四月也至八月十五日當捨一比丘僧中唱大德僧聽今日僧捨雨浴衣如是三說若至十六日捨者越毗尼罪捨已得用作三衣亦得知識比丘邊作淨亦得入餘水中浴種種著作無罪薩婆多論云尼得畜浴衣不得畜雨浴衣比丘畜雨浴衣凡有二事一雨時障四邊於中浴天熱時亦以自障於中浴二以夏月多雨常裹三衣擔持行來若閏三月不應前三月求比丘不畜雨浴衣無罪此戒大乘同學第二十八過時畜急施戒若比丘十日未竟夏三月諸比丘得急施衣比丘知是急施衣當受受已乃至衣時應畜若過畜者尼薩耆波逸提緣起佛在毗蘭若夏安居竟婆羅門請佛及僧食訖施衣佛聽諸比丘受夏衣六羣聞知即一切時常乞衣安居未竟亦乞衣亦受衣又跋難陀在一處安居竟聞異處大得衣乃處處分得衣分持入祗桓少欲比丘知已白佛佛但呵責未與結戒時波斯匿王遣梨師達多富那羅二大臣往征反逆二大臣受命已自念往征未知得還不當預為僧設食施衣諸比丘以安居未竟不敢受衣白佛佛聽諸比丘受急施衣由是結戒釋義文分二節十日未竟下明聽受畜若過下結成所犯律云急施衣者受便得不受便失此為檀越有急務公出若當時施衣在現前便得不在現前便失衣者有十種如上衣時者自恣竟不受迦絺那衣一月受迦絺那衣五月自恣十日在即七月初五日未至十五日故云十日在若比丘得急施衣知是急施衣當受受已即十日應畜到自恣竟不受迦絺那衣一月受迦絺那衣五月若自恣九日在八日在七日在乃至若自恣一日在即七月十四日來朝方十五故云一日在得急施衣知是急施衣應受受已應畜到自恣竟不受迦絺那衣一月受迦絺那衣五月結罪是中犯者若比丘得急施衣若過前過後俱捨墮若七月初五日已前受謂之過前犯不受功德衣者畜至八月十五日若過八月十五日則犯受功德衣者畜至十二月十五日若過則犯此二謂之過後畜此戒捨懺還衣等法於作持中明若捨衣竟不還等得罪如上此戒具三緣方成本罪一是急施衣二心存貪慢三受畜過前後兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者得急施衣不過前後不犯若為賊奪衣失衣燒衣漂衣過前不犯作奪失燒漂等想若嶮難道路不通多諸賊盜惡獸難若河水大漲王者所執閉命難梵行難若彼受寄比丘或死或出行或賊獸所害或為水所漂過後無犯及最初未制戒等是為不犯會採根本律云急施衣有其五種或為自病故施或為他病者故施或將死時施或為死亡故施或將行時施若在夏中或時施主欲得自手而行施者取亦無犯若其差得藏衣苾芻或施主作如是語我行還自手當施雖過時分畜亦無犯薩婆多論云急施衣者若王施若夫人施若王子施大官鬬將施衆僧以諸貴人善心難得又女欲嫁時以至壻家不自在故令得自在以物施僧若病人施令存亡有益如是等盡名急施衣除急施衣一切安居衣必待自恣時分若安居中分突吉羅此戒大乘為衆生故得畜然須如法淨施准前所論第二十九後月離衣過六夜戒若比丘夏三月竟後迦提一月滿在阿蘭若有疑恐懼處住比丘在如是處住三衣中欲留一一衣置舍內諸比丘有因緣離衣宿乃至六夜若過者尼薩耆波逸提緣起佛住給孤獨園諸比丘夏安居竟後迦提一月滿在阿蘭若處住時多有賊盜劫奪衣鉢皆來趣祗桓精舍聚住佛知其故聽在是處住留一一衣置舍內時六羣比丘聞佛開聽即便留衣置舍內囑親友比丘已出行受囑者出衣日中曬之諸比丘詰問其故白佛結戒因癡慢煩惱制斯學處釋義文分三節夏三月竟下明移居滿夏若有疑恐懼下明難開聽若過下結成所犯夏三月竟者謂四月十六日至七月十五日訖後迦提一月者迦提此翻昴星謂昴星直此月故即七月十六日至八月十五日是夏四月之後一月也滿者謂後安居人於五月十六日始來結坐然雖隨前安居人於七月十五日已自恣其一夏之功未圓必須滿此一月住令足成九十日而不破夏制故律云阿蘭若處者去村五百弓遮摩羅國弓長四肘用中肘量中人一肘周尺一尺八寸五百弓即五里也有疑恐怖者疑中有盜賊恐怖比丘在如是處住三衣中欲留一一衣置舍內者三衣謂僧伽黎多羅僧安陀會舍內謂村聚也五分律云一一衣者若僧伽黎若優多羅僧隨所量寄一衣不得寄安陀會以著身故不得寄二以禮拜入僧乞食不得單著故有因緣離衣宿者有因緣謂有塔事和尚阿闍黎事及以他事總而言之乃三寶病緣及看病等事離衣者謂離所寄之衣也乃至六夜者薩婆多論云從七月十六日次第六夜聽阿練若安居比丘得離衣宿所以聽者此六夜中間是賊發時是故聽也彼六夜竟第七夜明相未出前若捨三衣若手捉衣若至擲石所及處此云擲石所及處者非是阿蘭若界是以所寄衣之村舍外界而論結罪是中犯者若比丘六夜竟第七夜明相未出前不捨三衣不手捉衣不至擲石所及處住第七夜明相出離衣宿一切犯捨墮此戒捨懺還衣等法於作持中明若捨竟不還等得罪如上此戒具四緣方成本罪一期至六夜二慢教不往衣所三不作心念法捨四明相已現兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者劫奪想失想燒想漂想若船濟不通路道嶮難多盜賊有惡獸河水暴漲強力所執或繫閉或命難或梵行難如是等不捨衣不捉衣不至擲石所及處並最初未制戒等是為不犯會採五分律云不聽近聚落住離衣宿不聽阿蘭若無恐怖處離衣宿若一宿二宿乃至五宿事訖不還突吉羅律攝云本心暫去即擬還來因事稽留不至衣所無犯離衣過善見律云若阿蘭若處衆僧多房舍堅密不須寄衣聚落寄衣已六夜一往看見衣已還阿蘭若處此戒大乘比丘同學附考僧祗律云佛在舍衛祗桓精舍時沙祗園夏安居中衆僧有諍事起佛敕優波離滅諍尊者因僧伽黎重若被雨者不可勝而今半安居中若留衣則犯捨墮是以不去佛聽留衣得齊六夜復以諍事非可卒斷佛言從今聽一月不失衣宿白二羯磨是以除僧羯磨得一月不失衣也僧祗律云夏三月未滿五分律云安居三月未滿八月十誦律云三月過未至八月未滿歲根本律云在阿蘭若處作後安居故今滿字讀聯下句者准餘四部事義方順由本律譯文之古一往讀聯上句大乖制意實不相宜故引諸部不無所據第三十回僧物入己戒若比丘知是僧物自求入己者尼薩耆波逸提緣起此戒有二制佛在舍衛國祗樹園中有一居士恆好惠施欲飯佛及僧兼施好衣時跋難陀聞知即往彼居士家語言衆僧有大善利威力福德施衆僧者多汝今施衆僧衣可施我居士可之便不復與衆僧衣具唯設種種飲食次日請僧至家見衆僧威儀具足發大聲言我云何為如是嚴整衆僧衣而作留難諸比丘問知其故訶責跋難陀云何斷衆僧利而自入己以此因緣白佛此初結戒也時諸比丘不知是僧物非僧物為許僧不許僧後乃知是僧物已許僧或有作捨墮懺悔或慚愧者佛言不知無犯此第二結戒也由貪煩惱制斯學處乃初篇盜根本種類釋義律云僧物者為僧故作已與僧已許僧物者衣鉢坐具針筒下至飲水器律攝云利物有二種一衣利二食利凡衣服飲食臥具衣藥皆從他得故言利物此中利者據衣物利故言求入己者謂知是僧物而攝為私物也結罪是中犯者若知是僧物求入己者捨墮若物許僧轉與塔突吉羅若物許塔轉與僧亦爾若物許四方僧轉與現前僧突吉羅若物許現前僧轉與四方僧亦爾若物許比丘僧轉與比丘尼僧突吉羅若物許比丘尼僧轉與比丘僧亦爾若物許異處轉異處突吉羅若已許作許想者捨墮若已許心疑未許作已許想未許疑皆突吉羅此戒捨懺還物等法於作持中明若捨竟不還等得罪如上此戒具四緣方成本罪一聞施起貪二物已許僧三許想故回四得物入己兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若不知是僧物若已許作不許想若許少勸令與多若許少人勸與多人若許惡勸與好者或戲笑語若誤語若獨處說或眠中語或欲說此乃說彼及最初未制戒等是為不犯會採僧祗律云若有人來欲布施問比丘言應施何處答言隨汝心所敬處便與復問何處果報多答言施僧果報多復問何等清淨持戒有功德僧答言僧無有犯戒不清淨若人持物來施比丘應語言施僧者得大果報若言我已曾施僧今正欲施尊者受之無罪若有人問比丘言我欲以此物布施為置何處使我此物長見受用爾時應語某甲比丘是坐禪誦經持戒若施彼者長得受用見若知物向僧回向己捨墮是物僧不應還僧應受用若回與餘人波逸提物非入己故無捨也知物向此僧回與餘僧者越毗尼若知向此衆多人回與彼衆多人越毗尼若知物向此畜生回與餘畜生越毗尼心悔根本律云若苾芻知屬一苾芻物自回入己回時得惡作罪得便捨墮乃至知物屬二人三人或屬僧自回入己得罪如前若與此貧人物回與彼貧人得惡作罪若覓不得者回與無犯五分律云若施主自回欲以物與己不犯薩婆多論云若物向僧與前人說法令物自入捨墮物則還僧若比丘知檀越以物施此塔回向彼塔物即入彼塔不須還取以福同故比丘作突吉羅懺若知檀越以物施此僧祗回向餘僧祗此物入餘僧祗不須還取以僧祗同故比丘作突吉羅懺若知檀越以自恣臘與此衆僧回向餘僧自恣物應還與此僧以自恣物所屬異故比丘作突吉羅懺本律僧祇但明𢌞此僧物與餘僧得罪而未判物當與誰今准薩婆多則不須還取無復疑矣此戒大乘同制三十捨墮法竟音義糴糶上音狄買穀也下音跳賣米也白鑞音拉鍚鑞也規利規謂規求計也左傳云規求無度蘇摩國本蘇摩此翻云月按第四分云佛在此國人間遊行彼國有一信樂陶師佛一一指授教令作鉢彼如教隨作即成特異貴好蘇摩鉢與諸比丘不敢受佛聽受畜五分律云佛於蘇摩國自作鉢坯以為後式令陶師燒陶師便多作合燒開竈視之皆成金色鉢怖懼言此是大沙門神力若王聞者必當謂我多有金寶便舉埋藏佛復作令燒皆成銀鉢亦怖懼埋藏佛復作令燒乃成銅鉢色青好如閻浮樹與諸比丘不敢受佛聽受畜烏伽羅國鉢或作伽羅又名云優伽羅總是一號時諸比丘得此國貴好瓦鉢不受佛聽受畜優伽賖國鉢或云憂伽賖或云烏伽賖皆一也諸比丘得此國貴好瓦鉢不敢受佛聽受畜黑鉢此是毗舍離城上好黑色貴瓦鉢諸比丘得不敢受佛聽受畜赤鉢此是舍衛國上貴赤色瓦鉢諸比丘不敢受佛聽受用瓨與缸同啜穿入聲大飲也舋許慎切欣去聲凡瓦器裂皆曰舋繀音粹織繀說文云著絲於莩車莩音夫織緯者二五食一者蒲闍尼翻云噉食此有五種謂飯乾飯魚肉二者佉闍尼翻云嚼食此有五種謂枝葉華果細末食難陀弟子此難陀是跋難陀之兄非佛弟難陀也根本律云難陀有一共住弟子名達磨常懷慚耻追悔為心於諸學處愛樂尊重彼未曾知難陀惡行與之共住既知行跡即便捨之與善苾芻而為同住除三時禮除三時禮者律制弟子日三時中若不禮拜和尚者得越法罪得戒沙彌此是比丘犯重即時發露無覆藏心衆僧白四羯磨與學戒法既非比丘又不捨離袈裟仍同大僧共住故名得戒沙彌五法人受提婆達多破僧五法者酥是牛羊等乳鑽抨成之或以莫葉藥而成之所謂從牛出乳從乳出酥從酪出生酥從生酥出熟酥從熟酥出醍醐而醍醐最為上藥抨音并大論云牛乳驢乳其乳雖同牛乳抨則成酥驢乳抨則成糞油律攝云油謂苣蕂蔓菁及木蜜等并五種脂如法澄濾苣蕂即胡麻也蔓菁即蕪菁也其根莖葉可為菜食子可壓油也蜜謂蜂蜜也蜂有黃黑蜜分厚薄石蜜是甘蔗糖所成者善見律云甘蔗糖堅強如石是名石蜜然有黑白二種白者味純甘黑者味帶苦本草云一名乳糖又名白雪糖即白糖出益州及西戎用水牛乳汁米粉和沙糖煎煉作餅塊黃白色而堅重川浙者佳主心腹熱脹潤肺氣助五藏津治目中熱膜口乾渴可止目昏暗能明按根本律有糠無石蜜律攝云糠攝石蜜也捼音那又曰以兩手切摩也梨師達多富那羅梨師達多此云仙授或翻仙施又云仙餘謂從仙人邊求得子故也富那羅又名富蘭那此翻故舊或云宿舊是仙授之兄此兄弟二人是波斯匿王大臣於拘薩羅國錢財巨富無與等者而能於佛及四部衆等共受用不計我所雜阿含經云富蘭羅專修梵行離欲清淨不著香華遠諸凡鄙持戒為勝梨師達不專精梵行然其智足達四聖諦智慧為勝後時二俱命終佛記二人一持戒勝一智慧勝二俱同生一趣同一受生同於後世得斯陀含生兜率天一來世間盡苦邊際具德經云而於信心中能具大智慧仙授烏波薩哥是於信心中能持梵行布囉拏烏波薩哥是烏波薩哥即優婆塞布囉拏即富那羅
