body:
  text: 金陵寶華山弘律沙門讀體集七別解戒相者蓋前五門是推演教義第六門是分別題目教義題目既已朗然則當正解戒相凡諸沙彌受持十戒以為具戒之基本已登壇近圓時重在白四羯磨感發戒體次乃為説戒相保護其體故今將釋戒相明持先出無作戒體無作者天台大師云戒體者不起而已起則性無作假色磐公釋云謂此戒體不起則已起則全性而性修交成必有無作假色無作一發任運止惡任運行善一作之後不俟再作故云無作文言無作假色者十一色法各有假實就法處所攝色中唯定果色名為實色表無表色並名假色善惡二戒各有表及無表表即名作無表即名無作今且釋善戒互跪翹勤名為身表三説乞戒名為語表衆僧和合同集戒場亦名身表白四羯磨亦名語表由此作法受得清淨戒體成比丘性為意家所緣任運恆得止行二善故云一作之後不俟再作名為無作假色也此無作戒體從第三羯磨畢時便得於一切男女邊得不淫色於一切情非情邊得不盜色於一切有情邊得不殺色於一切有情邊得不欺誑色乃至於一切地得不掘色於一切草木得不壞色於一切酒得不飲色如是二百五十戒法一一各周法界故出家功德經明一日一夜持戒功德不可窮盡正由此妙善戒法遍以法界為所緣故是則無作戒體是法處色是無漏色有漏五蘊色身為依無漏五蘊戒身為依有漏色身從父精母血和合而生是色處假色無漏戒身從三師七證羯磨而得是法處假色所以和尚名為力生正從能生戒身以得名耳得此戒身便同僧寶能使天龍尊奉神鬼欽承邇來授受體則迷而莫知相則晦而罔諳欲企道基堅固梵行精瑩何可得焉故今先出戒體而令授受不虗保護清淨也次正解戒相準律分八初波羅夷法二僧伽婆尸沙法三不定法四尼薩耆波逸提法五波逸提法六波羅提提舍尼法七衆學戒法八滅諍法初波羅夷法共有四條僧祗律云波羅夷者義當極惡謂更無事重於此者總以三義釋之一退沒由犯此戒道果無分故二不共住非但失道果而已不得於説戒羯磨二種僧中住故三墮落捨此身已墮阿鼻地獄故律云犯波羅夷者譬如有人截其頭終不能還活斷多羅樹心終不復更生長如針鼻缺不堪復用如大石破為二分終不可還合多羅此云岸形直而且高葉可書經此樹若斷其心即便枯死永不發生根本律云波羅市迦者是極重罪極可厭惡嫌棄不可愛若苾芻亦才犯時即非沙門非釋迦子失苾芻性乖涅槃性墮落崩倒被他所勝不可救濟如截多羅樹頭更不復生不能茂增長廣大故名波羅市迦律攝云波羅市迦者是極惡義是他勝義才犯之時被梵行者所欺勝出家近圓為除煩惱今破禁戒反被降伏又能害善品使消滅故又復能生惡趣之罪故名波羅市迦又被非法軍而來降法王之子受敗於他既失所尊故名他勝近圓者圓謂涅槃受比丘戒則能親近涅槃故名近圓薩婆多論云波羅夷者名墮不如意處如二人共鬬一勝一負犯此戒者不聽懺悔畢竟永墮負處又如焦穀種雖種良田勤加溉灌不生苗實犯戒亦爾雖勤加精進終不能生道果苗實故佛説犯罪輕重經云犯波羅夷罪如他化自在天壽十六千歲墮泥犁中按論云人間一千六百年為彼天一晝夜於人間數九十二萬一千六百萬年此年數必譯誤音義中辨此泥犁即焰熱地獄謂獄卒置罪人鐵城中火然燋爛燒炙衆生故此但名其有間若謗三寶五逆等罪壽一大劫墮八無間獄也第一淫戒淫者污穢交遘鄙陋不堪之事名非梵行亦名不淨行準善見云此是性罪不受佛戒世間法爾有罪以犯佛戒則重犯國禁則輕輕者國制強姦者斬和姦者笞淫男者杖重者佛制不論男女等一有樂欲心行淫則墮三塗窮劫極苦非同世刑不可言喻若比丘共比丘同戒若不還戒戒羸不自悔犯不淨行乃至共畜生是比丘波羅夷不共住緣起蓋心隨境轉戒依事制若境幻心空則情忘理顯所以戒結五篇皆由有漏生起而大聖乘時制為學處故善見律云未有漏者如來結戒衆生生誹謗想云何瞿曇沙門如諸聲聞弟子悉是貴姓或是王位捨於財物宮殿妻子眷屬不惜身命皆是知足無所希求云何瞿曇反以波羅提木叉繫之是瞿曇未善別世人故言如此若結戒者世人亦不生敬重之心譬如醫師未善治病見人始欲生癰未大成就輒為破之破已血出受大苦痛以藥塗之瘡即還復醫謂曰我為汝治病當與我直病人答曰此癡醫師若是我病可為我治我本無病強為破肉令血流出生大苦痛反責我直詎非誑耶聲聞弟子亦復如是若先結戒而生誹謗我自無罪強為結戒是故如來不先結戒若有漏者是時如來當為諸弟子結戒文以是義故每戒之下先出緣起又制戒之後復有緣起而加制者亦有緣起而開制者故五篇之內有一制數制之不同今此淫戒有三制律云佛在毗舍離時迦蘭陀村須提那子持信堅固出家為道時世穀貴乞食難得須提那子將諸比丘詣迦蘭陀村乞食母聞子歸往勸捨道還家再三不允乃令與婦安子使種不斷便捉婦臂將至園中三行不淨時須提那子行不淨已常懷愁憂同學問知其故具白世尊世尊集諸比丘以無數方便訶責言汝所為非非威儀非沙門非淨行非隨順行所不應為汝須提那云何於此清淨法中乃至愛盡涅槃與故二行不淨耶告諸比丘寧以男根著毒蛇口中不持著女根中何以故不以此緣墮於惡道若犯女人身壞命終墮三惡道何以故我無數方便説斷欲法斷於欲想滅欲念除散欲熱越度愛結我説欲如火如把草炬亦如樹果又如假借猶如枯骨亦如段肉如夢所見如履鋒刃如新瓦器盛水著於日中如毒蛇頭如轉輪刀如在尖標如利戟刺甚可穢惡佛訶責已與諸比丘結戒集十句義一攝取於僧二令僧歡喜三令僧安樂四令未信者信五已信者令增長六難調者令調順七慚愧者得安樂八斷現在有漏九斷未來有漏十正法久住若説戒者當如是説若比丘犯不淨行行淫欲法是比丘波羅夷不共住此是創制也如是結戒已時有跋闍子比丘愁憂不樂淨行即還家共故二行不淨行諸比丘白佛佛集僧訶責云汝癡人犯波羅夷不共住若有餘比丘不樂淨行聽捨戒還家若欲復出家於佛法中修淨行應度令出家受大戒由此更結不還戒戒羸不悔之語此是第二制也後復有一乞食比丘依林中住與雌獼猴共行不淨按行比丘見已白佛如上集僧訶責乃更結共畜生之文此是第三制也準僧祗律云佛成道五年冬分第五半月十二日中食後因須提那子制此淫戒按西域分三際從十二月十六日至四月十五日為春際從四月十六日至八月十五日為夏際從八月十六日至十二月十五日為冬際一際四月每四月有八箇半月今準此方正當十月二十七日也律攝云由癡故因淫煩惱及淫事故制斯學處然以一切煩惱皆依無明不覺故生無明即癡也所以一一戒中佛莫不訶云汝癡人所為非而癡實是犯戒之根源也又結戒必要集僧者準薩婆多論有五義一佛現不自專輒二佛不集衆籌量輕重而後結戒但共衆和合令罪者心伏三如國王持國雖得自在凡有國事與諸忠臣議之國得久住佛法王亦爾雖於法自在為持佛法故凡有法事集衆共知法得久住四以為肅現在當來弟子凡是僧事不問有力無力要問衆詳宜不得專獨五諸佛法爾不獨一佛又集僧已佛知而故問知時而問知而故問者一以佛常法二以佛無事不知欲令前人伏罪順自言治法三以為安衆生故佛無事不知無事不見若不問前人自以知見説罪過則衆生常懷怖懼不能自安非是集衆安衆生法四若以逆察人心非大人聖主儀體知時而問者要在比丘衆中問沙彌白衣前不問一以今是結戒時又云一切善法不言結何以但言結戒然戒是萬善之本但結戒即結一切善法也釋義文分三節若比丘是泛指受持具戒之人下皆準此共比丘下正明所犯之事是比丘下結成所犯之罪按智度論云比丘義含有三一破惡義如初得戒即言比丘以三羯磨發善律儀破惡律儀故言破惡若通就行解戒防形非定除心亂慧悟想虗能破見思之惡二怖魔義既能破惡魔羅念言此人非但出我界域或有傳燈化我眷屬空我宮殿故生驚怖通而言之三魔亦怖三乞士義乞是乞求之名士是清雅之稱出家之人內修清雅之德必須遠離四邪淨命自居福利衆生破憍慢心謙下自𢍉告求資身以成清雅之德律明八種比丘謂名字比丘謂世間人有立名字喚為比丘或是比丘種族非出家法衆也相似比丘謂有人剃除鬚髮不受佛戒形貌類僧沙彌雖未稟具亦入比丘數故名曰相似非法衆也自稱比丘謂自剃鬚髮披著袈裟在僧中自稱言我是比丘此名賊住又犯重比丘不共僧住仍稱比丘善來比丘此謂有具信白衣來詣佛所欲求出家佛觀根性成熟堪可度者便喚言善來比丘於我法中快自娛樂可修梵行得盡苦源佛語未竟鬚髮自落衣鉢具足如百臘比丘威儀庠序得具足戒如陳如等諸大弟子是乞求比丘謂不受請食盡形乞食資身是名乞求比丘也著割截衣比丘謂衣價貴重比丘得已便割截而著壞衣價直針線刺納毀其細軟用樹皮壞其本色便是故衣能著是衣者名著割截衣比丘也破結使比丘一切煩惱名為結使謂能結縛衆生驅使流轉三界故若人出家或滿二十或不滿二十能破斷此煩惱證阿羅漢即名得具足戒受大戒白四羯磨如法成就得處所比丘謂有善男子希求具戒於三師七僧前三乞乃為作一白三羯磨於所作如法成就究竟圓滿成比丘性故名受大戒白四羯磨如法成就得處所比丘也是中比丘若受大戒白四羯磨如法成就得處所住比丘法中是謂比丘義謂今結戒本為白四羯磨受大戒比丘故其善來破結有自然之戒永離破禁過患煩惱已盡梵行已立前之三種但名相同是非法衆故不在禁限也於後諸戒凡云若比丘義皆準此共比丘者如餘比丘受大戒白四羯磨如法成就得處所住比丘法中是為共比丘義云何名為同戒我為諸弟子結戒已寧死不犯是中共餘比丘一戒戒體無二同戒戒相無別等戒戒行俱等是名同戒根本律云若有先受圓具已經百歲所應學事與新受者等無有異若新受圓具所應學事與百歲受圓具者事亦不殊所謂尸羅學處持犯軌儀咸皆相似而得故云共戒同戒也云何還戒還戒者捨戒也如律云若比丘不樂修梵行欲得還家厭比丘法常懷慚愧貪樂在家貪樂優婆塞或念沙彌外道外道弟子非沙門非釋子等法便作如是語我捨佛捨法捨比丘僧捨和尚阿闍黎捨同和尚同阿闍黎同和尚者謂彼比丘或同己之和尚或同一師受戒或同戒臘也同阿闍黎亦爾捨諸梵行捨律捨學事受居家法我作淨人我作優婆塞我作沙彌我作外道我作外道弟子我非沙門非釋種子若復作如是語我止不須佛佛於我何益離於佛所如是乃至學事亦如是若復作餘語毀佛法僧乃至學事便讚歎家業乃至非沙門非釋子以如是語了了説者是名捨戒若不作是了了語者是名不還戒若顛狂捨戒心亂捨戒痛惱捨戒戲笑捨戒皆不名捨戒若顛狂心亂痛惱啞聾人前捨戒中國人邊地人前捨戒邊地人中國人前捨戒若天龍鬼神睡眠人死人無知人前捨戒若自不語若語前人不解如是等皆不名捨戒戒羸者律云若比丘愁憂不樂梵行欲得還家厭比丘法意在家乃至樂欲作非沙門非釋子法便作是言我念父母兄弟姊妹婦兒村落城邑田園浴池我欲捨佛法僧乃至學事我欲受持家業乃至非沙門非釋子法是謂戒羸不自悔者謂於如來戒法無力能持內懷愁憂而不悔説是為不自悔若作如是思惟我欲捨戒便捨戒是謂戒羸而捨戒不淨行者是淫欲法律攝云行謂聖道淨謂涅槃由八正行方能證會作不淨行正違彼故下至畜生者可行淫處是也薩婆多論云與女人交會受欲具足與畜生女交會樂欲情薄是故言下至畜生三惡道是五道之邊下故言下至畜生云何名波羅夷譬如斷人頭不可復起比丘亦復如是犯此法者不復成比丘故名波羅夷廣釋準前云何名不共住有二共住同一羯磨同一説戒不得於是二事中住故名不共住結罪是中犯者若於人婦非人婦畜生婦若於人女非人女畜生女若於人二形非人二形畜生二形三處作不淨行大便道小便道及口中若於人黃門非人黃門畜生黃門若於人男非人男畜生男二處行不淨行大便道及口中如是比丘有淫欲心初入盡波羅夷方便而不入盡偷蘭遮若如上所堪行淫境有隔有隔有隔無隔無隔有隔無隔無隔有隔謂以物裹而入盡波羅夷若比丘淫意向人睡眠婦女若死形未壞多未壞大便道小便道及口若初入皆得波羅夷如是非人婦乃至畜生男亦如是若為怨家強捉比丘或自謂令己淫他或他謂他來淫己行不淨行於初入入已出三時中隨有一時生受樂心即得波羅夷受樂者如飢得食如渴得飲不受樂者如好淨人以種種死尸繫其頸上若骨間若死尸半壞若地孔若摶泥孔若君持口中行不淨行皆偷蘭遮君持此云瓶若道作道想道作道疑道作非道想皆波羅夷若非道道想非道疑皆偷蘭遮非道者謂除三道其餘腋下股間軍持泥團地空等是也若比丘教比丘行不淨行若作教者偷蘭遮若不作教者突吉羅若準義犯此戒要具四緣方成本罪一有淫欲心二全情境三入道四受樂若不具如律有開偷蘭遮者準善見律云偷蘭名大遮言障善道後墮惡道體是鄙穢從不善體以立名者由能成初二兩篇之罪故也明了論解偷蘭為粗遮即為過粗有二種一是重罪方便二能斷善根所言過者不依佛立戒而行故言過也然中復分從生獨頭十誦律云從初篇生重應一切僧中悔若初篇生輕二篇生重應界外四比丘衆中悔若僧殘生輕一比丘前悔今且就從生而論其獨頭三品並懺悔法詳明於作持中經云犯偷蘭遮如兜率陀天壽四千歲墮泥犁中人間四百年彼天一晝夜於人間數五萬七千六百萬年此泥犁即嘷呌地獄謂獄卒捉罪人擲鐵鑊中嘷咷大呌故此偷蘭遮若開聚則別列第三如歸篇則總攝前二兼制比丘尼波羅夷此是同制同學戒式叉摩那沙彌沙彌尼突吉羅滅擯小三衆犯淫殺盜妄四性重罪者雖無波羅夷之罪名則滅擯已是棄義不得與餘清淨沙彌同事同學不得如餘清淨沙彌與諸比丘得共二宿三宿雖云突吉羅罪實不通懺悔若比丘尼教比丘行不淨行若作教者偷蘭遮若不作教者突吉羅若式叉摩那沙彌沙彌尼教比丘作與不作教者盡突吉羅隨開不犯者若睡眠無所覺知不受樂一切無有淫意及最初未制戒癡狂心亂痛惱所纏善見律云見火而捉如金無異見屎而捉如栴檀無異是名癡狂心亂痛惱所纏又十誦律云有五相名狂人親里死盡故狂財物失盡故狂田業人民失盡故狂或四大錯亂故狂或先世業報故狂有五種因緣令心散亂為非人所打故心散亂或非人令心散亂或非人食心精氣故心散亂或四大錯故心散亂或先世業報故心散亂有五種病壞心或風發故病壞心或熱發故病壞心或冷發故病壞心或三病俱發故病壞心或時氣發故病壞心若雖有如是癡狂散亂病壞心若自覺是比丘作淫欲得波羅夷若不自知不犯於下諸戒皆有三病不犯準此可知不更釋會採僧祗律云若向五衆及白衣言我捨佛法僧捨共住等皆名捨戒又云若言捨過去未來佛捨過未經論捨過未僧捨多比丘皆不名捨戒得偷蘭遮罪若言捨過去未來法捨此經論是名捨戒又外道亦各言有佛法若實欲捨佛法假言捨外道佛捨外道法不名捨戒得偷蘭遮罪若言捨過未多比丘捨一比丘越毗尼罪若言捨過未一比丘越毗尼心悔若言捨阿闍黎不名捨戒得偷蘭遮罪本律言捨阿闍黎亦成捨者以原受戒時十僧不滿不得戒故若欲還戒但捨十中一人皆可此中唯言捨和尚方成捨者以本得戒時依和尚而生戒身是從根本所生處捨也須知和尚在前當依僧祗若和尚遠處異方應依本部法雖兩殊開遮隨時若作是念我不如捨佛法僧作外道彼心念口言未決定向他人説是名戒羸若説戒羸事者語語偷蘭遮罪復作是心念口言我捨佛者勝乃至我習本俗人者勝是名説戒羸事語語偷蘭遮罪五分律云若言我當行外道儀法語語偷蘭遮若言我當行白衣儀法突吉羅是不名捨戒若口言我捨戒是名捨戒薩婆多論云受戒時須三師七僧捨戒於一人前便捨者謂求增上法故則須多緣多力捨戒如從高墜下故不須多也又受戒如得財寶捨戒如失財寶譬如入海採寶無數方便然後得之及其失時賊盜水火須臾散滅捨戒亦爾又僧祗律云若比丘行淫若買得若雇得若恩義得知識得調戲得試弄得未更事得如是一切得而淫者波羅夷比丘以染汙心欲看女人得越毗尼心悔若眼見若聞聲犯越毗尼罪相觸得偷蘭遮罪乃至入如胡麻波羅夷若身大雖入不觸其邊者得偷蘭遮罪若女人身裂為二分就二分行淫者偷蘭遮罪繫縛令合行淫者波羅夷若欲心隨女人後行步步越毗尼罪欲心與女人隔壁語語語越毗尼罪又五分律云若比丘行淫外方便內出不淨內方便外出不淨波羅夷薩婆多論云方便偷蘭遮有輕有重輕偷蘭者欲作重淫謂所起淫煩惱猛勝也若起還坐輕偷蘭發足趣女未捉已還及捉已失精乃至嗚抱皆輕偷蘭男形垂入女形已來未失精亦輕偷蘭若失精得重偷蘭若男形觸女形及半珠已還不問失精不失盡重偷蘭生女死女非處行淫腋下股間得重偷蘭生女死女若壞墮蟲食於中行淫俱得重偷蘭若非人畜生男及黃門欲作淫偷蘭輕重亦爾此戒大乘同制大乘雖許懺悔如梵網須見好相或復得遇佛菩薩等為説深法頓發大心如淨業障經維摩詰經然必具大慚愧生大厭離絶不覆藏篤切悔過者乃可承當此事則與此中比丘學悔原相似也若無恐怖心決斷心雖是大乘豈容輒通懺悔若夫見機得作止謂在家菩薩非謂比丘菩薩戒本具有明文請詳觀之引證首楞嚴經云若諸世間六道衆生其心不淫則不隨其生死相續淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女梵網經云寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行又云故起心毀犯聖戒者不得受一切檀越供養亦不得國王地上行不得飲國王水五千大鬼常遮其前鬼言大賊入房舍城邑宅中鬼復常掃其腳迹一切世人皆罵言佛法中賊一切衆生眼不欲見犯戒之人畜生無異木頭無異薩婆多論云寧以身分內毒蛇口中毒有三事害人有見而害人有觸而害人有吞嚙害人女人亦爾有三種害人善法若見女人心發欲想滅人善法若觸女人犯僧殘罪滅人善法若共交會犯波羅夷滅人善法若為毒蛇所害害此一身若為女人所害害無數身二者毒蛇所害害報得無記身女人所害害善法身三者毒蛇所害害五識身女人所害害六識身四者毒蛇所害故得與行籌説戒得在十四人數一切羯磨女人所害不與僧同此事五者毒蛇所害得生天上人中值遇賢聖女人所害入三惡道六者毒蛇所害故得沙門四果女人所害正使八正道水滿於世間猶如大海於此無益七者毒蛇所害人則慈念而救護之女人所害衆共棄捨無心喜樂天龍善神一切遠離諸賢聖人之所訶責以如是因緣故寧以身分內毒蛇口中終不以此觸彼女人附考律云若比丘比丘尼若犯波羅夷已都無覆藏心當如法懺悔與學戒羯磨奪三十五事盡形行之若衆僧説戒羯磨時來與不來無犯若更犯重應滅擯毗尼母論云此比丘從今羯磨已名為清淨持戒者但此一身不得超生離死證於四果亦不得無漏功德然障不入地獄耳此與學悔羯磨必須稱量觀機於作持中詳明第二盜戒盜者偷竊有主財物奪人外命最不端之愧事此是性罪縱不受佛戒世間法爾有罪第違國禁則輕國制劫盜者流配竊盜者發配犯佛戒則重報墮三塗苦畢仍償若比丘若在村落若間靜處不與盜心取隨不與取法若為王王大臣所捉若殺若縛若驅出國汝是賊汝癡汝無所知是比丘波羅夷不共住緣起佛遊羅閲城耆闍崛山中時城中有陶師子比丘字檀尼迦在靜處止一草屋彼入村乞食後有取薪人破屋持歸乃和泥作全成瓦屋取柴薪牛屎燒之屋成色赤如火佛制不得作全成瓦屋作者突吉羅敕諸比丘往詣打破檀尼迦乃誑摩竭國守材人取瓶沙王所留要材持去大臣白王王念不應以少材而斷出家人命但訶責放去彼諸臣不伏居士譏嫌有少欲比丘白佛世尊集僧以無數方便訶責已知而故問迦樓比丘王法盜幾許應死迦樓答云五錢應死世尊為諸比丘隨王法盜五錢應死集十句義結戒僧祗律云佛成道六年冬分第二半月十日食後為瓦師子達膩迦制此戒達膩迦即檀尼迦乃梵音輕重耳西域冬分第二半月十日準此方正當九月初十日也律攝云此由癡故因畜積事畜積煩惱制斯學處釋義文分二節若在村落下正明所犯之事是比丘下結成所犯之罪律云比丘義如上村落者有四種村一者周匝垣牆二者柵籬三者籬牆不周四者四周屋亦名聚落謂人所聚居有巷陌之處間靜處者村外靜地是靜地即空地也僧祗律云空地者垣牆院外除聚落界盡名空地聚落界者去籬不遠多人所行蹤迹到處盡名聚落界五分律云聚落外盡一箭道有慚愧人所便利處是名聚落所行處所行處即界也不與者物主不捨盜者以偷盜心取隨不與取法者若五錢若直五錢王舍城國法盜五錢已即入死罪佛依此法總制瞻部洲內現有佛法處限五錢得重罪若國不用錢準直五錢物成罪十誦律云一銅錢直十六小銅錢此是羅什法師翻譯十誦時以西域一銅錢準此方十六小錢大錢五箇共該八十小錢根本律云五磨灑者一磨灑有八十貝齒然律言磨灑者是數名以一磨灑有八十箇貝齒五磨灑有四百貝齒貝齒一名貝子本草云生東海池澤亦産海涯大貝如酒杯出日南國小貝乃貝齒也背紫黑腹潔白近似魚齒小貌常帶壓驚俗呼為壓驚螺又呼珠買螺以上古珍之為寶貨故凡屬貨者字皆從貝至秦乃廢貝行錢今雲南猶作錢用而呼為海巴以一百二十八箇海巴作銀一分一千二百八十箇作銀一錢如是則四百箇貝齒作銀三分一釐二毫王者得自在不屬人薩遮經云王者民之父母以法攝護衆生安樂故大臣者種種大臣輔佐於王捉者謂捉持之殺者謂以刀杖斷其命根縛者謂杻械枷鎖等驅出國者謂擯出國界賊者謂離善及無記心持惡念貪竊他物癡無所知者癡乃根本煩惱即無名也由愚癡無智故能造一切惡業一切犯緣皆依癡故起是比丘波羅夷不共住如上此不與取律有多種今略之不出七法若自手取若看取若遣使取有主有主想取非暫用取非同意取若重物盜心取舉離本處處者若地處謂地中伏藏未發出七寶金銀真珠琉璃璧玉硨磲碼瑙生像金銀及衣服等物若復餘地中所須之物有主若地上處謂七寶乃至衣服等不埋若復有餘地上所須之物有主若乘處謂象乘及馬車步四種若復有餘乘如是等乘上若有七寶乃至衣服等若復有餘所須之物有主盜取若取乘從道至道從路至路從道至非道路至非路從非道至道從坑中至岸上從岸上至坑中若擔處