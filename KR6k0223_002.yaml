奪還取無罪若已作失想還奪還取便為賊復劫賊此中亦應計錢得罪又或賊順道去漸近聚落持物將分比丘還從乞得無罪比丘雖已作失想而賊為施主事同新得故若以勢力恐怖令還無罪若告聚落主方便慰喻令還無罪此皆以慈心而言護法名及告村長令還為憐愍偷人免墮惡趣故若知令彼或殺或縛則不應告若摩摩帝此云寺主塔無物衆僧有物便作是念天人所以供養衆僧者皆蒙佛恩供養佛者便為供養衆僧即持衆僧物修治塔者此摩摩帝得波羅夷若塔有物衆僧無物便作是念供養僧者佛亦在中便持塔物供養衆僧摩摩帝用者得波羅夷若塔無物僧有物者得如法貸用但分明疏記言某時貸用某時得當還若僧無物塔有物亦如是若交代時應僧中讀疏分明付授若不讀疏越毗尼罪若有二比丘共財物應分一比丘盜心獨取除自分他分滿五錢波羅夷若同意取無罪若共作制限得物共分既得物便言各任其相祿是中半分滿者波羅夷相謂相應祿謂福祿意謂任隨各人相應之福若汝得者汝自取若我得者我自取如是則有違本約而為貪盜故犯重置物施主家作是語者偷蘭遮若知有施主作是語者越毗尼罪二糞掃衣比丘相約亦如是若僧物有損應與有益應與云何損者若有賊詣寺索種種飲食若不與或能燒劫寺內雖不應與畏作損事故隨多少與云何益者若治衆僧房舍工匠及料理僧物事者應與前食後食及塗身油非時漿等若王及諸大勢力者應與飲食有比丘失衣鉢若未作捨想後知處應從彼索前云未作失想許令奪取還得是從賊劫論此從自失言若已作捨想後知處從索越毗尼罪若先作念言後若知處當從索取得無罪根本律云起盜心興方便得惡作罪即突吉羅觸彼物窣吐羅底即偷蘭遮舉離處滿五錢波羅市迦不滿粗罪亦即偷蘭遮若是畜生邊物觸彼物惡作罪舉離處滿五錢粗罪不滿惡作罪苾芻得地遺物應可持付知僧事人即維那也其知僧事人得此物已於數日中應可再三以物白衆本主索者可即將還若無認者入四方僧隨衆受用若異此者得越毗尼罪律攝云盜事略有五種一對面強取二竊盜取三調弄取四因寄取五與已更奪取此之五種咸是盜取若是人物旁生所偷人想取之亦得本罪若旁生想得突吉羅若遭旱時決彼堤水將入己田令他不熟至實成就準價得罪又或時遭潦泄水下流損他苗亦計直成罪獵師逐鹿走入寺中隨傷不傷不還無罪若鹿被箭入便死者應還獵師不應留礙若他田地及園店等意為僧伽意謂衆僧罪歸於己非理言競官斷與時彼心未捨得窣吐羅心若捨時即得本罪官不斷與得窣吐羅若就王斷斷得便重由斷事中王為上故若餘斷官待他心息方犯若與賊同心示彼舍處後時受彼分隨得招罪此與教人取不同若以盜心教他取則物一離本處罪已在我今示賊彼舍處則賊劫時未必與是故須從受分時結罪然雖不受分事非比丘所為亦得方便偷蘭遮罪若後生悔向彼物家報遣防護勿令失脫設彼賊偷皆方便罪後雖受分亦窣吐羅若與賊同行欲為盜事中路而退但得惡作由怖為伴無心共彼雖偷得苾芻非犯若比丘持物至稅處實是己財決心回與父母兄弟等告掌稅者此非我物不與汝稅或乘空去或口含或衣裏或避路並得粗罪本律為他持物過稅犯重由利歸己此中決心回施無利可歸是以結輕須知事一心異有別若為父母及三寶事持過稅處應為稅官種種説法稱讚三寶説父母恩彼不取稅直者無犯若猶索直者應與若三寶財持過稅所應取一分酬彼稅直後當均分勿令偏少若夫實不言苾芻妄説從彼妻索隨得物時犯罪輕重有施物來知非己分言我合得者窣吐羅罪若受其分準數成犯物有現前十方及安居物不同故成犯不請食輒去食者得惡作罪本師有緣須向餘處為受利者非犯謂和尚有緣他出弟子可以為師取然取分時須告他知勿不囑言輒取他分若為他將物擬濟病人聞彼身亡物還本主若及命在後方死者此成亡物若掌庫人自為賊意盜取他物施與苾芻施想受者無犯此但受者無罪然掌庫人自得盜罪若賊盜他物為恐怖故持施苾芻不應受若作還彼主心受之無犯若知是賊首領者隨意應受既受得已刀割染壞方便畜持本主來索者應還若盜故廢錢貝及破闕假偽者皆準當時價直成犯若興方便欲盜他財觸著之後便從主乞彼與時得前粗罪若初為貸借後欲不還決絶之時便得本罪若偷弊服內有貴衣後撿見時準物得罪若鼠盜己物見時應取若是鼠物則不應收竄若持來便成施主為彼物想應為受之若營事人為衆舉貨若其身死以衆物償他舉物時他指餘人也報諸耆宿苾芻明書券契方可與也若苾芻被他盜時不應倉卒輒為捨意後見應取若見賊來應現喚相恐喝令去捉得賊者不應付官先為説法從乞其物若不肯與當酬半價或復全還已成衣鉢卒難得故凡受事人閉寺門時有其五別謂上下轉鳴鎖并副鎖門關及扂不閉賊偷準事酬直若闕一者應還一分乃至若總不著即應全償若施主本心造立房寺於此寺住者與其供養苾芻輒將餘食計直全還若為病人欲覓藥者應問病人何處求藥如所教處覓之根本目得迦云凡主人見客來至先應問彼是汝伴否若索衣鉢與否若言莫與而將與者應酬彼價若言與者失不須酬凡客苾芻至他房內應問主人若有人來索衣鉢者可與否若言莫與而與者計直酬價若言與者失不須酬五分律云若比丘非同意人輒作同意取其衣食突吉羅十誦律云若水中浮物來比丘以偷奪心選擇時偷蘭遮若捉留住後水到前或沉著水底或舉離水直五錢以上波羅夷若盜佛舍利偷蘭遮此是逆罪偷蘭遮若尊敬清淨心取無罪盜經卷隨計直犯盜塔寺精舍中供養具若有守護隨計直犯取西拘耶尼人物隨計彼物價犯弗于逮亦爾取單越物無犯檀越請僧食次未至自言我應去波逸提得食時隨計直犯此為請僧而強去食者由不禁貪故犯破鳥巢取鳥巢皆突吉羅憐愍心解放他人畜生突吉羅奪神像物偷蘭遮一切捕獵物以快心壞偷蘭遮憐愍壞突吉羅善見律云若受人寄物物主還取答言我不受汝寄突吉羅令物主狐疑偷蘭遮此是妄語應得波逸提為是盜方便故結二方便罪物主言我不得此物波羅夷主作失物心比丘得本罪若偷人取物比丘以偷心奪取物離偷人身分若此人健又奪物去比丘雖不得物亦波羅夷以決定得偷心離本處故若檀越施衆僧果樹或擬衣服或擬湯藥衆僧不得分食若以果樹為四事布施比丘以盜心過分食隨直多少結罪若為作房舍施衆僧回食得偷蘭遮應還直若為衣施應作衣若飢儉時衆僧作白羯磨為飲食難衆僧三衣已足今且回以食用令衆僧得安樂若衆僧和合用食無罪若以衣施作房舍若以房舍施作飲食亦如是和白食用無罪又寺中房舍多無人修治敗壞應留好者餘粗敗壞得賣為食用為護住處薩婆多論云若自取欲盜五錢已上或欲盜一錢乃至四錢從始發足步步輕偷蘭乃至選撿取三錢已還得輕偷蘭四錢成重偷蘭若遣使取他物當教時得輕偷蘭若教取金乃取銀此比丘不得波羅夷以異教故得重偷蘭以先方便故若受使人不隨教從此至彼受使比丘步步輕偷蘭教他比丘無罪若盜僧物五錢已上得重偷蘭四錢以下得輕偷蘭而報罪甚深若曳不離僧地得輕偷蘭若舍屬一主物不異主若不離地未出家界步步輕偷蘭遮取非人五錢已上重偷蘭遮若四錢以下輕偷蘭遮非人者天與畜生盡名非人此戒大乘同制三賢以捨心為首六度以檀度為先其為菩薩者於己身命財尚行捨施以濟衆生豈可反盜他物而為己有若有犯此懺悔如上引證首楞嚴經云世界六道衆生其心不偷則不隨其生死相續偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人附考善見律云婆帝利王時供養大塔有比丘從南方來彼有七肘黃衣置在肩上入寺作禮是時王與大衆入寺驅逐諸人諸人衆多併疊一邊大衆鬬亂遂失衣不見而出比丘作捨心已後有比丘來見此衣作盜心取取已而生悔心我非沙門失我戒也時有律師名周羅須摩那善解律相最為第一彼往至所師知此罪可救向罪比丘言汝能得物主來不我當安置汝罪答言云何能得律師言可次第寺寺而問彼受教已遂逢物主將至律師所問言此汝衣不答言是問何處失彼依事答問汝捨心不答已作捨心又問罪比丘汝何處取答某時某處律師言汝若無盜心取便無罪汝惡心作取得突吉羅罪語物主言汝已捨心以衣與此比丘答言善師又曰如是名為觀時觀處時者取時此衣有時輕有時重若取輕即以輕時價直得罪若取重即以重時價直得罪又曰此語難解我今取人為證於海中間有一比丘得椰子殼端正具足得已刻如螺盤無異令人心戀比丘常以飲水以椰子盤置海中寺時有一比丘往海中寺而見椰殼盤以盜心取已復往支帝耶山用盤食粥盤主見已而問咄長老從何處得此盤也此非汝物是我許汝偷取也即捉到僧前衆中有一論師名瞿檀多極知方便問此比丘於何處取椰子盤答云海中間取又問云彼價直幾答言彼土噉此椰子餘殼棄破或然作薪都無價直問物主言作此椰子盤堪幾直答云削治作器堪一摩娑迦論師言若如是者不滿五摩娑迦不犯重罪然雖不滿五分但直一錢者應作突吉懺悔所以判斷盜戒時先應問明物之本處復問盜物之時然後定罪方得宜也音義阿鼻地獄阿鼻此云無間觀佛三昧經云阿言無鼻言救成論明五無間一趣果無間捨身生報故二受苦無間中無樂故三時無間定一劫故四命無間中不絶故五形無間如阿鼻縱廣八萬由旬一人多人皆遍滿故此五無間乃造五逆業者報之婆沙論云贍部洲下過五百踰繕那乃有其獄然此地獄有大有小大獄有八一活二黑繩三合會四叫喚五大叫喚六熱七大熱八阿鼻獄如是八大地獄各有十六小地獄為眷屬八寒氷八炎火八炎火者一炭坑二沸屎三燒林四劍林五刀道六鐵刺七鹹河八銅橛八寒氷者一小多有孔二無孔三阿羅羅寒顫聲四阿婆婆患寒聲五睺睺亦患寒聲六漚波羅外逼作青蓮華色七波頭摩紅蓮華色八摩訶波頭摩煩惱即百八煩惱也昏煩之法惱亂心神故名煩惱謂眼耳鼻舌身意六根對色聲香味觸法六塵各有好惡平三種起苦受樂受不苦不樂受復成十八煩惱共成三十六種更約過去未來現在三世各有三十六種總成百八煩惱也他化自在天謂假他所化以成己樂故此天依空而居即魔王天按論云人間一千六百年為此天一晝夜則人間五十七萬六千年方為此天一年若此天壽十六千歲則該人間九百二十一億六百萬年矣泥犁即地獄也秦言無有無有喜樂無氣味無歡無利故云無有三魔一煩惱魔謂三界中一切妄惑也修行之人為此妄惑惱亂心神不能成就菩提是名煩惱魔而五蘊魔亦攝其中二天魔此魔即欲界第六天攝也若人勤修勝善欲超越三界生死而此天魔為作障礙發起種種擾亂之事令行人不得成就出世善根是名天魔三死魔謂四大分散夭喪殞歿也行人為此夭喪不能續延慧命是名死魔兜率天兜率此翻知足謂於五欲境知止足故此天依空而居按論云人間四百年為此天一晝夜則人間十四萬四千年方為此天一年若此天壽四千歲則該人間五十七億六百萬年矣故二故者舊也梵語褒羅那地邪此云舊第二或云本二謂捨俗出家無復妻名以其本在俗時妻次故因名之為故二也如夢所見凡所有相皆如夢幻不實釋子增一阿含經云佛告諸比丘有四姓出家者無復本姓但言沙門釋子所以然者生由我生成由法成其猶四大河皆從阿耨達池出此方東晉安法師受業佛圖澄乃謂師莫過佛宜通稱釋氏後斯經來懸合聖意而道安法師乃印手菩薩一轉也復有四句分別一是釋子非沙門乃王種也二是沙門非釋子婆羅門也三是沙門是釋子比丘也四非沙門非釋子二賤姓也惡律儀謂法所不應作名曰惡律儀有十二種一屠羊屠者殺也謂人或以自食而常宰殺或因取利販賣而常宰殺二養雞謂因嗜其肉味以充口體常自畜養意圖烹殺三養豬謂或因自欲充於口腹或因販賣求利以資其生而畜養之四捕鳥謂以殺心故網捕禽鳥或食或賣傷害生命五捕魚謂以殺心故而用網罟取捕諸魚或食或賣傷害物命六獵師謂以殺心獵捕一切禽獸或食或賣傷害物命七作賊謂見一切物常懷劫盜之心不思物各有主妄行攘竊賊害於人八魁膾乃為官操刃行刑之人謂人本同類彼雖犯法理固當死然習為操刃之業以害其生實為惡行九守獄謂為獄吏守其牢獄以杻械枷鎖非理陵虗罪囚無慈善心十呪龍謂習諸邪法呪術呪於龍蛇以為戲樂十一屠犬謂殺犬以資利養十二伺獵謂作獵主伺捕禽獸以利其生而自積罪業黃門梵語般吒阿毗曇譯為閹人以無男根故律有五種黃門謂生黃門形殘黃門妬黃門變黃門半月黃門僧祗律云是不能男有於六種一生謂從生不能男二捺破謂妻妾生兒共相妬嫉小時捺破三割却謂若王若大臣取人割却男根以備門閹四因他謂因前人觸故身根生起五妬謂因見他人行淫然後身根生起六半月謂半月男半月不能男是謂六根閹音淹囓同咬陶師陶師乃作瓦之家經音義云按西域地卑濕不得為窑但纍壞器露地燒檀尼迦或云檀二迦或云但尼迦或云達膩迦或云陀尼迦善見律云檀尼迦是名此比丘是瓦作家子善能和泥作屋窗牖戶扄悉是泥作唯戶扇是木取柴薪牛屎及草以赤土污塗外燒之熟已赤色如火打之鳴喚狀如鈴聲風吹窗牖猶如樂音摩竭國亦云摩竭提或云摩竭陀或云摩伽陀此翻善勝或有譯云摩者不也竭提至也將謀兵勇鄰歒不能侵至也又有云摩遍也竭提聰慧也言聰慧之人遍其國內又有云摩者大也竭提體也謂五印度中此國最大統攝諸國故名大體又云摩者無也竭提害也言此國法不行刑戮其有犯死罪者送至寒林耳又有釋云此言無惱又言不害皆謂劫初已來無刑害故至瓶沙王截指為刑後自齧指痛復息此刑佛當生其地故吉兆預彰所以先置不害之名也瓶沙王此翻模實身模充實故又翻形牢亦云影堅影謂形影亦云形勝又名頻婆娑羅此云顏色端正皆取本分強壯姝好為義其形長大性行雄猛常自躬為征戰居士楞嚴云愛談名言清淨自居什師曰外國白衣多財富樂者名為居士普門疏云以多積財貨居業豐盈謂之居士鄭康成曰道藝處士也迦樓或作迦留或作迦羅迦羅秦言黑此比丘是瓶沙王舊大臣善知世法故佛問之然後隨國法結戒甕翁去聲汲水瓶市肆古今注云肆陳也店置也肆所以陳貨鬻之物也店所以置貨鬻之物也肆亦列也謂列其貨賄於市也長者謂年耆德艾事長於人又厚德自居曰長者有十德一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸旁生梵語帝利耶瞿榆泥伽此云旁行此道衆生多覆身行婆沙論云其形旁故其行亦旁又云因行不正受果報旁負天而行故云旁行畢陵伽婆蹉此云餘習每於恆河欲過即呼龍王云小婢斷流水即兩分尊者過已水復合之如是頻頻渡河常呼龍王為小婢龍以所輕往白世尊佛敕尊者與龍求悔後勿輕呼至於正求悔時仍呼龍云小婢我與求悔佛語龍云此非輕爾彼八十億劫常為尊上今以餘習未盡故如是實非為有意輕汝龍王聞佛所説由是無瞋黠了音瞎黠慧能明了事天眼能見六道衆生死此生彼苦樂之相及見一切世間內種種形色無有障礙故名天眼通非礙窣孫入聲
