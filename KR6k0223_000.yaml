  text: 序夫毗尼是正法之壽命者蓋由戒淨僧真性遮之業而無染覆道弘德備權實之教而克闡揚自行利他越苦海而登彼岸紹先啓後續慧命以振玄猷故曰毗尼住則正法住也不然則五邪罔禁八穢殉身虧僧寶之尊稱失福田之淨德上無模楷下闕規繩縱能聚衆匡徒悉屬附法魔外欲令正法久住豈可得乎體皰繫荒隈學慚往哲謬承先囑力樹戒幢因念律海汪洋學人難討爰搜諸部之精要詳明止持之大成雖未盡源庶幾便覽所冀同志諸賢須遵七聚嚴護以防非當欽四依知足而進道則五濁世戒香芬馥於大地六和衆法雨霈澤於人間所謂毗尼住世則正法住世不亦然乎時順治己丑年前安居日滇南雞足苾芻讀體識於寶華山之觀西軒毗尼止持會集目次卷第一序凡例綱要略開七門自第一門至第六門卷第二七門之餘自第六門至第七門四波羅夷法第一第一淫戒第二盜戒卷第三第三殺戒第四妄語戒十三僧伽婆尸沙法第二第一故弄失精戒第二女身相觸戒第三粗惡語戒第四歎身索欲戒第五媒嫁戒卷第四第六私房過量戒第七大房不處分戒第八無根謗戒第九取片謗戒第十不捨壞僧法戒第十一不捨惡黨破僧戒第十二被擯不服戒第十三不捨惡性戒卷第五二不定法第三初三不定法次二不定法三十尼薩耆婆逸提法第四第一衣過十日戒第二離衣異宿戒第三衣過一月戒第四從尼取衣戒第五使尼浣衣戒第六非親乞衣戒卷第六第七知足受衣戒第八貪好乞求戒第九貪好共索戒第十索衣過六反戒第十一乞綿作具戒第十二黑毛作具戒第十三減分作具戒第十四減年作具戒第十五不貼作具戒第十六遠持羊毛戒第十七使尼染羊毛戒第十八受金銀戒卷第七第十九賣買寶物戒第二十販賣戒第二十一畜長鉢戒第二十二畜鉢求好戒第二十三非親織衣戒第二十四勸織好衣戒第二十五與衣瞋奪戒第二十六過七日藥戒第二十七雨衣求用非時戒第二十八過時畜急施戒第二十九後月離衣過六夜戒第三十回僧物入己戒卷第八九十波逸提法第五第一故妄語戒第二毀呰戒第三兩舌戒第四與婦女同室宿戒第五與未受大戒三宿戒第六與未受戒人共誦戒第七說他粗罪戒第八向外人說法戒第九與女人過說法戒第十掘地戒第十一壞鬼神村戒卷第九第十二異語惱他戒第十三嫌罵戒第十四敷僧臥具不舉戒第十五僧房不舉臥具戒第十六強奪止宿戒第十七牽他出房戒第十八重閣坐脫腳牀戒第十九蟲水澆泥草戒第二十覆房過三節戒第二十一自往教尼戒第二十二教尼至暮戒第二十三譏論教尼戒第二十四與非親里尼衣戒第二十五與非親尼作衣戒第二十六與尼屏坐戒第二十七與尼同行戒第二十八與尼同船戒第二十九尼讚得食戒第三十婦女同行戒卷第十第三十一過受一食施戒第三十二展轉食戒第三十三別衆食戒第三十四過三鉢受請戒第三十五不作餘食法戒第三十六使他犯餘食法戒第三十七非時食戒第三十八殘宿食戒第三十九自取食戒第四十無病索美食戒卷第十一第四十一與外道食戒第四十二詣餘家不囑授戒第四十三食家強坐戒第四十四食家屏坐戒第四十五獨與女人坐戒第四十六故使他不得食戒第四十七過受藥戒第四十八觀軍陳戒第四十九軍中過三宿戒第五十觀軍事戒第五十一飲酒戒第五十二水中戲戒第五十三相擊攊戒第五十四不受諫戒第五十五恐怖他戒第五十六過洗浴戒第五十七露地然火戒卷第十二第五十八藏他物戒第五十九輒著淨施衣戒第六十衣不壞色戒第六十一殺生命戒第六十二飲用蟲水戒第六十三故惱他戒第六十四覆他粗罪戒第六十五授戒不如法戒第六十六發起諍事戒第六十七同賊伴行戒第六十八惡見不捨戒第六十九黨惡見不捨戒第七十畜被擯沙彌戒卷第十三第七十一拒諫難問戒第七十二輕訶說戒戒第七十三無知戒第七十四違反羯磨戒第七十五不與欲戒第七十六與欲後悔戒第七十七屏聽諍後語戒第七十八瞋打比丘戒第七十九瞋搏比丘戒第八十無根僧殘瞋謗戒第八十一輒入宮閾戒第八十二捉寶物戒第八十三非時入聚落戒第八十四作高牀戒第八十五兜羅綿貯褥戒卷第十四第八十六作骨牙角針筒戒第八十七過量作坐具戒第八十八過量作覆瘡衣戒第八十九過量作雨浴衣戒第九十等佛衣量戒四波羅提提舍尼法第六第一受非親里尼食戒第二不止尼代索食戒第三學家受食戒第四恐處受食戒一百式叉迦羅尼法第七自第一學法至第十五卷第十五自第十六學法至第七十三學法卷第十六自第七十四學法至第一百學法七滅諍法第八現前滅諍法第一憶念滅諍法第二不癡滅諍法第三自言治滅諍法第四覓罪滅諍法第五多人語滅諍法第六草覆地滅諍法第七毗尼止持會集目次終毗尼止持會集凡例律分衆部起自異執哲人弘範理合融收按舍利弗問經中舍利弗言如來正法云何少時分散如是既失本味云何奉持少時者謂佛滅度三四百年中佛言摩訶僧祗其味純正其餘部中如被添甘露諸天飲之但飲甘露棄於水去人間飲之水露俱進或時消疾或時結病其讀誦者亦復如是多智慧人能取能捨諸愚癡人不能分別文是知諸部之分出乎異見取捨之法讖自聖言故茲集雖以曇無德部為宗然於他部互有發明者悉採用之此亦南山律祖集大成之式也問既云摩訓僧祗其味純正何不宗之反宗四分豈非飲添水之甘露耶答茲藏中四十卷其僧祗者上古諸師皆判為略本故所不宗蓋文少義闕而又不合二百五十戒數故也今宗曇無德四分律者蓋是南山聖師之所宗故自唐以降皆弘通故二百五十戒相悉具足故犍度有歸無紊亂故余今宗之復何疑焉律制嚴詳譯文重沓初機簡閲不無浩繁之歎今為便覽故節要文然於義理并無增損戒因事制有緣方興故於條下先出犯緣須知栴檀林中曾無散木靈山會上豈有凡夫斯皆大權示現密護僧倫請佛制戒助揚法化如閲讀者當生欽信慎勿眇視以取慢尤故善見毗婆沙律云若長老聞此不淨行慎勿驚怪何以故如來憐愍我輩為結戒故說此惡言若不說者云何得知波羅夷偷蘭遮突吉羅若法師為人講聽者慎勿露齒笑若有笑者驅出何以故佛憐愍衆生金口所說汝等應生慚愧心聽何以笑諸部翻譯音雖不同義實無別由其五天各異語有重輕今皆倣古所述或注文下或贅卷末以省檢討五篇戒相各有根本等流性罪遮罪並所起煩惱性謂本性是罪遮謂因制方犯又性罪惟染心中作若遮罪通染不染惟薩婆多論明其本流獨善見律判其性遮據律攝中出其煩惱今於每戒下有無咸依藏録一無私增若准義推例亦可曉每戒之下約有八科一制戒緣起二依律釋文三結罪重輕四兼制餘衆五應機隨開六會採諸部七經論引證八附事便考然此八科有無不定臨文自見至於戒條正文書皆頂格餘者俱下一字若用本部但標律云或第幾分等字若用他部則別標名以識之便於稽考藏函律有止作二持止持惟顯開遮之法作持方攝誦戒之規有依佛陀耶舍所譯說戒別本而成集者斯乃用別集廣止作不分今此集專核止持一門故但明二百五十戒相所以卷首不録布薩偈文和白等法至於作持說戒篇中自當録附釋之庶無糅於止作也經通餘說律唯佛制等覺已下猶非所堪況諸小聖輒敢措詞良以如來行果極圓窮盡衆生輕重業性是故毗尼唯佛制立自餘下位但可依承不同經論許容他說故余欽此無敢穿鑿釋義出事皆如律藏成文重治輕開咸遵金口所說綱要經教利生普被諸有或在天上龍宮或居祗園鷲嶺或在王臣舍宅或於曠野林泉惟觀根器應緣化導凡從聽者曾無遮揀律則不爾若於他處有犯必在僧中結戒縱尼有漏制亦憑僧一則令諸比丘慚愧欽遵謹護無作次則遮障外人恐生譏嫌不敬僧倫是故毗尼乃佛內制獨大僧持猶如國王祕藏匪許外臣所知若白衣沙彌設先覽者後欲登壇不聽進具由犯賊住是名重難所以戒因緣經序云天竺持律不都通視唯諸十二法人堅明之士乃開緘縢而共相授耶舍見囑見誨諄諄人可使由之不可使知其言至切乃自是也文邇來義學兼講僧律不揀白衣沙彌槩容坐聽雖云法施實為犯法欺侮嚴制罪將焉逃所冀凡為師承及居上座若睹白衣沙彌翻閲律部並此集者當慈語教誡使勿披覽此則自他俱利法道可昌戒德難思功逾衆行初因極果以為元基淨樂報以為根本險途示迷此為良導苦海得濟此為舟航由是賢聖所修諸佛所證乃至人天暫樂惡道永離無越乎戒故我釋迦世尊始自鹿苑終於鶴樹五時所演一大藏教多讚戒法不特一佛推重毗尼即十方三世一切如來出現利生說法皆然若離戒修行冀超三界猶無足欲行無翅欲飛無船欲渡詎可得也戒有三種果因互成論得不同據用則共謂第一波羅提木叉戒即律儀戒第二禪戒即定共戒定是靜攝入定之時自然三業調善諸惡不起第三無漏戒即道共戒道是能通發真以後自無毀犯如初果耕地蟲離四寸是道共力此二戒法既是心上勝用力能發戒道定與律儀並起故稱為共今毗尼藏正詮律儀亦攝定道由持淨戒禪定智慧功德發生則律儀為因定道為果由禪無漏力性業遮業悉得清淨則木叉為果定道為緣故律中令諸比丘增心增慧薩婆多論云此波羅提木叉戒若佛出世則有佛不出世則無禪無漏戒一切時有波羅提木叉戒從教而得禪無漏戒不從教得又波羅提木叉戒但佛弟子有禪戒外道俱有夫能維持佛法有七衆在世間三乘道果相續不斷盡以波羅提木叉而為根本禪無漏戒不爾是故於三戒中最為殊勝持律者須知輕重開遮決斷疑悔始令正法久住不斷故第四分云有五法名為持律一知犯二知不犯三知輕四知重五廣誦二部戒又五法四如前五廣誦毗尼又五法四如前五謂住毗尼而不動又五法四如前五諍事起善能滅除又善見律云律師有三法一本毗尼藏謂為律師者必本於毗尼諷誦通利句義辨習文字不忘然後可以教授於人所以稱之為律師也二堅持不雜謂為律師者常懷慚愧堅持法律於毗尼藏所有文句義疏悉皆通達若有問者次第而答不相雜亂所以稱之為律師也三受持不忘謂為律師者於毗尼藏所傳之師須知次第授受之由若佛授優波離如是次第師師相承乃至於今其名字或能盡知或知一二而不忘失所以稱為律師也比丘戒相雖曰小乘然學大乘者未有不遵故南海寄歸云大乘小乘律撿不殊齊制五篇通修四諦若禮菩薩讀大乘經名之為大不行斯事號之為小所云大乘無過二種一則中觀二乃瑜伽中觀則俗有真空體虗如幻瑜伽則外無內有事皆唯識斯並咸遵聖教孰是孰非同契涅槃何真何僞意在斷煩惑濟衆生豈欲廣致紛紜重增冗結依行則俱升彼岸棄違則並溺生津西國雙行理無乖競又云浮囊不泄乃是菩薩本心勿輕小愆還成最後之唱理合大小雙修方順慈尊之訓防小罪觀大空攝物澄心何過之有或恐自迷誤衆准教聊陳一隅空法信是非虗律典何因見慢今所集卷專為初學若為師者切莫樂簡厭繁儘閲散帙為盈須覽全藏博究二持庶可高樹戒幢大振法鐸苟未徹諳急欲師人多乖聖制律有大呵
