body:
  text: 金陵寶華山弘律沙門讀體集不得掉臂行入白衣舍應當學第十六釋義緣處發起譏嫌如上佛為結戒律云掉臂者垂前却也結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或為人所打舉手遮或值惡獸盜賊或逢擔棘刺人來舉手遮或浮渡河水或跳渡坑墼泥水或共伴行不及以手招喚並最初未制戒等會採根本律云不得附肩不應肩相接不應連手入白衣舍僧祗律云若是王子大臣本習未除應當教言汝今出家當捨此俗儀從比丘法若欲呼人不得雙舉兩手當以一手招不得掉臂行入白衣舍坐應當學第十七釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前唯坐威儀別也會採僧祗律云不得動手動足舞手舞足當安靖住若有所問當先護戒隨順而說好覆身入白衣舍應當學第十八釋義緣處發起如上見者譏嫌謂如婆羅門佛為結戒律云不好覆身者處處露現也結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病或被縛或風吹衣離體及最初未制戒等附考僧祗律云安陀會當用緻物作若疏者當二重三重若安陀會疏者多羅僧當用緻物作若多羅僧疏者僧伽黎當用緻物作若僧伽黎疏者多羅僧當用緻物文三衣而分疏緻聽用二三重作者所制元為禦寒障暑律中詳列十種衣財今有相傳云佛制三衣俱用粗麻布造止因世尊初出家時既脫珍御樹神獻一麻衣而此麻衣乃百年前辟支佛之留極為精細亦非粗疏由未稽考訛來久矣若云不許綿布唯許麻布者非制而制實非律文須知此方國風不同別有隨常衣服設無兩重三重亦可然受具名僧斷不可無守持之三衣好覆身入白衣舍坐應當學第十九釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前此殊坐也會採僧祗律云坐時不得坐衣上當一手褰衣一手按坐具然後安詳而坐若精舍中食上和尚阿闍黎若長老比丘前應好覆身坐根本律云在白衣舍不纍足坐不重內踝坐不重外踝坐不斂足坐不長舒足坐不露身坐不得左右顧視行入白衣舍應當學第二十釋義緣處發起如上見者譏嫌謂似盜賊人佛為結戒律云左右顧視者處處看也結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或仰瞻日時節或命難梵行難左右處處伺求方便道欲逃走及最初未制戒等會採僧祗律云諦視行時不得如馬低頭行當平視行防惡象牛馬當如擔輦人行不得東西瞻視若欲看時回身向所看處律攝云不高視者舉目視前一踰伽地一踰伽量者長四肘也不得左右顧視入白衣舍坐應當學第二十一釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前所不同者唯坐也會採根本律云在白衣舍他不請坐不應輒坐不應不善觀察而坐僧祗律云坐時不得如馬延頸低頭當平視勿令不覺檀越持熱器來搪突手若精舍內食上和尚阿闍黎上座前當平視坐靜默入白衣舍應當學第二十二緣起佛在舍衛國給孤獨園諸居士見六羣高聲大喚入白衣舍譏嫌謂似婆羅門佛為結戒律云不靜默者高聲大喚若囑授若高聲施食結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病若聾不聞聲須高聲喚或高聲囑授若高聲施食若命難梵行難高聲而走及最初未制戒等會採律攝云設有須喚他不聞時應請俗人為其大喚靜默入白衣舍坐應當學第二十三釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前唯異坐也會採僧祗律云不得高聲大喚坐俗家內若欲喚者應彈指若前人不覺者高語近邊人若精舍中食上若和尚阿闍黎上座前坐不得聲大喚若欲語時語比座如是展轉第二第三令彼得知不得戲笑行入白衣舍應當學第二十四釋義緣處發起如上見者譏嫌謂如獼猴佛為結戒律云戲笑者露齒而笑也結罪其中所犯並餘四衆悉皆同前不犯者或脣病不覆齒或念法歡喜而笑及最初未制戒等會採僧祗律云若有可笑事不得出齗現齒大笑應忍之起無常苦空無我想死想復不止者當以衣角掩口根本摩得勒伽云缺時不遮口突吉羅不得戲笑白衣舍坐應當學第二十五釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前所別坐也用意受食應當學第二十六緣起佛在舍衛國給孤獨園有居士請僧設供手自斟酌種種飲食六羣不用意受食捐棄羮飯居士見已自相謂言沙門釋子不知慚愧不用意受食貪心多受如穀貴時佛為結戒律云不用意受食者棄羮飯食也結罪是中所犯並餘四衆悉皆同前不犯者或鉢小故食時棄飯或還墮案上及最初未制戒等會採五分律云一心受食者左手一心持鉢右手扶緣當平鉢受食應當學第二十七緣起佛在舍衛國住祗園中六羣赴請溢鉢受食諸居士見譏嫌謂如饑餓之人貪多佛為結戒律云不平鉢者溢滿也其中所犯不犯並餘四衆悉皆同前會採根本律云不得滿鉢受飯更安羮菜令食流溢於鉢緣邊應留曲指平鉢受羮應當學第二十八釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前會採律攝云受食之時應觀其鉢勿令流溢所有羮菜不應多請後安鉢時恐溢出故羮飯等食應當學第二十九緣起佛在舍衛國住祗園中有居士設供請僧自手斟酌下飯已入內取羮還六羣飯已盡居士與羮已復入內取飯還彼食羮已盡居士譏嫌謂似饑餓之人佛為結戒律云不等者飯至羮未至飯已盡羮至飯未至羮已盡也結罪其中所犯並餘四衆悉皆同前不犯者或時正須飯不須羮或時正須羮不須飯或日時欲過或命難梵行難疾疾食及最初未制戒等會採僧祗律云不得先取羮後取飯當先取飯按已後取半羮若國法先以羮後以飯者當取鍵鎡拘鉢受若無者得以鉢受羮但受飯者應以手遮徐徐下鉢中勿太令溢出若病比丘宜取羮者多取無罪拘鉢者是小鉢也謂取鍵鎡小鉢受之以次食應當學第三十釋義緣處發起如上赴請譏嫌謂譬如禽畜佛為結戒律云不次第者鉢中處處取食食也結罪其中所犯並餘四衆悉皆同前不犯者或時患飯熱挑取冷處食若日時欲過若命難梵行難如是疾疾食及最初未制戒等會採僧祗律云不得遍刳食十誦律云不得鉢中摘好食根本律云不應憍慢食不得挑鉢中而食應當學第三十一釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前律云挑者置四邊挑中央至鉢底現空也若比丘不病不得自為己索羮飯應當學第三十二緣起佛在舍衛國祗樹園住時有居士請僧自手斟酌種種飲食六羣自為己索食如饑餓時居士譏嫌佛為結戒結罪其中所犯並餘四衆悉皆同前不犯者若病者自索若為他索他為己索若不求而得及最初未制戒等不得以飯覆羮更望得應當學第三十三緣起佛在舍衛國給孤獨園有居士請僧設供手自斟酌羮飯與一六羣比丘羮已識次更入內取羮彼於後即以飯覆羮居士問言羮在何處彼便默然居士譏嫌謂似饑餓人佛為結戒結罪其中所犯並餘四衆悉皆同前不犯者若請食或為同梵行者或為病者請食還與彼或時正須羮有時正須飯及最初未制戒等會採僧祗云若比丘迎食慮污衣者不得盡覆當露一邊若食盡者前人問得未應答已得若比丘病宜多須羮者多取無罪律攝云羮飯不得互掩覆者意欲多求長貪心故應於飲食生厭離想是為出家所應作事隨得隨食少欲為念不得視比座鉢中應當學第三十四緣起佛在舍衛國住祗陀林有居士設供請僧手自斟酌飲食六羣中有一人得食分少見比座分多即語居士言汝有愛居士報言我平等相與耳何故言我有愛佛為結戒律云視比座鉢中者誰多誰少耶結罪其中所犯並餘四衆悉皆同前不犯者若比座病若眼暗為看得食不得食淨不淨受未受及最初未制戒等會採僧祗律云若監食人看食何處得何處不得無罪若共行弟子若依止弟子病看其鉢中是應病食不看無罪若看上下座為得食不無罪當繫鉢想食應當學第三十五緣起佛在舍衛國給孤獨園有居士請僧諸比丘往詣其家就座而坐六羣受羮飯已左右顧視不覺比座取羮藏之彼自看不見羮問言我向受羮今在何處比座比丘言汝何處來耶答言我在此置羮在前左右看視而今無爾佛為結戒律云不繫鉢想者為左右顧視也結罪其中所犯並餘四衆悉皆同前不犯者或比座眼暗為受取瞻看淨不淨得未得或自看日時或命難梵行難欲逃避左右看及最初未制戒等會採僧祗律云當端心觀鉢食不得放鉢在前共比座語若有因緣須左右語者左手撫鉢上緣若食到第三人時當先將鉢預擎待食至律攝云繫心而食充軀長道不得觀他生嫌賤心附考勒伽論云若食一一食時當觀此食從何處來從倉中出倉從地出地以和合種子得生今復還養糞身舉摶時作糞想正念在前不以散亂心噉食當作逆食想從地得想病想等智度論云思惟此食工夫甚重計一鉢之飯作夫流汗合集量之食少汗多此食辛苦如是入口即成不淨宿昔之間變為屎尿本是美味惡不欲見行者自思如是弊食我若貪著當墮三塗如是觀食當厭五欲不得大摶飯食應當學第三十六釋義緣處發起如上赴供譏嫌謂似畜類佛為結戒律云大摶者口不容受也結罪其中所犯並餘四衆悉皆同前不犯者或日時欲過或命難梵行難疾疾食及最初未制戒等會採僧祗律云不得大摶亦不得小如淫女兩三粒而食當可口食上座當徐徐食不得速食竟住看令年少狼狽食不飽不得大張口待飯食應當學第三十七釋義緣處發起譏嫌等其中所犯不犯並餘四衆悉皆同前律云大張口者飯未至先大張口以待也會採僧祗律云比丘食時當如雪山象王食法食入口已以鼻作後口分齊前食咽已續內後團若口有瘡得預張無罪不得含食語應當學第三十八釋義緣處發起譏嫌等如上佛為結戒律云含飯語者飯在口中語不分明令人不解也此據緣起但云含飯語須知食有二五比食噉一切皆不得含口而語含食語乃白衣法及諸婆羅門無慚受施非比丘赴供之儀也結罪其中所犯並餘四衆悉皆同前不犯者或噎而索水或命難梵行難作聲食及最初未制戒等會採僧祗律云和尚阿闍黎上座喚若咽未盡能使聲不異者得應若不能者咽已乃應前人嫌者答言我口中有食故不即應五分律云益食時聽言須不須不嫌訶食不得摶飯遙擲口中應當學第三十九釋義緣處發起如上赴供譏嫌謂如幻師佛為結戒律云遙擲者先張其口乃以飯摶遙擲而入也結罪其中所犯並餘四衆悉皆同前不犯者或被繫縛擲口中食及最初未制戒等會採僧祗律云若酸棗若蒲萄如是種種乃至熬豆挑擲噉無罪不得遺落飯食應當學第四十緣起佛在舍衛國住祗陀林城中有居士請僧手自斟酌飲食六羣手把飯摶齧半食居士譏嫌佛為結戒律云遺落者半入口半在手中准犯緣據西域食儀結戒其今東土應鉢用匙若遺落者事同此治結罪其中所犯並餘四衆悉皆同前不犯者或噉薄餅焦飯若瓜甘蔗菜果及最初未制戒等會採僧祗律云若團大當手中分令可口餅亦如是不得頰食食應當學第四十一釋義緣處發起如上赴請譏嫌謂似獼猴佛為結戒律云頰食者令兩頰鼓起如似獼猴也結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或日時欲過或命難梵行難疾疾食及最初未制戒等會採僧祗律云不得口中回食食謂含飯團從一頰回至一頰當一邊嚼即嚼邊咽不得嚼食作聲應當學第四十二釋義緣處發起亦如上赴供生俗譏嫌佛為結戒結罪其中所犯並餘四衆悉皆同前不犯者或嚼乾餅焦飯或嚼甘蔗瓜果及最初未制戒等會採僧祗律云不得㗘㗱作聲食不得全吞嗗嗗作聲若咽喉病無罪十誦律云啜粥不得作聲噉根莖等勿令大作聲不得大吸飯食應當學第四十三釋義緣處發起譏嫌如上佛為結戒律云吸飯者張口遙呼吸也結罪其中所犯並餘四衆悉皆同前不犯者若口痛若食羮若食一切漿及最初未制戒等會採僧祗律云若食薄粥羮飲不得吸使作聲當徐徐咽根本律云不彈舌食不㗘㗱食不訶氣食不吹氣食若實口病當依本部聽開若口無病宜遵僧祗根本不得舌䑛食應當學第四十四釋義緣處發起譏嫌如上佛為結戒律云舌䑛者以舌䑛飯揣食也揣者試探也結罪其中所犯並餘四衆悉皆同前不犯者或被縛或手有泥或垢膩污手舌䑛取及最初未制戒等會採僧祗律云不得䑛手食若酥油蜜石蜜著手者當就鉢緣上概取一處然後取食不得𭋝指食若蜜鹽著指頭得𭋝無罪不得振手食應當學第四十五釋義緣處發起如上譏嫌謂似王如大臣佛為結戒振者謂以手動搖也結罪其中所犯並餘四衆悉皆同前不犯者或有如是病或食中有草有蟲或時手有不淨欲振去之或未受食手觸而污手振去之及最初未制戒等會採僧祗律云若振手時不得向比座振若食著手當已前振若鉢中抖擻根本律云以鉢水振灑餘人污彼衣服見他好衣生嫉妬故如是等皆不應作不得手把散飯食應當學第四十六釋義緣處發起如上譏嫌謂似雞鳥佛為結戒手把散飯謂不摶食之今此方受食俱用匙鉢無手摶儀式或落有之其中所犯不犯並餘四衆悉皆同前會採僧祗律云受食時不得令一粒落地若淨人瀉時墮地無罪食著口中時勿令落地誤落者無罪若噉瓜果甘蔗時皮核滓不得縱橫棄地當聚足邊十誦律云食墮所受草葉上者應食若有土者吹去却而食或有多土著者水洗得食不得污手捉飲器應當學第四十七釋義緣處發起如上譏嫌謂似國王大臣佛為結戒律云污手者膩飯著手也結罪其中所犯並餘四衆悉皆同前不犯者或草上受葉上受洗手受及最初未制戒等會採五分律云不曲指收鉢食不嗅食食不嫌訶食不得洗鉢水棄白衣舍內應當學第四十八緣起佛在舍衛國住給孤精舍時六羣在居士家食已洗鉢棄洗鉢水乃至餘食在地居士見已譏嫌謂多受飲食如譏餓之人而損棄狼藉如王大臣佛為結戒律云洗鉢水者雜飯水也結罪其中所犯並餘四衆悉皆同前不犯者若澡槃承取水持棄外及最初未制戒等會採十誦律云問主人棄不犯僧祗律云食時當稱腹而取不得多受若淨人卒多與者未噉時應減與比座若比座不取應與沙彌及園民若洗鉢時不應一粒瀉棄地若有者應聚板上葉上附考五分律云有諸白衣新作屋欲得比丘洗鉢水灑地以為吉祥佛聽以鉢中無食水灑地根本律云有人來乞鉢水時應洗淨鉢置清淨水誦伽陀三遍授與彼人或洗或飲能除萬病不得以殘食置鉢水中伽陀云以世五欲樂或復諸天樂若比愛盡樂千分不及一由集能生苦因苦復生集八聖道能超至妙涅槃處所為布施者必獲其義利若為樂布施後必得安樂佛雖親說此伽陀必要真正清淨持戒之者持鉢三誦方療萬病若無戒德縱誦千遍亦難感應不得生草菜上大小便涕唾除病應當學第四十九緣起此戒有二制佛在舍衛國住祗園中六羣大小便涕唾生草菜上諸居士見譏嫌謂如畜生佛為僧初結戒也如是結戒已有病比丘不堪避生草菜疲極故復隨開除病無犯乃第二結戒也結罪是中所犯並餘四衆悉皆同前准尼律中比丘尼犯波逸提僧戒結在先其間乃兼制四衆故結輕尼戒結在後一一皆正制本部故結重不犯者在無草菜處大小便流墮生草菜上或時為風吹或鳥所銜而墮生草菜中及最初未制戒等會採僧祗律云若夏月生草普茂無空缺處者當在駱駝牛馬等行處及專瓦石上乾草葉上如上次第無者當以木枝承令糞先墮木上後墮地若大小便涕唾污手腳得拭生草律攝云若棘刺叢處無犯若大林中行枝葉交茂應離人行處若涉生田間無空處應持乾葉布上便利若不可得者無犯不得水中大小便涕唾除病應當學第五十釋義緣處發起譏嫌如上其中所犯並餘四衆悉皆同前不犯者若有病或於岸上大小便流墮水中或風吹鳥銜墮水及最初未制戒等會採僧祗律云若雨時水卒浮滿當在土塊上及瓦石竹木上先令墮木上後落水中若大小便污手腳得水中洗若入水浴時不得唾中若岸遠者當唾手中然後棄善見律云若水人所不用或海水不犯水雖中用曠遠無人用不犯律攝云凡為洟唾時勿令大聲亦不應數為洟唾若性多洟唾者應向屏處不得立大小便除病應當學第五十一釋義緣處發起譏嫌如上佛為結戒其中所犯並餘四衆悉皆同前不犯者若有病若被繫縛或時腳有垢膩若泥及最初未制戒等然此一戒五天竺攪小行之時人皆蹲踞至於海洲諸國亦符此也其惟震旦方處不同事非一定立者多而蹲者寡若非蹲之鄉蹲者譏為不男設非立之地立者便以為怪於斯兩途理應通決蓋律依西制結集時仍列開遮故無移漏法流東夏受持者宜隨國風以護譏嫌據教善行庶無疑矣引證五分律云佛言雖是我所制餘方不以為清淨者皆不應用雖非我所制餘方必應行者皆不得不行根本羯磨云時佛臨欲涅槃告諸苾芻曰我先為汝等廣已開闡毗奈耶教而未略說汝等今時宜聽略教且如有事我於先來非許非遮若於此事順不清淨違清淨者此是不淨即不應行若事順清淨違不清淨者此即是淨應可順行問曰何意世尊將圓寂時說斯略教答曰大師滅後乃至聖教未沒已來莫令外道作斯譏議世尊既是具一切智世間有事不開不遮諸弟子輩欲如何行為遮斯難遠察未來利益故制又復欲令諸弟子於事無疑得安樂住是故須說凡諸司律幸勿才聞斯說便取餘之定禁妄符聖教是即非制而制是制而開廢紊毗尼其罪孰代附考佛言不應久忍大小便去時應捉廁草若在前去者當在前行至廁房應安衣著杙上若架上樹石上至廁外應彈指若謦咳令人非人知手堅捉衣不令觸廁兩邊應堅安腳當先看有蛇蟲應驅出不應未蹲便舉衣應並蹲漸舉衣蹲已當看勿令前却近兩邊使大小便洟唾污廁孔不應高聲大鳴廁草極長一磔手極短四指已用草未用草應別安處便已徐起漸下衣至洗淨處應彈指令人非人知應先看毒蛇漸褰衣蹲不應就水器中洗洗時勿使有聲洗已應以手若葉若弊物拭身上水應以鹵土若灰若泥若牛糞若土墼若澡豆洗手洗已應漸下衣起見廁上有不淨應掃除毗尼母經云應用二指頭洗之謂無名指及小指也不得與反抄衣不恭敬人說法除病應當學第五十二緣起此戒有二制佛在舍衛國住祗園中六羣與反抄衣不恭敬人說法諸比丘聞有知慚愧樂學戒者嫌責六羣白佛此初結戒也時諸比丘疑不敢為病反抄衣者說法佛言病者無犯故加除病之語乃第二制也向下除病說法諸條咸皆准此結罪其中所犯並餘四衆悉皆同前不犯者若為王王大臣說法及最初未制戒等雖曰王臣世所尊貴宜當深重佛法若生慠慢縱聞奚益為法忘軀上古皆然況靈山會上親以付囑是故特須尊敬其說者愈當以法自重苟彼此不恭二皆失利若夫誘進攝化之權必須隨機稱量不可直爾造為向下說法諸戒准此應知會採十誦律云諸佛常法不一心衆生不為說法不得為衣纏頸者說法除病應當學第五十三釋義緣處發起如上佛為結戒根本部云按西域俗儀所著衣裳無所裁製本自織成一幅之㲲價貴鮮白輕軟雜彩男則繞腰絡腋橫巾右袒女則襜衣下垂通肩總覆今故制云纏頸此方若以巾帕及餘物繞頸者例制可知若外儀不恭則內念不䖍是亦不應為說其中所犯不犯並餘四衆悉皆同前不得為覆頭者說法除病應當學第五十四釋義緣處發起如上佛為結戒覆頭者謂以衣物蓋頭也西竺以露頂跣足表至敬東土以冠履備整顯極恭然禮隨國制所以便為䖍敬之儀此方除冠巾外若用餘物覆頭者俱不應為說其中所犯不犯並餘四衆悉皆同前會採僧祗律云若比丘為塔為僧事詣王若地主時彼言比丘為我說法若邊有淨人當立意為彼人說王聽無罪若比丘在怖畏險道行時防衛人言尊者為我說法彼雖覆頭為說無罪不得為裹頭者說法除病應當學第五十五釋義緣處發起如上佛為結戒裹謂包裹纏裹與覆義不同其中所犯不犯並餘四衆悉皆同前會採僧祗律云若比丘為塔事僧事詣王若地主乃至在怖畏險道行時開說同上不得為叉腰者說法除病應當學第五十六釋義緣處發起如上佛為結戒叉腰者或一手叉或兩手叉俱不應為說其中所犯不犯並餘四衆悉皆同前會採僧祗律云不得為抱膝人說法除病不得為翹腳人說法除病不得為著革屣者說法除病應當學第五十七釋義緣處發起如上佛為結戒梵語亟縛屣或名革屣此翻云靴乃皮屬之履也東土雖無跣足聽法之儀若著不淨鞋履還須更却餘義通塞准略教應知其中所犯不犯並餘四衆悉皆同前會採五分律云若多人著革屣不能令脫但因不著者說無罪不得為著木屣者說法除病應當學第五十八釋義緣處發起如上佛為結戒草作者名扉皮作者名履麻作者名屩木作者名屐亦有帛屐以帛為之西域王臣長者俱著金銀寶屐准義悉皆不聽為說若隨機權攝如上應知其中所犯不犯並餘四衆悉皆同前會採僧祗律云若比丘為塔為僧事詣王若地主所彼言比丘為我說法不應語令脫屐恐生疑故若邊有淨人應作意為淨人說王雖聽無罪不得為騎乘者說法除病應當學第五十九緣起十誦律云波斯匿王自作制限若佛在祗園我當日日自往由是乘乘向祗園見佛六羣為王說法諸比丘聞有行頭陀樂學戒者嫌責六羣白佛結戒故制人前己後人在道己非道人坐己立人高座己下座人臥己坐持杖持劒持鉾持刀持蓋不應為說法緣起並同此中乘者謂象馬牛車等乘也其中所犯不犯並餘四衆悉皆同前會採僧祗律云若比丘為塔為僧事詣王若地主彼言比丘為我說法不應語令下乘恐生疑故若邊有淨人者應作意為淨人說王雖聽無罪若在怖畏險道行時防衛人言尊者為我說法彼雖騎乘為說無犯不得在佛塔中止宿除為守護故應當學第六十緣起佛在舍衛國住給孤園六羣止宿佛塔中諸比丘聞有少欲者嫌責六羣白佛結戒時諸比丘疑不敢為守護故止宿佛亦聽允乃第二制也釋義梵語塔婆亦云浮圖新云窣堵波又曰制底別名支提此翻為方墳或翻為圓冢正譯為聚相謂如來衆德俱聚於此人天所共瞻仰即瘞佛舍利處也若佛說法經行之處皆建浮圖雖無舍利亦名為塔僧祗律云有舍利名曰制底無舍利名曰支提舍利義有二種一全身二碎身碎身者有三種一骨舍利其色白二肉舍利其色赤三髮舍利其色黑菩薩羅漢皆有此三種唯佛舍利五色不定神通變化而有光明經無量劫常在具足利益衆生乃戒定慧之所熏修妙功德之所共集希有難得為像末法中最上福田也魏書釋老志云佛既謝往香木焚尸靈骨分碎大小如粒擊之不壞焚之不焦而有光明神驗謂之舍利王臣收奉竭香花致敬墓建宮宇謂之為塔猶宗廟也故時稱為塔廟此言佛塔揀非菩薩聲聞之塔縱非佛塔即一切聖賢浮圖亦應恭敬皆不得於中止宿等事除為守護故者謂以恭敬心晨昏灑掃塵坌晝夜然供香燈並防無信白衣𧜼慢招愆故聽於中止宿而守護之即今香燈殿主之類是也結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病或為強力者所執或命難梵行難止宿及最初未制戒等引證第四分云佛在王舍城時恭敬世尊無敢與佛剃髮者只有一小兒名優波離無知未有所畏為佛剃髮其父母在世尊前合掌白言小兒為世尊剃髮為好不佛言善能剃髮乃使身安樂而太曲身父即語兒言汝莫太曲身令世尊不安復問佛言好不佛言善身太直父語子言汝莫太直身令世尊不安復問佛言好不佛言善而入息太粗父語兒言汝莫粗入息令佛不安復問佛言好不佛言善而出息太粗父語兒言汝莫出息太粗令佛不安時小兒優波離入出息盡入第四禪爾時世尊告阿難言此小兒已入第四禪汝取彼手中刀阿難即受教取刀持故盛髮器收世尊髮佛言不應故器盛應用新器新繒綵新衣裹盛時有王子瞿波離將軍俗往征西方索佛髮持行供養佛聽不知云何安處佛言聽安金塔中若銀塔若七寶塔繒綵衣裹不知云何持佛言聽象馬車乘若輦輿若頭上若肩上擔時王子持世尊髮去所往征討得勝還國為世尊起髮塔此是世尊在世時塔也時諸比丘亦請世尊髮持行不知云何安處佛言聽安金塔等不知持行乃至肩上持行時諸優婆塞作是念若佛聽我等及世尊現在起塔者我當起立佛聽作而不知云何作佛言應四方若八角若圓作不知何物作佛言應以甎石若木作一切如上法乃至地敷亦如上彼欲作幢四邊籬障及莊嚴供養佛一一皆聽幢作師子時諸比丘在世尊塔內宿乃至安佛塔在下房己在上房等二十六事緣發起佛皆云不應爾一一制之如下所列目得迦云給孤長者請世尊曰我以如來髮爪造窣堵波若佛聽者我當營造佛告長者隨意應作不知云何作佛言始從覩史多天下生贍部化導有情乃至涅槃本生聖跡隨意應作諸部咸缺此佛塔等事唯本部有制今詳録者以防佛現在世有塔之疑據此以為證也附考十二因緣經云有八種塔並有露盤佛塔八重菩薩七重辟支六重四果五重三果四重二果三重初果二重輪王一重凡僧但蕉葉火珠而已輪王雖是一重比丘見之不得為禮以非聖塔故凡僧隨次應禮涅槃經後分云佛塔高十三層上有輪相衆寶莊嚴辟支佛十一層羅漢四層亦以寶嚴飾輪王雖亦寶成無復層級未脫三界諸有苦故輪相者僧祗律云佛造迦葉佛塔上施盤蓋長表輪相經中多云相輪以人仰望而瞻相也露盤即輪相名別爾不得藏財物置佛塔中除為堅牢故應當學第六十一釋義緣處發起如上佛為結戒時諸比丘疑不敢為堅牢故藏財物著佛塔中佛復開聽乃第二制也財物者謂衣具器物也若為貪積藏中則不可以重己物而輕佛塔若供養塔及形像之物或僧祗物為守護堅牢不令有失權可藏舉結罪其中所犯並餘四衆悉皆同前不犯者為堅牢藏著或彊者所執或命難梵行難及最初未制戒等不得著革屣入佛塔中應當學第六十二釋義緣處發起如上佛為結戒皮熟曰韋生曰革凡是皮履通名革屣也結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病或為強者所執喚入塔中及最初未制戒等附考第三分云佛在王舍城時瞻波城有長者子字守籠那其父母唯有一子甚愛念之生來習樂未曾躡地而行足下生毛時摩竭國王欲見之敕瞻波城主使諸長者各將兒來彼城主奉敕與諸長者將兒到已乞王以衣敷地守籠那行詣王所頭面作禮王見歡喜賜以金寶語言我已與汝現世利益世尊在耆闍崛山中汝可往禮覲問訊當與汝後世利益諸長者如教禮佛聞法得法眼淨受三皈五戒為優婆塞時守籠那求佛出家因父母不聽佛不許可彼還家以方便求其二親七日不食遂聽捨家為道於精進經行之處血流污地如屠殺處後得漏盡證阿羅漢果佛告守籠那汝生習樂不慣涉苦聽汝於寺內著一重革屣即白佛言我捨五象王出家為道或致人難言貪一重革屣世尊聽諸比丘畜者我亦當畜佛時默然可之即以是因緣集比丘僧為隨順說法無數方便稱讚頭陀行少欲知足樂出離者告諸比丘聽為護身護衣護臥具故聽在寺內著一重革屣時諸比丘著一重革屣不久便穿壞聽以樹皮若皮補之當以縷縫聽畜錐若在邊國多瓦石聽著兩重革屣以皮為臥具若得未治皮聽柔不聽一手捉革屣及鉢一切大皮不得畜謂師子虎豹獺野狸野狐黑皮等不得坐皮錦褥雜色臥具大小便洗足聽著革屣在和尚等前阿闍黎等前應偏露右肩脫革屣有所取與除在白衣舍及在道行若夜暮畏毒蟲聽著不應以皮作鉢並針線等囊若帽腰帶禪帶一切不淨可惡皮及皮器不應畜聽畜浮囊若住處有塵不得以皮作地敷不得手捉革屣入佛塔中應當學第六十三釋義緣處發起其中所犯不犯並餘四衆悉皆同前前既不聽著入彼復捉持而進故制革屣乃是履踐之物不淨所污故亦不聽持入塔中也不得著革屣繞佛塔行應當學第六十四釋義緣處發起其中所犯不犯並餘四衆悉皆同前繞有二種一路由塔邊過故繞二為表敬故繞此言繞者是路由邊過附考義淨律師云原西天致敬之儀有於多種或以禮拜為恭或復旋繞為敬禮則品列九等旋乃分於左右右繞為吉左繞為凶匝數則從一二三乃至百千隨各所表且如常行三匝者表供三尊止三毒淨三業然諸所表但不外於法數合乎聖教可爾而言九等者一發言慰問二俯首示敬三舉手高揖四合掌平拱五屈膝六長跪七手膝踞地八五輪俱屈九五體投地凡斯九等極唯一拜跪而讚德謂之盡敬遠則稽顙拜手近則䑛足摩踵凡其致詞受命褰裳長跪尊賢受拜必有慰詞或摩其頂或拊其背善言誨導以示親厚出家沙門既受敬禮唯加善願不止跪拜此方禮數久乖智者宜當奉教勿順人情而𧇾聖制也不得著富羅入佛塔中應當學第六十五釋義緣處發起其中所犯不犯並餘四衆悉皆同前梵語富羅此譯為短靿靴會採五分律云富羅不應深作𩍓聽至踝上不得𩍓如靴應開前附考寄歸傳云准如聖教若對形像及近尊師除病則徒跣是儀無容輒著鞋履偏露右肩衣掩左膊首無巾帕自是恆途餘處遊行在開非過若是寒國聽著短靴諸餘履屣隨處應用既而殊方異域寒暖不同准如聖教多有違處理可隆冬之月權可養身春夏之時須依律制履屣不旋佛塔教已先明富羅勿進香臺頒之自久然有違教之類即是強慢金言不得手捉富羅入佛塔中應當學第六十六釋義緣處發起其中所犯不犯並餘四衆悉皆同前前禁著入此制不得捉入也不得塔下坐食留草及食污地應當學第六十七緣起此有二制佛在舍衛國住祗陀園六羣在塔下坐食已留殘食及草污地而去有如足比丘嫌責白佛結戒與結戒已時諸比丘作塔已施食作房已施食衆集坐處窄狹不敢塔下坐食佛言聽坐食不得留草及食污地時有病比丘不敢留殘食草污地佛言聽聚著腳邊出時持棄之乃第二制也結罪其中所犯並餘四衆悉皆同前不犯者或時有如是病或時聚一處持出棄及最初未制戒等不得擔死尸從塔下過應當學第六十八緣起佛在舍衛國住給孤園六羣比丘擔死尸從塔下過護塔神瞋諸比丘中有樂學戒慚愧者嫌責六羣白佛結戒死者盡也謂氣盡命終尸者故形也在牀曰尸在棺曰柩結罪其中所犯並餘四衆悉皆同前不犯者或從此道過或強力者所將去及最初未制戒等附考寄歸傳云死喪之際僧尼漫設禮儀或復與俗同哀將為孝子或房設靈几用作供尊或披黲布而乖恆或垂長髮而異則或拄哭杖或寢苫廬斯等咸非教儀不行無過理應為其亡者淨飾一房或可權施蓋幔讀經念佛具施香花冀使亡魂托生善處方成孝子始是報恩豈可泣血三年將為賽德不䬸七日始符酬恩者乎斯乃重結塵勞更嬰枷鎖從暗入暗不悟緣起之三節從使趣使詎證圓乘之十地歟然依佛教苾芻亡者觀知決死當日輿向燒處尋即以火焚之當燒之時親友咸萃在一邊坐或結草為座或聚土作臺或置甎石以充坐物令一能者誦無常經半紙一紙勿令疲久然後各念無常還歸住處寺外池內連衣並洗其無池處就井浴身皆用故衣不損新服別著乾者然後歸房地以牛糞用塗餘並皆如故衣服之儀曾無片別或有收其設利羅設利羅此翻身骨為亡人作塔名為俱儸形如小塔上無輪蓋豈容棄釋父之聖教逐周公之俗禮號咷數月布服三年者哉無常經出北藏孝字函南藏當字函不得塔下埋死尸應當學第六十九釋義緣處發起其中所犯不犯並餘四衆悉皆同前埋者葬也凡比丘身亡當依佛教四種葬法謂焚燒水殯地埋棄林如此四法必依處所不可輒爾便為還乖聖教須當慎之附考根本雜事云苾芻身死應可焚燒塢波離白佛言如佛所說於此身中有八萬尸蟲如何得燒佛言此諸蟲類人生隨生人死隨死身有瘡者應觀無蟲方可燒殯無柴可得可棄河中若無河者穿地埋之地多蟲蟻可於叢薄深處令其北首右脅而臥以草稕支頭若草若葉覆其身上送喪苾芻可令能者誦三啓無常經並說伽陀為其呪願事了歸寺應可洗身若觸尸者連衣俱浴其不觸者但洗手足還至寺中應禮制底不得在塔下燒死尸應當學第七十釋義緣處發起其中所犯不犯並餘四衆悉皆同前經律云茶毗或云闍維此翻為焚燒不得向塔下燒死尸應當學第七十一釋義緣處發起其中所犯不犯並餘四衆悉皆同前向者謂不得正對塔前而燒也不得佛塔四邊燒死尸使臭氣來入應當學第七十二釋義緣處發起其中所犯不犯並餘四衆悉皆同前前禁正向此制四面如來浮圖應以香花旋繞瞻相禮敬尸氣不淨豈容四方焚熏須覓僻靜處以燒化之可也附考法華經云一切衆生喜見菩薩服諸香油焚身臂供佛用酬法乳弘恩光明遍照八十億恆河沙世界其中諸佛同聲讚善然以聖人見道理證性空三業純淨無諸雜穢雖焚肉身是名真法供養此則當為凡流不淨是故遮止不得持死人衣及牀從塔下過除浣染香熏應當學第七十三緣起佛在舍衛國給孤獨園六羣持死人衣及牀從塔下過彼所住處神瞋諸比丘聞嫌責白佛結戒時諸糞掃衣比丘疑不敢持死人衣塔下過佛言聽浣染香熏已持過是故開除乃第二制也結罪其中所犯並餘四衆悉皆同前不犯者若或時有如是病若浣染香熏者及最初未制戒等會採毗尼母云若得糞掃衣若水中久漬由純灰浣淨以奚黑伽香塗上然後得著入塔中衣著糞掃是慚愧頭陀浣染香熏仍淨潔無穢聖慈開聽得著入塔者一令貪好之流自厭一令頭陀之衆增修其意深矣附考僧祗律云病時不服蒜不差者聽服服已不應繞塔若塔在露地者得下風遙禮音義搪突觸也齗音銀齒根肉也斟酌益也缺時缺伸即顰伸也狼狽下音輩狼前二足長後二足短狽前二足短後二足長狼無狽不立狽無狼不行若相離則進退不得矣今取喻年少比丘不相離上座出入也㗘㗱上音博下音集嗗音穵飲聲啜穿入聲同啜音傳腓腸也齧音孽也痤坐平聲小腫也頰音劫面旁也溉音戲又音蓋取也屝音費屩音覺瘞音意埋也藏也覩史多天即兜率陀天此翻知足涅槃經云此天欲界最勝故補處菩薩皆示生此天為教化衆生故襜諂平聲衣之遮蔽前者彊音強暴也守籠那根本律云說籠拏此翻二百億瞻波城有長者豪貴晚得繼嗣時有報者輒賜金錢二百億因名其子聞二百億有云父聞歡喜施子金錢二百億二百億形貌端嚴人所希見足下毛長四指同黃金色增一阿含經云勇猛精勤堪任苦行所謂二十億比丘是狸狐狸也狐音呼獸名鼻尖尾大善為妖魅性淫多疑名山記云狐者先古之淫婦其名曰紫化為狐多自稱紫獺灘入聲獸名形如小狗水居食魚正月祭魚獺不祭魚國多盜賊𩍓音雍靴𩍓也黲音慘淺青黑色賽腮上聲報也不悟緣起之三節謂無明不覺生三細此業轉現次第而生故云三節萃音悴聚也咷音陶號咷哭聲也稕肫去聲束稈也
