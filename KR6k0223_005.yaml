body:
  text: 金陵寶華山弘律沙門讀體集三不定法此不定有二條律攝云不定法者言此罪體無定相故容有多罪不可定言薩婆多毗婆沙云佛坐道場時已決定五篇戒輕重通塞無法不定此所以言不定者直以可信人不識罪相輕重亦不識罪名字設見共女人一處坐不知為作何事為共行婬為作觸摩為作惡語為過五六語故言不定文然中犯相若以五篇收之則前攝初二後准單墮所起煩惱及歸根本種類皆屬婬故其泥犁受報歲月極苦一一准罪可知初三不定法若比丘共女人獨在屏覆處障處可作婬處坐說非法語有住信優婆私於三法中一一法說若波羅夷若僧伽婆尸沙若波夜提是坐比丘自言我犯是罪於三法中應一一治若波羅夷若僧伽婆尸沙若波夜提如住信優婆私所說應如法治是比丘是名不定法緣起佛在舍衛國祗桓精舍迦留陀夷未出家時有親友婦名齋優婆私顏貌端正迦留陀夷亦顏貌端正互相繫意於乞食時往詣其家在屏覆處與共獨坐說非法語時毗舍佉母有小緣事往彼毗舍佉母遙聞迦留陀夷語聲意為說法信樂心生即就壁聽其所以往禮世尊具白上事佛知訶責迦留陀夷已集十句義與諸比丘結戒此是性罪由婬煩惱制初不定薩婆多論問云毗舍佉聰明利根大德重人知比丘與女人屏處坐何故往答是人已入道跡已得阿那含道深樂佛法佛常自說聽法有五事一得聞未曾聞法二已曾聞清淨堅固三除邪見四得正見五解甚深法是以毗舍佉樂法情深不以嫌疑自礙佛說種種法者在家人未入道亦多為說布施功德出家人已入道跡多為說持戒功德與諸比丘結此戒者一為止誹謗故二為除鬬諍故三為增上法故比丘出家迹絕俗穢為人天所宗以道化物而與女人屏處私曲鄙碎上違聖意下失人天宗尚信敬四為斷惡業次第法故初既屏處漸染纏綿無所不至是以防之釋義文分三節共女人獨在屏覆處下明所犯之境有住信優婆私下明見聞有根是坐比丘下正明所犯律云女人者人女有智未命終獨者一比丘一女人屏覆二種一者見屏覆若塵若霧若黑暗中不相見二者聞屏覆乃至常語不聞聲處障處者若樹若牆壁若籬若衣及餘物障可作婬處者謂其處堪作不淨事坐者謂身所居若牀若坐乃至地敷得容二身說非法語者說婬欲法住信優婆私者信佛法僧歸依三寶受持五戒善憶持事不錯不妄薩婆多論云可信優婆夷者若人語言汝若妄語不害汝命若不妄語當害汝命即思我不妄語害此肉身滅此一身若妄語者滅無量身兼害法身誓不妄語又復語言汝若妄語活汝父母兄弟姊妹一切親族若不妄語一切殺之尋思我不妄語害此一世生死親族我若妄語流轉三惡永失人天累世親族眷屬又失出世賢聖眷屬誓不妄語又復語言汝若妄語與汝珍寶種種財利若不妄語即不與汝即思我不妄語失此俗財我若妄語失聖法財誓不妄語是名可信優婆夷僧祗律云成就十六法名可信優婆夷歸佛歸法歸僧於佛不壞淨於法不壞淨於僧不壞淨僧未得利能令得已得利能令增僧未有名稱能令名聞遠著僧有惡名能令速滅不隨愛瞋怖癡離欲向成就聖果於三法中一一法說等者謂於四棄十三僧殘九十墮中隨一一法而陳說也三法皆云若者若乃不定之義是坐比丘自言我犯是罪等者謂以所為之事據實自說即如其言治之若其言與優婆私語不相當即應如優婆私言而治之律攝云此中不定法由事由處由情由證以為其體若復苾芻獨與一女人者是事在屏障者是處堪行婬者是情若有正信鄔波斯迦即優婆夷也隨一而說者是證又設是異生有忠信者言行無濫亦依其語異生者以人倫異於非人畜類故名異生則知一切人凡正直不妄之言皆可准信結罪是中犯者若比丘自言所趣向處自言所到處自言坐自言臥自言作即應如比丘所語治若比丘自言所趣向處自言所到處自言坐自言臥不自言作應如優婆私所說治若自言所趣向處自言所到處自言坐不自言臥不自言作應如優婆私所說治若自言所趣向處自言所到處不自言坐不自言臥不自言作應如優婆私所說治若自言所趣向處不自言所到處不自言坐不自言臥不自言作應如優婆私所說治若不自言所趣向處不自言所到處不自言坐不自言臥不自言作應如優婆私所說治會採十誦律云隨優婆夷所說事應善急問善謂稱量前境急問謂據證速究是比丘善急問已若言我不往無有是罪應隨可信優婆夷語故與是比丘作實覓白四羯磨作羯磨已應隨順行不與他受大戒乃至心常行恭敬禮拜即奪三十五事也若不如法行者盡形壽不得出是羯磨薩婆多論云若比丘初言爾後言不爾或言我不往不作是罪應隨可信人語與實覓毗尼所以爾者欲令罪人折伏惡心又令苦惱不覆藏罪又令梵行者得安樂住又肅將來令惡法不起與作羯磨已者說先罪應解羯磨隨事輕重治若不說者盡形壽不解羯磨此實覓羯磨與夫解法俱於作持中明次二不定法若比丘共女人在露現處不可作婬處坐作麤惡語有住信優婆私於二法中一一法說若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中應一一法治若僧伽婆尸沙若波逸提如住信優婆私所說應如法治是比丘是名不定法緣起此戒發起亦由前人其間別者前據三事是在屏處堪作婬處坐此以二事謂在露現不堪作婬處坐其波羅夷罪無由生故以彼共在露處或身相觸或說非法麤惡語或說索供等語故得僧殘罪若獨與女人露地坐或過語說法或向說實得上人法或說他麤罪等故得波逸提罪此戒犯者唯除共作為異餘言趣向所到坐臥悉同於前與實覓羯磨奪三十五事若說先罪與解羯磨亦爾比丘尼無此二不定法三不定法竟四尼薩耆波逸提法此波逸提法比丘共有一百二十條於中揀三十條因財事生犯貪慢心強制捨入僧中名曰尼薩耆波逸提餘有九十事無財可捨但名波逸提出要律儀云尼薩耆舊翻捨墮聲論云尼翻為盡薩耆翻捨波逸提翻墮十誦律云墮在燒煑覆障地獄八熱通為燒煑八寒黑暗等通為覆障經云犯波逸提如夜摩天壽二千歲墮泥犂中人間二百年彼天一晝夜於人間數一萬四千四百萬年此泥犁即眾合地獄謂以眾多苦具熾然猛熱合來逼惱故第一衣過十日戒若比丘衣已竟迦絺那衣已出畜長衣長去聲餘也經十日不淨施得畜若過十日尼薩耆波逸提緣起此戒有二制時佛在舍衛國聽諸比丘持三衣不得長六羣畜長衣或早起衣或中時衣或晡時衣如來知已訶責六羣不聽畜長衣集十句義與諸比丘結戒也時阿難得一貴價糞掃衣欲以奉大迦葉大迦葉常行頭陀樂著糞掃衣故而迦葉不在畏犯畜長衣乃往白佛佛問迦葉何時當還報言却後十日因是開聽畜長衣經十日不淨施得畜故有第二結戒也此是遮罪由長衣事多貪煩惱制斯學處衣犍度云佛見諸比丘在路行多擔衣物作是念可為諸比丘制衣多少不得過畜時佛初夜在露地坐著一衣至中夜覺身寒即著第二衣至後夜覺身寒復著第三衣便安隱住時佛念言當來世善男子不忍寒者聽畜三衣不得過又云若作新衣一重安陀會一重多羅僧二重僧伽黎若故衣聽二重安陀會二重多羅僧四重僧伽黎糞掃衣隨意多少重數僧祗律云我諸弟子齊是三衣足遮大寒大熱防蠅蚊蝱覆障慚愧不壞聖種若性不堪寒者聽故弊衣隨意重納律攝云應知三衣受用各別若作務時或道行時及在寺內常用五條若行禮敬及食噉時應披七條為遮寒入聚落乞食噉食禮制底應著大衣後二衣割截作若是貧人後必須截為入聚落故何故不割截衣不入聚落然苾芻衣有其二種與俗不同謂彩色形狀俗人純白不截苾芻壞色而截若是貧人後必須截者謂僧伽黎必須割截衣持也以三衣大衣在後故曰後必須截釋義文分三節衣已竟下明其創制畜長衣下明其隨開若過十日下結成所犯律云衣竟者三衣迦絺那衣已出僧祗律云比丘三衣已成是名衣竟不受迦絺那衣亦名衣竟已捨迦絺那衣亦名衣竟洗染衣訖亦名衣竟迦絺那衣此翻云功德衣為坐夏有功五利賞德賞前安居人後安居人不得此衣於七月十六日受同眾僧受已若畜長衣離衣宿受別請展轉食前食後食不囑餘比丘入聚落此五戒聽開不犯至臘月十五日僧集羯磨捨迦絺那衣已若畜長衣等五事則犯捨即出也後安居人雖不得受衣其五事亦開聽一月此法於作持中明衣者有十種憍賖耶衣此翻云野蠶衣如此方紬綾絹帛之類劫貝衣此翻云木綿衣如此方細布之類欽婆羅衣此翻云細毛衣西域王臣長者多以上好極細羊毛織成其財名曰上妙氎也如此方絨褐之類芻摩衣此翻云麻衣乃似麻之類亦名芻摩翻云細輭衣讖摩衣此翻云麤布衣扇那衣或云奢那衣乃樹名也此樹皮似麻取以織衣體如麤布此方無有麻衣西域麻有多種自然青黃赤色不以染成讖夷羅衣鳩夷羅衣讖羅半尼衣此三無翻譯雖聽十種衣者非謂比丘畜十衣也以世人所著之衣財不出此十若有施此十種衣財者比丘皆可納取染成壞色割截縫作三衣受持衣犍度云佛在鹿野苑時憍陳如五比丘頂禮白佛言我等當持何等衣佛言聽持糞掃衣及十種衣應作袈裟色持斯乃創制後因無悲愍心起世譏嫌如下第十一戒中憍賖耶衣不聽著用長衣者若長如來八指若廣四指是佛一指有二寸則長一尺六寸闊八寸儘可作大衣條隔用也除三衣及百一衣物外餘者皆名長衣摩得勒伽論云何得長衣謂若入手若在膝上肩上作想此是我衣不淨施者衣揵度云淨施有二一真實淨施謂真實施與一比丘也二展轉淨施謂對一比丘作法已然後畜也異此二種故名不淨施此法於作持中明結罪是中犯者若比丘一日得衣畜二日得衣畜乃至十日得衣畜至十一日明相出一切尼薩耆波逸提言一日者即以從他得衣入手之日名為一日非謂月之初一日也此乃十日中日日相續得衣皆犯故云一切若於十日內或間日得衣或唯一日得衣至十一日明相出隨所得衣盡捨墮若比丘一日得衣不淨施二日得衣淨施三日得衣乃至十日得衣不淨施至十一日明相出九日中所得衣盡捨墮此十日中所得衣唯除第二日得者已作淨施故不犯其餘九日不作淨施者盡犯若於十日內或間日得衣或唯一日得衣至十一日明相出隨所得衣若作淨施者不犯若不淨施者盡捨墮若十日內或日日得衣或間日得衣或唯一日得衣至十一日明相出若不遣與人若不失衣若不故壞若不作非衣若不作親厚意取若不忘去盡捨墮遣與人即送與人也失衣謂被他盜去及離衣宿等故壞謂鼠咬蟲殘水漬火燒等作非衣謂別作餘用作親厚意取謂作一往久相知親友取去忘去謂有緣事他往忘其作淨施若捨墮衣不捨持更貿餘衣一捨墮一突吉羅此捨墮衣應捨與僧僧者謂若四若五若十二十乃至數百比丘若眾多人謂若二若三比丘若一人不得別眾捨若捨不成捨突吉羅是比丘捨衣竟不還者突吉羅若還時有人言莫還者突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣善見律云朱羅波利迦羅衣漢言雜碎衣也若故壞若燒若作非衣謂作餘用若數數著壞者盡突吉羅已上突吉羅皆反治能作法者由不遵聖制違越毗尼故此戒捨懺還衣等法於作持中一一詳明此戒必具四緣方成本罪一時非開聽二有貪慢心三畜三衣及衣財四過十日不受持不說淨兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者齊十日內若轉淨施若遣與人若賊奪想若失想若燒想若漂想不淨施不遣與人若奪衣失衣燒衣漂衣取著若他與著若他與作彼不犯若彼受付囑衣者若命終若為賊盜惡獸水火等難不作淨施不遣與人及最初未制戒等是為不犯會採僧祗律云一日得衣即日作淨乃至十日得衣十日作淨十一日得衣十一日作淨犯越毗尼罪以無間故間者一日得衣得更停九日二日得衣更停八日三日得衣更停七日乃至九日得衣更停一日十日得衣即十日作淨十一日得衣不應受是名間也若二比丘共物未分過十日不犯若居士舍請僧食并施衣物有病比丘囑人取衣分是比丘持衣分雖久未與不犯若師若弟子送衣與未得雖久不犯若令織師織衣衣竟雖久不犯若比丘買衣雖價決了未得衣不犯若為佛為僧供養故求物集在一處雖久未用不犯若路行恐畏處藏衣而去過十日取者犯若人取來與者亦犯若為賊逐便捨衣走過十日已有人持來還者無犯於佛生處得道處轉法輪處阿難設會處羅云設會處五歲會處大得布施諸衣物是物入僧未分者雖久不犯是物已分多人共得一分中有善毗尼人能為眾人同意作淨無犯此方雖無如是聖迹凡遇諸佛菩薩勝會道場所有施物如法分已准斯例行可謂持律律攝云若為三寶畜衣非犯或施主作如是言此是我物仁當受用雖不分別即說淨也用之無犯或是己物寄他或作未得想斯皆無犯根本律云若犯捨墮不捨或雖捨不說悔或雖說悔不經宿謂間也隨有所得並成捨墮由前染故若捨衣說悔經宿已得皆無犯五分律云不得捨與餘人及非人餘人謂下三眾與夫近事男女捨已然後悔過若不捨而悔者罪益深除長三衣若長餘衣乃至手巾過十日皆突吉羅若淨施不犯此謂十三資具守持用者一僧伽胝二喎呾羅僧伽三安呾婆娑四尼師但那五裙六副裙七僧脚崎八副僧脚崎九拭身巾十拭面巾十一剃髮衣十二覆瘡衣十三藥直衣言藥直衣者於所得衣中取一貴價者以預備為藥直薩婆多毗婆沙云若初日得衣二日捨此中凡言捨即作淨也如是乃至九日得衣十日捨十日所得衣若不捨不受持不作淨至十一日地了時捨墮謂前九日所得衣盡捨作淨但十日所得一衣以前次續因緣故得捨墮罪若初日得衣初日捨二日得衣以相續故此二日衣次第更得十日若初日得衣二日捨二日更不得衣三日得衣此三日次第得至十日以不相續故此中衣以日次第相續若初日得衣即不見擯不作擯此乃犯罪不懺悔僧為作舉白四羯磨擯治也惡邪不除擯若狂心亂心病壞心若不解擯不得本心乃至命終不犯此戒後解擯得本心還計日成罪若初日得衣上天宮北至單越住彼至命終不犯此戒後歸本處計日成罪若初日得衣至五日不見擯不作擯惡邪不除擯若狂亂病壞心上天宮北至單越後還解擯若得本心若歸本處取前五日數後五日然後成犯又云九十六種無淨施法佛大慈悲方便力故教令淨施令諸弟子得畜長財而不犯戒問曰佛何不直聽畜長財而強與結戒設此方便答曰佛法以少欲為本是故結戒不畜長財而眾生根性不同或有多預畜積而後行道得證聖法是故如來先為結戒而後設方便於法無礙眾生有益此戒大乘同學菩薩六度以檀施為首利濟眾生雖許畜者亦須如法說淨引證緇門警訓云地持論言菩薩先於一切所畜資具為非淨故以清淨心捨與十方諸佛菩薩如比丘將現前衣物捨與和尚阿闍黎等涅槃經云雖聽受畜要須淨施篤信檀越是也今時講學專務利名不耻五邪多畜八穢但隨浮俗豈念聖言自下壇場經多夏臘至於淨法一未霑身寧知日用所資無非穢物箱囊所積並是犯財慢法欺心自貽伊戚學律者知而故犯餘宗者固不足言誰知報逐心成豈信果由因結現前袈裟離體當來鐵葉纏身為人則生處貧窮衣裳垢穢為畜則墮於不淨毛羽腥臊況大小兩乘通名淨法儻懷深信豈憚奉行第二離衣異宿戒若比丘衣已竟迦絺那衣已出三衣中離一一衣異處宿除僧羯磨尼薩耆波逸提緣起此戒有二制佛在舍衛國給孤獨園時六羣比丘持衣付囑親友比丘往人間遊行受付囑比丘得此衣數數在日中曬諸比丘見已問知白佛此乃初結戒也後時一乾痟病比丘有糞掃僧伽黎患重因逢緣事遠行不堪隨持啟白世尊除僧羯磨乃第二結戒也此是遮罪由不善護身離衣故及慢教煩惱制斯學處釋義文分三節衣已竟下明其創制三衣中下顯所違犯除僧下明其隨聞律云衣已竟迦絺那衣已出如上三衣者一安陀會此云下著衣二多羅僧此二上著衣三僧伽黎此云重複衣又云大衣然此三衣西國總名支伐羅以色稱之並名袈裟所以作此三名者欲顯未曾有法以異外道故為少欲知足故以三衣不多不少足得資身行道大寒亦可以禦之故制三衣衣有十種如上離者謂衣不隨身也一一衣者謂守持三衣中隨離一衣也異處宿者謂異界而宿不失衣者僧伽藍裏有一界樹有一界謂樹與人等足陰覆跏趺坐場有一界謂於中治五穀處車有一界謂若車迴轉處船有一界謂船迴轉處村有一界村有四種如上舍有一界堂有一界堂舍謂多敞露庫有一界庫謂儲積諸物倉有一界倉謂儲積五穀失衣者則僧伽藍裏有若干界乃至倉有若干界而此僧伽藍界非彼僧伽藍界乃至非彼倉界又此僧伽藍界非彼樹界乃至非彼倉界又此樹界非彼僧伽藍界乃至非彼倉界又此場界非彼僧伽藍界乃至非彼倉界謂界互非作句亦爾在僧伽藍邊以中人若用石若甎擲所及處是名為界乃至倉界亦如是而人言中者以顯氣力不太大其所擲之甎石亦去不太遠也結罪是中犯者若比丘置衣在僧伽藍內在樹下宿至明相未出若不捨衣若不手捉衣若不至擲石所及處明相出隨所離衣捨墮除三衣若離餘衣突吉羅若明相未出可以得入界至衣處者須以手捉衣若衣界寬恐明相未出行不到衣處者但至擲石所及處立即名不離衣已到衣界故若不能捉衣又不能至擲石所及處立須趁明相未出時且速速作心念法捨所離之衣寧于壞威儀之突吉羅作對首懺悔迯其離衣之捨墮免勞眾中羯磨若比丘留衣樹下往場處乃至往倉處僧伽藍處宿亦如是若阿蘭若處無界八樹中間一樹間七弓遮摩梨國作弓法長中人四肘弓肘之數明於卷末若比丘留衣著此八樹間異處宿明相未出若不捨衣若不手捉衣若不至擲石所及處明相出捨墮除三衣若離餘衣突吉羅餘衣即臥具等此捨墮衣應捨與僧若眾多人若一人不得別眾捨若捨不成捨突吉羅若僧中捨衣竟不還者突吉羅若還時有人言莫還者突吉羅若轉作淨施若遣與人若持作三衣若作波利迦羅衣若故壞若燒若作非衣若數數著壞者盡突吉羅此戒捨懺還衣等法於作持中詳明此戒具六緣方成本罪一心不敬教二所離是受持三衣三時非開聽四非羯磨聽許五不作心念法捨六已經明相未至衣所兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者僧與作羯磨明相未出手捉衣若捨衣若至擲石所及處若劫奪失燒漂壞如是等想若水道斷路險難若賊惡獸渠水漲強力者所執若繫縛或梵行難若不捨衣不手捉衣不至擲石所及處及最初未制戒等是為不犯會採善見律云羯磨者隨病未瘥得離宿若僧為羯磨已離衣往餘方病瘥欲還道路險難不得還恒作還意雖病瘥不失衣若決作不還意失衣過十日犯長衣罪若往餘方病瘥還至衣所病復發更欲往餘方承先羯磨不須更羯磨律攝云有三種離衣一舉處離謂在障難處而舉其衣不得重觀或因失落二失念離於安衣處更不重憶三受用離謂暫安衣即遇緣隔不得受用雖復離衣若明相未出還得者無犯根本雜事云若暫向餘處即擬還者任不將去復有暫出擬還至彼日暮即侵夜歸被蟲賊害當於彼宿不應夜行所守持衣應心念捨可於同梵行邊借餘三衣守持充事薩婆多論云若重縫三衣設有因緣擿分持行名不離衣第三分云汝諸比丘隨所住處常俱三衣持鉢乞食譬如鳥之兩翼恒與身俱汝等捨本族姓以信出家應當如是所到之處法衣隨身不應離宿此戒大乘同制梵網經云而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身故知衣鉢鳥翼兩乘同也附考緇門警訓引事鈔云諸部並制隨身今時但護離宿不應教矣又會正記云今時希有護宿何況常隨多有畢生身無法服是則末世護宿猶為勝矣但內無淨信慢法輕衣真出家兒願遵聖制業疏云所以衣鉢常隨身者由出家人虗懷為本無有住著有益便停故制隨身若任留者更增餘習於彼道分曾無思擇故有由也唐無著禪師遊五臺因往金剛窟隨喜遇文殊化為老翁引入般若寺寺地盡是瑠璃堂舍皆輝金色翁居白牙牀指金墩令著坐之對談著欲求寓一宿翁曰持三衣不答曰受戒已來持之翁曰此是封執處著曰亦有聖教在若許住宿心念捨之或有強緣佛故聽許翁曰無難不得捨衣宜從急護噫今人不以離衣宿為咎者覩此可自思之第三衣過一月戒若比丘衣已竟迦絺那衣已出若比丘得非時衣欲須便受受已疾疾成衣若足者善若不足者得畜一月為滿足故若過畜尼薩耆波逸提緣起佛在舍衛國有比丘僧伽梨弊壞十日中更不能辦恐犯畜長衣戒彼同伴者為白世尊因聽畜長衣乃至滿足故時六羣比丘聞開聽畜長衣乃至滿足彼有糞掃衣及餘種衣同者不足取中糞掃衣浣染四角頭點作淨持寄親友比丘已人間遊行受寄者以其行久不還便出曬之諸比丘問知白佛結戒此由廢修正業制斯學處釋義文分三節衣已竟下明其創制得非時衣下明其隨開若過畜下結成所犯律云衣已竟迦絺那衣已出如上時者無迦絺那衣自恣後一月若有迦絺那衣自恣後五月非時者若過此限此謂後安居人無功德衣者從七月十六日至八月十五日於此一月畜長等五事開聽前安居人有功德衣者從七月十六日至臘月十五日於此五月五利許開若過其一月五月皆非畜長之時凡所得衣名曰非時衣也衣有十種如上欲須便受者欲須謂希樂得衣便受謂合畜也受已疾疾成衣者謂既得衣財於三衣中隨所闕壞者當速造成如法受持若足者善謂同樣衣財量已滿足堪成一衣而不缺少若不足者聽畜一月謂同樣衣財或欠少不能作一衣是以開聽如僧祇律云阿那律得一小段衣與諸比丘河邊灑水引令長廣佛至河邊知而故問彼答云為衣財不足是以灑水引令長廣佛言汝頗有更得衣望處不答云有佛問何時可得答言一月佛言從今聽不足衣有望處者停一月為滿足故結罪是中犯者若十日同衣足者應裁割若線拼若縫作衣若作淨施若遣與人若不裁割若不線拼若不作衣不淨施不遣與人十一日明相出隨衣多少捨墮若同衣不足至十一日同衣足即十一日應裁割縫作衣若線拼若不裁割縫作衣若不線拼若不淨施不遣與人至十二日明相出隨衣多少盡捨墮乃至二十九日同衣足亦如是若同衣不足三十日若足若不足若同衣若不同衣應即日裁割縫作衣乃至遣與人若不裁割乃至若不遣與人至三十一日明相出捨墮此捨墮衣應捨與僧若眾多人若一人不應別眾捨若捨不成捨突吉羅若僧中捨衣竟不還還時若有人教莫還若不還轉作淨施若遣與人若持作三衣若作波利迦羅衣若故壞若燒若作非衣若數數著壞者盡突吉羅此戒捨懺還衣等法於作持中詳明此戒具四緣方成本罪一心存貪慢二衣財滿足三時非開聽四不縫受持及不淨施而過期兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者若十日內同衣足若裁割若線拼若縫作衣若同衣不足至十一日足應裁割等乃至二十九日亦如是至三十日若足不足若同不同即日應裁割等若奪衣失衣燒衣漂衣而取著若他與著若作彼若受寄衣比丘命終或遠行若有難緣若不裁割等及最初未制戒等是為不犯會採十誦律云若比丘得不足衣停更望多衣故即得衣日不得所望亦不斷望非望而許復勤求所望是望亦斷非望更得是衣十日應作衣若足者善不足者留乃至三十日亦復如是善見律云若二十九日得所望衣細先衣麤先衣說淨新得衣復得一月為望同故若望得衣麤復得停一月如是展轉隨意所樂為欲同故莫過一月此戒大乘為利益眾生故不禁畜持若自為己畜不惠施他者亦犯慳貪多積之咎第四從尼取衣戒若比丘從非親里比丘尼取衣除貿易尼薩耆波逸提緣起此戒有三制佛在王舍城耆闍崛山中有一比丘著弊故補衲僧伽黎蓮華色比丘尼見已發慈愍心即脫身所著貴價僧伽黎與之易彼弊故僧伽黎自著異時往禮世尊世尊知而故問汝所著衣何以弊故彼以因緣白佛佛言不應如是聽汝畜持五衣完堅者餘衣隨意淨施若與人何以故婦人著上衣服猶尚不好何況弊衣乃集眾僧初為結戒也於後諸比丘皆畏慎不敢從親里比丘尼取衣佛言若非親里亦不能籌量知其可取不可取若好惡新舊若是親里籌量知其有無可取不可取好惡舊新故聽從親里尼取衣是第二結戒也又祇桓中二部僧得施衣其分時比丘錯得尼衣尼錯得比丘衣尼持衣至僧伽藍中相易比丘更白世尊故聽貿易乃第三結戒也此是遮罪由貪著心制斯學處釋義文分二節從非親里下明其所犯除貿易明其隨開律云非親里者非父母親里乃至七世非親也親里者父母親里乃至七世有親里者五家為鄰五鄰為里又云里者止也五十家共居止也父有六親謂伯叔兄弟子孫母有六親謂姑姨兄弟兒孫七世者謂高曾祖父子孫玄孫也衣有十種如上貿易者以衣貿衣以衣易非衣或以非衣貿衣或以鍼或鍼筒刀線小段物乃至一丸藥等貿衣結罪是中犯者除貿易若比丘取非親里比丘尼衣捨墮此戒捨懺還衣等法於作持中明若捨衣竟不還等得罪如上此戒具五緣方成本罪一有貪好慢教心二是非親里比丘尼三作非親里比丘尼想四物非貿易五衣財應量兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者從親里尼邊取衣若貿易為僧為佛圖者及最初未制戒等是為不犯會採僧祗律云若比丘從非親里比丘尼取衣許貿易自不與不教他人與不自語尼言後爾許時當與汝衣不教人如是語尼若還尼先衣是不應與應與餘衣截本衣還是不名貿謂將尼衣割截已仍復還之得彼全衣已與減少衣是不名與應與全足衣取彼衣已與鉢若小鉢若鍵鎡若以飲食及餘物與是不名貿應與衣也若比丘取非親里比丘尼衣已不與直不教與不自語不教人語捨去離見聞處波夜提罪若取衣已不與直乃至不教人語若坐若臥若入定皆波夜提罪若非親里比丘尼與知識沙彌衣作是言沙彌我與汝是衣汝持是衣與某甲比丘可得福德比丘取者無罪如是與知識沙彌尼式叉尼優婆塞優婆夷言我與汝此衣汝持此衣施與尊者某甲比丘可得功德比丘取者無罪五分律云從非親里式叉摩那沙彌尼取衣突吉羅若親里犯戒邪見從取衣突吉羅根本律云非親里親里想非親里非親里疑皆捨墮親里非親里想親里非親里疑得惡作罪若尼將衣施僧或為說法或為受具時施或見被賊故施或尼多獲利養持衣物到苾芻所置地求受棄之而去取亦無犯薩婆多論云取應量衣捨墮不應量衣物等突吉羅此戒大乘不論親里非親里但觀可取不可取然在末世慎護法門尤宜避其嫌疑第五使尼浣衣戒若比丘令非親里比丘尼浣故衣若染若打尼薩耆波逸提緣起此戒有二制佛在舍衛國時尊者迦留陀夷與偷蘭難陀比丘尼露形而坐彼此欲心相視尊者尋失不淨污安陀會尼請浣之得此衣已即於屏處以爪扴取不淨著口中及小便道中後遂有娠諸尼詰知其故曰諸比丘轉白世尊訶責黑光此初結戒也於是諸比丘各各畏慎不敢令親里尼浣染打故衣佛慈開聽更增非親里之言是第二結戒也由除婬染煩惱制斯學處乃初篇婬根本種類釋義律云非親里如上故衣者乃至一經身著五分律云經體有垢膩名故衣衣有十種如上善見律云得使出家女乃至孫女浣不得使出家婦兒婦浣非親故浣染打者律攝云浣者下至以水一浸即名為浣染者乃至一入染汁打者下至將手一打一拍結罪是中犯者若比丘令非親里比丘尼浣故衣若染若打三捨墮彼浣染不打二捨墮一突吉羅彼浣不染而打二捨墮一突吉羅彼不浣而染打二捨墮一突吉羅彼不浣染打三突吉羅衣但一捨即淨墮罪隨有三二須悔若使非親里尼浣染打新衣突吉羅此戒捨懺還衣等法於作持中明若捨衣竟不還等得罪如上此戒具四緣方成本罪一是非親里尼二有欲染心三是已故衣四浣染打竟兼制比丘尼突吉羅同制不同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者與親里尼故衣浣染打若病浣染打若為僧為佛圖浣染打若借他衣浣染打及最初未制戒等是為不犯會採五分律云若令非親里浣染打而親里浣染打若令非親里浣染打而親里非親里共浣染打若令親里非親里共浣染打而親里浣染打若令親里非親里共浣染打而非親里浣染打若令親里非親里共浣染打而親里非親里共浣染打皆犯捨墮若衣未可浣染打而令非親里浣染打突吉羅若令親里浣染打而非親里浣染打不犯根本律云若非親族尼作非親族想令浣染打犯捨墮若非親族尼疑亦捨墮若是親族尼作非親族想若是親族尼而起疑心皆得惡作罪僧祗律云若為和尚阿闍黎持衣使尼浣越毗尼罪十誦律云先自小浣更令浣染打皆突吉羅薩婆多論云此戒應量不應量衣一切犯摩得勒伽云使非親里尼浣尼師壇捨墮浣褥枕等突吉羅律攝云若是老病無力或苾芻尼恭敬尊重情樂為浣及是門徒悉皆無犯此戒大乘同學內護僧制外息世譏附考律攝云若衣須洗者或時自洗或遣門徒勿不用心令衣有損凡洗浣衣有五種利除臭穢氣蟣虱不生身無瘙癢能受染色堪久受用不洗衣者翻成五失著染色衣亦有五利順聖形儀故令離傲慢故不受塵垢故不生蟣虱故觸時柔輭易將護故過分浣衣有五種失能令疾破故不堪苦用故受用勞心故無益煩勞故障諸善品故著好染色衣亦有五失自長驕恣生他嫉心故令他知是冶容好色故能令求時多勞苦故能障善品事故過染損衣用不牢故過打亦有五失同此又難陀苾芻過打衣故佛言受用衣者不應打不極打若於施主得極打衣謂細心搥打必致光亮有好光色揉壞而用或置露中摩使光失或可以水灑浸而用故知遮其過打過打即極打不遮其打第六非親乞衣戒若比丘從非親里居士若居士婦乞衣除餘時尼薩耆波逸提餘時者若比丘奪衣失衣燒衣漂衣是謂餘時緣起此戒有六制佛在舍衛國城中有長者晨朝詣園遊觀已迴車詣祗桓精舍見䟦難陀釋子禮敬聽法䟦難陀說法開化勸令歡喜長者問云欲何所須願見告語報言無所須長者固問若有所須莫有疑難報言止止即使我有所須不能見與長者復請乃言汝所著者可與我長者身著貴價廣長白氎衣長者報言明日來至我家中我當相與䟦難陀言我先語汝正使所須汝俱不能與我今果如是長者云非為不與但明日來若與此衣或更好者若即脫此衣與汝我不能無衣入城難陀固求不止長者不悅脫衣與之乘車著一衣入城守門者疑被賊劫長者具說其由居士譏嫌謂檀越雖施無厭而受者應知足佛知故制不得從居士索衣此初結戒也於是諸比丘畏慎不敢從親里居士索衣世尊復聽從乞是第二結戒也後有眾多比丘在拘薩羅國安居竟持衣鉢往世尊所晝日熱不可行夜行遂失正道為賊所劫露形立祗桓門外諸比丘疑為尼犍子報優波離問知其故即借衣著見佛佛慰問已具白因緣佛乃制裸形而行者突吉羅若爾時當以軟草若樹葉覆形應往寺邊若先有長衣應取著若無者諸知友比丘有長衣應取著若知友無衣應問僧中有何等衣可分若有者當與若無者應問有臥具不若有者當與若不與應自開庫看若有褥若地敷若氎若被應擿解取裁作衣以自覆形出外乞衣時諸比丘不敢持此處物往彼處佛言聽時諸比丘奪衣失衣燒衣漂衣畏慎不敢著僧衣佛言聽著彼得衣已僧衣不還本處佛言不應爾若得衣已應浣染縫治安本處若不爾如法治時有比丘奪衣失衣燒衣漂衣皆畏慎不敢從非親里居士居士婦乞衣佛言聽乞故有除餘時等緣是故此戒初則創制遂復隨開共有六翻結戒也由生煩惱令他不樂長自貪求因譏嫌事制斯學處釋義文分二節從非親里下明其所犯除餘時下明其緣開律云親里非親里如上居士如上乞者謂從彼乞求而得前第四戒制不從出家人乞出家人中唯取尼結戒此戒制不從在家人乞其在家人中無論男女凡是非親里者悉皆不聽衣有十種如上除餘時者謂在難緣聽允從乞奪衣者僧祗律云若王奪若賊奪若女人起欲心奪若父母親里欲令罷道故奪失衣者謂自失落或自藏衣後忘憶處所或藏久朽壞不可被著燒衣者謂被火焚燒漂衣者謂被水漂也結罪是中犯者比丘捨墮此戒捨懺還衣等法於作持中明若捨衣竟不還等得罪如上此戒具五緣方成本罪一貪好慢教二無難乞求三主非親里四價色量如己所囑五衣已入手兼制比丘尼捨墮同制同學式叉摩那沙彌沙彌尼突吉羅是為犯隨開不犯者奪衣失衣燒衣漂衣得從非親里居士若居士婦乞若從親里乞若從同出家人乞言同出家者揀非異道出家或為他乞他為己乞不求而得及最初未制戒等是為不犯會採僧祗律云若比丘從非親里乞衣若身往乞若遣人往乞若作寒熱相乞云何寒相若比丘冬分夜雨雪時而云夜者西域時分不以日言但以夜論其時分也著弊故衣詣檀越家現寒顫相爾時檀越禮足問言阿闍黎無有時衣耶何以寒凍報言無有汝父母在時恒為我作時衣今汝父母去世誰當為我作者非但汝父母死亦是我父母無常檀越即言莫怨恨我當為作時衣是名寒相乞若得衣者捨墮云何熱相若比丘五六月大熱時著厚納衣流汗詣檀越家現熱相亦如上言若得衣者捨墮若說法乞云何說法是比丘為衣故與檀越說偈言得生最勝處若人以衣施以樂布施者人天受福報生天得好色天寶冠莊嚴衣施比丘故生生自然衣是名說法乞若得者捨墮若乞漉水囊若小補衣物若繫頭物若裹瘡物若衣褋若衣中一條皆不犯若為和尚乞為阿闍黎乞越毗尼罪若為墖僧不犯十誦律云犯有三種謂價色量價者若比丘語居士與我好價衣若得衣者捨墮不得突吉羅乃至直二百三百錢價衣犯亦如是此以西域大錢而言如前盜戒中說色者若比丘語居士與我青色衣若黃赤白黑衣乃至劫貝等衣犯亦如是量者若比丘語居士與我四肘衣五肘六肘乃至十八肘衣犯亦如是如是色量衣若索此得彼皆突吉羅根本律云乞時得惡作罪所得衣物若價若色若量與所乞相應者捨墮不相應者無犯毗婆沙論云二人共乞一衣突吉羅從親里貧乏者索突吉羅與少更索多突吉羅若非親里先請與衣言請者謂不往乞而彼自發心後貧乏從索突吉羅與少更索多突吉羅為他索亦突吉羅本律若為他求不犯原出自心不受他囑若准薩婆多皆突吉羅由見他貧乏不生慈愍欲他為我而作方便所謂聖制從緣推因開遮此戒大乘為眾生故雖不同學然須籌量施主堪與不堪與可受不可受善護他心增長淨信可也附考僧祗律云若比丘三由延內有衣者若失僧伽黎多羅僧在不應乞若失僧伽黎多羅僧安陀會在不應乞若失三衣若覆瘡衣在不應乞若失三衣覆瘡衣若雨浴衣在不應乞若失三衣覆瘡衣雨浴衣若覆臥褥具在不應乞若失三衣乃至褥具若任衣在任衣謂堪造衣之餘財也長兩肘廣一肘不應乞何以故是比丘應著是下衣往三由延受先衣若道中有諸難事不得往趣衣者得乞無罪音義夜摩天夜摩此翻善時亦名時分謂其時時唱快樂故以蓮花開合分其晝夜此天依空而居按論云人間二百年為此天一晝夜則人間七萬二千年方為此天一年若此天壽二千歲則當人間一十四億四百萬年矣屏覆屏者所以蔽也覆者蓋也齋優婆私齋者是其名也或是受八戒齋者優婆私或作優婆斯即優婆夷也奘師云鄔波斯迦唐言近事女謂親近承事佛法僧故若是在家女人受三皈五戒已則能親事佛法比丘尼眾也舊云優婆斯優婆夷皆譌也有云受八戒者名近住女為近阿羅漢住也涅槃疏云一日一夜受八戒者名為善宿女是人善心離破戒宿故毗舍佉母或作吠舍佉此譯為別枝即是氐宿以生日所值宿為名也五分律云毗舍佉壻名鹿子鹿子敬毗舍佉猶敬母時人遂名為毗舍佉鹿子母賢愚經云此是波斯匿王弟曇摩訶羨女也羨昔因罪迯奔得叉尸利國便於彼土安家納娶而生此女此女辯才智慧後嫁舍衛國梨耆彌大臣第七兒為婦波斯匿王聞其智辯即拜為王妹後生三十二卵卵各出一兒顏貌端嚴勇健無雙一人之力能敵千夫時毗舍佉信心開解請佛及僧佛為說法合家得須陀洹道佛後為說法即得阿那含道於優婆夷中智慧辯才最為第一闚音傾頭門中邪視也明相梵語阿樓那善見律云阿留那漢言明相明了論云東方已赤通慧指歸云此方約日未出前二刻為曉此為明相也又以觀見掌文為限也十誦律名地了時謂見地色明了故也復此閻浮提地北有大樹王名閻浮檀金若日照彼樹則有黑色若照彼樹葉則有青色若過樹照閻浮界則有白色於三色中白色為正也自貽伊戚謂憂戚皆自造而成非關他事猶云自作孽不可活之謂也六羣比丘或云六眾謂聚集成眾作諸非威儀事羣出隊入故也一難陀二䟦難陀三迦留陀夷四闡陀五馬宿六滿宿此之六人無法不曉通達三藏內教精諳五明百藝之術難陀䟦難陀二人多貪亦云多瞋善解算數陰陽變運說法論議迦留陀夷多欲深通射道善解阿毗曇後得漏盡證阿羅漢果闡陀多瞋亦云多癡亦通射道解阿毗曇後得漏盡成阿羅漢馬宿滿宿多癡亦云多瞋善於音樂種種戲笑事事皆能亦巧說法論議亦解阿毗曇此六人俱是豪族共相影響契交為友宣通佛教內為法門之棟梁外作佛教之大護所謂大權示現也人各弟子九人共為六十故號六羣比丘也乾痟謂渴病也又云乾枯病以其肌膚痟瘦故僧祗律云消盡病正法念經云有虫名咬脂住在身中脂脉之內若食有過若多睡眠此虫則瞋不消飲食或生疥瘙或乾痟等病八樹中間西域種樹之法相間七弓方植一樹八樹但有七間七七該四十九弓以中人四肘為一弓一尺八寸為一肘七尺二寸為一弓七七四十九弓總該三十五丈二尺八寸若無界蘭若周圍四十九丈一尺二寸是為界也根本部以中人二十四指為一肘此當笏尺一尺五寸為一肘七弓之量准數可知肘者從臂節至指端蓮華色比丘尼根本律云得叉尸羅城有一長者娶妻未久便生一女身有三德如青嗢鉢羅華一者身黃金色猶如華鬘二者目紺青色猶如華葉三者香氣氛馥猶如華香因此立字名青蓮華婆沙論云容貌端正色作優鉢羅華色此人前世久遠劫時作婆羅門女父母家人入海採寶是女在後不能自活便與諸婬女共住一處賣色自供此女色貌不豐無人往來常自咎責何以獨爾時世有辟支佛一切敬仰有人語言汝能供養辟支佛者隨心所欲世世如願因辦美好飲食以優鉢羅華覆上奉辟支佛即發願言令我世世常得女人端正無雙為人所敬又願得如沙門所得功德令我得之是故今世作女顏貌第一以本願故今得漏盡佛所稱讚於比丘尼中有大神通力最為第一也畜持五衣比丘尼五衣者准根本律云一僧伽胝即僧伽黎二嗢怛羅僧伽即多羅僧三安怛婆娑即安陀會四厥蘚洛迦即僧祗支下裙也五僧脚踦即覆肩衣名掩腋襯衣會正記乃唐允堪律師所著而緇門警訓常引其文然全本未見想已失矣偷蘭難陀比丘尼亦云偷羅難陀或云吐羅難陀按偷蘭是大亦名麤麤即大義難陀此云歡喜是比丘尼解通三藏善閑說法六羣比丘尼中之最者是種種女分別功德經云是阿難妹也爪扴扴音甲謂以爪扴括取不淨也娠婦懷孕也祗桓精舍祗桓者即祗陀之訛也此翻勝精舍者釋迦譜云息心所棲故曰精舍又云非麤暴者所居故云精舍藝文類云非由其舍精妙良由精練行者所居故云精舍按感通記云祗桓寺之基址有八十頃地一百二十院准約東西近有十里南北七百餘步祗陀須達二人共造涅槃經云須達取金隨集布地一日之中唯五百步金未周祗陀即語須達餘未徧者不復須金請以見與我自為佛造立門樓常使如來經由出入祗陀長者自造門樓須達長者七日之中成立大房足三百口禪坊靜處六十三所冬室夏堂各各別異凡所應用無不備足法顯傳云出舍衛城南門千二百步道西長者須達起精舍處也拘薩羅國大論云憍薩羅國是佛生地如佛答頻婆娑羅王偈云有妙好國土在於雪山邊豐樂多異寶名曰憍薩羅日種釋諸子我在是中生心厭老病死出家求佛道諸經中說佛生迦毗羅國何以論云生於憍薩羅國然憍薩羅是都城也以彼此相鄰同是中印土境尼犍子尼犍此翻離繫是外道之都名也或云尼乾或云尼乾陀應云泥健連他而譯為不繫也其外道拔髮露形無所貯畜以手乞食隨得即噉者也由延亦云由旬亦云踰繕那天竺里數名也大論云由旬三別大者八十里中者六十里下者四十里根本羯磨註曰言踰繕那者既無正翻義當東夏一驛可三十餘里舊云由旬者訛也若准西域俗法四俱盧舍為一踰繕那計一俱盧舍可有八里四共三十二里故今作一驛之程庶無遠滯業疏云此無正翻乃是輪王巡狩一停之舍如此方舘驛也冶音野裝飾也
